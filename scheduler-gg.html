<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>돌봄매트 경기 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#191a20;--card:#21222c;--card2:#282a36;--border:rgba(255,255,255,.05);--text:#f2f2f7;--dim:#8e8e93;--sub:#aeaeb2;--blue:#5AC8FA;--green:#30D158;--red:#FF453A;--yellow:#FFD60A;--pink:#FF6482;--purple:#BF5AF2;--orange:#FF9F0A;--cyan:#64D2FF;--lime:#a3e635;--rose:#FF6482;--teal:#40E0D0;--font:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding-bottom:80px;-webkit-font-smoothing:antialiased}
.hd{padding:20px 16px 12px;position:sticky;top:0;z-index:100;background:var(--bg)}
.hd h1{font-size:20px;font-weight:900;letter-spacing:-.3px}.hd-sub{font-size:12px;color:var(--dim);margin-top:4px}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);z-index:100;max-width:600px;margin:0 auto;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav a{flex:1;padding:8px 4px 12px;text-align:center;font-size:10px;font-weight:600;color:var(--dim);text-decoration:none;border-top:2px solid transparent;transition:color .15s}
.nav a.on{color:var(--text);border-top-color:var(--text)}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
.pane{display:none;padding:8px 16px 20px}.pane.on{display:block}

/* Emp Badge */
.emp-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.emp-badge:active{transform:scale(.92)}

/* Day Card - 토스 스타일 */
.daycard{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;border:none}
.daycard-hd{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px}
.daycard-date{font-size:18px;font-weight:900;letter-spacing:-.5px}.daycard-dow{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
.dow-mon{background:rgba(90,200,250,.12);color:var(--blue)}.dow-tue{background:rgba(48,209,88,.12);color:var(--green)}.dow-wed{background:rgba(255,214,10,.12);color:var(--yellow)}.dow-thu{background:rgba(191,90,242,.12);color:var(--purple)}.dow-fri{background:rgba(255,100,130,.12);color:var(--pink)}.dow-sat{background:rgba(90,200,250,.12);color:var(--blue)}.dow-sun{background:rgba(255,69,58,.12);color:var(--red)}
.daycard-off{padding:6px 18px;font-size:11px;color:var(--red);font-weight:500}
.daycard-body{padding:4px 14px 14px}

/* Team Job Block - 토스 카드 */
.tjob{background:var(--card2);border-radius:14px;padding:14px 16px;margin:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tjob:active{background:rgba(255,255,255,.04);transform:scale(.99)}
.tjob-team{display:inline-block;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:6px}
.tjob-time{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;flex-shrink:0}
.tjob-time.am{background:rgba(255,214,10,.1);color:var(--yellow)}.tjob-time.pm{background:rgba(191,90,242,.1);color:var(--purple)}
.mat{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.mat-marble{background:rgba(90,200,250,.12);color:var(--blue)}.mat-cotton{background:rgba(48,209,88,.12);color:var(--green)}.mat-modern{background:rgba(255,69,58,.12);color:var(--red)}.mat-beige{background:rgba(255,214,10,.12);color:var(--yellow)}
.new-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(255,69,58,.15);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Unassigned */
.ujob{background:var(--card2);border:1px dashed rgba(255,214,10,.2);border-radius:14px;padding:14px 16px;margin:6px 0}
.ujob-title{font-size:11px;color:var(--yellow);font-weight:700;margin-bottom:8px}

/* Team Setup */
.tcard{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;border:none}
.tcard h3{font-size:15px;font-weight:800;margin-bottom:14px}
.tslot{min-height:50px;background:var(--card2);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.tmem{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.tmem .x{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.pool{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.pool-mem{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.pool-mem:active{transform:scale(.95)}

/* Drag & Drop */
.drag-ghost{position:fixed;z-index:500;pointer-events:none;opacity:.9;transform:scale(1.08);filter:brightness(1.2)}
.drag-over{outline:2px dashed var(--blue);outline-offset:-2px;background:rgba(90,200,250,.08)!important}
.drag-src{opacity:.3;transform:scale(.9)}
.tslot.drag-over,.pool.drag-over{outline:2px dashed var(--blue);outline-offset:-2px;background:rgba(90,200,250,.08)!important}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin:8px 0;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#000}.btn-green{background:var(--green);color:#000}.btn-red{background:rgba(255,69,58,.12);color:var(--red)}

/* Fair */
.fcard{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;border:none}
.frow{display:flex;align-items:center;gap:10px;margin:8px 0}
.fname{min-width:44px;font-size:12px;font-weight:700}
.fbar{flex:1;height:22px;background:var(--card2);border-radius:8px;overflow:hidden}
.ffill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:20px}
.fval{min-width:50px;text-align:right;font-size:11px;font-family:monospace;color:var(--dim)}
.sec{font-size:14px;font-weight:800;margin-bottom:10px;letter-spacing:-.2px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:14px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.toast-ok{background:rgba(48,209,88,.9);color:#000}.toast-copy{background:rgba(90,200,250,.9);color:#000}

/* Colors */
.tc0{background:var(--blue);color:#000}.tc1{background:var(--green);color:#000}.tc2{background:var(--yellow);color:#000}.tc3{background:var(--pink);color:#fff}.tc4{background:var(--purple);color:#fff}.tc5{background:var(--orange);color:#000}.tc6{background:var(--cyan);color:#000}.tc7{background:var(--lime);color:#000}.tc8{background:var(--rose);color:#fff}.tc9{background:var(--teal);color:#000}
.tl0{background:rgba(90,200,250,.12);color:var(--blue)}.tl1{background:rgba(48,209,88,.12);color:var(--green)}.tl2{background:rgba(255,214,10,.12);color:var(--yellow)}.tl3{background:rgba(255,100,130,.12);color:var(--pink)}.tl4{background:rgba(191,90,242,.12);color:var(--purple)}.tl5{background:rgba(255,159,10,.12);color:var(--orange)}.tl6{background:rgba(100,210,255,.12);color:var(--cyan)}.tl7{background:rgba(163,230,53,.12);color:var(--lime)}.tl8{background:rgba(255,100,130,.12);color:var(--rose)}.tl9{background:rgba(64,224,208,.12);color:var(--teal)}

.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:14px;font-family:var(--font);outline:none}

/* 캘린더 */
.cal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.cal-overlay.show{display:flex}
.cal-sheet{background:var(--card);border-radius:24px 24px 0 0;max-width:500px;width:100%;padding:24px 18px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cal-hd h3{font-size:17px;font-weight:900}
.cal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-dow{font-size:10px;color:var(--dim);font-weight:700;padding:4px 0}
.cal-day{padding:8px 0;border-radius:10px;font-size:13px;font-weight:500;color:var(--text)}
.cal-day.off{background:rgba(255,69,58,.15);color:var(--red);font-weight:900}
.cal-day.work{background:rgba(48,209,88,.08);color:var(--green)}
.cal-day.today{border:2px solid var(--blue)}
.cal-day.empty{color:transparent}
.cal-day.sun{color:var(--red)}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:11px;color:var(--dim)}
.cal-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.cal-legend .lg-off::before{background:rgba(248,113,113,.3)}
.cal-legend .lg-work::before{background:rgba(52,211,153,.2)}
.emp-badge{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;user-select:none}
.emp-badge::after{content:'📅';font-size:8px;position:absolute;top:-2px;right:-2px}

/* 출발확인 */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:20px;max-width:400px;width:100%;padding:24px;animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:18px;font-weight:900;text-align:center;margin-bottom:16px}
.confirm-item{padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px}
.confirm-label{font-size:10px;color:var(--dim);font-weight:700;margin-bottom:4px}
.confirm-value{font-size:15px;font-weight:700}
.confirm-btn{display:block;width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:900;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin-top:16px}
.confirm-ok{background:var(--green);color:#000}
.confirm-cancel{background:var(--card2);color:var(--dim);margin-top:8px}
.confirmed-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(52,211,153,.15);color:var(--green)}
.depart-btn{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(251,191,36,.2);color:var(--yellow);cursor:pointer;border:1px solid rgba(251,191,36,.3);animation:pulseBtn 2s infinite}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.3)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}
</style>
</head>

// ===== Distance (Google Geocoding API) =====
async function geo(addr){
if(DC[addr])return DC[addr];
try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key=AIzaSyAEz2OXudxNoTTn2ueFKWm7KGSnwDW83mw&language=ko');
const d=await r.json();if(d.results&&d.results[0]){const l=d.results[0].geometry.location;DC[addr]={lat:l.lat,lng:l.lng};localStorage.setItem('s4_dc',JSON.stringify(DC));return DC[addr]}}catch(e){}
return null}

function hav(a1,n1,a2,n2){const R=6371,x=(a2-a1)*Math.PI/180,y=(n2-n1)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}

function getOffice(addr){return SOUTH.some(r=>addr.includes(r))?OFF_B:OFF_A}

async function calcDist(addr){const o=getOffice(addr);const c=await geo(addr);if(!c)return 0;return Math.round(hav(o.lat,o.lng,c.lat,c.lng))}

// ===== CSV Parse (새 시트 구조) =====
// A:시간 B:시공일 C:주소 D:연락처 E:신축여부 F:평수 G:시공범위 H:제품 I:수량 J:사수 K:부사수 L:차량번호 M:결제방법 N:판매금액 O:결제상태 P:추천인 Q:유입경로 R:카톡URL S:채널명
let OFFS={}; // {date: Set(이름)} 휴무 데이터

function parseCSV(text){
const lines=text.split('\n');J=[];
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[2])continue;
if(!r[0]||!r[0].trim())continue; // 시간 없으면 스킵
const mat=[];if(r[8]&&r[9]&&parseInt(r[9])>0){mat.push({t:r[8].trim(),q:parseInt(r[9])})}
else if(r[8]){mat.push({t:r[8].trim(),q:1})}
let ds=r[2];
if(ds.length===8)ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
if(ds.includes('T'))ds=ds.substring(0,10);
// 날짜 형식 보정 (구글시트 Date → YYYY-MM-DD)
if(ds.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
  const parts=ds.split('-');
  ds=parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
}
const id=ds+'_'+r[0]+'_'+i;
const doff=[]; // 휴무는 OFFS에서 가져옴
if(OFFS[ds])OFFS[ds].forEach(n=>doff.push(n));
J.push({id,time:r[0],category:r[1]||'',addr:r[3]||'',date:ds,phone:r[4]||'',chatUrl:r[18]||'',channelName:r[19]||'',py:r[6]||'',scope:r[7]||'',doff,mat,dist:0,isNew:false,sasu:(r[10]||'').trim(),busasu:(r[11]||'').trim()})}}

// 휴무 CSV 파싱 (A:날짜 B:요일 C~L:이름1~이름10)
function parseOffCSV(text){
const lines=text.split('\n');
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[0])continue;
let ds=r[0].trim();
if(ds.includes('T'))ds=ds.substring(0,10);
// YYYYMMDD → YYYY-MM-DD
if(ds.match(/^\d{8}$/))ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
// YYYY-M-D → YYYY-MM-DD
if(ds.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
  const parts=ds.split('-');
  ds=parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
}
if(!ds.match(/^\d{4}-\d{2}-\d{2}$/))continue; // 유효한 날짜만
// C~L열 (r[2]~r[11]) 모든 이름 읽기
for(let ci=2;ci<=11;ci++){
  if(!r[ci]||!r[ci].trim())continue;
  const name=matchEmpName(r[ci]); // 풀네임 → 짧은 이름 매칭
  if(name){
    if(!OFFS[ds])OFFS[ds]=new Set();
    OFFS[ds].add(name);
  }
}
}}

// 시트 이름 → 직원 짧은 이름 매칭 (이준형→준형, 윤철→윤철)
function matchEmpName(sheetName){
if(!sheetName)return null;
const n=sheetName.trim();
// 정확히 일치
if(E.includes(n))return n;
// 3글자 이상이면 성 제거 후 매칭
if(n.length>=3){const short=n.slice(1);if(E.includes(short))return short;}
// 직원 이름이 시트 이름에 포함
const found=E.find(e=>n.includes(e));
if(found)return found;
return null;
}

// ===== Auto Assign =====
async function autoAssign(){
isAssigning=true;
toast('⏳ 자동 배정 중...','ok');

// 거리 계산
for(const j of J){if(j.addr&&!j.offOnly&&!j.dist){j.dist=await calcDist(j.addr)}}

const bd={};J.filter(j=>!j.offOnly).forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const empDist={};E.forEach(e=>empDist[e]=0);

// 기존 배정 거리 반영
J.forEach(j=>{if(A[j.id]){A[j.id].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0})}});

// ===== 공정성 점수 계산 (이번 달 누적) =====
const fairScore={};
const now2=new Date();const curY=now2.getFullYear(),curM=now2.getMonth();
const monthJobs=J.filter(j=>!j.offOnly&&new Date(j.date).getFullYear()===curY&&new Date(j.date).getMonth()===curM);
E.forEach(e=>{fairScore[e]={workDays:new Set(),double:0,km:0,days:{}}});
monthJobs.forEach(j=>{const t=A[j.id];if(t)t.forEach(e=>{if(!fairScore[e])return;
  fairScore[e].workDays.add(j.date);
  if(j.time!=='as'){if(!fairScore[e].days[j.date])fairScore[e].days[j.date]=0;fairScore[e].days[j.date]++}
  const dKey=j.addr?j.addr.replace(/[.#$/\[\]]/g,'_'):'';
  fairScore[e].km+=DIST[dKey]||0;
})});
E.forEach(e=>{fairScore[e].double=Object.values(fairScore[e].days).filter(c=>c>=2).length;fairScore[e].wd=fairScore[e].workDays.size});
// 평균 계산 (편차 기반 점수: 평균보다 많으면 +, 적으면 -)
const avgWd=E.reduce((s,e)=>s+fairScore[e].wd,0)/Math.max(E.length,1);
const avgDb=E.reduce((s,e)=>s+fairScore[e].double,0)/Math.max(E.length,1);
const avgKm=E.reduce((s,e)=>s+fairScore[e].km,0)/Math.max(E.length,1);
// 팀 공정성 점수: 평균 대비 초과분 × 가중치 (높을수록 배정 후순위)
function teamFairPenalty(members){
  let total=0;
  members.forEach(m=>{if(!fairScore[m])return;
    total+=(fairScore[m].wd-avgWd)*3;     // 근무일 1일 초과 = 3점
    total+=(fairScore[m].double-avgDb)*8;  // 두탕 1회 초과 = 8점 (인센티브 기회 균등 배분)
    total+=((fairScore[m].km-avgKm)/20);   // 이동거리 20km 초과 = 1점
  });
  return total/Math.max(members.length,1);
}

// 팀 그룹 생성 함수
function makeGroups(pool,jobCnt){
  if(teams.length){
    const avTeams=teams.map((t,i)=>({idx:i,members:t.filter(m=>pool.includes(m))})).filter(t=>t.members.length>0);
    const grouped=avTeams.map(t=>t.members);
    const inTeam=new Set();grouped.forEach(g=>g.forEach(m=>inTeam.add(m)));
    const orphans=pool.filter(m=>!inTeam.has(m));
    const fullTeams=grouped.filter(g=>g.length>=2);
    const soloTeam=grouped.filter(g=>g.length===1).map(g=>g[0]);
    const allSingles=[...soloTeam,...orphans];
    const paired=[];
    for(let i=0;i<allSingles.length;i+=2){
      if(i+1<allSingles.length)paired.push([allSingles[i],allSingles[i+1]]);
    }
    return [...fullTeams,...paired];
  }
  const sorted=[...pool];
  const groups=[];
  for(let i=0;i<sorted.length;i+=2){
    if(i+1<sorted.length)groups.push([sorted[i],sorted[i+1]]);
  }
  return groups;
}

// ===== 월간 팀별 누적 이동거리 (날짜 간 공유) =====
const crossDateKm={};
E.forEach(e=>{crossDateKm[e]=0});
// 기존 배정의 이번달 거리 반영
J.filter(j=>!j.offOnly&&new Date(j.date).getFullYear()===curY&&new Date(j.date).getMonth()===curM).forEach(j=>{
  if(A[j.id])A[j.id].forEach(e=>{if(crossDateKm[e]!==undefined)crossDateKm[e]+=j.dist||0});
});
function teamCrossKm(members){
  let t=0;members.forEach(m=>{t+=crossDateKm[m]||0});return t/Math.max(members.length,1);
}

for(const date of Object.keys(bd).sort()){
// 3일 뒤부터만 전체 자동배정 (오늘~모레는 확정된 배정 보호)
const cutoff=new Date();cutoff.setDate(cutoff.getDate()+3);
const cutoffStr=cutoff.toISOString().slice(0,10);

  const pm2=dj2.filter(j=>(j.time.startsWith('오후')||j.time==='as')&&j.addr&&j.addr.trim());
  const amUsed=new Set();
  am2.forEach(j=>{if(A[j.id])A[j.id].forEach(e=>amUsed.add(e))});
  
  // ── 오전 처리 ──
  am2.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&A[j.id]&&A[j.id].length===1).forEach(j=>{

        if(partner){A[j.id]=[sasu,partner].sort();amUsed.add(partner);return}
      }
    }
    const free=avail2.filter(e=>!amUsed.has(e)&&e!==sasu);
    if(free.length){A[j.id]=[sasu,free[0]].sort();amUsed.add(free[0])}
  });
  const amEmpty2=am2.filter(j=>!A[j.id]&&!SKIP.has(j.id)&&!LOCK.has(j.id));
  if(amEmpty2.length){
    const amFree2=avail2.filter(e=>!amUsed.has(e));
    const amG2=makeGroups(amFree2,amEmpty2.length);
    let gi2=0;
    amEmpty2.forEach(j=>{
      if(amG2.length){
        A[j.id]=[...amG2[gi2%amG2.length]].sort();
        amG2[gi2%amG2.length].forEach(e=>amUsed.add(e));
        gi2++;
      }
    });
  }
  
  // ── 오후 처리 (지역 매칭 + 공평 분배) ──
  const pmUsed=new Set();
  pm2.forEach(j=>{if(A[j.id])A[j.id].forEach(e=>pmUsed.add(e))});
  
  pm2.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&A[j.id]&&A[j.id].length===1).forEach(j=>{
    const sasu=A[j.id][0];
    if(teams.length){
      const myTeam=teams.find(t=>t.includes(sasu));
      if(myTeam){
        const partner=myTeam.find(m=>m!==sasu&&avail2.includes(m)&&!pmUsed.has(m));
        if(partner){A[j.id]=[sasu,partner].sort();pmUsed.add(partner);return}
      }
    }
    const free=avail2.filter(e=>!pmUsed.has(e)&&e!==sasu);
    if(free.length){A[j.id]=[sasu,free[0]].sort();pmUsed.add(free[0])}
  });
  
  const pmEmpty2=pm2.filter(j=>!A[j.id]&&!SKIP.has(j.id)&&!LOCK.has(j.id));
  if(pmEmpty2.length){
    // 오전 팀 목록 (마지막 시공 주소 + GPS 좌표 + 건수 추적)
    const amTeamInfo=[];
    am2.forEach(j=>{if(A[j.id]&&A[j.id].length>=2){

    }});

    pm2.forEach(j=>{if(A[j.id]){
      const key=[...A[j.id]].sort().join('+');
      const t=amTeamInfo.find(ti=>ti.key===key);
      if(t)t.pmCount++;
    }});

    // GPS 좌표 미리 계산 (오전 팀 마지막 위치 + 오후 건 위치)
    for(const ti of amTeamInfo){

      const allAssigned=new Set();
      [...am2,...pm2].forEach(jj=>{if(A[jj.id])A[jj.id].forEach(e=>allAssigned.add(e))});
      const idlePeople=avail2.filter(e=>!allAssigned.has(e)&&!pmUsed.has(e));
      const idleTeams=makeGroups(idlePeople,1);
      if(idleTeams.length){
        // 대기팀 중 GPS 가장 가까운 팀 (사무실에서 출발)
        let bestIdle=idleTeams[0];
        if(pmGeo&&idleTeams.length>1){
          let minD=9999;
          for(const it of idleTeams){
            const d=hav(OFF_B.lat,OFF_B.lng,pmGeo.lat,pmGeo.lng);
            if(d<minD){minD=d;bestIdle=it}
          }
        }
        A[j.id]=[...bestIdle].sort();
        bestIdle.forEach(e=>{pmUsed.add(e);crossDateKm[e]+=(j.dist||0)});
        return;
      }

      // 2순위: 오전팀 중 GPS 가장 가까운 팀
      const availTeams=amTeamInfo.filter(t=>t.team.every(m=>!pmUsed.has(m)));
      if(availTeams.length){
        availTeams.forEach(t=>{
          t._dist=(t.lastGeo&&pmGeo)?hav(t.lastGeo.lat,t.lastGeo.lng,pmGeo.lat,pmGeo.lng):9999;
        });
        availTeams.sort((a,b)=>{
          const scoreA=a._dist+(a.pmCount*15);
          const scoreB=b._dist+(b.pmCount*15);
          return scoreA-scoreB;
        });
        const best=availTeams[0];
        A[j.id]=[...best.team].sort();
        best.team.forEach(e=>{pmUsed.add(e);crossDateKm[e]+=(j.dist||0)});
        best.pmCount++;
        return;
      }
      // 3순위: 남는 사람
      const freeP=avail2.filter(e=>!pmUsed.has(e));
      const gP=makeGroups(freeP,1);
      if(gP.length){
        A[j.id]=[...gP[0]].sort();
        gP[0].forEach(e=>pmUsed.add(e));
      }
    });
  }
  continue;
}

const dj=bd[date];
const ao=new Set();
if(OFFS[date])OFFS[date].forEach(n=>ao.add(n));
J.filter(jj=>jj.date===date).forEach(jj=>jj.doff.forEach(n=>ao.add(n)));
const avail=E.filter(e=>!ao.has(e));
if(!avail.length)continue;

// 배정 대상 건 (주소 있고, SKIP 아니고, 미배정 또는 1인)
const allJobs=dj.filter(j=>j.addr&&j.addr.trim());
const needWork=allJobs.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&(!A[j.id]||A[j.id].length===1));
if(!needWork.length)continue;

// 팀 생성
const dayTeams=makeGroups(avail,needWork.length);
if(!dayTeams.length)continue;

// 기존 2인 배정은 유지 (해당 팀의 건수에 반영)
const teamLoad={};
dayTeams.forEach(g=>{const k=[...g].sort().join('+');teamLoad[k]={team:[...g],count:0,cities:[]}});
allJobs.forEach(j=>{if(A[j.id]&&A[j.id].length>=2){
  const k=[...A[j.id]].sort().join('+');
  if(teamLoad[k]){teamLoad[k].count++;teamLoad[k].cities.push((j.addr||'').slice(0,2))}
}});

// 1인→2인 보완
needWork.filter(j=>A[j.id]&&A[j.id].length===1).forEach(j=>{
  const sasu=A[j.id][0];
  if(teams.length){
    const myTeam=teams.find(t=>t.includes(sasu));
    if(myTeam){
      const partner=myTeam.find(m=>m!==sasu&&avail.includes(m));
      if(partner){A[j.id]=[sasu,partner].sort();return}
    }
  }
  const myGroup=dayTeams.find(g=>g.includes(sasu));
  if(myGroup){const partner=myGroup.find(m=>m!==sasu);if(partner)A[j.id]=[sasu,partner].sort()}
});

// 미배정 건 GPS 거리 기반 배정
const unassigned=needWork.filter(j=>!A[j.id]);
if(unassigned.length){
  // 각 팀의 마지막 배정 주소 GPS 좌표 계산
  for(const k of Object.keys(teamLoad)){
    const tl=teamLoad[k];
    const lastJob=allJobs.filter(j=>A[j.id]&&[...A[j.id]].sort().join('+')===k).pop();
    tl.lastGeo=lastJob?await geo(lastJob.addr):null;
  }
  // 미배정 건 GPS 좌표 미리 계산
  for(const j of unassigned){if(j.addr&&!j._geo)j._geo=await geo(j.addr)}

  // 오전/오후 분리: 오전 먼저 → 오후는 오전 위치 기반
  const amUn=unassigned.filter(j=>j.time.startsWith('오전')||j.time.includes('2:'));
  const pmUn=unassigned.filter(j=>j.time.startsWith('오후')||j.time==='as');

  // 오전 배정: 건수 균등 라운드로빈
  amUn.forEach(j=>{
    if(A[j.id])return;
    const allTeamsSorted=Object.values(teamLoad).sort((a,b)=>a.count-b.count);
    if(allTeamsSorted.length){
      const best=allTeamsSorted[0];
      A[j.id]=[...best.team].sort();
      best.count++;
      if(j._geo)best.lastGeo=j._geo;
    }
  });

  // 오후 배정: 0건 팀 우선 + GPS 거리
  pmUn.forEach(j=>{
    if(A[j.id])return;
    const pmGeo=j._geo;
    const allTeamsSorted=Object.values(teamLoad);

    if(allTeamsSorted.length&&pmGeo){
      allTeamsSorted.forEach(t=>{
        // 0건 팀은 사무실에서 출발
        const fromGeo=t.lastGeo||OFF_B;
        t._dist=hav(fromGeo.lat,fromGeo.lng,pmGeo.lat,pmGeo.lng);
      });
      // 0건 팀 우선 (count*15) + GPS 거리
      allTeamsSorted.sort((a,b)=>{
        const scoreA=a._dist+(a.count*15);
        const scoreB=b._dist+(b.count*15);
        return scoreA-scoreB;
      });
      const best=allTeamsSorted[0];
      A[j.id]=[...best.team].sort();
      best.count++;
      // 월간 누적 갱신
      best.team.forEach(e=>{crossDateKm[e]+=(j.dist||0)});
      // 이 팀의 마지막 위치를 오후 건으로 갱신 (다음 오후 건 거리 계산에 반영)
      if(pmGeo)best.lastGeo=pmGeo;
    }else{
      // GPS 없으면 건수 가장 적은 팀
      const fairTeam=Object.values(teamLoad).sort((a,b)=>a.count-b.count)[0];
      if(fairTeam){
        A[j.id]=[...fairTeam.team].sort();
        fairTeam.count++;
      }
    }
  });
}}

// ===== 터치 드래그앤드롭 시스템 =====
let dndState=null;
function initDnD(){
const members=document.querySelectorAll('.tmem[data-name],.pool-mem[data-name]');
members.forEach(el=>{
  el.addEventListener('touchstart',dndTouchStart,{passive:false});
  el.addEventListener('mousedown',dndMouseDown);
});
}

function dndTouchStart(e){
const el=e.currentTarget;
const name=el.dataset.name;
if(!name)return;
// 길게 누르기 감지 (200ms)
const timer=setTimeout(()=>{
  e.preventDefault();
  startDrag(el,e.touches[0].clientX,e.touches[0].clientY);
},200);
el._dndTimer=timer;
el._dndMoved=false;
el.addEventListener('touchmove',function onM(ev){
  if(!dndState){
    // 아직 드래그 시작 안 됐으면 타이머 취소 (스크롤 허용)
    const dx=Math.abs(ev.touches[0].clientX-(e.touches[0]?.clientX||0));
    const dy=Math.abs(ev.touches[0].clientY-(e.touches[0]?.clientY||0));
    if(dx>5||dy>5){clearTimeout(timer);el.removeEventListener('touchmove',onM)}
    return;
  }
  ev.preventDefault();
  moveDrag(ev.touches[0].clientX,ev.touches[0].clientY);
},{passive:false});
el.addEventListener('touchend',function onE(ev){
  clearTimeout(timer);
  if(dndState)endDrag(ev.changedTouches[0].clientX,ev.changedTouches[0].clientY);
  el.removeEventListener('touchend',onE);
},{once:true});
el.addEventListener('touchcancel',function(){clearTimeout(timer);cancelDrag()},{once:true});
}

function dndMouseDown(e){
const el=e.currentTarget;
if(e.target.classList.contains('x'))return; // X 버튼은 무시
const name=el.dataset.name;
if(!name)return;
e.preventDefault();
startDrag(el,e.clientX,e.clientY);
function onM(ev){ev.preventDefault();moveDrag(ev.clientX,ev.clientY)}
function onU(ev){endDrag(ev.clientX,ev.clientY);document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU)}
document.addEventListener('mousemove',onM);
document.addEventListener('mouseup',onU);
}

function startDrag(el,x,y){
const rect=el.getBoundingClientRect();
const ghost=el.cloneNode(true);
ghost.className=el.className+' drag-ghost';
ghost.style.width=rect.width+'px';
ghost.style.left=(x-rect.width/2)+'px';
ghost.style.top=(y-rect.height/2)+'px';
document.body.appendChild(ghost);
el.classList.add('drag-src');
dndState={name:el.dataset.name,fromType:el.dataset.from,fromTi:el.dataset.ti!==undefined?parseInt(el.dataset.ti):undefined,ghost,srcEl:el};
}

function moveDrag(x,y){
if(!dndState)return;
dndState.ghost.style.left=(x-dndState.ghost.offsetWidth/2)+'px';
dndState.ghost.style.top=(y-dndState.ghost.offsetHeight/2)+'px';
// 드롭 대상 하이라이트
document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
const target=document.elementFromPoint(x,y);
if(target){
  const drop=target.closest('[data-drop]');
  if(drop)drop.classList.add('drag-over');
}
}

function endDrag(x,y){
if(!dndState)return;
document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
const target=document.elementFromPoint(x,y);
if(target){
  const drop=target.closest('[data-drop]');
  if(drop){
    const toType=drop.dataset.drop;
    const toTi=drop.dataset.ti!==undefined?parseInt(drop.dataset.ti):undefined;
    // 같은 자리가 아니면 이동
    if(toType!==dndState.fromType||toTi!==dndState.fromTi){
      moveMember(dndState.name,dndState.fromType,dndState.fromTi,toType,toTi);
    }
  }
}
cancelDrag();
}

function cancelDrag(){
if(!dndState)return;
if(dndState.ghost&&dndState.ghost.parentNode)dndState.ghost.remove();
if(dndState.srcEl)dndState.srcEl.classList.remove('drag-src');
dndState=null;
}

// ===== 직원 캘린더 =====
let calEmp='',calYear=0,calMonth=0;

function openCal(emp){
calEmp=emp;
const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
renderCal();
document.getElementById('calOverlay').classList.add('show');
}
function closeCal(){document.getElementById('calOverlay').classList.remove('show')}
function calMove(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCal()}

function renderCal(){
const ei=E.indexOf(calEmp);
const ecl=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)','var(--cyan)','var(--lime)','var(--rose)','var(--teal)'];
const ec=ecl[ei%10];
document.getElementById('calTitle').innerHTML=`<span style="color:${ec}">${calEmp}</span> 근무 캘린더`;
document.getElementById('calMonth').textContent=calYear+'년 '+(calMonth+1)+'월';

// 이 달의 휴무일 + 시공일 계산
const offDays=new Set();const workDays=new Set();

// 날짜별 휴무자를 모든 행에서 수집
const dateOffsMap={};
J.forEach(j=>{if(j.doff.length){if(!dateOffsMap[j.date])dateOffsMap[j.date]=new Set();j.doff.forEach(n=>dateOffsMap[j.date].add(n))}});

// 이번 달 날짜 순회
Object.entries(dateOffsMap).forEach(([date,offs])=>{
const jd=new Date(date);
if(jd.getFullYear()===calYear&&jd.getMonth()===calMonth){
if(offs.has(calEmp))offDays.add(jd.getDate())}});

// 시공일 (배정된 날)
J.forEach(j=>{
const jd=new Date(j.date);
if(jd.getFullYear()===calYear&&jd.getMonth()===calMonth){
const t=A[j.id];
if(t&&t.includes(calEmp)){workDays.add(jd.getDate())}}});

const today=new Date();
const todayD=(today.getFullYear()===calYear&&today.getMonth()===calMonth)?today.getDate():-1;

const first=new Date(calYear,calMonth,1);
const lastDay=new Date(calYear,calMonth+1,0).getDate();
const startDow=first.getDay();

let grid='';
['일','월','화','수','목','금','토'].forEach((d,i)=>{
grid+=`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--blue)':''}">${d}</div>`});

for(let i=0;i<startDow;i++) grid+=`<div class="cal-day empty">·</div>`;
for(let d=1;d<=lastDay;d++){
const dow=(startDow+d-1)%7;
const isOff=offDays.has(d);
const isWork=workDays.has(d);
const isToday=d===todayD;
const isSun=dow===0;
let cls='cal-day';
if(isOff) cls+=' off';
else if(isWork) cls+=' work';
if(isToday) cls+=' today';
if(isSun&&!isOff) cls+=' sun';
grid+=`<div class="${cls}">${d}</div>`}

document.getElementById('calGrid').innerHTML=grid;
document.getElementById('calSummary').textContent=
`시공 ${workDays.size}일 · 휴무 ${offDays.size}일 · 근무일 ${lastDay-offDays.size}일`;
}

async function init(){

OFFS={};

const r=await fetch(CSV_URL);const text=await r.text();parseCSV(text);
lastCSVHash=text.length+'-'+text.slice(0,200);

// 새 일정 감지
J.forEach(j=>{if(!prevJobIds.has(j.id))j.isNew=true});

// 휴무자 자동 제거 - 같은 날짜의 모든 휴무자를 모아서 그 날짜 전체 배정에서 제거
let changed=false;
const dateOffs={};
J.forEach(j=>{if(j.doff.length){if(!dateOffs[j.date])dateOffs[j.date]=new Set();j.doff.forEach(n=>dateOffs[j.date].add(n))}});
J.forEach(j=>{
const offs=dateOffs[j.date];
if(A[j.id]&&offs&&offs.size){
const before=A[j.id].length;
A[j.id]=A[j.id].filter(e=>!offs.has(e));
if(A[j.id].length===0)delete A[j.id];
if(A[j.id]&&A[j.id].length!==before)changed=true;
if(!A[j.id])changed=true}});
if(changed){fbSave('gg_assignments',A);lastAHash=aHash(A);toast('⚠️ 휴무자 배정 자동 해제됨','ok')}

// 1인 배정 자동 수정 + 주소 없는 건 배정 제거
const realJ=J.filter(j=>!j.offOnly);
let badAssign=false;
realJ.forEach(j=>{
// 주소 없는 건은 배정 제거
if(A[j.id]&&(!j.addr||!j.addr.trim())){delete A[j.id];badAssign=true}
// 1인 배정은 제거 → 대기로 (단, 시트에서 사수/부사수가 지정된 건은 유지)
if(A[j.id]&&A[j.id].length===1&&!j.sasu&&!j.busasu){delete A[j.id];badAssign=true}
});
if(badAssign){fbSave('gg_assignments',A);lastAHash=aHash(A)}

// 미배정 건 또는 1인 배정(사수만, 부사수 필요)이 있으면 자동 배정 실행
const assignableJ=realJ.filter(j=>j.addr&&j.addr.trim());
const needAssignCnt=assignableJ.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&(!A[j.id]||(A[j.id]&&A[j.id].length===1))).length;
if(needAssignCnt>0){await autoAssign()}

const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
const curM=new Date().getMonth()+1;
const monthJobs=realJ.filter(j=>{const d=new Date(j.date);return d.getMonth()+1===curM&&j.addr&&j.addr.trim()});
const monthAs=realJ.filter(j=>{const d=new Date(j.date);return d.getMonth()+1===curM&&j.time==='as'});
document.getElementById('sub').textContent=curM+'월 '+monthJobs.length+'건 · AS '+monthAs.length+'건 · '+E.length+'명 · '+teams.length+'팀 · '+hm+'';
}catch(e){document.getElementById('sub').textContent='⚠️ 연결 실패 · 터치하여 재시도'}
renderAll()}

init();

// 구글시트 갱신 함수 (자동 + 수동 공용)
let lastCSVHash='';
let lastCSVRowCount=0;
async function refreshSheet(showToast){
try{
const sub=document.getElementById('sub');
if(showToast)sub.textContent='🔄 갱신 중...';

// 휴무 데이터 먼저 갱신
OFFS={};
if(CSV_OFF_URL){try{const offR=await fetch(CSV_OFF_URL+'&_='+Date.now());const offText=await offR.text();parseOffCSV(offText)}catch(e){}}

const r=await fetch(CSV_URL+'&_='+Date.now());
const text=await r.text();

// 변경 감지 (행 수 변화 = 새 예약 추가일 때만 자동배정)
const newHash=text.length+'-'+text.slice(0,200);
const newRowCount=text.split('\n').length;
const oldRowCount=lastCSVRowCount||0;
const isNewReservation=newRowCount>oldRowCount&&oldRowCount>0;
lastCSVHash=newHash;
lastCSVRowCount=newRowCount;

parseCSV(text);

// 새 예약이 추가됐을 때만 자동 배정 (기존 배정 보호)
if(isNewReservation){
const realJ=J.filter(j=>!j.offOnly&&j.addr&&j.addr.trim());
const unCnt=realJ.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&(!A[j.id]||(A[j.id]&&A[j.id].length===1))).length;
if(unCnt>0)await autoAssign()}

const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
const curM2=new Date().getMonth()+1;
const mJobs=J.filter(j=>!j.offOnly&&new Date(j.date).getMonth()+1===curM2&&j.addr&&j.addr.trim());
const mAs=J.filter(j=>!j.offOnly&&new Date(j.date).getMonth()+1===curM2&&j.time==='as');
sub.textContent=curM2+'월 '+mJobs.length+'건 · AS '+mAs.length+'건 · '+E.length+'명 · '+teams.length+'팀 · '+hm+'';
renderAll();
if(isNewReservation)toast('📋 새 예약 감지! 자동 배정 완료','ok');
else if(showToast)toast('✅ 최신 상태예요','ok');
}catch(e){if(showToast)toast('⚠️ 연결 실패','ok')}}

function manualRefresh(){refreshSheet(true)}

async function reAssign(){
const hasLock=LOCK.size>0;
const msg=hasLock?'모든 배정을 초기화하고 다시 배정할까요?\n\n🔒 확정된 '+LOCK.size+'건은 유지됩니다.\n(전부 초기화하려면 확정을 먼저 해제하세요)':'모든 배정을 초기화하고 다시 배정할까요?';
if(!confirm(msg))return;
// 확정된 건은 유지, 나머지만 초기화
const lockedA={};
LOCK.forEach(id=>{if(A[id])lockedA[id]=A[id]});
A=lockedA;
SKIP=new Set();fbSave('gg_skipJobs',[]);
toast('⏳ 재배정 중...','ok');
await autoAssign();
toast('✅ 재배정 완료!','ok');
}
