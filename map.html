<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 사례</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f3ee;min-height:100vh;color:#1a1a1a}
.top{text-align:center;padding:28px 20px 20px}
.top-logo{font-size:11px;letter-spacing:3px;color:#999;margin-bottom:6px}
.top-num{font-size:48px;font-weight:900;color:#1a1a1a;line-height:1.1}
.top-label{font-size:14px;color:#888;margin-top:4px}
.top-sub{font-size:12px;color:#bbb;margin-top:8px}
.map-wrap{margin:0 16px 16px;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);position:relative;background:#fff}
.map-wrap iframe{width:100%;height:65vh;border:none;display:block}
.map-hint{text-align:center;padding:10px;font-size:12px;color:#888;background:#fff}
.cta-area{padding:0 16px 40px;max-width:460px;margin:0 auto}
.cta-btn{display:block;width:100%;padding:16px;background:#2E7D32;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px}
.cta-btn:hover{background:#1B5E20}
.cta-sub{display:block;width:100%;padding:14px;background:#fff;color:#666;border:1.5px solid #e0ddd6;border-radius:12px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none}
.stats{display:flex;gap:8px;justify-content:center;margin:16px 16px 0;max-width:460px;margin-left:auto;margin-right:auto}
.stat{flex:1;background:#fff;border-radius:12px;padding:14px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-num{font-size:20px;font-weight:700;color:#2E7D32}
.stat-label{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>

<div class="top">
  <div class="top-logo">DOLBOM MAT</div>
  <div class="top-num">6,700+</div>
  <div class="top-label">시공 완료 현장</div>
  <div class="top-sub">지도를 확대해서 우리 동네 시공 내역을 확인해보세요</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num">6,700+</div>
    <div class="stat-label">시공 완료</div>
  </div>
  <div class="stat">
    <div class="stat-num">전국</div>
    <div class="stat-label">시공 가능</div>
  </div>
  <div class="stat">
    <div class="stat-num">6년</div>
    <div class="stat-label">클레임 0건</div>
  </div>
</div>

<div style="height:16px"></div>

<div class="map-wrap">
  <iframe src="https://www.google.com/maps/d/embed?mid=1yVEL5-1haaKF0XdJzlRDbMrmF8rNYE4&ll=36.5,127.5&z=7" allowfullscreen loading="lazy"></iframe>
  <div class="map-hint">🏠 마커를 눌러 시공 정보를 확인하세요</div>
</div>

<div class="cta-area">
  <a href="https://pf.kakao.com/_xnxaxmxj/chat" class="cta-btn">카카오톡 상담하기</a>
  <a href="https://gjvk3322-web.github.io/dolbom-dashboard/sample.html" class="cta-sub">무료 샘플 신청하기</a>
</div>

</body>
</html>
