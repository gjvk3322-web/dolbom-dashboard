<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 사례</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:#f5f3ee}
.bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #eee}
.bar-left{display:flex;align-items:center;gap:8px}
.bar-logo{font-size:11px;letter-spacing:2px;color:#999}
.bar-num{font-size:16px;font-weight:900;color:#1a1a1a}
.bar-label{font-size:11px;color:#888}
.map-frame{width:100%;height:calc(100vh - 50px);border:none;display:block}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-left">
    <span class="bar-logo">DOLBOM MAT</span>
    <span class="bar-num">6,700+</span>
    <span class="bar-label">시공 현장</span>
  </div>
</div>
<iframe class="map-frame" src="https://www.google.com/maps/d/u/0/embed?mid=1aSuBB0-c6trd7imjcyXyy0TBfZs7Gg4&ehbc=2E312F&noprof=1" allowfullscreen loading="lazy"></iframe>
</body>
</html>
