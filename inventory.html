<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>부산 재고조사</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#09090b;--card:#141416;--border:#262628;--text:#f4f4f5;--dim:#71717a;--accent:#22c55e;--blue:#3b82f6;--team:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
.wrap{padding:16px 10px 110px;max-width:500px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hd h1{font-size:18px;font-weight:800}
.hd h1 em{font-style:normal;color:var(--team)}
.badge{font-size:11px;color:var(--dim);background:var(--card);padding:4px 10px;border-radius:12px}
.mode{display:flex;gap:0;margin-bottom:14px;background:var(--card);border-radius:10px;overflow:hidden;border:.5px solid var(--border)}
.mode-btn{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--dim);transition:all .15s}
.mode-btn.on{background:var(--team);color:#fff}
.progress{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.prog-row b{color:var(--accent)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--team);border-radius:3px;transition:width .3s}
.loc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.loc-btn{padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--dim);transition:all .15s;position:relative}
.loc-btn.on{background:#7f1d1d;border-color:var(--team);color:#fca5a5}
.loc-btn.done{border-color:#1a3a1a;background:#0d1f0d;color:var(--accent)}
.loc-btn.done::after{content:'✓';position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--accent);color:#000;border-radius:50%;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.loc-time{display:block;font-size:9px;font-weight:500;color:var(--dim);margin-top:2px}
.ph{display:flex;align-items:center;gap:6px;margin:14px 0 6px 2px}
.ph-name{font-size:14px;font-weight:800}
.ph-tag{font-size:10px;font-weight:600;color:var(--blue);background:#1e293b;padding:2px 7px;border-radius:5px}
.ph-box{font-size:10px;color:var(--dim);margin-left:2px}
.ph-sum{margin-left:auto;font-size:13px;font-weight:800;color:var(--accent)}
.g{background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:4px}
.g-hd{display:grid;grid-template-columns:54px repeat(4,1fr);border-bottom:.5px solid var(--border)}
.g-hd div{padding:7px 0;text-align:center;font-size:10px;font-weight:700;color:var(--dim)}
.g-hd div:first-child{text-align:left;padding-left:10px}
.g-row{display:grid;grid-template-columns:54px repeat(4,1fr);align-items:center;border-bottom:.5px solid rgba(255,255,255,.03)}
.g-row:last-child{border-bottom:none}
.cl{padding:7px 0 7px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ce{padding:4px 2px}
.ce input{width:100%;height:34px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none}
.ce input:focus{border-color:var(--accent);background:#0a1a0a}
.g-row .rv{padding:7px 0;text-align:center;font-size:14px;font-weight:700;color:var(--text)}
.g-row .rv.zero{color:#333}
.loc-sub{font-size:11px;color:var(--dim);padding:4px 10px;border-bottom:.5px solid var(--border);display:flex;gap:10px;flex-wrap:wrap}
.loc-sub b{font-weight:700;color:var(--text)}
.memo-sec{margin-top:12px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.memo-hd{padding:10px 12px;font-size:13px;font-weight:700;border-bottom:.5px solid var(--border)}
.memo-bd{padding:10px 12px}
.memo{width:100%;height:52px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px;outline:none;resize:none;font-family:inherit}
.memo:focus{border-color:var(--accent)}
.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bar-loc{font-size:12px;color:var(--dim)}.bar-loc b{color:var(--team)}
.bar-n{font-size:12px;color:var(--dim)}.bar-n .n{color:var(--accent);font-size:18px;font-weight:800}
.btn{width:100%;padding:13px;background:var(--team);border:none;border-radius:12px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.98);opacity:.9}
.btn:disabled{background:var(--border)!important;color:var(--dim)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200}
.ov.h{display:none}
.sb{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;max-width:280px;width:90%}
.sb .ic{font-size:48px;margin-bottom:10px}
.sb .tt{font-size:18px;font-weight:800;margin-bottom:4px}
.sb .ds{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:16px;white-space:pre-line}
.sb .ok{padding:10px 32px;background:var(--accent);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#000;cursor:pointer}
.toast-msg{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a3a1a;color:var(--accent);padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s}
.toast-msg.show{opacity:1}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast-msg" id="toastMsg"></div>
<div class="bar" id="barEl">
  <div class="bar-row">
    <div class="bar-loc" id="bl">위치를 선택하세요</div>
    <div class="bar-n">합계 <span class="n" id="gt">0</span>장</div>
  </div>
  <button class="btn" id="sbtn" onclick="submit()" disabled>위치를 선택하세요</button>
</div>
<div class="ov h" id="ov">
  <div class="sb">
    <div class="ic">✅</div>
    <div class="tt">제출 완료!</div>
    <div class="ds" id="sm"></div>
    <button class="ok" onclick="document.getElementById('ov').classList.add('h')">확인</button>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://dolbom-schedule-default-rtdb.asia-southeast1.firebasedatabase.app'});
const db=firebase.database();
const TEAM='부산';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwo33sv9L1y722IdcfUm_i_nhmgZCCQX-grPEXGYbLemeI3WUx-f3C1Mi8ZxunmZ6D6lw/exec';
const LOCS=['사무실','802서2139','804서6771','821머1224'];
const CL={'모던':'#3b82f6','마블':'#a855f7','코튼':'#22c55e','베이지':'#d4a574'};
const TY=['센터','사이드','코너','10T'];
const PR=[
  {id:'500',name:'500매트',badge:'22T',bpb:12,colors:['모던','마블','코튼']},
  {id:'1000_22',name:'1000매트',badge:'22T',bpb:4,colors:['모던','베이지']},
  {id:'1000_17',name:'1000매트',badge:'18T',bpb:6,colors:['모던','베이지']}
];
let loc=null,mode='input',fbData={};
const now=new Date(),mm=String(now.getMonth()+1).padStart(2,'0'),dd=String(now.getDate()).padStart(2,'0'),dow=['일','월','화','수','목','금','토'][now.getDay()];
const dateKey=now.getFullYear()+'-'+mm+'-'+dd;
function fk(l){return l.replace(/[.#$/\[\]]/g,'_')}
function toast(msg){const t=document.getElementById('toastMsg');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
db.ref('inventory/'+dateKey+'/'+TEAM).on('value',snap=>{fbData=snap.val()||{};render()});

function render(){if(mode==='summary')return renderSummary();renderInput()}

function renderInput(){
  const dc=Object.keys(fbData).filter(k=>fbData[k]&&fbData[k].time).length,tl=LOCS.length;
  let h=`<div class="hd"><h1><em>${TEAM}</em> <b>재고</b>조사</h1><div class="badge">${mm}.${dd} (${dow})</div></div>`;
  h+=`<div class="mode"><div class="mode-btn on" onclick="setMode('input')">📝 입력</div><div class="mode-btn" onclick="setMode('summary')">📊 종합</div></div>`;
  h+=`<div class="progress"><div class="prog-row"><span>완료 현황</span><b>${dc} / ${tl}</b></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(dc/tl*100)}%"></div></div></div>`;
  h+=`<div class="loc">`;
  LOCS.forEach(l=>{const icon=l==='사무실'?'🏢':'🚛';const dk=fk(l);const d=fbData[dk];const isDone=d&&d.time;const isOn=loc===l;
    h+=`<div class="loc-btn ${isOn?'on':(isDone?'done':'')}" onclick="pickLoc('${l}')">${icon} ${l}${isDone?'<span class="loc-time">'+d.time+'</span>':''}</div>`});
  h+=`</div>`;
  if(!loc){
    h+=dc>=tl?`<div style="text-align:center;padding:30px 20px"><div style="font-size:36px;margin-bottom:10px">🎉</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">모든 위치 제출 완료!</div><div style="font-size:13px;color:var(--dim);margin-bottom:16px">종합 탭에서 전체 재고를 확인하세요</div><div style="display:inline-block;padding:10px 24px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer" onclick="setMode('summary')">📊 종합 재고 보기</div></div>`:`<div style="text-align:center;padding:50px 20px;color:var(--dim);font-size:14px">👆 위치를 선택하세요</div>`;
    document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none';return}
  document.getElementById('barEl').style.display='block';
  const dk=fk(loc),existing=fbData[dk];
  if(existing&&existing.time)h+=`<div style="text-align:center;padding:6px;font-size:12px;color:var(--accent);margin-bottom:4px">✅ ${existing.time}에 제출됨 · 다시 제출 시 덮어쓰기</div>`;
  PR.forEach(p=>{
    h+=`<div class="ph"><span class="ph-name">${p.name}</span><span class="ph-tag">${p.badge}</span><span class="ph-box">1박스=${p.bpb}장</span><span class="ph-sum" id="ps_${p.id}">0장</span></div>`;
    h+=`<div class="g"><div class="g-hd"><div></div><div>센터</div><div>사이드</div><div>코너</div><div>10T</div></div>`;
    p.colors.forEach(c=>{h+=`<div class="g-row"><div class="cl"><div class="cd" style="background:${CL[c]}"></div>${c}</div>`;
      TY.forEach(t=>{const key=p.id+'_'+c+'_'+t;const prev=(existing&&existing.data&&existing.data[key])||'';
        h+=`<div class="ce"><input type="number" inputmode="numeric" id="i_${key}" value="${prev}" placeholder="" oninput="calc()"></div>`});
      h+=`</div>`});
    h+=`</div>`});
  if(loc==='사무실'){const prevMemo=(existing&&existing.memo)||'';
    h+=`<div class="memo-sec"><div class="memo-hd">📋 필요용품 / 기타</div><div class="memo-bd"><textarea class="memo" id="invMemo" placeholder="필요한 용품이나 특이사항을 적어주세요">${prevMemo}</textarea></div></div>`}
  document.getElementById('app').innerHTML=h;updBar();calc()}

function renderSummary(){
  let h=`<div class="hd"><h1><em>${TEAM}</em> <b>재고</b>조사</h1><div class="badge">${mm}.${dd} (${dow})</div></div>`;
  h+=`<div class="mode"><div class="mode-btn" onclick="setMode('input')">📝 입력</div><div class="mode-btn on" onclick="setMode('summary')">📊 종합</div></div>`;
  const submitted=LOCS.filter(l=>{const d=fbData[fk(l)];return d&&d.time});const pending=LOCS.filter(l=>!submitted.includes(l));
  h+=`<div style="margin-bottom:14px">`;
  if(pending.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:4px">⏳ 미제출: <span style="color:var(--team);font-weight:700">${pending.join(', ')}</span></div>`;
  if(submitted.length)h+=`<div style="font-size:12px;color:var(--dim)">✅ 제출: <span style="color:var(--accent);font-weight:700">${submitted.map(l=>l+' ('+fbData[fk(l)].time+')').join(', ')}</span></div>`;
  h+=`</div>`;
  const totals={};LOCS.forEach(l=>{const d=fbData[fk(l)];if(d&&d.data)Object.entries(d.data).forEach(([k,v])=>{totals[k]=(totals[k]||0)+v})});
  let grandSheets=0;
  PR.forEach(p=>{let pB=0;const ls={};
    LOCS.forEach(l=>{const d=fbData[fk(l)];if(d&&d.data){let lb=0;p.colors.forEach(c=>{TY.forEach(t=>{lb+=(d.data[p.id+'_'+c+'_'+t]||0)})});if(lb>0)ls[l]=lb}});
    p.colors.forEach(c=>{TY.forEach(t=>{pB+=(totals[p.id+'_'+c+'_'+t]||0)})});const pS=pB*p.bpb;grandSheets+=pS;
    h+=`<div class="ph"><span class="ph-name">${p.name}</span><span class="ph-tag">${p.badge}</span><span class="ph-box">1박스=${p.bpb}장</span><span class="ph-sum">${pB}박스 / ${pS}장</span></div>`;
    h+=`<div class="g">`;
    if(Object.keys(ls).length){h+=`<div class="loc-sub">`;Object.entries(ls).forEach(([l,b])=>{h+=`<span>${l==='사무실'?'🏢':'🚛'}${l}: <b>${b}박스</b></span>`});h+=`</div>`}
    h+=`<div class="g-hd"><div></div><div>센터</div><div>사이드</div><div>코너</div><div>10T</div></div>`;
    p.colors.forEach(c=>{h+=`<div class="g-row"><div class="cl"><div class="cd" style="background:${CL[c]}"></div>${c}</div>`;
      TY.forEach(t=>{const v=totals[p.id+'_'+c+'_'+t]||0;h+=`<div class="rv ${v===0?'zero':''}">${v}</div>`});h+=`</div>`});
    h+=`</div>`});
  const officeMemo=fbData[fk('사무실')]?.memo;
  if(officeMemo)h+=`<div class="memo-sec"><div class="memo-hd">📋 사무실 필요용품</div><div class="memo-bd" style="font-size:13px;line-height:1.6">${officeMemo}</div></div>`;
  h+=`<div style="text-align:center;margin:20px 0;padding:16px;background:var(--card);border-radius:12px;border:.5px solid var(--border)"><div style="font-size:12px;color:var(--dim);margin-bottom:4px">${TEAM} 종합 재고</div><div style="font-size:28px;font-weight:800;color:var(--accent)">${grandSheets.toLocaleString()}<span style="font-size:14px;font-weight:500;color:var(--dim);margin-left:4px">장</span></div></div>`;
  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none'}

function setMode(m){mode=m;render()}
function pickLoc(l){loc=l;mode='input';render()}
function updBar(){const bl=document.getElementById('bl'),sb=document.getElementById('sbtn');
  if(!loc){bl.textContent='위치를 선택하세요';sb.disabled=true;sb.textContent='위치를 선택하세요'}
  else{bl.innerHTML=`📍 <b>${TEAM} ${loc}</b>`;sb.disabled=false;sb.textContent='제출하기'}}
function calc(){let grand=0;PR.forEach(p=>{let pb=0;p.colors.forEach(c=>{TY.forEach(t=>{pb+=(parseInt(document.getElementById(`i_${p.id}_${c}_${t}`)?.value)||0)})});grand+=pb*p.bpb;
  const e=document.getElementById(`ps_${p.id}`);if(e)e.textContent=pb+'박스 / '+pb*p.bpb+'장'});document.getElementById('gt').textContent=grand.toLocaleString()}

async function submit(){if(!loc)return;const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='저장 중...';
  const dataMap={},items=[];
  PR.forEach(p=>{p.colors.forEach(c=>{TY.forEach(t=>{const key=p.id+'_'+c+'_'+t;const v=parseInt(document.getElementById(`i_${key}`)?.value)||0;dataMap[key]=v;
    if(v>0)items.push({product:p.name+' '+p.badge,color:c,type:t,qty:v,sheets:v*p.bpb})})})});
  const memo=document.getElementById('invMemo')?.value||'';
  const hhmm=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  const dk=fk(loc);const fbPayload={time:hhmm,data:dataMap};if(loc==='사무실'&&memo)fbPayload.memo=memo;
  try{await db.ref('inventory/'+dateKey+'/'+TEAM+'/'+dk).set(fbPayload);toast('✅ 저장 완료!')}catch(e){toast('실패');btn.disabled=false;btn.textContent='제출하기';return}
  let txt=mm+dd+' '+TEAM+' '+loc+'\n\n';
  PR.forEach(p=>{let has=false,sec='【'+p.name+' '+p.badge+'】\n';p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`i_${p.id}_${c}_${t}`)?.value)||0;
    if(v>0){sec+=c+'('+t+') : '+v+'박스('+v*p.bpb+'장)\n';has=true}})});if(has)txt+=sec+'\n'});
  if(memo)txt+='필요용품: '+memo+'\n';
  try{await navigator.clipboard.writeText(txt)}catch(e){}
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'inventory',team:TEAM,location:loc,date:dateKey,items:items,memo:memo}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
  toast('✅ '+TEAM+' '+loc+' 저장 완료!');
  btn.disabled=false;btn.textContent='제출하기';updBar()}
</script>
</body>
</html>
