<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>돌봄매트 CS 상담 교육</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --green:#1F7A52; --green-d:#155c3c; --green-l:#E8F3EC; --green-ll:#F3F9F5;
    --ink:#1d2721; --sub:#5c6b62; --line:#e3e9e5; --bg:#f6f8f6;
    --warn-bg:#FFF6E9; --warn-bd:#F0C886; --warn-ink:#8a5a18;
    --no-bg:#FCEEEE; --no-bd:#E8B4B4; --no-ink:#A33;
    --tip-bg:#EAF4FB; --tip-bd:#A9D2EC; --tip-ink:#1D5E86;
    --new-bg:#EEF7E9; --new-bd:#AED596; --new-ink:#3C7B22;
  }
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;padding-bottom:60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto}

  /* 헤더 */
  .hero{background:linear-gradient(150deg,var(--green) 0%,var(--green-d) 100%);color:#fff;padding:30px 22px 26px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%}
  .hero .kicker{font-size:12px;letter-spacing:3px;opacity:.8;font-weight:600}
  .hero h1{font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
  .hero p{font-size:13px;opacity:.9;margin-top:8px}
  .hero .meta{font-size:11px;opacity:.7;margin-top:14px}

  /* 진행률 */
  .progress-card{background:#fff;margin:-16px 16px 0;border-radius:16px;padding:16px 18px;box-shadow:0 6px 20px rgba(0,0,0,.06);position:relative;z-index:2}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-top .label{font-size:13px;font-weight:700;color:var(--green)}
  .progress-top .pct{font-size:20px;font-weight:800;color:var(--ink)}
  .bar{height:9px;background:var(--green-l);border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#39a06b);border-radius:6px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .progress-sub{font-size:11px;color:var(--sub);margin-top:8px;text-align:center}

  /* 섹션 */
  .sections{padding:18px 16px 0}
  .sec{background:#fff;border-radius:14px;margin-bottom:11px;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow:hidden;border:1px solid var(--line)}
  .sechead{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;user-select:none}
  .sec.done .sechead{background:var(--green-ll)}
  .sechead .snum{font-size:13px;font-weight:800;color:var(--green);min-width:26px;height:26px;line-height:26px;text-align:center;background:var(--green-l);border-radius:8px;flex-shrink:0}
  .sec.done .sechead .snum{background:var(--green);color:#fff}
  .sechead .tt{flex:1;min-width:0}
  .sechead .ti{font-size:15.5px;font-weight:700;letter-spacing:-.3px}
  .sechead .chev{font-size:13px;color:#bbb;transition:transform .3s;flex-shrink:0}
  .sec.open .sechead .chev{transform:rotate(180deg)}
  .sec.done .sechead .ti::after{content:" ✓";color:var(--green);font-weight:800;font-size:13px}
  .secbody{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .secinner{padding:4px 17px 18px}

  .secinner p{font-size:13.5px;color:#39443d;margin:9px 0}
  .secinner ul{list-style:none;margin:8px 0}
  .secinner ul li{font-size:13px;color:#39443d;padding:5px 0 5px 18px;position:relative}
  .secinner ul li::before{content:"";position:absolute;left:3px;top:12px;width:5px;height:5px;border-radius:50%;background:var(--green)}

  table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
  th{background:var(--green-l);color:var(--green-d);font-weight:700;text-align:left;padding:8px 10px}
  td{border-bottom:1px solid var(--line);padding:8px 10px;color:#39443d;vertical-align:top}
  tr td:first-child{font-weight:600;white-space:nowrap}

  .notice{border-radius:10px;padding:11px 13px;margin:11px 0;font-size:12.5px;line-height:1.6}
  .notice .nt{font-weight:800;display:block;margin-bottom:3px;font-size:12.5px}
  .notice.warn{background:var(--warn-bg);border:1px solid var(--warn-bd)} .notice.warn .nt{color:var(--warn-ink)}
  .notice.no{background:var(--no-bg);border:1px solid var(--no-bd)} .notice.no .nt{color:var(--no-ink)}
  .notice.tip{background:var(--tip-bg);border:1px solid var(--tip-bd)} .notice.tip .nt{color:var(--tip-ink)}
  .notice.new{background:var(--new-bg);border:1px solid var(--new-bd)} .notice.new .nt{color:var(--new-ink)}
  .notice .nb{color:#46514a}

  .quote{background:#fbfcfb;border-left:4px solid var(--green);border-radius:8px;padding:11px 13px;margin:11px 0}
  .quote .ql{font-size:11px;font-weight:800;color:var(--green);margin-bottom:6px;letter-spacing:.3px}
  .quote .qt{font-size:12.5px;color:#2f3a33;white-space:pre-line;line-height:1.7}

  /* 퀴즈 */
  .quiz{background:var(--green-ll);border-radius:11px;padding:13px 14px;margin:13px 0 4px}
  .quiz-tag{font-size:10px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:6px}
  .quiz-q{font-size:13.5px;font-weight:700;margin-bottom:10px}
  .quiz-opts{display:flex;flex-direction:column;gap:7px}
  .opt{background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;cursor:pointer;transition:.15s;text-align:left}
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--green);background:var(--green-l);font-weight:700}
  .opt.wrong{border-color:var(--no-bd);background:var(--no-bg)}
  .quiz-ex{font-size:12px;color:var(--sub);margin-top:9px;padding:9px 11px;background:#fff;border-radius:8px;display:none;line-height:1.6}
  .quiz-ex.show{display:block}
  .quiz-ex b{color:var(--green)}

  /* 체크리스트 */
  .checklist{margin:22px 16px;background:#fff;border-radius:16px;padding:20px 18px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid var(--line)}
  .checklist h2{font-size:17px;font-weight:800;margin-bottom:4px}
  .checklist .csub{font-size:12px;color:var(--sub);margin-bottom:14px}
  .check{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--green-ll);cursor:pointer}
  .check:last-child{border-bottom:none}
  .check .box{width:22px;height:22px;border:2px solid var(--green);border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px}
  .check.on .box{background:var(--green)}
  .check .box::after{content:"✓";color:#fff;font-size:13px;font-weight:800;opacity:0;transition:.2s}
  .check.on .box::after{opacity:1}
  .check .ctext{font-size:13.5px;color:#39443d;flex:1}
  .check.on .ctext{color:#9aa69f;text-decoration:line-through}

  /* 완료 배너 */
  .done-banner{margin:0 16px 24px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border-radius:16px;padding:22px;text-align:center;display:none}
  .done-banner.show{display:block;animation:pop .4s}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .done-banner .big{font-size:30px}
  .done-banner h3{font-size:18px;font-weight:800;margin:6px 0}
  .done-banner p{font-size:12.5px;opacity:.9}

  .reset{display:block;margin:0 auto 30px;background:none;border:none;color:#bbb;font-size:11px;text-decoration:underline;cursor:pointer}

  .foot{text-align:center;font-size:10.5px;color:#b3bdb6;padding:0 24px 30px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="kicker">DOLBOM MAT · CS GUIDE</div>
    <h1>CS 상담 교육</h1>
    <p>폰으로 보고 익히는 신입 상담원 매뉴얼</p>
    <div class="meta">맘카페 585건 + 상담 대화 3,085건 분석 · 민석</div>
  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span class="label">교육 진행률</span>
      <span class="pct" id="pct">0%</span>
    </div>
    <div class="bar"><i id="barfill"></i></div>
    <div class="progress-sub" id="psub">섹션을 열고 퀴즈를 풀어보세요</div>
  </div>

  <div class="sections" id="sections"></div>

  <div class="done-banner" id="doneBanner">
    <div class="big">🎉</div>
    <h3>1차 교육 완료!</h3>
    <p>이제 실전이야. 막히면 언제든 민석에게 물어봐!</p>
  </div>

  <div class="checklist">
    <h2>✅ 출근 전 체크리스트</h2>
    <div class="csub">탭해서 하나씩 체크하세요</div>
    <div id="checklist"></div>
  </div>

  <button class="reset" id="resetBtn">진행 기록 초기화</button>
  <div class="foot">본 교육자료는 참고용입니다. 가격·정책·이벤트는 항상 최신 기준(민석 확인)을 우선합니다.</div>
</div>

  if(b.t==='p') return '<p>'+esc(b.v)+'</p>';
  if(b.t==='list') return '<ul>'+b.v.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>';
  if(b.t==='notice') return '<div class="notice '+b.tone+'"><span class="nt">'+esc(b.title)+'</span><span class="nb">'+esc(b.v)+'</span></div>';
  if(b.t==='quote') return '<div class="quote"><div class="ql">'+esc(b.label)+'</div><div class="qt">'+esc(b.v)+'</div></div>';
  if(b.t==='table'){
    let h='<table><tr>'+b.head.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr>';
    h+=b.rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c)+'</td>').join('')+'</tr>').join('');
    return h+'</table>';
  }
  return '';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  const wrap = document.getElementById('sections');
  wrap.innerHTML = DATA.SECTIONS.map((s,si)=>{
    const isOpen = state.open[s.id];
    const isDone = sectionDone(s);
    let inner = s.blocks.map(blockHTML).join('');
    if(s.quiz){
      inner += s.quiz.map((q,qi)=>{
        const key = s.id+'_'+qi;
        const ans = state.quiz[key];
        const opts = q.opts.map((o,oi)=>{
          let cls='opt';
          if(ans!=null){
            if(oi===q.a) cls+=' correct';
            else if(oi===ans) cls+=' wrong';
          }
          return '<button class="'+cls+'" onclick="answer(\''+s.id+'\','+qi+','+oi+','+q.a+')">'+esc(o)+'</button>';
        }).join('');
        return '<div class="quiz"><div class="quiz-tag">QUIZ</div><div class="quiz-q">'+esc(q.q)+'</div><div class="quiz-opts">'+opts+'</div><div class="quiz-ex'+(ans!=null?' show':'')+'"><b>해설</b> '+esc(q.ex)+'</div></div>';
      }).join('');
    }
    return '<div class="sec'+(isOpen?' open':'')+(isDone?' done':'')+'" id="sec-'+s.id+'">'+
      '<div class="sechead" onclick="toggle(\''+s.id+'\')">'+
      '<span class="snum">'+s.num+'</span>'+
      '<span class="tt"><span class="ti">'+esc(s.title)+'</span></span>'+
      '<span class="chev">▼</span></div>'+
      '<div class="secbody" id="body-'+s.id+'"><div class="secinner">'+inner+'</div></div></div>';
  }).join('');
  // 체크리스트
  document.getElementById('checklist').innerHTML = DATA.CHECKLIST.map((c,i)=>
    '<div class="check'+(state.check[i]?' on':'')+'" onclick="toggleCheck('+i+')"><div class="box"></div><div class="ctext">'+esc(c)+'</div></div>'
  ).join('');
  // 열린 섹션 높이 복원
  DATA.SECTIONS.forEach(s=>{ if(state.open[s.id]) expand(s.id); });
  updateProgress();
}

function sectionDone(s){
  if(!state.open[s.id]) return false;
  if(s.quiz){ for(let i=0;i<s.quiz.length;i++){ if(state.quiz[s.id+'_'+i]==null) return false; } }
  return true;
}

function toggle(id){
  state.open[id] = !state.open[id];
  save();
  const sec = document.getElementById('sec-'+id);
  sec.classList.toggle('open');
  if(state.open[id]) expand(id); else { document.getElementById('body-'+id).style.maxHeight='0'; }
  if(sectionDone(DATA.SECTIONS.find(x=>x.id===id))) sec.classList.add('done');
  updateProgress();
}
function expand(id){
  const body = document.getElementById('body-'+id);
  if(body) body.style.maxHeight = body.scrollHeight + 'px';
}
function answer(sid,qi,oi,correct){
  const key = sid+'_'+qi;
  if(state.quiz[key]!=null) return;
  state.quiz[key]=oi; save();
  render();
  setTimeout(()=>{ expand(sid); const e=document.getElementById('sec-'+sid); if(e) e.scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}
function toggleCheck(i){
  state.check[i]=!state.check[i]; save();
  render();
}
function updateProgress(){
  let total=0, done=0;
  DATA.SECTIONS.forEach(s=>{
    total++; if(state.open[s.id]) done++;
    if(s.quiz) s.quiz.forEach((q,i)=>{ total++; if(state.quiz[s.id+'_'+i]!=null) done++; });
  });
  DATA.CHECKLIST.forEach((c,i)=>{ total++; if(state.check[i]) done++; });
  const pct = Math.round(done/total*100);
  document.getElementById('pct').textContent = pct+'%';
  document.getElementById('barfill').style.width = pct+'%';
  document.getElementById('psub').textContent = done+' / '+total+' 완료';
  document.getElementById('doneBanner').classList.toggle('show', pct===100);
}
document.getElementById('resetBtn').onclick=function(){
  if(confirm('진행 기록을 모두 초기화할까요?')){ state={open:{},quiz:{},check:{}}; save(); render(); window.scrollTo(0,0); }
};
render();
</script>
</body>
</html>
