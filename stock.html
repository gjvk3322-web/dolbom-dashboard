<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>мһ¬кі  кҙҖлҰ¬</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#09090b;--card:#141416;--border:#262628;--text:#f4f4f5;--dim:#71717a;--accent:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
.wrap{padding:16px 10px 120px;max-width:520px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hd h1{font-size:18px;font-weight:800}
.badge{font-size:11px;color:var(--dim);background:var(--card);padding:4px 10px;border-radius:12px}
.team{display:flex;gap:8px;margin-bottom:12px}
.team-btn{flex:none;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--dim);transition:all .15s}
.tabs{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:10px;overflow:hidden;border:.5px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--dim);transition:all .15s}
.tab.on-inv{background:var(--accent);color:#000}
.tab.on-in{background:var(--orange);color:#000}
.tab.on-sum{background:var(--blue);color:#fff}
.progress{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.prog-row b{color:var(--accent)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.loc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.loc-btn{padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--dim);transition:all .15s;position:relative}
.loc-btn.on{background:#7f1d1d;border-color:var(--red);color:#fca5a5}
.loc-btn.on-gg{background:#1e3a5f;border-color:var(--blue);color:#93c5fd}
.loc-btn.done{border-color:#1a3a1a;background:#0d1f0d;color:var(--accent)}
.loc-btn.done::after{content:'вң“';position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--accent);color:#000;border-radius:50%;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.loc-time{display:block;font-size:9px;font-weight:500;color:var(--dim);margin-top:2px}
.ph{display:flex;align-items:center;gap:6px;margin:12px 0 6px 2px}
.ph-name{font-size:14px;font-weight:800}
.ph-tag{font-size:10px;font-weight:600;color:var(--blue);background:#1e293b;padding:2px 7px;border-radius:5px}
.ph-box{font-size:10px;color:var(--dim);margin-left:2px}
.ph-sum{margin-left:auto;font-size:13px;font-weight:800;color:var(--accent)}
.g{background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:4px}
.g-hd{display:grid;grid-template-columns:54px repeat(4,1fr);border-bottom:.5px solid var(--border)}
.g-hd div{padding:7px 0;text-align:center;font-size:10px;font-weight:700;color:var(--dim)}
.g-hd div:first-child{text-align:left;padding-left:10px}
.g-row{display:grid;grid-template-columns:54px repeat(4,1fr);align-items:center;border-bottom:.5px solid rgba(255,255,255,.03)}
.g-row:last-child{border-bottom:none}
.cl{padding:7px 0 7px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ce{padding:4px 2px}
.ce input{width:100%;height:34px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none}
.ce input:focus{border-color:var(--accent);background:#0a1a0a}
.ce.incoming input:focus{border-color:var(--orange);background:#1a1400}
.g-row .rv{padding:7px 0;text-align:center;font-size:14px;font-weight:700;color:var(--text)}
.g-row .rv.zero{color:#333}
.loc-sub{font-size:11px;color:var(--dim);padding:4px 10px;border-bottom:.5px solid var(--border);display:flex;gap:10px;flex-wrap:wrap}
.loc-sub b{font-weight:700;color:var(--text)}
.memo-sec{margin-top:12px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.memo-hd{padding:10px 12px;font-size:13px;font-weight:700;border-bottom:.5px solid var(--border)}
.memo-bd{padding:10px 12px}
.memo{width:100%;height:52px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px;outline:none;resize:none;font-family:inherit}
.memo:focus{border-color:var(--accent)}
.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bar-loc{font-size:12px;color:var(--dim)}.bar-loc b{color:var(--text)}
.bar-n{font-size:12px;color:var(--dim)}.bar-n .n{color:var(--accent);font-size:18px;font-weight:800}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:800;color:#000;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.98);opacity:.9}
.btn:disabled{background:var(--border)!important;color:var(--dim)}
.btn-inv{background:var(--accent)}
.btn-in{background:var(--orange)}
.toast-msg{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a3a1a;color:var(--accent);padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s}
.toast-msg.show{opacity:1}
.sum-card{text-align:center;margin:16px 0;padding:16px;background:var(--card);border-radius:12px;border:.5px solid var(--border)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast-msg" id="toastMsg"></div>
<div class="bar" id="barEl" style="display:none">
  <div class="bar-row">
    <div class="bar-loc" id="bl"></div>
    <div class="bar-n">н•©кі„ <span class="n" id="gt">0</span>мһҘ</div>
  </div>
  <button class="btn" id="sbtn" disabled></button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://dolbom-schedule-default-rtdb.asia-southeast1.firebasedatabase.app'});
const db=firebase.database();
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwo33sv9L1y722IdcfUm_i_nhmgZCCQX-grPEXGYbLemeI3WUx-f3C1Mi8ZxunmZ6D6lw/exec';
const TEAMS={
  'л¶ҖмӮ°':{locs:['мӮ¬л¬ҙмӢӨ','802м„ң2139','804м„ң6771','821лЁё1224'],color:'busan'},
  'кІҪкё°':{locs:['мӮ¬л¬ҙмӢӨ','820лқј1210','837лЁё1201','841л¶Җ4647','85к°Җ6506'],color:'gg'}
};
const CL={'лӘЁлҚҳ':'#3b82f6','л§Ҳлё”':'#a855f7','мҪ”нҠј':'#22c55e','лІ мқҙм§Җ':'#d4a574'};
const TY=['м„јн„°','мӮ¬мқҙл“ң','мҪ”л„Ҳ','10T'];
const PR=[
  {id:'500',name:'500л§ӨнҠё',badge:'22T',bpb:12,colors:['лӘЁлҚҳ','л§Ҳлё”','мҪ”нҠј']},
  {id:'1000_22',name:'1000л§ӨнҠё',badge:'22T',bpb:4,colors:['лӘЁлҚҳ','лІ мқҙм§Җ']},
  {id:'1000_17',name:'1000л§ӨнҠё',badge:'17T',bpb:6,colors:['лӘЁлҚҳ','лІ мқҙм§Җ']}
];
let team=null,loc=null,tab='inventory';
let fbInvData={},fbInRef=null;
const now=new Date(),mm=String(now.getMonth()+1).padStart(2,'0'),dd=String(now.getDate()).padStart(2,'0'),dow=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '][now.getDay()];
const dateKey=now.getFullYear()+'-'+mm+'-'+dd;
const urlTeam=new URLSearchParams(window.location.search).get('team');
const urlTab=new URLSearchParams(window.location.search).get('tab');
function fk(l){return l.replace(/[.#$/\[\]]/g,'_')}
function toast(msg){const t=document.getElementById('toastMsg');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function pickTeam(t){team=t;loc=null;if(fbInRef)fbInRef.off();fbInRef=db.ref('inventory/'+dateKey+'/'+team);fbInRef.on('value',snap=>{fbInvData=snap.val()||{};render()})}
function setTab(t){tab=t;loc=null;render()}
function render(){if(!team)return renderTeamSelect();if(tab==='summary')return renderSummary();if(tab==='incoming')return renderIncoming();renderInventory()}

function renderTeamSelect(){
  document.getElementById('barEl').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="hd"><h1>рҹ“Ҡ мһ¬кі  кҙҖлҰ¬</h1><div class="badge">${mm}.${dd} (${dow})</div></div>
    <div style="padding:30px 10px;display:flex;flex-direction:column;gap:12px">
      <div style="padding:28px 20px;border-radius:16px;text-align:center;cursor:pointer;font-size:20px;font-weight:800;background:linear-gradient(135deg,#1a0505,#2a0a0a);border:2px solid #3d1111;color:#f87171" onclick="pickTeam('л¶ҖмӮ°')">л¶ҖмӮ°<div style="font-size:12px;font-weight:500;margin-top:6px;opacity:.6">мӮ¬л¬ҙмӢӨ + м°Ёлҹү 3лҢҖ</div></div>
      <div style="padding:28px 20px;border-radius:16px;text-align:center;cursor:pointer;font-size:20px;font-weight:800;background:linear-gradient(135deg,#050a1a,#0a142a);border:2px solid #112244;color:#60a5fa" onclick="pickTeam('кІҪкё°')">кІҪкё°лҸ„<div style="font-size:12px;font-weight:500;margin-top:6px;opacity:.6">мӮ¬л¬ҙмӢӨ + м°Ёлҹү 4лҢҖ</div></div>
    </div>`}

function renderTabs(){
  const tc=TEAMS[team].color,tColor=tc==='busan'?'var(--red)':'var(--blue)';
  let h=`<div class="hd"><h1 style="color:${tColor}">${team} мһ¬кі кҙҖлҰ¬</h1><div class="badge">${mm}.${dd} (${dow})</div></div>`;
  h+=`<div class="team"><div class="team-btn" onclick="team=null;loc=null;if(fbInRef)fbInRef.off();fbInvData={};render()">вҶҗ нҢҖ ліҖкІҪ</div></div>`;
  h+=`<div class="tabs"><div class="tab ${tab==='inventory'?'on-inv':''}" onclick="setTab('inventory')">рҹ“Ұ мһ¬кі мЎ°мӮ¬</div><div class="tab ${tab==='incoming'?'on-in':''}" onclick="setTab('incoming')">рҹ“Ҙ мһ…кі кё°лЎқ</div><div class="tab ${tab==='summary'?'on-sum':''}" onclick="setTab('summary')">рҹ“Ҡ мў…н•©</div></div>`;
  return h}

function renderInventory(){
  const T=TEAMS[team],tc=T.color;
  const dc=Object.keys(fbInvData).filter(k=>fbInvData[k]&&fbInvData[k].time).length,tl=T.locs.length;
  let h=renderTabs();
  h+=`<div class="progress"><div class="prog-row"><span>мҷ„лЈҢ нҳ„нҷ©</span><b>${dc} / ${tl}</b></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(dc/tl*100)}%;background:${tc==='busan'?'var(--red)':'var(--blue)'}"></div></div></div>`;
  h+=`<div class="loc">`;
  T.locs.forEach(l=>{const icon=l==='мӮ¬л¬ҙмӢӨ'?'рҹҸў':'рҹҡӣ';const dk=fk(l);const d=fbInvData[dk];const isDone=d&&d.time;const isOn=loc===l;
    h+=`<div class="loc-btn ${isOn?(tc==='busan'?'on':'on-gg'):(isDone?'done':'')}" onclick="loc='${l}';render()">${icon} ${l}${isDone?'<span class="loc-time">'+d.time+'</span>':''}</div>`});
  h+=`</div>`;
  if(!loc){h+=dc>=tl?`<div style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:8px">рҹҺү</div><div style="font-size:16px;font-weight:700">лӘЁл“  мң„м№ҳ м ңм¶ң мҷ„лЈҢ!</div></div>`:`<div style="text-align:center;padding:40px 20px;color:var(--dim);font-size:14px">рҹ‘Ҷ мң„м№ҳлҘј м„ нғқн•ҳм„ёмҡ”</div>`;
    document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none';return}
  document.getElementById('barEl').style.display='block';
  const dk=fk(loc),existing=fbInvData[dk];
  if(existing&&existing.time)h+=`<div style="text-align:center;padding:6px;font-size:12px;color:var(--accent);margin-bottom:4px">вң… ${existing.time}м—җ м ңм¶ңлҗЁ</div>`;
  h+=buildTable('inv',existing);
  if(loc==='мӮ¬л¬ҙмӢӨ'){const pm=(existing&&existing.memo)||'';h+=`<div class="memo-sec"><div class="memo-hd">рҹ“Ӣ н•„мҡ”мҡ©н’Ҳ / кё°нғҖ</div><div class="memo-bd"><textarea class="memo" id="invMemo" placeholder="н•„мҡ”н•ң мҡ©н’ҲмқҙлӮҳ нҠ№мқҙмӮ¬н•ӯ">${pm}</textarea></div></div>`}
  document.getElementById('app').innerHTML=h;
  document.getElementById('bl').innerHTML=`рҹ“Қ <b>${team} ${loc}</b>`;
  const sb=document.getElementById('sbtn');sb.disabled=false;sb.textContent='мһ¬кі  м ңм¶ң';sb.className='btn btn-inv';sb.onclick=submitInv;calc('inv')}

function renderIncoming(){
  let h=renderTabs();
  h+=`<div style="font-size:13px;color:var(--dim);margin-bottom:12px">рҹ“Ҙ мҳӨлҠҳ ${team}м—җ мһ…кі лҗң мҲҳлҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”</div>`;
  h+=buildTable('in',null);
  h+=`<div class="memo-sec"><div class="memo-hd">рҹ“қ л№„кі </div><div class="memo-bd"><textarea class="memo" id="inMemo" placeholder=""></textarea></div></div>`;
  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='block';
  document.getElementById('bl').innerHTML=`рҹ“Ҙ <b>${team} мһ…кі </b>`;
  const sb=document.getElementById('sbtn');sb.disabled=false;sb.textContent='мһ…кі  кё°лЎқ м ҖмһҘ';sb.className='btn btn-in';sb.onclick=submitIn;calc('in')}

// мӢңкіөкё°мӨҖн‘ң (нҸүмҲҳлі„ м„јн„° л°•мҠӨмҲҳ)
const STD={
  '500':{25:9,30:10,35:12},
  '1000_22':{25:7,30:8,35:9},
  '1000_17':{25:5,30:6,35:6}
};
let stockCache=null;

async function fetchStockData(){
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'getStock',team:team})});
    const txt=await r.text();
    try{const d=JSON.parse(txt);stockCache=d;return d;}catch(e){console.error('JSON parse error:',txt);return {error:txt}}
  }catch(e){console.error('fetch error:',e);return {error:e.message}}
}

async function renderSummary(){
  let h=renderTabs();const T=TEAMS[team];
  const submitted=T.locs.filter(l=>{const d=fbInvData[fk(l)];return d&&d.time});const pending=T.locs.filter(l=>!submitted.includes(l));
  if(pending.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:4px">вҸі лҜём ңм¶ң: <span style="color:var(--red);font-weight:700">${pending.join(', ')}</span></div>`;
  if(submitted.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:12px">вң… м ңм¶ңмҷ„лЈҢ: <span style="color:var(--accent);font-weight:700">${submitted.map(l=>l+' ('+fbInvData[fk(l)].time+')').join(', ')}</span></div>`;

  // мһ¬кі мЎ°мӮ¬ н•©мӮ°
  const totals={};T.locs.forEach(l=>{const d=fbInvData[fk(l)];if(d&&d.data)Object.entries(d.data).forEach(([k,v])=>{totals[k]=(totals[k]||0)+v})});
  let gs=0;

  // мӢңкіө лҚ°мқҙн„° лЎңл”© н‘ңмӢң
  h+=`<div id="stockLoading" style="text-align:center;padding:12px;font-size:12px;color:var(--dim)">рҹ“Ў мӢңкіө лҚ°мқҙн„° лЎңл”© мӨ‘...</div>`;
  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none';

  // мӢңкіө+мһ…кі  лҚ°мқҙн„° к°Җм ёмҳӨкё°
  const sd=await fetchStockData();
  if(sd&&sd.error){console.error('API error:',sd.error)}
  h=renderTabs();
  if(pending.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:4px">вҸі лҜём ңм¶ң: <span style="color:var(--red);font-weight:700">${pending.join(', ')}</span></div>`;
  if(submitted.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:12px">вң… м ңм¶ңмҷ„лЈҢ: <span style="color:var(--accent);font-weight:700">${submitted.map(l=>l+' ('+fbInvData[fk(l)].time+')').join(', ')}</span></div>`;

  // м ңн’Ҳлі„ н…Ңмқҙлё”
  PR.forEach(p=>{let pB=0;const ls={};
    T.locs.forEach(l=>{const d=fbInvData[fk(l)];if(d&&d.data){let lb=0;p.colors.forEach(c=>{TY.forEach(t=>{lb+=(d.data[p.id+'_'+c+'_'+t]||0)})});if(lb>0)ls[l]=lb}});
    p.colors.forEach(c=>{TY.forEach(t=>{pB+=(totals[p.id+'_'+c+'_'+t]||0)})});const pS=pB*p.bpb;gs+=pS;
    h+=`<div class="ph"><span class="ph-name">${p.name}</span><span class="ph-tag">${p.badge}</span><span class="ph-box">1л°•мҠӨ=${p.bpb}мһҘ</span><span class="ph-sum">${pB}л°•мҠӨ / ${pS}мһҘ</span></div>`;
    h+=`<div class="g">`;
    if(Object.keys(ls).length){h+=`<div class="loc-sub">`;Object.entries(ls).forEach(([l,b])=>{h+=`<span>${l==='мӮ¬л¬ҙмӢӨ'?'рҹҸў':'рҹҡӣ'}${l}: <b>${b}л°•мҠӨ</b></span>`});h+=`</div>`}
    h+=`<div class="g-hd"><div></div><div>м„јн„°</div><div>мӮ¬мқҙл“ң</div><div>мҪ”л„Ҳ</div><div>10T</div></div>`;
    p.colors.forEach(c=>{h+=`<div class="g-row"><div class="cl"><div class="cd" style="background:${CL[c]}"></div>${c}</div>`;
      TY.forEach(t=>{const v=totals[p.id+'_'+c+'_'+t]||0;h+=`<div class="rv ${v===0?'zero':''}">${v}</div>`});h+=`</div>`});h+=`</div>`});

  // мӮ¬л¬ҙмӢӨ л©”лӘЁ
  const om=fbInvData[fk('мӮ¬л¬ҙмӢӨ')]?.memo;
  if(om)h+=`<div class="memo-sec"><div class="memo-hd">рҹ“Ӣ мӮ¬л¬ҙмӢӨ н•„мҡ”мҡ©н’Ҳ</div><div class="memo-bd" style="font-size:13px;line-height:1.6">${om}</div></div>`;

  // мў…н•© мһ¬кі  + лҜёлһҳ мҳҲмёЎ м№ҙл“ң
  const ft=sd&&!sd.error?sd.futureTotal||0:0;
  const fj=sd&&!sd.error?sd.futureJobs||0:0;
  const pj=sd&&!sd.error?sd.pastJobs||0:0;
  const remaining=gs-ft;
  const isShort=remaining<0;

  h+=`<div class="sum-card">`;
  h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:4px">${team} нҳ„мһ¬ мһ¬кі </div>`;
  h+=`<div style="font-size:28px;font-weight:800;color:var(--accent)">${gs.toLocaleString()}<span style="font-size:14px;font-weight:500;color:var(--dim);margin-left:4px">мһҘ</span></div>`;
  if(ft>0){
    h+=`<div style="margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)">`;
    h+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span style="color:var(--dim)">лӢӨмқҢ 7мқј мҳҲм•Ҫ (${fj}кұҙ)</span><span style="color:var(--red);font-weight:700">-${ft.toLocaleString()}мһҘ</span></div>`;
    h+=`<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;padding:6px 0;margin-top:4px;border-top:.5px solid var(--border)"><span>мҳҲмғҒ мһ”м—¬</span><span style="color:${isShort?'var(--red)':'var(--accent)'}">${remaining.toLocaleString()}мһҘ</span></div>`;
    if(isShort)h+=`<div style="margin-top:6px;padding:8px 10px;background:#1a0505;border-radius:8px;font-size:12px;color:var(--red);font-weight:700;text-align:center">вҡ пёҸ мһ¬кі  л¶ҖмЎұ мҳҲмғҒ! л°ңмЈјк°Җ н•„мҡ”н•©лӢҲлӢӨ</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;

  // лӢӨмқҢ 7мқј мҳҲм•Ҫ мғҒм„ё
  if(sd&&!sd.error&&sd.futureList&&sd.futureList.length>0){
    h+=`<div style="margin-top:4px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden">`;
    h+=`<div style="padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700">рҹ“… лӢӨмқҢ 7мқј мҳҲм•Ҫ</span><span style="font-size:12px;color:var(--dim)">${fj}кұҙ</span></div>`;
    h+=`<div style="padding:10px 14px">`;
    sd.futureList.forEach(j=>{
      const pName=j.product.replace('л§ӨнҠё','');
      const cDot=j.color?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${CL[j.color]||'#888'};margin-right:3px"></span>`:'';
      h+=`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--dim)">${j.date} В· ${j.sqm}нҸү В· ${cDot}${j.color||''} ${pName}</span><span style="font-weight:600">~${j.expected}мһҘ</span></div>`;
    });
    // мғүмғҒлі„ мҶҢмҡ” мҡ”м•Ҫ
    const colorSum={};
    sd.futureList.forEach(j=>{const c=j.color||'лҜём •';if(!colorSum[c])colorSum[c]={count:0,sheets:0};colorSum[c].count++;colorSum[c].sheets+=j.expected});
    if(Object.keys(colorSum).length>0){
      h+=`<div style="padding:8px 14px 10px;border-top:.5px solid var(--border);font-size:12px;color:var(--dim)">мғүмғҒлі„ мҡ”м•Ҫ</div>`;
      h+=`<div style="padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px">`;
      Object.entries(colorSum).forEach(([c,v])=>{
        h+=`<span style="padding:4px 10px;background:var(--bg);border-radius:6px;font-size:11px;font-weight:600"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${CL[c]||'#888'};margin-right:3px"></span>${c} ${v.count}кұҙ ~${v.sheets}мһҘ</span>`;
      });
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  // м§ҖлӮң 7мқј мӢңкіө нҳ„нҷ©
  if(sd&&!sd.error&&pj>0){
    h+=`<div style="margin-top:8px;background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">`;
    h+=`<span style="font-size:13px;font-weight:700">рҹ”§ м§ҖлӮң 7мқј мӢңкіө</span><span style="font-size:13px;color:var(--dim)">${pj}кұҙ мҷ„лЈҢ</span>`;
    h+=`</div>`;
  }

  // мһ…кі  кё°лЎқ
  if(sd&&!sd.error&&sd.incoming&&sd.incoming.length>0){
    h+=`<div style="margin-top:8px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden">`;
    h+=`<div style="padding:12px 14px;border-bottom:.5px solid var(--border);font-size:13px;font-weight:700">рҹ“Ҙ мөңк·ј мһ…кі </div>`;
    h+=`<div style="padding:10px 14px">`;
    sd.incoming.forEach(i=>{
      h+=`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--dim)">${i.date} ${i.color} ${i.type}</span><span style="color:var(--orange);font-weight:700">+${i.qty}л°•мҠӨ</span></div>`;
    });
    h+=`</div></div>`;
  }

  // м—җлҹ¬
  if(sd&&sd.error){
    h+=`<div style="margin-top:8px;background:#1a0505;border:.5px solid #3d1111;border-radius:12px;padding:14px;font-size:12px;color:var(--red)">вҡ пёҸ лҚ°мқҙн„° лЎңл”© мӢӨнҢЁ</div>`;
  }

  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none'}

function buildTable(pfx,ex){let h='';PR.forEach(p=>{
  h+=`<div class="ph"><span class="ph-name">${p.name}</span><span class="ph-tag">${p.badge}</span><span class="ph-box">1л°•мҠӨ=${p.bpb}мһҘ</span><span class="ph-sum" id="ps_${pfx}_${p.id}">0мһҘ</span></div>`;
  h+=`<div class="g"><div class="g-hd"><div></div><div>м„јн„°</div><div>мӮ¬мқҙл“ң</div><div>мҪ”л„Ҳ</div><div>10T</div></div>`;
  p.colors.forEach(c=>{h+=`<div class="g-row"><div class="cl"><div class="cd" style="background:${CL[c]}"></div>${c}</div>`;
    TY.forEach(t=>{const k=p.id+'_'+c+'_'+t;const pv=(ex&&ex.data&&ex.data[k])||'';
      h+=`<div class="ce ${pfx==='in'?'incoming':''}"><input type="number" inputmode="numeric" id="${pfx}_${k}" value="${pv}" oninput="calc('${pfx}')"></div>`});h+=`</div>`});h+=`</div>`});return h}

function calc(pfx){let g=0;PR.forEach(p=>{let pb=0;p.colors.forEach(c=>{TY.forEach(t=>{pb+=(parseInt(document.getElementById(`${pfx}_${p.id}_${c}_${t}`)?.value)||0)})});g+=pb*p.bpb;
  const e=document.getElementById(`ps_${pfx}_${p.id}`);if(e)e.textContent=pb+'л°•мҠӨ / '+pb*p.bpb+'мһҘ'});document.getElementById('gt').textContent=g.toLocaleString()}

async function submitInv(){if(!loc||!team)return;const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='м ҖмһҘ мӨ‘...';
  const dm={},items=[];PR.forEach(p=>{p.colors.forEach(c=>{TY.forEach(t=>{const k=p.id+'_'+c+'_'+t;const v=parseInt(document.getElementById(`inv_${k}`)?.value)||0;dm[k]=v;
    if(v>0)items.push({product:p.name+' '+p.badge,color:c,type:t,qty:v,sheets:v*p.bpb})})})});
  const memo=document.getElementById('invMemo')?.value||'';
  const hm=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  const fb={time:hm,data:dm};if(loc==='мӮ¬л¬ҙмӢӨ'&&memo)fb.memo=memo;
  try{await db.ref('inventory/'+dateKey+'/'+team+'/'+fk(loc)).set(fb);toast('вң… '+team+' '+loc+' м ҖмһҘ!')}catch(e){toast('мӢӨнҢЁ');btn.disabled=false;btn.textContent='мһ¬кі  м ңм¶ң';return}
  let txt=mm+dd+' '+team+' '+loc+'\n\n';PR.forEach(p=>{let has=false,s='гҖҗ'+p.name+' '+p.badge+'гҖ‘\n';p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`inv_${p.id}_${c}_${t}`)?.value)||0;if(v>0){s+=c+'('+t+') : '+v+'л°•мҠӨ('+v*p.bpb+'мһҘ)\n';has=true}})});if(has)txt+=s+'\n'});
  if(memo)txt+='н•„мҡ”мҡ©н’Ҳ: '+memo+'\n';try{await navigator.clipboard.writeText(txt)}catch(e){}
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'inventory',team:team,location:loc,date:dateKey,items:items,memo:memo}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
  btn.disabled=false;btn.textContent='мһ¬кі  м ңм¶ң'}

async function submitIn(){if(!team)return;const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='м ҖмһҘ мӨ‘...';
  const items=[];PR.forEach(p=>{p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`in_${p.id}_${c}_${t}`)?.value)||0;
    if(v>0)items.push({product:p.name+' '+p.badge,color:c,type:t,qty:v,sheets:v*p.bpb})})})});
  if(items.length===0){toast('мҲҳлҹүмқ„ мһ…л Ҙн•ҳм„ёмҡ”');btn.disabled=false;btn.textContent='мһ…кі  кё°лЎқ м ҖмһҘ';return}
  const memo=document.getElementById('inMemo')?.value||'';
  const hm=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  try{await db.ref('incoming/'+team+'/'+dateKey+'_'+hm.replace(':','')).set({time:hm,date:dateKey,items:items,memo:memo});
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'incoming',team:team,date:dateKey,time:hm,items:items,memo:memo}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
    let txt=mm+dd+' '+team+' мһ…кі \n\n';PR.forEach(p=>{let has=false,s='гҖҗ'+p.name+' '+p.badge+'гҖ‘\n';p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`in_${p.id}_${c}_${t}`)?.value)||0;if(v>0){s+=c+'('+t+') : '+v+'л°•мҠӨ('+v*p.bpb+'мһҘ)\n';has=true}})});if(has)txt+=s+'\n'});
    if(memo)txt+='л№„кі : '+memo+'\n';try{await navigator.clipboard.writeText(txt)}catch(e){}
    toast('вң… '+team+' мһ…кі  мҷ„лЈҢ!')}catch(e){toast('мӢӨнҢЁ')}
  btn.disabled=false;btn.textContent='мһ…кі  кё°лЎқ м ҖмһҘ'}

if(urlTab&&['inventory','incoming','summary'].includes(urlTab))tab=urlTab;
if(urlTeam&&TEAMS[urlTeam]){pickTeam(urlTeam)}else if(urlTeam==='кІҪкё°лҸ„'&&TEAMS['кІҪкё°']){pickTeam('кІҪкё°')}else{render()}
</script>
