<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="/auth.js"></script>

    <!-- 검색엔진 노출 차단 (자동 추가) -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="naverbot" content="noindex, nofollow">
    <meta name="yeti" content="noindex, nofollow">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>재고 관리</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{--bg:#09090b;--card:#141416;--border:#262628;--text:#f4f4f5;--dim:#71717a;--accent:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
.wrap{padding:16px 10px 120px;max-width:520px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hd h1{font-size:18px;font-weight:800}
.badge{font-size:11px;color:var(--dim);background:var(--card);padding:4px 10px;border-radius:12px}
.team{display:flex;gap:8px;margin-bottom:12px}
.team-btn{flex:none;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--dim);transition:all .15s}
.tabs{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:10px;overflow:hidden;border:.5px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:var(--dim);transition:all .15s}
.tab.on-inv{background:var(--accent);color:#000}
.tab.on-in{background:var(--orange);color:#000}
.tab.on-sum{background:var(--blue);color:#fff}
.progress{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.prog-row b{color:var(--accent)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.loc{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.loc-btn{padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--dim);transition:all .15s;position:relative}
.loc-btn.on{background:#7f1d1d;border-color:var(--red);color:#fca5a5}
.loc-btn.on-gg{background:#1e3a5f;border-color:var(--blue);color:#93c5fd}
.loc-btn.done{border-color:#1a3a1a;background:#0d1f0d;color:var(--accent)}
.loc-btn.done::after{content:'✓';position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--accent);color:#000;border-radius:50%;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.loc-time{display:block;font-size:9px;font-weight:500;color:var(--dim);margin-top:2px}
.ph{display:flex;align-items:center;gap:6px;margin:12px 0 6px 2px}
.ph-name{font-size:14px;font-weight:800}
.ph-tag{font-size:10px;font-weight:600;color:var(--blue);background:#1e293b;padding:2px 7px;border-radius:5px}
.ph-box{font-size:10px;color:var(--dim);margin-left:2px}
.ph-sum{margin-left:auto;font-size:13px;font-weight:800;color:var(--accent)}
.g{background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:4px}
.g-hd{display:grid;grid-template-columns:54px repeat(4,1fr);border-bottom:.5px solid var(--border)}
.g-hd div{padding:7px 0;text-align:center;font-size:10px;font-weight:700;color:var(--dim)}
.g-hd div:first-child{text-align:left;padding-left:10px}
.g-row{display:grid;grid-template-columns:54px repeat(4,1fr);align-items:center;border-bottom:.5px solid rgba(255,255,255,.03)}
.g-row:last-child{border-bottom:none}
.cl{padding:7px 0 7px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
.cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ce{padding:4px 2px}
.ce input{width:100%;height:34px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:15px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none}
.ce input:focus{border-color:var(--accent);background:#0a1a0a}
.ce.incoming input:focus{border-color:var(--orange);background:#1a1400}
.g-row .rv{padding:7px 0;text-align:center;font-size:14px;font-weight:700;color:var(--text)}
.g-row .rv.zero{color:#333}
.loc-sub{font-size:11px;color:var(--dim);padding:4px 10px;border-bottom:.5px solid var(--border);display:flex;gap:10px;flex-wrap:wrap}
.loc-sub b{font-weight:700;color:var(--text)}
.memo-sec{margin-top:12px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden}
.memo-hd{padding:10px 12px;font-size:13px;font-weight:700;border-bottom:.5px solid var(--border)}
.memo-bd{padding:10px 12px}
.memo{width:100%;height:52px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px;outline:none;resize:none;font-family:inherit}
.memo:focus{border-color:var(--accent)}
.bar{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,.96);backdrop-filter:blur(20px);border-top:.5px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.bar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bar-loc{font-size:12px;color:var(--dim)}.bar-loc b{color:var(--text)}
.bar-n{font-size:12px;color:var(--dim)}.bar-n .n{color:var(--accent);font-size:18px;font-weight:800}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:800;color:#000;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.98);opacity:.9}
.btn:disabled{background:var(--border)!important;color:var(--dim)}
.btn-inv{background:var(--accent)}
.btn-in{background:var(--orange)}
.toast-msg{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a3a1a;color:var(--accent);padding:8px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s}
.toast-msg.show{opacity:1}
.sum-card{text-align:center;margin:16px 0;padding:16px;background:var(--card);border-radius:12px;border:.5px solid var(--border)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast-msg" id="toastMsg"></div>
<div class="bar" id="barEl" style="display:none">
  <div class="bar-row">
    <div class="bar-loc" id="bl"></div>
    <div class="bar-n">합계 <span class="n" id="gt">0</span>장</div>
  </div>
  <button class="btn" id="sbtn" disabled></button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({databaseURL:'https://dolbom-schedule-default-rtdb.asia-southeast1.firebasedatabase.app'});
const db=firebase.database();
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwo33sv9L1y722IdcfUm_i_nhmgZCCQX-grPEXGYbLemeI3WUx-f3C1Mi8ZxunmZ6D6lw/exec';
const TEAMS={
  '부산':{locs:['사무실','802서2139','804서6771','821머1224'],color:'busan'},
  '경기':{locs:['사무실','820라1210','837머1201','841부4647','85가6506'],color:'gg'}
};
const CL={'모던':'#3b82f6','마블':'#a855f7','코튼':'#22c55e','베이지':'#d4a574'};
const TY=['센터','사이드','코너','10T'];
const PR=[
  {id:'500',name:'500매트',badge:'22T',bpb:12,colors:['모던','마블','코튼']},
  {id:'1000_22',name:'1000매트',badge:'22T',bpb:4,colors:['모던','베이지']},
  {id:'1000_17',name:'1000매트',badge:'17T',bpb:6,colors:['모던','베이지']}
];
let team=null,loc=null,tab='summary';
let fbInvData={},fbInRef=null;
const now=new Date(),mm=String(now.getMonth()+1).padStart(2,'0'),dd=String(now.getDate()).padStart(2,'0'),dow=['일','월','화','수','목','금','토'][now.getDay()];
const dateKey=now.getFullYear()+'-'+mm+'-'+dd;
const surveyDateKey=dateKey; // 실사일 = 실제 조사한 날짜 (<=로 당일 작업 자동 제외)
let incomingDate=dateKey;
const urlTeam=new URLSearchParams(window.location.search).get('team');
const urlTab=new URLSearchParams(window.location.search).get('tab');
function fk(l){return l.replace(/[.#$/\[\]]/g,'_')}
function toast(msg){const t=document.getElementById('toastMsg');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
let invDataDate=dateKey; // 현재 보고있는 재고 날짜
function pickTeam(t){
  team=t;loc=null;invDataDate=dateKey;
  // URL 업데이트 (새로고침 없이)
  const url=new URL(window.location);url.searchParams.set('team',t);window.history.replaceState({},'',url);
  if(fbInRef)fbInRef.off();
  // 오늘 데이터 먼저 확인
  fbInRef=db.ref('inventory/'+dateKey+'/'+team);
  fbInRef.on('value',snap=>{
    const val=snap.val()||{};
    // 오늘 제출된 데이터가 있으면 바로 사용
    const hasData=Object.keys(val).some(k=>val[k]&&val[k].time);
    if(hasData){
      fbInvData=val;invDataDate=dateKey;if(tab!=='order')render();
    } else {
      // 오늘 데이터 없으면 최근 7일 탐색
      findRecentInventory(team).then(result=>{
        if(result){
          fbInvData=result.data;invDataDate=result.date;
        } else {
          fbInvData={};invDataDate=dateKey;
        }
        if(tab!=='order')render();
      });
    }
  });
}

async function findRecentInventory(teamName){
  for(let i=1;i<=7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const dk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    try{
      const snap=await db.ref('inventory/'+dk+'/'+teamName).once('value');
      const val=snap.val();
      if(val&&Object.keys(val).some(k=>val[k]&&val[k].time)){
        return {date:dk,data:val};
      }
    }catch(e){}
  }
  return null;
}
function setTab(t){if(tab==='order')saveOrderInputs();tab=t;loc=null;if(t==='order'){deliveries=[];delIdCounter=0;orderInputs={};}document.querySelector('.wrap').style.maxWidth=t==='order'?'1020px':'520px';const url=new URL(window.location);url.searchParams.set('tab',t);window.history.replaceState({},'',url);render()}
function render(){if(!team)return renderTeamSelect();if(tab==='summary')return renderSummary();if(tab==='incoming')return renderIncoming();if(tab==='order')return renderOrder();renderInventory()}

function renderTeamSelect(){
  document.getElementById('barEl').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="hd"><h1>📊 재고 관리</h1><div class="badge">${mm}.${dd} (${dow})</div></div>
    <div style="padding:30px 10px;display:flex;flex-direction:column;gap:12px">
      <div style="padding:28px 20px;border-radius:16px;text-align:center;cursor:pointer;font-size:20px;font-weight:800;background:linear-gradient(135deg,#1a0505,#2a0a0a);border:2px solid #3d1111;color:#f87171" onclick="pickTeam('부산')">부산<div style="font-size:12px;font-weight:500;margin-top:6px;opacity:.6">사무실 + 차량 3대</div></div>
      <div style="padding:28px 20px;border-radius:16px;text-align:center;cursor:pointer;font-size:20px;font-weight:800;background:linear-gradient(135deg,#050a1a,#0a142a);border:2px solid #112244;color:#60a5fa" onclick="pickTeam('경기')">경기도<div style="font-size:12px;font-weight:500;margin-top:6px;opacity:.6">사무실 + 차량 4대</div></div>
    </div>`}

function renderTabs(){
  const tc=TEAMS[team].color,tColor=tc==='busan'?'var(--red)':'var(--blue)';
  const otherTeam=team==='부산'?'경기':'부산';
  let h=`<div class="hd"><h1 style="color:${tColor}">${team} 재고관리</h1><div class="badge">${mm}.${dd} (${dow})</div></div>`;
  h+=`<div class="team">`;
  h+=`<div class="team-btn" style="${team==='부산'?'background:#7f1d1d;border-color:var(--red);color:#fca5a5':''}" onclick="if(team!=='부산'){loc=null;if(fbInRef)fbInRef.off();fbInvData={};pickTeam('부산')}">부산</div>`;
  h+=`<div class="team-btn" style="${team==='경기'?'background:#1e3a5f;border-color:var(--blue);color:#93c5fd':''}" onclick="if(team!=='경기'){loc=null;if(fbInRef)fbInRef.off();fbInvData={};pickTeam('경기')}">경기</div>`;
  h+=`</div>`;
  h+=`<div class="tabs"><div class="tab ${tab==='inventory'?'on-inv':''}" onclick="setTab('inventory')">📦 재고조사</div><div class="tab ${tab==='incoming'?'on-in':''}" onclick="setTab('incoming')">📥 입고기록</div><div class="tab ${tab==='summary'?'on-sum':''}" onclick="setTab('summary')">📊 종합</div><div class="tab ${tab==='order'?'on-in':''}" onclick="setTab('order')">📋 발주</div></div>`;
  return h}

function renderInventory(){
  const T=TEAMS[team],tc=T.color;
  const isToday=invDataDate===dateKey;
  const dc=isToday?Object.keys(fbInvData).filter(k=>fbInvData[k]&&fbInvData[k].time).length:0;
  const tl=T.locs.length;
  let h=renderTabs();
  if(!isToday){
    const dp=invDataDate.split('-');
    h+=`<div style="font-size:12px;color:var(--orange);background:#1a1400;border:.5px solid #3d2e00;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:600">📅 ${dp[1]}.${dp[2]} 기준 재고 참고값 (오늘 제출하면 업데이트됩니다)</div>`;
  }
  h+=`<div style="font-size:11px;color:var(--accent);background:rgba(34,197,94,.08);border:.5px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;margin-bottom:8px">📋 재고조사 기준일: <b>${surveyDateKey}</b> (당일 작업분은 자동 제외)</div>`;
  h+=`<div class="progress"><div class="prog-row"><span>오늘 완료 현황</span><b>${dc} / ${tl}</b></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(dc/tl*100)}%;background:${tc==='busan'?'var(--red)':'var(--blue)'}"></div></div></div>`;
  h+=`<div class="loc">`;
  T.locs.forEach(l=>{const icon=l==='사무실'?'🏢':'🚛';const dk=fk(l);const d=fbInvData[dk];const isDone=isToday&&d&&d.time;const isOn=loc===l;
    h+=`<div class="loc-btn ${isOn?(tc==='busan'?'on':'on-gg'):(isDone?'done':'')}" onclick="loc='${l}';render()">${icon} ${l}${isDone?'<span class="loc-time">'+d.time+'</span>':''}</div>`});
  h+=`</div>`;
  if(!loc){h+=dc>=tl&&isToday?`<div style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:8px">🎉</div><div style="font-size:16px;font-weight:700">모든 위치 제출 완료!</div></div>`:`<div style="text-align:center;padding:40px 20px;color:var(--dim);font-size:14px">👆 위치를 선택하세요</div>`;
    document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none';return}
  document.getElementById('barEl').style.display='block';
  const dk=fk(loc),existing=fbInvData[dk];
  if(isToday&&existing&&existing.time)h+=`<div style="text-align:center;padding:6px;font-size:12px;color:var(--accent);margin-bottom:4px">✅ ${existing.time}에 제출됨</div>`;
  if(!isToday&&existing)h+=`<div style="text-align:center;padding:6px;font-size:12px;color:var(--orange);margin-bottom:4px">⚠️ ${invDataDate} 데이터 참고용 (제출하면 오늘 날짜로 저장)</div>`;
  h+=buildTable('inv',existing);
  if(loc==='사무실'){const pm=(existing&&existing.memo)||'';h+=`<div class="memo-sec"><div class="memo-hd">📋 필요용품 / 기타</div><div class="memo-bd"><textarea class="memo" id="invMemo" placeholder="필요한 용품이나 특이사항">${pm}</textarea></div></div>`}
  document.getElementById('app').innerHTML=h;
  document.getElementById('bl').innerHTML=`📍 <b>${team} ${loc}</b>`;
  const sb=document.getElementById('sbtn');const isWed=new Date().getDay()===3;sb.disabled=!isWed;sb.textContent=isWed?'재고 제출':'수요일에만 제출 가능';sb.className='btn btn-inv';sb.onclick=submitInv;calc('inv')}

function renderIncoming(){
  let h=renderTabs();
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:13px;color:var(--dim)">📥 ${team} 입고 날짜:</span><input type="date" id="inDate" value="${incomingDate}" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit"></div>`;
  h+=buildTable('in',null);
  h+=`<div class="memo-sec"><div class="memo-hd">📝 비고</div><div class="memo-bd"><textarea class="memo" id="inMemo" placeholder=""></textarea></div></div>`;
  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='block';
  document.getElementById('bl').innerHTML=`📥 <b>${team} 입고</b>`;
  const sb=document.getElementById('sbtn');sb.disabled=false;sb.textContent='입고 기록 저장';sb.className='btn btn-in';sb.onclick=submitIn;calc('in')}

// 시공기준표 (평수별 센터 박스수)
const STD={
  '500':{25:{센터:9,사이드:1,코너:1,'10T':0},30:{센터:10,사이드:2,코너:1,'10T':0},35:{센터:12,사이드:2,코너:1,'10T':0}},
  '1000_22':{25:{센터:7,사이드:1,코너:1,'10T':0},30:{센터:8,사이드:1,코너:1,'10T':0},35:{센터:9,사이드:1,코너:1,'10T':0}},
  '1000_17':{25:{센터:5,사이드:1,코너:1,'10T':0},30:{센터:6,사이드:1,코너:1,'10T':0},35:{센터:6,사이드:1,코너:1,'10T':0}}
};
let stockCache=null;

async function fetchStockData(){
  try{
    const r=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'getStock',team:team})});
    const txt=await r.text();
    try{const d=JSON.parse(txt);stockCache=d;return d;}catch(e){console.error('JSON parse error:',txt);return {error:txt}}
  }catch(e){console.error('fetch error:',e);return {error:e.message}}
}

async function renderSummary(){
  let h=renderTabs();const T=TEAMS[team];
  // 과거 데이터 안내
  if(invDataDate!==dateKey){
    const dp=invDataDate.split('-');
    h+=`<div style="font-size:12px;color:var(--orange);background:#1a1400;border:.5px solid #3d2e00;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-weight:600">📅 ${dp[1]}.${dp[2]} 기준 재고 (오늘 미제출)</div>`;
  }
  const submitted=T.locs.filter(l=>{const d=fbInvData[fk(l)];return d&&d.time});const pending=T.locs.filter(l=>!submitted.includes(l));
  if(pending.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:4px">⏳ 미제출: <span style="color:var(--red);font-weight:700">${pending.join(', ')}</span></div>`;
  if(submitted.length)h+=`<div style="font-size:12px;color:var(--dim);margin-bottom:12px">✅ 제출완료: <span style="color:var(--accent);font-weight:700">${submitted.map(l=>l+' ('+fbInvData[fk(l)].time+')').join(', ')}</span></div>`;

  const totals={};T.locs.forEach(l=>{const d=fbInvData[fk(l)];if(d&&d.data)Object.entries(d.data).forEach(([k,v])=>{totals[k]=(totals[k]||0)+v})});
  let gs=0;

        if(!isLossP)pColor='var(--accent)';
        else if(absP<=5)pColor='var(--accent)';
        else if(absP<=10)pColor='var(--orange)';
        else pColor='var(--red)';
        const barW=Math.min(100,Math.abs(p.loss)/maxAbs*100);
        h+=`<div style="margin-bottom:6px">`;
        h+=`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${colorDot[color]||'#888'};margin-right:4px"></span>${prodName} ${color}</span><span style="color:${pColor};font-weight:700">${isLossP?'':'+'}${(-p.loss).toLocaleString()}장 (${p.rate}%)</span></div>`;
        h+=`<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${barW}%;background:${pColor}"></div></div>`;
        h+=`<div style="font-size:9px;color:var(--dim);margin-top:2px">이전 ${p.prev.toLocaleString()} ${p.incoming>0?'+ 입고 '+p.incoming.toLocaleString():''} - 판매 ${p.sold.toLocaleString()} = 예상 ${p.expected.toLocaleString()} | 실사 ${p.current.toLocaleString()}</div>`;
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    
    // 판매갯수 미입력 시공 목록
    if(ld.missingQtyJobs&&ld.missingQtyJobs.length>0){
      h+=`<div style="margin-top:10px;padding:10px;background:rgba(255,69,58,.05);border:.5px solid rgba(255,69,58,.2);border-radius:8px">`;
      h+=`<div style="font-weight:700;font-size:11px;color:var(--red);margin-bottom:6px">⚠️ 판매갯수 미입력 시공 (${ld.missingQtyCount}건)</div>`;
      ld.missingQtyJobs.forEach(j=>{
        const shortAddr=j.addr.length>35?j.addr.substring(0,35)+'...':j.addr;
        h+=`<div style="padding:4px 0;border-top:.5px dashed var(--border);font-size:10px;display:flex;justify-content:space-between;gap:8px"><span style="color:var(--dim);flex-shrink:0">${j.date.substring(5)}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${shortAddr}</span><span style="color:var(--accent);flex-shrink:0">${j.color||'-'}</span></div>`;
      });
      if(ld.missingQtyCount>ld.missingQtyJobs.length){
        h+=`<div style="padding:4px 0;font-size:10px;color:var(--dim);text-align:center">...외 ${ld.missingQtyCount-ld.missingQtyJobs.length}건</div>`;
      }
      h+=`<div style="margin-top:6px;padding-top:6px;border-top:.5px solid rgba(255,69,58,.2);font-size:10px;color:var(--dim)">💡 시공스케줄 시트 Y열(판매갯수)에 수량 입력 필요</div>`;
      h+=`</div>`;
    }
    
    h+=`<div style="margin-top:8px;padding-top:6px;border-top:.5px solid var(--border);font-size:10px;color:var(--dim);text-align:center">로스율 = 로스 ÷ 이전재고 × 100</div>`;
    h+=`</div></div>`;
  } else if(sd&&!sd.error){
    h+=`<div style="margin-top:4px;background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700">📉 로스율</span><span style="font-size:12px;color:var(--dim)">다음주 자동 계산</span></div>`;
  }

  // 지난 7일 + 입고 (한 줄씩)
  if(sd&&!sd.error&&pj>0){
    h+=`<div style="margin-top:4px;background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700">🔧 지난 7일 시공</span><span style="font-size:12px;color:var(--dim)">${pj}건 · ${(sd.totalSold||0).toLocaleString()}장</span></div>`;
  }
  if(sd&&!sd.error&&sd.incoming&&sd.incoming.length>0){
    h+=`<div style="margin-top:4px;background:var(--card);border:.5px solid var(--border);border-radius:12px;overflow:hidden">`;
    h+=`<div style="padding:12px 14px;display:flex;justify-content:space-between;cursor:pointer" onclick="const el=document.getElementById('inDetail');el.style.display=el.style.display==='none'?'block':'none'"><span style="font-size:13px;font-weight:700">📥 최근 입고</span><span style="font-size:12px;color:var(--dim)">${sd.incoming.length}건 ▸</span></div>`;
    h+=`<div id="inDetail" style="display:none;padding:0 14px 10px;border-top:.5px solid var(--border)">`;
    sd.incoming.forEach(i=>{h+=`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--dim)">${i.date} ${i.color} ${i.type}</span><span style="color:var(--orange);font-weight:700">+${i.qty}박스</span></div>`});
    h+=`</div></div>`;
  }
  if(sd&&sd.error)h+=`<div style="margin-top:8px;background:#1a0505;border:.5px solid #3d1111;border-radius:12px;padding:14px;font-size:12px;color:var(--red)">⚠️ 데이터 로딩 실패</div>`;
  document.getElementById('app').innerHTML=h;document.getElementById('barEl').style.display='none'}

// ===== 발주 탭 (월간 발주서) =====
let deliveries=[];
let delIdCounter=0;
let orderInputs={};  // 발주서 입력 데이터 유지용
let orderMonth=new Date().getMonth()+1;  // 발주서 월
let orderYear=new Date().getFullYear();
const ORDER_CL={'모던':'#9ca3af','마블':'#3b82f6','코튼':'#22c55e','베이지':'#d4a574'};
const ORDER_COLORS={'500':['마블','모던','코튼'],'1000_22':['모던','베이지'],'1000_17':['모던','베이지']};
const ORDER_SHAPES={'500':['센터','사이드','코너','10T'],'1000_22':['센터','사이드','코너','10T'],'1000_17':['센터','사이드','코너']};

function initDefaultDeliveries(){
  if(deliveries.length>0)return;
  // localStorage에서 불러오기
  try{
    const saved=localStorage.getItem('dolbom_order_'+team);
    if(saved){
      const d=JSON.parse(saved);
      deliveries=d.deliveries||[];
      delIdCounter=d.delIdCounter||0;
      orderInputs=d.orderInputs||{};
      orderMonth=d.orderMonth||new Date().getMonth()+1;
      orderYear=d.orderYear||new Date().getFullYear();
      if(deliveries.length>0)return;
    }
  }catch(e){}
  for(let i=0;i<7;i++){
    const id=++delIdCounter;
    const d=new Date();d.setDate(d.getDate()+7*i);
    deliveries.push({id:id,loc:'부산',date:d.toISOString().split('T')[0]});
  }
}

function saveOrderToStorage(){
  try{
    localStorage.setItem('dolbom_order_'+team,JSON.stringify({
      deliveries,delIdCounter,orderInputs,orderMonth,orderYear
    }));
  }catch(e){}
}

function saveOrderInputs(){
  deliveries.forEach(d=>{
    PR.forEach(p=>{
      const shapes=ORDER_SHAPES[p.id]||['센터','사이드','코너'];
      (ORDER_COLORS[p.id]||[]).forEach(c=>{
        shapes.forEach(t=>{
          const key='oc_'+d.id+'_'+p.id+'_'+c+'_'+t;
          const el=document.getElementById(key);
          if(el){
            // 🛠 버그 수정: 빈 값/0이면 저장된 옛날값을 명시적으로 삭제
            // (그래야 탭 이동 후 돌아왔을 때 옛날 값이 부활하지 않음)
            if(el.value && el.value!=='0'){
              orderInputs[key]=el.value;
            } else {
              delete orderInputs[key];
            }
          }
        });
      });
    });
    const dateEl=document.getElementById('ddate_'+d.id);
    if(dateEl)d.date=dateEl.value;
  });
  const memo=document.getElementById('ordMemo');
  if(memo)orderInputs._memo=memo.value;
  saveOrderToStorage();
}

function restoreOrderInputs(){
  setTimeout(()=>{
    deliveries.forEach(d=>{
      PR.forEach(p=>{
        const shapes=ORDER_SHAPES[p.id]||['센터','사이드','코너'];
        (ORDER_COLORS[p.id]||[]).forEach(c=>{
          shapes.forEach(t=>{
            const key='oc_'+d.id+'_'+p.id+'_'+c+'_'+t;
            const el=document.getElementById(key);
            if(el&&orderInputs[key])el.value=orderInputs[key];
          });
        });
      });
    });
    const memo=document.getElementById('ordMemo');
    if(memo&&orderInputs._memo)memo.value=orderInputs._memo;
    calcMonthlyOrder();
    saveOrderToStorage();
  },50);
}

function resetOrder(){
  if(!confirm('발주서 데이터를 모두 초기화할까요?'))return;
  deliveries=[];delIdCounter=0;orderInputs={};
  saveOrderToStorage();
  renderOrder();
}

function changeOrderMonth(dir){
  saveOrderInputs();
  orderMonth+=dir;
  if(orderMonth>12){orderMonth=1;orderYear++}
  if(orderMonth<1){orderMonth=12;orderYear--}
  renderOrder();
}

function toggleLoc(id){
  const d=deliveries.find(x=>x.id===id);
  if(d)d.loc=d.loc==='부산'?'안산':'부산';
  renderOrder();
}

function confirmRemoveDelivery(id){
  if(!confirm('이 배송 칸을 삭제할까요?'))return;
  removeDelivery(id);
}

function renderOrder(){
  saveOrderInputs();
  initDefaultDeliveries();
  let h=renderTabs();

  h+=`<div id="orderSheet" style="background:#ffffff;border-radius:14px;overflow:visible;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06)">`;

  // 헤더: 월 선택 + 초기화/배송추가
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">`;
  h+=`<div style="display:flex;align-items:center;gap:8px">`;
  h+=`<button onclick="changeOrderMonth(-1)" style="width:30px;height:30px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;color:#555;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">◀</button>`;
  h+=`<div style="font-size:20px;font-weight:800;color:#1a1a1a">📋 돌봄 ${orderMonth}월 발주서</div>`;
  h+=`<button onclick="changeOrderMonth(1)" style="width:30px;height:30px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fff;color:#555;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">▶</button>`;
  h+=`</div>`;
  h+=`<div style="display:flex;gap:8px">`;
  h+=`<button onclick="resetOrder()" style="padding:8px 14px;background:#fff;color:#e53935;border:1.5px solid #ffcdd2;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🗑 초기화</button>`;
  h+=`<button onclick="addDelivery();renderOrder()" style="padding:8px 14px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ 배송 추가</button>`;
  h+=`</div></div>`;

  const cols=deliveries.length;
  const gcols=`130px repeat(${cols},minmax(90px,1fr))`;

  // 배송 헤더 (위치 클릭=토글, 날짜 클릭=달력)
  h+=`<div style="display:grid;grid-template-columns:${gcols};gap:2px;margin-bottom:4px">`;
  h+=`<div></div>`;
  deliveries.forEach(d=>{
    const locColor=d.loc==='부산'?'#e53935':'#1565c0';
    const locBg=d.loc==='부산'?'#ffebee':'#e3f2fd';
    const dt=new Date(d.date);
    const dayName=['일','월','화','수','목','금','토'][dt.getDay()];
    const dayColor=dt.getDay()===0?'#e53935':dt.getDay()===6?'#1565c0':'#555';
    const mm=String(dt.getMonth()+1).padStart(2,'0');
    const dd2=String(dt.getDate()).padStart(2,'0');
    h+=`<div style="text-align:center;padding:6px 2px;background:#f0fdf4;border:1px solid #c8e6c9;border-radius:8px">`;
    h+=`<div onclick="toggleLoc(${d.id})" style="padding:5px 2px;background:${locBg};border:1px solid ${locColor}30;border-radius:6px;color:${locColor};font-size:12px;font-weight:800;cursor:pointer;user-select:none">${d.loc}</div>`;
    h+=`<div onclick="document.getElementById('ddate_${d.id}').showPicker()" style="margin-top:4px;font-size:11px;color:#1a1a1a;font-weight:600;cursor:pointer">${mm}.${dd2} <span style="color:${dayColor}">(${dayName})</span></div>`;
    h+=`<input type="date" id="ddate_${d.id}" value="${d.date}" onchange="this.closest('div').querySelector('div:nth-child(2)');calcMonthlyOrder();renderOrder()" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">`;
    h+=`</div>`;
  });
  h+=`</div>`;

  // 제품별 행 (코튼 제외)
  // 1파레트당 박스 수 (한 곳만 수정하면 라벨과 계산이 자동으로 맞춰짐)
  const bppMap={'500':24,'1000_22':16,'1000_17':14};
  const palletLabel={};Object.keys(bppMap).forEach(k=>palletLabel[k]=bppMap[k]+'박스 기준');
  const allRows=[];
  PR.forEach(p=>{
    const shapes=ORDER_SHAPES[p.id]||['센터','사이드','코너'];
    allRows.push({type:'header',label:`${p.name} ${p.badge}`,pid:p.id,pallet:palletLabel[p.id]||''});
    (ORDER_COLORS[p.id]||[]).forEach(c=>{
      shapes.forEach(t=>{
        allRows.push({type:'cell',label:`${c}(${t})`,pid:p.id,color:c,shape:t});
      });
    });
    allRows.push({type:'subtotal',pid:p.id,bpp:bppMap[p.id]||24});
  });

  allRows.forEach(row=>{
    if(row.type==='header'){
      h+=`<div style="margin-top:10px;padding:8px 10px;font-size:13px;font-weight:800;color:#2E7D32;background:#e8f5e9;border-radius:6px;display:inline-block">${row.label} <span style="font-size:10px;font-weight:500;color:#888">${row.pallet}</span></div>`;
    } else if(row.type==='subtotal'){
      h+=`<div style="display:grid;grid-template-columns:${gcols};gap:2px;border-top:1px solid #e0e0e0;margin-top:2px">`;
      h+=`<div style="padding:5px 10px;font-size:11px;font-weight:700;color:#888">파레트</div>`;
      deliveries.forEach(d=>h+=`<div style="text-align:center;font-size:12px;font-weight:700;padding:5px;color:#2E7D32" id="palsub_${d.id}_${row.pid}">0</div>`);
      h+=`</div>`;
    } else {
      h+=`<div style="display:grid;grid-template-columns:${gcols};gap:2px">`;
      h+=`<div style="padding:7px 10px;font-size:12px;font-weight:600;color:#555;display:flex;align-items:center;gap:5px;white-space:nowrap"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${ORDER_CL[row.color]||'#888'}"></span>${row.label}</div>`;
      deliveries.forEach(d=>{
        const cellId=`oc_${d.id}_${row.pid}_${row.color}_${row.shape}`;
        const cellBg=d.loc==='부산'?'#fff5f5':'#f0f7ff';
        const cellBorder=d.loc==='부산'?'#f5c6c6':'#c6d9f5';
        const focusBg=d.loc==='부산'?'#ffe8e8':'#e0eeff';
        h+=`<div style="padding:2px"><input type="number" inputmode="numeric" min="0" id="${cellId}" value="" oninput="calcMonthlyOrder()" style="width:100%;height:32px;background:${cellBg};border:1.5px solid ${cellBorder};border-radius:6px;color:#1a1a1a;font-size:14px;font-weight:700;text-align:center;outline:none;font-family:inherit;transition:border .2s" onfocus="this.style.borderColor='${d.loc==='부산'?'#e53935':'#1565c0'}';this.style.background='${focusBg}'" onblur="this.style.borderColor='${cellBorder}';this.style.background='${cellBg}'"></div>`;
      });
      h+=`</div>`;
    }
  });

  // 수량 합계 행
  h+=`<div style="display:grid;grid-template-columns:${gcols};gap:2px;margin-top:10px;border-top:2px solid #c8e6c9;padding-top:8px">`;
  h+=`<div style="padding:7px 10px;font-size:14px;font-weight:800;color:#1a1a1a">수량</div>`;
  deliveries.forEach(d=>h+=`<div style="text-align:center;font-size:15px;font-weight:800;padding:7px;color:#2E7D32" id="dsum_${d.id}">0</div>`);
  h+=`</div>`;

  // 파레트 행
  h+=`<div style="display:grid;grid-template-columns:${gcols};gap:2px">`;
  h+=`<div style="padding:7px 10px;font-size:14px;font-weight:800;color:#1a1a1a">파레트</div>`;
  deliveries.forEach(d=>h+=`<div style="text-align:center;font-size:15px;font-weight:800;padding:7px;color:#555" id="dpal_${d.id}">0</div>`);
  h+=`</div>`;

  // 메모
  h+=`<div style="margin-top:14px"><div style="font-size:12px;font-weight:600;color:#999;margin-bottom:6px">📝 메모</div><textarea id="ordMemo" style="width:100%;height:52px;background:#fafafa;border:1.5px solid #e0e0e0;border-radius:8px;color:#1a1a1a;font-size:13px;padding:10px;outline:none;resize:none;font-family:inherit" onfocus="this.style.borderColor='#2E7D32'" onblur="this.style.borderColor='#e0e0e0'"></textarea></div>`;

  h+=`</div>`;// orderSheet

  document.getElementById('app').innerHTML=h;
  document.querySelector('.wrap').style.maxWidth='1020px';

  document.getElementById('barEl').style.display='block';
  document.getElementById('bl').innerHTML=`📋 <b>돌봄 ${orderMonth}월 발주서</b>`;
  document.getElementById('gt').textContent='0';
  const sb=document.getElementById('sbtn');sb.disabled=false;sb.textContent='📸 발주서 저장';sb.className='btn btn-in';sb.onclick=saveMonthlyOrder;

  restoreOrderInputs();
}

function addDelivery(){
  saveOrderInputs();
  const id=++delIdCounter;
  const d=new Date();
  d.setDate(d.getDate()+7*deliveries.length);
  const ds=d.toISOString().split('T')[0];
  deliveries.push({id:id,loc:'부산',date:ds});
}

function removeDelivery(id){
  saveOrderInputs();
  deliveries=deliveries.filter(d=>d.id!==id);
  renderOrder();
}

function calcMonthlyOrder(){
  const bppMap={'500':24,'1000_22':16,'1000_17':14};
  let grandTotal=0;

  deliveries.forEach(d=>{
    const dateEl=document.getElementById('ddate_'+d.id);
    if(dateEl)d.date=dateEl.value;

    let colTotal=0;
    let totalPallets=0;
    PR.forEach(p=>{
      const shapes=ORDER_SHAPES[p.id]||['센터','사이드','코너'];
      let pBox=0;
      (ORDER_COLORS[p.id]||[]).forEach(c=>{
        shapes.forEach(t=>{
          const v=parseInt(document.getElementById('oc_'+d.id+'_'+p.id+'_'+c+'_'+t)?.value)||0;
          colTotal+=v;
          pBox+=v;
        });
      });
      const pPal=pBox>0?Math.ceil(pBox/bppMap[p.id]):0;
      totalPallets+=pPal;
      const subEl=document.getElementById('palsub_'+d.id+'_'+p.id);
      if(subEl)subEl.textContent=pPal>0?pPal+'P':'0';
    });

    const maxP=d.loc==='부산'?16:8;
    const sumEl=document.getElementById('dsum_'+d.id);
    const palEl=document.getElementById('dpal_'+d.id);
    if(sumEl)sumEl.textContent=colTotal;
    if(palEl){palEl.textContent=totalPallets+'/'+maxP;palEl.style.color=totalPallets>maxP?'#e53935':'#555'}
    grandTotal+=colTotal;
  });
  const gtEl=document.getElementById('gt');
  if(gtEl)gtEl.textContent=grandTotal.toLocaleString();
}

async function saveMonthlyOrder(){
  // 1. 시트에 발주 데이터 저장
  saveOrderInputs();
  const orderData=[];
  deliveries.forEach(d=>{
    const items=[];
    PR.forEach(p=>{
      const shapes=ORDER_SHAPES[p.id]||['센터','사이드','코너'];
      (ORDER_COLORS[p.id]||[]).forEach(c=>{
        shapes.forEach(t=>{
          const v=parseInt(document.getElementById('oc_'+d.id+'_'+p.id+'_'+c+'_'+t)?.value)||0;
          if(v>0)items.push({product:p.name+' '+p.badge,color:c,shape:t,qty:v});
        });
      });
    });
    if(items.length>0)orderData.push({loc:d.loc,date:d.date,items:items});
  });
  if(orderData.length>0){
    fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveOrder',month:orderMonth+'월',deliveries:orderData})
    }).catch(()=>{});
  }

  // 2. 이미지 저장
  if(typeof html2canvas==='undefined'){
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    document.head.appendChild(s);await new Promise(r=>s.onload=r);
  }
  try{
    const el=document.getElementById('orderSheet');
    const canvas=await html2canvas(el,{backgroundColor:'#ffffff',scale:2,width:el.scrollWidth,height:el.scrollHeight,windowWidth:el.scrollWidth+40});
    const link=document.createElement('a');
    link.download='발주서_'+orderMonth+'월_'+dateKey+'.png';
    link.href=canvas.toDataURL();link.click();
    toast('✅ 발주서 저장 + 시트 기록 완료!');
  }catch(e){toast('이미지 저장 실패 (시트 기록은 완료)');console.error(e)}
}

function buildTable(pfx,ex){let h='';PR.forEach(p=>{
  h+=`<div class="ph"><span class="ph-name">${p.name}</span><span class="ph-tag">${p.badge}</span><span class="ph-box">1박스=${p.bpb}장</span><span class="ph-sum" id="ps_${pfx}_${p.id}">0장</span></div>`;
  h+=`<div class="g"><div class="g-hd"><div></div><div>센터</div><div>사이드</div><div>코너</div><div>10T</div></div>`;
  p.colors.forEach(c=>{h+=`<div class="g-row"><div class="cl"><div class="cd" style="background:${CL[c]}"></div>${c}</div>`;
    TY.forEach(t=>{const k=p.id+'_'+c+'_'+t;const pv=(ex&&ex.data&&ex.data[k])||'';
      h+=`<div class="ce ${pfx==='in'?'incoming':''}"><input type="number" inputmode="numeric" min="0" id="${pfx}_${k}" value="${pv}" oninput="calc('${pfx}')"></div>`});h+=`</div>`});h+=`</div>`});return h}

function calc(pfx){let g=0;PR.forEach(p=>{let pb=0;p.colors.forEach(c=>{TY.forEach(t=>{pb+=(parseInt(document.getElementById(`${pfx}_${p.id}_${c}_${t}`)?.value)||0)})});g+=pb*p.bpb;
  const e=document.getElementById(`ps_${pfx}_${p.id}`);if(e)e.textContent=pb+'박스 / '+pb*p.bpb+'장'});document.getElementById('gt').textContent=g.toLocaleString()}

async function submitInv(){if(!loc||!team)return;
  // 수요일 체크 (0=일, 3=수)
  const today=new Date();const dayOfWeek=today.getDay();
  if(dayOfWeek!==3){toast('⚠️ 재고조사는 매주 수요일에만 제출 가능합니다','error');return}
  if(!confirm(team+' '+loc+' 재고를 제출하시겠습니까?\n\n제출하면 기존 데이터가 업데이트됩니다.'))return;
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='저장 중...';
  const dm={},items=[];PR.forEach(p=>{p.colors.forEach(c=>{TY.forEach(t=>{const k=p.id+'_'+c+'_'+t;const v=parseInt(document.getElementById(`inv_${k}`)?.value)||0;dm[k]=v;
    items.push({product:p.name+' '+p.badge,color:c,type:t,qty:v,sheets:v*p.bpb})})})});
  const memo=document.getElementById('invMemo')?.value||'';
  const hm=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  const fb={time:hm,data:dm};if(loc==='사무실'&&memo)fb.memo=memo;
  try{await db.ref('inventory/'+dateKey+'/'+team+'/'+fk(loc)).set(fb);toast('✅ '+team+' '+loc+' 저장! (기준일:'+surveyDateKey+')')}catch(e){toast('실패');btn.disabled=false;btn.textContent='재고 제출';return}
  let txt=mm+dd+' '+team+' '+loc+' (기준일:'+surveyDateKey+')\n\n';PR.forEach(p=>{let has=false,s='【'+p.name+' '+p.badge+'】\n';p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`inv_${p.id}_${c}_${t}`)?.value)||0;if(v>0){s+=c+'('+t+') : '+v+'박스('+v*p.bpb+'장)\n';has=true}})});if(has)txt+=s+'\n'});
  if(memo)txt+='필요용품: '+memo+'\n';try{await navigator.clipboard.writeText(txt)}catch(e){}
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'inventory',team:team,location:loc,date:surveyDateKey,items:items,memo:memo}),headers:{'Content-Type':'text/plain'}}).then(r=>{if(!r.ok)toast('⚠️ 시트 저장 실패')}).catch(()=>toast('⚠️ 시트 저장 실패'));
  btn.disabled=false;btn.textContent='재고 제출'}

async function submitIn(){if(!team)return;const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='저장 중...';
  const items=[];PR.forEach(p=>{p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`in_${p.id}_${c}_${t}`)?.value)||0;
    if(v>0)items.push({product:p.name+' '+p.badge,color:c,type:t,qty:v,sheets:v*p.bpb})})})});
  if(items.length===0){toast('수량을 입력하세요');btn.disabled=false;btn.textContent='입고 기록 저장';return}
  const memo=document.getElementById('inMemo')?.value||'';
  const selDate=document.getElementById('inDate')?.value||dateKey;
  incomingDate=selDate;
  const hm=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  try{await db.ref('incoming/'+team+'/'+selDate+'_'+hm.replace(':','')).set({time:hm,date:selDate,items:items,memo:memo});
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'incoming',team:team,date:selDate,time:hm,items:items,memo:memo}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});
    let txt=mm+dd+' '+team+' 입고\n\n';PR.forEach(p=>{let has=false,s='【'+p.name+' '+p.badge+'】\n';p.colors.forEach(c=>{TY.forEach(t=>{const v=parseInt(document.getElementById(`in_${p.id}_${c}_${t}`)?.value)||0;if(v>0){s+=c+'('+t+') : '+v+'박스('+v*p.bpb+'장)\n';has=true}})});if(has)txt+=s+'\n'});
    if(memo)txt+='비고: '+memo+'\n';try{await navigator.clipboard.writeText(txt)}catch(e){}
    toast('✅ '+team+' 입고 완료!')}catch(e){toast('실패')}
  btn.disabled=false;btn.textContent='입고 기록 저장'}

if(urlTab&&['inventory','incoming','summary','order'].includes(urlTab))tab=urlTab;
if(urlTeam&&TEAMS[urlTeam]){pickTeam(urlTeam)}else if(urlTeam==='경기도'&&TEAMS['경기']){pickTeam('경기')}else{render()}
</script>
