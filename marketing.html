<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>돌봄매트 마케팅</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh;padding:20px}
.wrap{max-width:1600px;margin:0 auto}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #1a1a1a}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:42px;height:42px;background:#1a1a1a;color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header .sub{font-size:11px;color:#666;margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px;font-size:11px;color:#666}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#10b981}
.sync-dot.offline{background:#ef4444}
.header-action{padding:6px 12px;background:#fff;border:1px solid #e5e5e0;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#666}
.header-action:hover{border-color:#1a1a1a;color:#1a1a1a}

.section{background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.02)}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-desc{font-size:11px;color:#888;margin-top:2px}
.sec-actions{display:flex;gap:6px;align-items:center}

.btn{padding:7px 13px;border:1px solid #1a1a1a;border-radius:7px;background:#1a1a1a;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{opacity:.85}
.btn.secondary{background:#fff;color:#1a1a1a}
.btn.secondary:hover{background:#f0f0ed}
.btn.small{padding:4px 10px;font-size:11px}
.btn.danger{background:#fff;color:#ef4444;border-color:#fecaca}
.btn.danger:hover{background:#fef2f2}
.btn.ghost{background:transparent;border-color:#e5e5e0;color:#666}
.btn.ghost:hover{border-color:#1a1a1a;color:#1a1a1a}

.filter-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.fchip{padding:5px 11px;background:#fff;border:1px solid #e5e5e0;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;color:#666;transition:all .15s}
.fchip:hover{border-color:#1a1a1a;color:#1a1a1a}
.fchip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.persona{background:#fafaf8;border:1.5px solid #e5e5e0;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;position:relative}
.persona:hover{border-color:#1a1a1a;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.05)}
.persona.active{border-color:#1a1a1a;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.persona-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.persona-emoji{font-size:20px}
.persona-tier{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:700}
.tier-1{background:#fef3c7;color:#92400e}
.tier-2{background:#dbeafe;color:#1e40af}
.tier-3{background:#f3e8ff;color:#6b21a8}
.tier-4{background:#dcfce7;color:#14532d}
.persona-name{font-size:13px;font-weight:700;margin-bottom:2px}
.persona-label{font-size:10px;color:#666;margin-bottom:7px;line-height:1.4}
.persona-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.tag{font-size:9px;padding:2px 6px;background:#fff;border:1px solid #e5e5e0;border-radius:5px;color:#555}
.tag.purpose{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.tag.channel{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.persona-meta{font-size:10px;color:#888;line-height:1.5;max-height:60px;overflow:hidden}
.persona-actions-row{display:none;gap:4px;margin-top:7px;padding-top:7px;border-top:1px dashed #e5e5e0}
.persona.active .persona-actions-row{display:flex}

.persona-filter-bar{display:none;justify-content:space-between;align-items:center;padding:8px 14px;background:#fff3cd;border:1px solid #ffe69c;border-radius:9px;font-size:12px;margin-bottom:12px}

.platform-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #e5e5e0}
.ptab{padding:7px 12px;border:1px solid #e5e5e0;border-radius:7px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:#666}
.ptab:hover{border-color:#1a1a1a;color:#1a1a1a}
.ptab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.ptab .count{display:inline-block;margin-left:5px;padding:1px 6px;background:rgba(255,255,255,.2);border-radius:7px;font-size:10px}
.ptab:not(.active) .count{background:#f0f0ed;color:#888}
.ptab-add{padding:7px 12px;border:1px dashed #c0c0b8;border-radius:7px;background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#888}
.ptab-add:hover{border-style:solid;color:#1a1a1a;border-color:#1a1a1a}

.platform-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:9px 13px;background:#fafaf8;border-radius:8px}
.platform-name-edit{font-size:14px;font-weight:700;background:transparent;border:none;font-family:inherit;outline:none;flex:1}
.platform-name-edit:focus{background:#fff;padding:3px 7px;border-radius:5px}
.platform-strategy{font-size:11px;color:#666;background:#fffef0;border-left:3px solid #eab308;padding:8px 12px;margin-bottom:10px;border-radius:0 6px 6px 0;line-height:1.6}

.actions-grid{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto}
.action-item{background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;transition:all .15s}
.action-item:hover{border-color:#c0c0b8}
.action-check{width:18px;height:18px;border:2px solid #c0c0b8;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.action-check.done{background:#10b981;border-color:#10b981}
.action-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.action-body{flex:1;min-width:0}
.action-title{font-size:12px;font-weight:600;margin-bottom:3px}
.action-item.done .action-title{text-decoration:line-through;color:#999}
.action-meta{display:flex;gap:5px;flex-wrap:wrap;font-size:10px;color:#888;margin-top:3px}
.action-persona{padding:2px 6px;background:#f0f0ed;border-radius:5px}
.action-note{font-size:11px;color:#666;margin-top:3px;line-height:1.4}
.action-del{background:transparent;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px}
.action-del:hover{color:#ef4444;background:#fef2f2}

.platform-empty{text-align:center;padding:30px 20px;color:#999;font-size:12px}

.memo-area{width:100%;min-height:180px;padding:14px;border:1px solid #e5e5e0;border-radius:10px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.7;background:#fffef9}
.memo-area:focus{outline:none;border-color:#1a1a1a}
.memo-save{font-size:10px;color:#888}

.form-box{background:#fafaf8;border:2px dashed #c0c0b8;border-radius:10px;padding:12px;margin-top:10px}
.form-box input,.form-box select,.form-box textarea{width:100%;padding:8px 11px;border:1px solid #e5e5e0;border-radius:6px;font-size:12px;margin-bottom:6px;font-family:inherit;background:#fff}
.form-box .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.form-box textarea{resize:vertical;min-height:50px}
.form-box .form-title{font-size:12px;font-weight:700;margin-bottom:9px}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:22px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:10px;font-size:12px;font-weight:600;z-index:200;transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:40px 20px;color:#999;grid-column:1/-1}
.empty-emoji{font-size:36px;margin-bottom:8px;opacity:.5}
.empty-text{font-size:12px;margin-bottom:10px}

@media(max-width:640px){
  .persona-grid{grid-template-columns:1fr}
  .header h1{font-size:18px}
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>

<div class="wrap">

<div class="header">
  <div class="header-left">
    <div class="header-logo">D</div>
    <div>
      <h1>🎯 돌봄매트 마케팅</h1>
      <div class="sub">페르소나 · 플랫폼 · 메모 통합 보드</div>
    </div>
  </div>
  <div class="header-right">
    <button class="header-action" onclick="resetData()">🔄 기본값 리셋</button>
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncText">연결됨</span>
  </div>
</div>

<!-- Section 1: Personas -->
<div class="section">
  <div class="sec-header">
    <div>
      <div class="sec-title">👥 페르소나 (23개)</div>
      <div class="sec-desc">클릭하면 해당 페르소나 대상 플랫폼 실행만 필터링</div>
    </div>
    <div class="sec-actions">
      <button class="btn secondary small" onclick="showAllPersonas()">전체 보기</button>
      <button class="btn small" onclick="toggleForm('personaForm')">+ 페르소나</button>
    </div>
  </div>
  
  <div class="filter-chips" id="personaFilterChips"></div>
  <div class="persona-filter-bar" id="personaFilterBar"></div>
  <div class="persona-grid" id="personaGrid"></div>
  
  <div class="form-box" id="personaForm" style="display:none">
    <div class="form-title">새 페르소나</div>
    <div class="row">
      <input type="text" id="pEmoji" placeholder="이모지 (예: 👩‍👧)" maxlength="4">
      <input type="text" id="pName" placeholder="이름 (예: 신축엄마 수진)">
    </div>
    <input type="text" id="pLabel" placeholder="한줄 설명">
    <div class="row">
      <select id="pTier">
        <option value="1">Tier 1 (핵심 ⭐⭐⭐)</option>
        <option value="2">Tier 2 (주요 ⭐⭐)</option>
        <option value="3" selected>Tier 3 (틈새 ⭐)</option>
        <option value="4">Tier 4 (신규/실험)</option>
      </select>
      <input type="text" id="pPurpose" placeholder="시공목적 (쉼표로)">
    </div>
    <input type="text" id="pChannel" placeholder="주 유입경로">
    <textarea id="pDetail" placeholder="상세: 고민, 예산, 결정요인"></textarea>
    <div class="form-actions">
      <button class="btn secondary small" onclick="toggleForm('personaForm')">취소</button>
      <button class="btn small" onclick="savePersona()">저장</button>
    </div>
  </div>
</div>

<!-- Section 2: Platforms -->
<div class="section">
  <div class="sec-header">
    <div>
      <div class="sec-title">📱 마케팅 플랫폼별 실행</div>
      <div class="sec-desc" id="platformFilter">전체 페르소나</div>
    </div>
    <div class="sec-actions">
      <button class="btn small" onclick="toggleForm('actionForm')">+ 실행 추가</button>
    </div>
  </div>
  
  <div class="platform-tabs" id="platformTabs"></div>
  <div id="platformContent"></div>
  
  <div class="form-box" id="actionForm" style="display:none">
    <div class="form-title">새 실행 항목</div>
    <input type="text" id="aTitle" placeholder="제목 (예: 신축엄마 타겟 블로그 포스팅)">
    <div class="row">
      <select id="aPersona"></select>
      <select id="aPlatform"></select>
    </div>
    <div class="row">
      <input type="date" id="aDate">
      <select id="aStatus">
        <option value="pending">진행 중</option>
        <option value="done">완료</option>
      </select>
    </div>
    <textarea id="aNote" placeholder="메모 (선택)"></textarea>
    <div class="form-actions">
      <button class="btn secondary small" onclick="toggleForm('actionForm')">취소</button>
      <button class="btn small" onclick="saveAction()">추가</button>
    </div>
  </div>
</div>

<!-- Section 3: Memo -->
<div class="section">
  <div class="sec-header">
    <div>
      <div class="sec-title">📝 마케팅 메모</div>
      <div class="sec-desc">아이디어, 전략, 회의록 자유롭게</div>
    </div>
    <div class="memo-save" id="memoStatus">자동 저장됨</div>
  </div>
  <textarea class="memo-area" id="memoArea" placeholder="• 이번 달 마케팅 방향&#10;• 경쟁사 분석&#10;• 캠페인 아이디어&#10;• ..."></textarea>
</div>

</div>

<div class="toast" id="toast"></div>

<div class="modal" id="platformModal">
  <div class="modal-box">
    <div class="modal-title">새 플랫폼 추가</div>
    <input type="text" id="newPlatformName" placeholder="이름 (예: 유튜브)" style="width:100%;padding:10px;border:1px solid #e5e5e0;border-radius:7px;font-size:13px;font-family:inherit;margin-bottom:8px">
    <input type="text" id="newPlatformIcon" placeholder="이모지 (예: 🎬)" maxlength="4" style="width:100%;padding:10px;border:1px solid #e5e5e0;border-radius:7px;font-size:13px;font-family:inherit;margin-bottom:8px">
    <textarea id="newPlatformStrategy" placeholder="이 플랫폼 전략 (선택)" style="width:100%;padding:10px;border:1px solid #e5e5e0;border-radius:7px;font-size:12px;font-family:inherit;margin-bottom:14px;min-height:60px;resize:vertical"></textarea>
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button class="btn secondary small" onclick="closePlatformModal()">취소</button>
      <button class="btn small" onclick="savePlatform()">추가</button>
    </div>
  </div>
</div>

<script>

let personas=[],platforms=[],actions=[],memo='';
let selectedPersonaId=null,selectedPlatformId=null,editingPersonaId=null,tierFilter='all';

function syncOnline(on){const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText');if(on){dot.classList.remove('offline');txt.textContent='연결됨'}else{dot.classList.add('offline');txt.textContent='연결 안됨'}}
function arrToObj(arr){const o={};arr.forEach(x=>{o[x.id]=x});return o}
function saveToFB(key,val){db.ref(MK+'/'+key).set(val).catch(e=>{console.error(e);syncOnline(false)})}

function resetData(){
  if(!confirm('페르소나 23개+플랫폼 8개를 기본값으로 복원할까요?\n(실행 항목과 메모는 유지)'))return;
  personas=[...DEFAULT_PERSONAS];
  platforms=[...DEFAULT_PLATFORMS];
  saveToFB('personas',arrToObj(personas));
  saveToFB('platforms',arrToObj(platforms));
  if(platforms.length>0)selectedPlatformId=platforms[0].id;
  renderAll();
  toast('✅ 기본 데이터 복원됨');
}

function loadAll(){
  db.ref(MK).once('value').then(snap=>{
    const d=snap.val()||{};
    if(d.personas&&Object.keys(d.personas).length>0)personas=Object.values(d.personas);
    else{personas=[...DEFAULT_PERSONAS];saveToFB('personas',arrToObj(personas))}
    if(d.platforms&&Object.keys(d.platforms).length>0)platforms=Object.values(d.platforms);
    else{platforms=[...DEFAULT_PLATFORMS];saveToFB('platforms',arrToObj(platforms))}
    actions=d.actions?Object.values(d.actions):[];
    memo=d.memo||'';
    personas.sort((a,b)=>(a.order||0)-(b.order||0));
    platforms.sort((a,b)=>(a.order||0)-(b.order||0));
    if(platforms.length>0)selectedPlatformId=platforms[0].id;
    renderAll();
    syncOnline(true);
  }).catch(e=>{syncOnline(false);console.error(e);
    personas=[...DEFAULT_PERSONAS];platforms=[...DEFAULT_PLATFORMS];
    if(platforms.length>0)selectedPlatformId=platforms[0].id;
    renderAll();
  });
  
  db.ref(MK).on('value',snap=>{
    const d=snap.val();if(!d)return;
    if(d.personas&&Object.keys(d.personas).length>0){personas=Object.values(d.personas);personas.sort((a,b)=>(a.order||0)-(b.order||0))}
    if(d.platforms&&Object.keys(d.platforms).length>0){platforms=Object.values(d.platforms);platforms.sort((a,b)=>(a.order||0)-(b.order||0))}
    actions=d.actions?Object.values(d.actions):[];
    if(d.memo!==undefined&&d.memo!==memo){memo=d.memo;const ma=document.getElementById('memoArea');if(document.activeElement!==ma)ma.value=memo}
    renderAll();
  });
}

function personaCardHTML(p){
  const active=selectedPersonaId===p.id;
  return `<div class="persona ${active?'active':''}" onclick="selectPersona('${p.id}')">
    <div class="persona-header">
      <span class="persona-emoji">${p.emoji||'👤'}</span>
      <span class="persona-tier tier-${p.tier||3}">T${p.tier||3}</span>
    </div>
    <div class="persona-name">${p.name}</div>
    <div class="persona-label">${p.label||''}</div>
    <div class="persona-tags">
      ${(p.purpose||'').split(',').map(x=>x.trim()).filter(x=>x).map(x=>`<span class="tag purpose">${x}</span>`).join('')}
      ${p.channel?`<span class="tag channel">${p.channel}</span>`:''}
    </div>
    ${p.detail?`<div class="persona-meta">${p.detail}</div>`:''}
    <div class="persona-actions-row">
      <button class="btn secondary small" onclick="event.stopPropagation();editPersona('${p.id}')">수정</button>
      <button class="btn danger small" onclick="event.stopPropagation();deletePersona('${p.id}')">삭제</button>
    </div>
  </div>`;
}

function renderPersonas(){
  const tiers=[{v:'all',l:'전체'},{v:1,l:'핵심 ⭐⭐⭐'},{v:2,l:'주요 ⭐⭐'},{v:3,l:'틈새 ⭐'},{v:4,l:'신규/실험'}];
  document.getElementById('personaFilterChips').innerHTML=tiers.map(t=>{
    const count=t.v==='all'?personas.length:personas.filter(p=>p.tier===t.v).length;
    return `<div class="fchip ${tierFilter===t.v?'active':''}" onclick="setTierFilter('${t.v}')">${t.l} (${count})</div>`;
  }).join('');
  
  let filtered=personas;
  if(tierFilter!=='all')filtered=personas.filter(p=>p.tier===parseInt(tierFilter));
  
  const grid=document.getElementById('personaGrid');
  if(filtered.length===0){grid.innerHTML='<div class="empty"><div class="empty-emoji">👥</div><div class="empty-text">페르소나가 없어요</div><button class="btn small" onclick="resetData()">기본값 23개 복원</button></div>';return}
  grid.innerHTML=filtered.map(p=>personaCardHTML(p)).join('');
  
  const bar=document.getElementById('personaFilterBar');
  if(selectedPersonaId){
    const p=personas.find(x=>x.id===selectedPersonaId);
    if(p){bar.style.display='flex';bar.innerHTML=`<span>🎯 <b>${p.emoji} ${p.name}</b> 선택됨 · 아래 플랫폼에 필터링 적용</span><button class="btn secondary small" onclick="showAllPersonas()">선택 해제</button>`}
  } else bar.style.display='none';
}

function setTierFilter(v){tierFilter=v==='all'?'all':parseInt(v);renderPersonas()}
function selectPersona(id){selectedPersonaId=selectedPersonaId===id?null:id;renderAll()}
function showAllPersonas(){selectedPersonaId=null;renderAll()}

function toggleForm(id){const f=document.getElementById(id);f.style.display=f.style.display==='none'?'block':'none';if(f.style.display==='block'){if(id==='personaForm'){editingPersonaId=null;clearPersonaForm()}else if(id==='actionForm'){populateActionSelects();if(selectedPersonaId)document.getElementById('aPersona').value=selectedPersonaId;if(selectedPlatformId)document.getElementById('aPlatform').value=selectedPlatformId;document.getElementById('aDate').value=new Date().toISOString().slice(0,10);document.getElementById('aTitle').value='';document.getElementById('aNote').value=''}}}

function clearPersonaForm(){['pEmoji','pName','pLabel','pPurpose','pChannel','pDetail'].forEach(id=>document.getElementById(id).value='');document.getElementById('pTier').value='3'}

function editPersona(id){const p=personas.find(x=>x.id===id);if(!p)return;editingPersonaId=id;document.getElementById('pEmoji').value=p.emoji||'';document.getElementById('pName').value=p.name||'';document.getElementById('pLabel').value=p.label||'';document.getElementById('pTier').value=p.tier||3;document.getElementById('pPurpose').value=p.purpose||'';document.getElementById('pChannel').value=p.channel||'';document.getElementById('pDetail').value=p.detail||'';document.getElementById('personaForm').style.display='block';document.getElementById('personaForm').scrollIntoView({behavior:'smooth',block:'center'})}

function savePersona(){const name=document.getElementById('pName').value.trim();if(!name){toast('⚠️ 이름을 입력하세요');return}const data={id:editingPersonaId||('p_'+Date.now()),emoji:document.getElementById('pEmoji').value.trim()||'👤',name,label:document.getElementById('pLabel').value.trim(),tier:parseInt(document.getElementById('pTier').value),purpose:document.getElementById('pPurpose').value.trim(),channel:document.getElementById('pChannel').value.trim(),detail:document.getElementById('pDetail').value.trim(),order:editingPersonaId?personas.find(x=>x.id===editingPersonaId).order:personas.length+1};if(editingPersonaId){const idx=personas.findIndex(x=>x.id===editingPersonaId);personas[idx]=data}else personas.push(data);saveToFB('personas',arrToObj(personas));toggleForm('personaForm');renderAll();toast('✅ 저장 완료')}

function deletePersona(id){if(!confirm('삭제할까요?'))return;personas=personas.filter(x=>x.id!==id);if(selectedPersonaId===id)selectedPersonaId=null;saveToFB('personas',arrToObj(personas));renderAll();toast('🗑️ 삭제됨')}

function renderPlatforms(){
  const tabs=document.getElementById('platformTabs');
  const filtered=selectedPersonaId?actions.filter(a=>a.personaId===selectedPersonaId):actions;
  tabs.innerHTML=platforms.map(pf=>{
    const count=filtered.filter(a=>a.platformId===pf.id).length;
    return `<button class="ptab ${selectedPlatformId===pf.id?'active':''}" onclick="selectPlatform('${pf.id}')">${pf.icon} ${pf.name}<span class="count">${count}</span></button>`;
  }).join('')+`<button class="ptab-add" onclick="openPlatformModal()">+ 플랫폼</button>`;
  renderPlatformContent();
  
  if(selectedPersonaId){const p=personas.find(x=>x.id===selectedPersonaId);if(p)document.getElementById('platformFilter').innerHTML=`🎯 <b>${p.emoji} ${p.name}</b> 대상 · <a href="#" onclick="showAllPersonas();return false" style="color:#1a1a1a">전체 보기</a>`}
  else document.getElementById('platformFilter').textContent='전체 페르소나';
}

function selectPlatform(id){selectedPlatformId=id;renderPlatforms()}

function actionItemHTML(a){
  const persona=personas.find(p=>p.id===a.personaId);
  return `<div class="action-item ${a.done?'done':''}">
    <div class="action-check ${a.done?'done':''}" onclick="toggleAction('${a.id}')"></div>
    <div class="action-body">
      <div class="action-title">${a.title}</div>
      ${a.note?`<div class="action-note">${a.note}</div>`:''}
      <div class="action-meta">
        ${persona?`<span class="action-persona">${persona.emoji} ${persona.name}</span>`:'<span class="action-persona">전체</span>'}
        ${a.date?`<span>📅 ${a.date}</span>`:''}
      </div>
    </div>
    <button class="action-del" onclick="deleteAction('${a.id}')">✕</button>
  </div>`;
}

function renderPlatformContent(){
  const container=document.getElementById('platformContent');
  const pf=platforms.find(p=>p.id===selectedPlatformId);
  if(!pf){container.innerHTML='<div class="platform-empty">플랫폼을 선택하거나 추가하세요</div>';return}
  let filtered=actions.filter(a=>a.platformId===pf.id);
  if(selectedPersonaId)filtered=filtered.filter(a=>a.personaId===selectedPersonaId);
  filtered.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  
  let html=`<div class="platform-info">
    <input type="text" class="platform-name-edit" value="${pf.icon} ${pf.name}" onchange="renamePlatform('${pf.id}',this.value)" />
    <div style="display:flex;gap:5px">
      <button class="btn ghost small" onclick="editPlatformStrategy('${pf.id}')">전략 수정</button>
      <button class="btn danger small" onclick="deletePlatform('${pf.id}')">삭제</button>
    </div>
  </div>`;
  if(pf.strategy)html+=`<div class="platform-strategy"><b>💡 전략:</b> ${pf.strategy}</div>`;
  if(filtered.length===0)html+=`<div class="platform-empty">${selectedPersonaId?'이 페르소나에 대한 ':''}실행이 없어요.<br>"+ 실행 추가" 버튼으로 추가해보세요.</div>`;
  else html+='<div class="actions-grid">'+filtered.map(a=>actionItemHTML(a)).join('')+'</div>';
  container.innerHTML=html;
}

function renamePlatform(id,val){const pf=platforms.find(p=>p.id===id);if(!pf)return;const m=val.match(/^(\S+)\s+(.+)$/);if(m){pf.icon=m[1];pf.name=m[2]}else pf.name=val;saveToFB('platforms',arrToObj(platforms));renderAll()}

function editPlatformStrategy(id){const pf=platforms.find(p=>p.id===id);if(!pf)return;const s=prompt('이 플랫폼의 전략을 입력하세요',pf.strategy||'');if(s!==null){pf.strategy=s;saveToFB('platforms',arrToObj(platforms));renderAll();toast('✅ 전략 저장됨')}}

function openPlatformModal(){document.getElementById('newPlatformName').value='';document.getElementById('newPlatformIcon').value='';document.getElementById('newPlatformStrategy').value='';document.getElementById('platformModal').classList.add('show')}
function closePlatformModal(){document.getElementById('platformModal').classList.remove('show')}
function savePlatform(){const name=document.getElementById('newPlatformName').value.trim();const icon=document.getElementById('newPlatformIcon').value.trim()||'📌';const strategy=document.getElementById('newPlatformStrategy').value.trim();if(!name){toast('⚠️ 이름을 입력하세요');return}const data={id:'pf_'+Date.now(),name,icon,strategy,order:platforms.length+1};platforms.push(data);saveToFB('platforms',arrToObj(platforms));selectedPlatformId=data.id;closePlatformModal();renderAll();toast('✅ 플랫폼 추가됨')}
function deletePlatform(id){if(!confirm('이 플랫폼과 관련 실행을 모두 삭제할까요?'))return;platforms=platforms.filter(p=>p.id!==id);actions=actions.filter(a=>a.platformId!==id);saveToFB('platforms',arrToObj(platforms));saveToFB('actions',arrToObj(actions));selectedPlatformId=platforms.length>0?platforms[0].id:null;renderAll();toast('🗑️ 삭제됨')}

function populateActionSelects(){const ps=document.getElementById('aPersona');const pfs=document.getElementById('aPlatform');ps.innerHTML='<option value="">전체 (특정 페르소나 아님)</option>'+personas.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('');pfs.innerHTML=platforms.map(p=>`<option value="${p.id}">${p.icon} ${p.name}</option>`).join('')}

function saveAction(){const title=document.getElementById('aTitle').value.trim();if(!title){toast('⚠️ 제목을 입력하세요');return}const data={id:'a_'+Date.now(),title,personaId:document.getElementById('aPersona').value||null,platformId:document.getElementById('aPlatform').value,date:document.getElementById('aDate').value,note:document.getElementById('aNote').value.trim(),done:document.getElementById('aStatus').value==='done',createdAt:Date.now()};actions.push(data);saveToFB('actions',arrToObj(actions));toggleForm('actionForm');renderAll();toast('✅ 추가됨')}

function toggleAction(id){const a=actions.find(x=>x.id===id);if(!a)return;a.done=!a.done;saveToFB('actions',arrToObj(actions));renderAll()}

function deleteAction(id){if(!confirm('삭제할까요?'))return;actions=actions.filter(x=>x.id!==id);saveToFB('actions',arrToObj(actions));renderAll();toast('🗑️ 삭제됨')}

let memoSaveTimer=null;
function setupMemo(){const ma=document.getElementById('memoArea');ma.addEventListener('input',()=>{document.getElementById('memoStatus').textContent='저장 중...';clearTimeout(memoSaveTimer);memoSaveTimer=setTimeout(()=>{memo=ma.value;saveToFB('memo',memo);document.getElementById('memoStatus').textContent='✅ 저장됨 '+new Date().toLocaleTimeString('ko-KR')},800)})}

function renderAll(){renderPersonas();renderPlatforms();const ma=document.getElementById('memoArea');if(ma&&document.activeElement!==ma)ma.value=memo}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

loadAll();
setupMemo();
</script>
