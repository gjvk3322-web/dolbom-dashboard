function renderCalendar(){
  const cal=document.getElementById('calDays');if(!cal)return;document.getElementById('calTitle').textContent=`${currentYear}ë…„ ${currentMonth}ى›”`;
  const fd=new Date(currentYear,currentMonth-1,1).getDay();const dim=new Date(currentYear,currentMonth,0).getDate();const pd=new Date(currentYear,currentMonth-1,0).getDate();
  const today=new Date();const tStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const teamCount = employees.length || 4;
  let h='';
  for(let i=0;i<fd;i++)h+=`<div class="cal-day other-month">${pd-fd+i+1}</div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(currentYear,currentMonth-1,d).getDay();
    const isPast=new Date(currentYear,currentMonth-1,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    let cls='cal-day';if(ds===tStr)cls+=' today';if(ds===selectedDate)cls+=' selected';if(isPast)cls+=' past';if(highlightDates.includes(ds)&&ds!==selectedDate)cls+=' highlight';
    const offCnt=OFFS[ds]?OFFS[ds].size:0;
    const activeCount=Math.max(teamCount-offCnt,0);
    const maxPerDay=Math.floor(activeCount/2)*2;
    const sc=scheduleData[ds]||{am:[],pm:[]};
    const used=sc.am.length+sc.pm.length;
    const ratio=maxPerDay>0?used/maxPerDay:0;
    let dc='dot-gray';
    if(dow!==0&&!isPast){
      if(isClosed(ds))dc='dot-red';
      else if(used===0)dc='dot-gray';
      else if(ratio>=0.8)dc='dot-red';
      else if(ratio>=0.4)dc='dot-orange';
      else dc='dot-green';
    }
    if(isClosed(ds)&&!isPast) cls+=' closed';
    const dots=(dow===0||isPast)?'':`<div class="slot-dots">${used>0||isClosed(ds)?`<div class="slot-dot ${dc}"></div>`:''}</div>`;
    h+=`<div class="${cls}" onclick="selectDate('${ds}')">${d}${dots}</div>`;
  }
  const rem=7-((fd+dim)%7);if(rem<7)for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month">${i}</div>`;
  cal.innerHTML=h;
}

}

function generateChannelName(){
  const time=document.getElementById('fTime').value;
  const date=document.getElementById('fDate').value;
  const region=document.getElementById('fRegion').value.trim();
  const product=document.getElementById('fProduct1').value;
  const isExtra=time==='AS'||time==='ى‹¤ى¸،';
  const isMove=time.includes('ى‌´ى „ى„¤ى¹ک');
  if(!time||!date||!region){showToast('âڑ ï¸ڈ ى‹œê°„, ى‹œê³µى‌¼, ى§€ى—­ى‌„ ë¨¼ى € ى‍…ë ¥ي•کى„¸ىڑ”');return;}
  if(!isExtra&&!product){showToast('âڑ ï¸ڈ ى œي’ˆى‌„ ë¨¼ى € ى„ يƒ‌ي•کى„¸ىڑ”');return;}
  if(region.length>2){showToast('âڑ ï¸ڈ ى§€ى—­ëھ…ى‌€ 2ê¸€ى‍گê¹Œى§€ë§Œ ê°€ëٹ¥ي•´ىڑ”');return;}
  const ds=date.replace(/-/g,'');
  const prefix=currentTeam==='ê²½ê¸°'?'5'+ds.slice(1):ds;
  let name;
  if(isExtra){
    name=`${time.toLowerCase()}/${region})${prefix}`;
  } else {
    const baseTime=time.startsWith('ىک¤ى „')?'ىک¤ى „':'ىک¤ي›„';
    const timeCode=baseTime==='ىک¤ى „'?'5':'9';
    if(isMove){
      name=`${timeCode}2${region}/${product})${prefix}`;
    } else {
      name=`${timeCode}/${region}/${product})${prefix}`;
    }
  }
  document.getElementById('channelText').textContent=name;
  document.getElementById('channelResult').style.display='flex';
  copyChannel();
}
function copyChannel(){
  const text=document.getElementById('channelText').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('ًں“‹ ى±„ë„گëھ… ë³µى‚¬ëگ¨: '+text)).catch(()=>showToast('ë³µى‚¬ ى‹¤يŒ¨'));
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
