<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>돌봄매트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7f3;
  --card:#fff;
  --text:#1a1a1a;
  --text2:#555;
  --text3:#999;
  --border:#e8e8e3;
  --green:#2E7D32;
  --green-light:#E8F5E9;
  --green-dark:#1B5E20;
  --radius:14px;
  --shadow:0 2px 8px rgba(0,0,0,0.04);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  max-width:500px;
  margin:0 auto;
  padding-bottom:60px;
  font-weight:400;
}

/* 헤더 */
.header{
  background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);
  padding:48px 24px 56px;
  text-align:center;
  position:relative;
}
.brand-logo{
  font-size:28px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.5px;
  margin-bottom:8px;
}
.brand-tagline{
  font-size:13px;
  color:rgba(255,255,255,0.75);
  font-weight:400;
  letter-spacing:0.3px;
}

/* 추천 배지 (조건부 표시) */
.ref-badge{
  display:none;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;
  padding:6px 14px;
  font-size:12px;
  color:#fff;
  font-weight:500;
  margin-top:12px;
  display:none;
}
.ref-badge.show{display:inline-block}

/* 신뢰 지표 */
.trust-bar{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;
  justify-content:space-around;
  text-align:center;
  margin-bottom:24px;
}
.trust-item{flex:1}
.trust-num{
  font-size:18px;
  font-weight:700;
  color:var(--green);
  letter-spacing:-0.3px;
}
.trust-label{
  font-size:11px;
  color:var(--text3);
  margin-top:2px;
  font-weight:400;
}
.trust-divider{
  width:1px;
  background:var(--border);
  margin:4px 0;
}

/* 컨테이너 */
.container{
  padding:0 20px;
}

/* 메뉴 그룹 */
.menu-section{
  margin-bottom:32px;
}
.menu-label{
  font-size:11px;
  color:var(--text3);
  font-weight:500;
  letter-spacing:0.5px;
  text-transform:uppercase;
  margin-bottom:8px;
  padding-left:4px;
}

.menu-list{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}

.menu-item{
  display:flex;
  align-items:center;
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
  text-decoration:none;
  color:inherit;
}
.menu-item:last-child{
  border-bottom:none;
}
.menu-item:active{
  background:#fafaf7;
}

.menu-content{
  flex:1;
  min-width:0;
}
.menu-title{
  font-size:15px;
  font-weight:600;
  color:var(--text);
  margin-bottom:3px;
  letter-spacing:-0.2px;
}
.menu-desc{
  font-size:12px;
  color:var(--text3);
  font-weight:400;
  letter-spacing:-0.1px;
}

.menu-arrow{
  color:#ccc;
  font-size:18px;
  margin-left:12px;
  font-weight:300;
}

/* 카톡 상담 영역 */
.contact-area{
  margin-top:24px;
  text-align:center;
}
.contact-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#fee500;
  color:#1a1a1a;
  padding:14px 28px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  transition:transform 0.15s;
}
.contact-btn:active{transform:scale(0.97)}

/* 푸터 */
.footer{
  margin-top:40px;
  padding:24px 20px;
  text-align:center;
  font-size:11px;
  color:var(--text3);
  font-weight:400;
  line-height:1.6;
}
.footer a{
  color:var(--text3);
  text-decoration:underline;
}

/* 페이드 인 애니메이션 */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.menu-section{animation:fadeUp 0.4s ease both}
.menu-section:nth-child(1){animation-delay:0.05s}
.menu-section:nth-child(2){animation-delay:0.1s}
.menu-section:nth-child(3){animation-delay:0.15s}
</style>
</head>
<body>

<div class="header">
  <div class="brand-logo">돌봄매트</div>
  <div class="brand-tagline">TPU 바닥매트 전문</div>
  <div id="refBadge" class="ref-badge"><span id="refName"></span> 추천</div>
</div>

<div class="trust-bar">
  <div class="trust-item">
    <div class="trust-num">6년</div>
    <div class="trust-label">시공 경험</div>
  </div>
  <div class="trust-divider"></div>
  <div class="trust-item">
    <div class="trust-num">6,700+</div>
    <div class="trust-label">시공 완료</div>
  </div>
  <div class="trust-divider"></div>
  <div class="trust-item">
    <div class="trust-num">80곳</div>
    <div class="trust-label">어린이집</div>
  </div>
</div>

<div class="container">

  <!-- 메인 메뉴 -->
  <div class="menu-section">
    <div class="menu-list">
      
      <a href="https://www.dolbommat.com" class="menu-item" id="menuHome">
        <div class="menu-content">
          <div class="menu-title">홈페이지</div>
          <div class="menu-desc">제품 소개 · 인증서 · 시공 후기</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="quote.html" class="menu-item" id="menuQuote">
        <div class="menu-content">
          <div class="menu-title">견적 받기</div>
          <div class="menu-desc">평수 입력하면 즉시 가격 확인</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="sample.html" class="menu-item" id="menuSample">
        <div class="menu-content">
          <div class="menu-title">무료 샘플 신청</div>
          <div class="menu-desc">직접 만져보고 결정하세요</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="booking.html" class="menu-item" id="menuBooking">
        <div class="menu-content">
          <div class="menu-title">시공 예약</div>
          <div class="menu-desc">원하는 날짜 선택해 신청</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

      <a href="review-event.html" class="menu-item" id="menuReview">
        <div class="menu-content">
          <div class="menu-title">후기 이벤트</div>
          <div class="menu-desc">미션 참여하고 캐시백 받기</div>
        </div>
        <div class="menu-arrow">›</div>
      </a>

    </div>
  </div>

  <!-- 카톡 상담 -->
  <div class="contact-area">
    <a href="http://pf.kakao.com/_UMyBK/chat" class="contact-btn">
      카카오톡 1:1 상담
    </a>
  </div>

</div>

<div class="footer">
  돌봄매트 · TPU 바닥매트 전문<br>
  창업 6년 · 6,700건 시공 완료
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 추천 채널 자동 인식 + 모든 링크에 ?ch=xx 자동 전달
// ═══════════════════════════════════════════════════════════════

(function(){
  // URL 파라미터에서 ch 추출
  var urlParams = new URLSearchParams(window.location.search);
  var ch = urlParams.get('ch');
  
  // 또는 path에서 추출 (예: my.dolbommat.com/sj)
  if (!ch) {
    var path = window.location.pathname;
    var match = path.match(/\/([a-zA-Z0-9_-]+)$/);
    if (match && match[1] !== 'cs-hub.html') {
      ch = match[1];
    }
  }
  
  // 추천 채널이 있으면
  if (ch) {
    // 1. 추천 배지 표시
    var badge = document.getElementById('refBadge');
    var name = document.getElementById('refName');
    if (badge && name) {
      name.textContent = ch;
      badge.classList.add('show');
    }
    
    // 2. localStorage에 저장 (각 페이지에서 읽음)
    try {
      var saved = JSON.parse(localStorage.getItem('dolbom_shared') || '{}');
      saved.channel = ch;
      saved.lastVisit = new Date().toISOString();
      localStorage.setItem('dolbom_shared', JSON.stringify(saved));
    } catch(e) {}
    
    // 3. 모든 내부 링크에 ?ch= 추가 (홈페이지 제외)
    var menuItems = [
      {id: 'menuQuote',   url: 'quote.html'},
      {id: 'menuSample',  url: 'sample.html'},
      {id: 'menuBooking', url: 'booking.html'},
      {id: 'menuReview',  url: 'review-event.html'}
    ];
    
    menuItems.forEach(function(item){
      var el = document.getElementById(item.id);
      if (el) {
        el.href = item.url + '?ch=' + encodeURIComponent(ch);
      }
    });
  }
  
  // 고객 유입 추적 (cs-welcome.html과 동일한 패턴)
  // localStorage에 phone이 있으면 trackEntry 호출
  try {
    var saved = JSON.parse(localStorage.getItem('dolbom_shared') || '{}');
    if (saved.phone && saved.name) {
      var API_URL = 'https://script.google.com/macros/s/AKfycbwo33sv9L1y722IdcfUm_i_nhmgZCCQX-grPEXGYbLemeI3WUx-f3C1Mi8ZxunmZ6D6lw/exec';
      fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({
          action: 'trackEntry',
          name: saved.name,
          phone: saved.phone,
          ref: ch || '',
          page: 'cs-hub',
          consent: 'Y'
        })
      }).catch(function(){});
    }
  } catch(e) {}
})();
</script>

</body>
</html>
