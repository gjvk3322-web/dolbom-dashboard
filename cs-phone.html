<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="/auth.js"></script>

    <!-- 검색엔진 노출 차단 (자동 추가) -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="naverbot" content="noindex, nofollow">
    <meta name="yeti" content="noindex, nofollow">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FAFAF7">
<title>돌봄매트 · 상담 로그</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7; --warm:#F0EDE6; --card:#FFFFFF;
  --text:#2C2925; --soft:#6B655E; --muted:#908B84; --line:#EBE8E1;
  --accent:#8BB5C0; --accent-bg:#F1F7F9; --accent-dk:#3A6670;
  --green:#89B493; --green-bg:#E8F3EC; --green-dk:#3F7249;
  --gold:#C4A878; --gold-bg:#F9F3E5; --gold-dk:#7A5E2E;
  --red:#C87F7D; --red-bg:#F8EBEB; --red-dk:#8A3D3C;
  --shadow-sm:0 1px 3px rgba(44,41,37,0.04),0 2px 8px rgba(44,41,37,0.03);
  --shadow-md:0 4px 16px rgba(44,41,37,0.06);
  --radius:16px; --radius-sm:10px;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text);
  letter-spacing:-0.01em; line-height:1.55;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  min-height:100vh; padding-bottom:80px;
}
button,input,textarea{font-family:inherit;letter-spacing:-0.01em}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.topnav{
  background:rgba(250,250,247,0.88);
  backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
  padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.nav-brand{display:flex; align-items:center; gap:10px}
.nav-logo{
  width:30px; height:30px; border-radius:9px;
  background:linear-gradient(135deg,var(--text),#4A4440);
  display:flex; align-items:center; justify-content:center;
  color:white; font-size:14px; font-weight:800;
}
.nav-title{font-size:15px; font-weight:750; letter-spacing:-0.025em}
.nav-title .label{color:var(--soft); font-weight:500; margin-left:6px}
.nav-meta{font-size:11.5px; color:var(--soft); font-variant-numeric:tabular-nums}

.container{max-width:480px; margin:0 auto; padding:20px}

.today-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:24px 22px 26px;
  box-shadow:var(--shadow-md);
  margin-bottom:18px;
}
.today-head{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:4px;
}
.today-title{
  font-size:18px; font-weight:780; letter-spacing:-0.025em;
  display:flex; align-items:center; gap:8px;
}
.today-title .emoji{font-size:19px}
.today-date{
  font-size:12px; color:var(--soft);
  background:var(--warm);
  padding:5px 11px; border-radius:100px;
  font-weight:600;
}
.already-saved{
  display:none; margin-top:10px; padding:8px 12px;
  background:var(--green-bg); color:var(--green-dk);
  border-radius:var(--radius-sm); font-size:11.5px; font-weight:650;
  text-align:center;
}
.already-saved.show{display:block}

.field{margin-top:18px}
.field-label{
  font-size:11.5px; font-weight:700; color:var(--soft);
  margin-bottom:8px; display:flex; align-items:center; gap:6px;
}
.field-label .icon{font-size:14px}
.field-label .tag{
  font-size:9.5px; font-weight:650;
  background:var(--warm); color:var(--muted);
  padding:2px 7px; border-radius:100px;
  margin-left:auto;
}
.field-label .tag.good{background:var(--green-bg); color:var(--green-dk)}
.field-label .tag.warn{background:var(--gold-bg); color:var(--gold-dk)}
.field-label .tag.hot{background:var(--red-bg); color:var(--red-dk)}

.num-input{
  width:100%; padding:22px 20px;
  border:2px solid var(--line); background:#fff;
  border-radius:var(--radius-sm);
  font-size:32px; font-weight:800; text-align:center;
  letter-spacing:-0.03em; color:var(--text);
  font-variant-numeric:tabular-nums;
  transition:all 0.2s var(--ease);
  -webkit-appearance:none; appearance:none;
}
.num-input:focus{
  outline:none; border-color:var(--accent);
  background:var(--accent-bg);
  box-shadow:0 0 0 4px rgba(139,181,192,0.15);
}
.num-input::placeholder{color:var(--muted); font-weight:600; font-size:24px}
.num-input.missed{border-color:#E8C8C7}
.num-input.missed:focus{border-color:var(--red); background:var(--red-bg); box-shadow:0 0 0 4px rgba(200,127,125,0.15)}
.num-input.callback{border-color:#D0E2D4}
.num-input.callback:focus{border-color:var(--green); background:var(--green-bg); box-shadow:0 0 0 4px rgba(137,180,147,0.15)}

.callback-rate{
  display:none; margin-top:8px; padding:7px 14px;
  background:var(--green-bg); color:var(--green-dk);
  border-radius:100px; font-size:11.5px; font-weight:650;
  text-align:center; font-variant-numeric:tabular-nums;
}
.callback-rate.show{display:block}
.callback-rate.warn{background:var(--gold-bg); color:var(--gold-dk)}
.callback-rate.danger{background:var(--red-bg); color:var(--red-dk)}

.memo-input{
  width:100%; padding:14px 16px;
  border:1px solid var(--line); background:#fff;
  border-radius:var(--radius-sm);
  font-size:14px; color:var(--text);
  resize:none; font-family:inherit;
  transition:all 0.2s;
}
.memo-input:focus{outline:none; border-color:var(--accent); background:var(--accent-bg)}

.submit-btn{
  width:100%; margin-top:20px;
  padding:17px; border:none; border-radius:var(--radius-sm);
  background:var(--text); color:#fff;
  font-size:16px; font-weight:720; letter-spacing:-0.015em;
  cursor:pointer; transition:all 0.2s;
}
.submit-btn:hover{background:#000; transform:translateY(-1px); box-shadow:var(--shadow-md)}
.submit-btn:active{transform:scale(0.98)}
.submit-btn:disabled{background:var(--muted); cursor:not-allowed; transform:none}
.submit-btn.success{background:var(--green-dk); color:#fff}

.summary-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px 22px;
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
}
.sc-head{
  font-size:12.5px; font-weight:700;
  color:var(--soft); letter-spacing:-0.015em;
  margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.sc-stats{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.sc-col .lbl{
  font-size:10.5px; font-weight:650;
  color:var(--muted); letter-spacing:0.04em;
  text-transform:uppercase; margin-bottom:4px;
}
.sc-col .val{
  font-size:22px; font-weight:800; letter-spacing:-0.025em;
  font-variant-numeric:tabular-nums; line-height:1.1;
}
.sc-col .val .u{font-size:12px; font-weight:600; color:var(--muted); margin-left:2px}
.sc-col .sub{font-size:10.5px; color:var(--soft); margin-top:3px}
.val-green{color:var(--green-dk)}
.val-red{color:var(--red-dk)}

.chart-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px 22px;
  box-shadow:var(--shadow-sm);
}
.barchart7{
  display:flex; align-items:flex-end; gap:6px;
  height:80px; margin:12px 0 6px;
}
.bar7{
  flex:1; background:var(--accent); opacity:0.35;
  border-radius:4px 4px 0 0; min-height:4px;
  position:relative;
}
.bar7-inner{
  position:absolute; bottom:0; left:0; right:0;
  background:var(--red);
  border-radius:4px 4px 0 0;
}
.bar7.today-b{opacity:0.55}
.bar7.today-b .bar7-inner{background:var(--red-dk)}
.bar7-labels{
  display:flex; gap:6px; font-size:10px; color:var(--muted);
  font-variant-numeric:tabular-nums;
}
.bar7-labels span{flex:1; text-align:center; line-height:1.4}
.bar7-labels .today-lbl{color:var(--text); font-weight:700}

.toast{
  position:fixed; bottom:30px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--text); color:#fff;
  padding:13px 22px; border-radius:100px;
  font-size:13.5px; font-weight:650;
  box-shadow:var(--shadow-md);
  opacity:0; transition:all 0.3s var(--ease);
  z-index:200; pointer-events:none;
  max-width:90vw; text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0); opacity:1}
.toast.success{background:var(--green-dk)}
.toast.error{background:var(--red-dk)}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}
.today-card,.summary-card,.chart-card{
  animation:fadeUp 0.45s var(--ease) backwards;
}
.today-card{animation-delay:0.05s}
.summary-card{animation-delay:0.15s}
.chart-card{animation-delay:0.2s}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-logo">돌</div>
    <div class="nav-title">
      상담 로그<span class="label">· 전화</span>
    </div>
  </div>
  <div class="nav-meta" id="navTime">2026-04-21 火</div>
</nav>

<div class="container">

<div class="today-card">
  <div class="today-head">
    <div class="today-title"><span class="emoji">📞</span>오늘 상담 현황</div>
    <div class="today-date" id="todayDate">4월 21일 화</div>
  </div>
  <div class="already-saved" id="alreadySaved">
    ✓ 오늘 이미 입력함 · 수정해서 다시 제출하면 덮어써집니다
  </div>

  <div class="field">
    <label class="field-label">
      <span class="icon">📞</span>받은 전화 (응답 성공)
      <span class="tag good">상담 시작</span>
    </label>
    <input type="number" inputmode="numeric" class="num-input"
           id="received" placeholder="0" min="0" max="999">
  </div>

  <div class="field">
    <label class="field-label">
      <span class="icon">📵</span>놓친 전화 (부재중)
      <span class="tag hot">콜백 대상</span>
    </label>
    <input type="number" inputmode="numeric" class="num-input missed"
           id="missed" placeholder="0" min="0" max="999">
  </div>

  <div class="field">
    <label class="field-label">
      <span class="icon">🔄</span>콜백 완료 (놓친 전화 → 다시 건 수)
      <span class="tag good">핵심 지표</span>
    </label>
    <input type="number" inputmode="numeric" class="num-input callback"
           id="callback" placeholder="0" min="0" max="999">
    <div class="callback-rate" id="callbackRate">콜백률 0%</div>
  </div>

  <div class="field">
    <label class="field-label">
      <span class="icon">💬</span>메모 (선택)
    </label>
    <textarea class="memo-input" id="memo" rows="2"
              placeholder="특이사항이 있으면 적어주세요"></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitPhone()">
    오늘 상담 등록
  </button>
</div>

<div class="summary-card">
  <div class="sc-head">📊 이번 달 누적 <span id="thisMonthLabel" style="color:var(--muted); font-weight:500; margin-left:auto">4월</span></div>
  <div class="sc-stats">
    <div class="sc-col">
      <div class="lbl">받은 전화</div>
      <div class="val" id="monthReceived">—<span class="u">건</span></div>
      <div class="sub" id="monthDays">영업일 —</div>
    </div>
    <div class="sc-col">
      <div class="lbl">놓친 전화</div>
      <div class="val val-red" id="monthMissed">—<span class="u">건</span></div>
      <div class="sub" id="monthMissedAvg">일평균 —</div>
    </div>
    <div class="sc-col">
      <div class="lbl">콜백률</div>
      <div class="val val-green" id="monthCallbackRate">—<span class="u">%</span></div>
      <div class="sub" id="monthCallback">—/—</div>
    </div>
  </div>
</div>

<div class="chart-card">
  <div class="sc-head">📈 최근 7일 전화 추이</div>
  <div class="barchart7" id="bar7">
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
    <div class="bar7 today-b" style="height:20%"><div class="bar7-inner" style="height:0%"></div></div>
  </div>
  <div class="bar7-labels" id="bar7Labels">
    <span>-</span><span>-</span><span>-</span><span>-</span><span>-</span><span>-</span><span class="today-lbl">오늘</span>
  </div>
  <div style="margin-top:10px; font-size:11px; color:var(--muted); text-align:center">
    <span style="display:inline-block; width:9px; height:9px; background:var(--accent); opacity:0.35; border-radius:2px; vertical-align:middle; margin-right:4px"></span>받은 + 놓친
    <span style="margin:0 8px">·</span>
    <span style="display:inline-block; width:9px; height:9px; background:var(--red); border-radius:2px; vertical-align:middle; margin-right:4px"></span>놓친 전화
  </div>
</div>

</div>

<div class="toast" id="toast">저장 완료!</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo33sv9L1y722IdcfUm_i_nhmgZCCQX-grPEXGYbLemeI3WUx-f3C1Mi8ZxunmZ6D6lw/exec';

function updateTime(){
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const dow = days[d.getDay()];
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0'), mn = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('navTime').textContent = `${y}-${m}-${dd} ${dow} ${hh}:${mn}`;
  document.getElementById('todayDate').textContent = `${d.getMonth()+1}월 ${d.getDate()}일 ${dow}`;
  document.getElementById('thisMonthLabel').textContent = `${d.getMonth()+1}월`;
}
updateTime();
setInterval(updateTime, 30000);

function toast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function updateCallbackHint(){
  const missed = parseInt(document.getElementById('missed').value) || 0;
  const callback = parseInt(document.getElementById('callback').value) || 0;
  const el = document.getElementById('callbackRate');
  if(missed === 0){
    el.classList.remove('show');
    return;
  }
  const rate = Math.min(100, Math.round(callback/missed*100));
  el.classList.add('show');
  el.classList.remove('warn', 'danger');
  if(rate >= 80) el.textContent = `👍 콜백률 ${rate}% · 좋아요!`;
  else if(rate >= 50){ el.textContent = `콜백률 ${rate}% · 조금 더`; el.classList.add('warn'); }
  else { el.textContent = `콜백률 ${rate}% · 놓친 고객 돌려받아야 해요`; el.classList.add('danger'); }
}

document.getElementById('missed').addEventListener('input', updateCallbackHint);
document.getElementById('callback').addEventListener('input', updateCallbackHint);

async function loadStats(){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?type=phoneStats`);
    const json = await res.json();
    if(!json.success) return;
    
    if(json.today && (json.today.received > 0 || json.today.missed > 0 || json.today.callback > 0 || json.today.memo)){
      document.getElementById('received').value = json.today.received || '';
      document.getElementById('missed').value = json.today.missed || '';
      document.getElementById('callback').value = json.today.callback || '';
      document.getElementById('memo').value = json.today.memo || '';
      document.getElementById('alreadySaved').classList.add('show');
      updateCallbackHint();
    }
    
    const m = json.month || {received:0, missed:0, callback:0, days:0};
    document.getElementById('monthReceived').innerHTML = m.received + '<span class="u">건</span>';
    document.getElementById('monthMissed').innerHTML = m.missed + '<span class="u">건</span>';
    document.getElementById('monthDays').textContent = `영업일 ${m.days}일`;
    const missAvg = m.days > 0 ? (m.missed/m.days).toFixed(1) : '-';
    document.getElementById('monthMissedAvg').textContent = `일평균 ${missAvg}건`;
    
    const cbRate = m.missed > 0 ? Math.round(m.callback/m.missed*100) : 0;
    document.getElementById('monthCallbackRate').innerHTML = cbRate + '<span class="u">%</span>';
    document.getElementById('monthCallback').textContent = `${m.callback}/${m.missed}`;
    
    if(json.last7 && json.last7.length > 0){
      renderBar7(json.last7);
    }
  } catch(e){
    console.error('통계 로드 실패', e);
  }
}

function renderBar7(data){
  const maxVal = Math.max(...data.map(d => (d.received||0) + (d.missed||0)), 1);
  const bars = document.querySelectorAll('#bar7 .bar7');
  const labels = document.getElementById('bar7Labels');
  
  let labelHTML = '';
  data.forEach((d, idx) => {
    const bar = bars[idx];
    if(!bar) return;
    const total = (d.received||0) + (d.missed||0);
    const h = Math.max(10, (total/maxVal)*100);
    const missedH = total > 0 ? ((d.missed||0)/total*100) : 0;
    bar.style.height = h + '%';
    bar.querySelector('.bar7-inner').style.height = missedH + '%';
    bar.title = `${d.date} · 받은 ${d.received||0} · 놓친 ${d.missed||0} · 콜백 ${d.callback||0}`;
    
    const isToday = idx === data.length - 1;
    const cls = isToday ? 'today-lbl' : '';
    labelHTML += `<span class="${cls}">${isToday ? '오늘' : d.date}<br><b>${total}</b></span>`;
  });
  labels.innerHTML = labelHTML;
}

async function submitPhone(){
  const received = parseInt(document.getElementById('received').value) || 0;
  const missed = parseInt(document.getElementById('missed').value) || 0;
  const callback = parseInt(document.getElementById('callback').value) || 0;
  const memo = document.getElementById('memo').value.trim();
  
  if(received === 0 && missed === 0 && callback === 0 && !memo){
    toast('받은 전화 또는 놓친 전화를 입력해주세요', 'error');
    document.getElementById('received').focus();
    return;
  }
  
  if(callback > missed){
    toast('콜백 완료는 놓친 전화보다 많을 수 없어요', 'error');
    return;
  }
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({
        type: 'phoneLog',
        received: received,
        missed: missed,
        callback: callback,
        memo: memo
      })
    });
    
    const txt = await res.text();
    let json = {};
    try { json = JSON.parse(txt); } catch(e) { 
      json = {success: txt.toLowerCase().indexOf('ok') >= 0 || txt.toLowerCase().indexOf('success') >= 0}; 
    }
    
    if(json.success !== false){
      btn.textContent = '✓ 저장 완료';
      btn.classList.add('success');
      toast('저장 완료!', 'success');
      document.getElementById('alreadySaved').classList.add('show');
      
      setTimeout(() => {
        btn.textContent = '오늘 상담 등록';
        btn.classList.remove('success');
        btn.disabled = false;
        loadStats();
      }, 1500);
    } else {
      throw new Error(json.error || '저장 실패');
    }
  } catch(e){
    btn.disabled = false;
    btn.textContent = '다시 시도';
    toast('저장 실패: ' + e.message, 'error');
    console.error(e);
  }
}

window.addEventListener('DOMContentLoaded', loadStats);
</script>
