<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매트 배치 프로그램</title>

<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">

<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { font-family: 'Pretendard Variable', -apple-system, sans-serif; }
  svg { touch-action: manipulation; }
  .mat-clickable { cursor: pointer; }
  .mat-clickable:active { opacity: 0.6; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useMemo, useRef, useState, useEffect } = React;

const DEFAULT_SCALE = 80;
const STORAGE_KEY = 'puzzleMatLayout_v3';
const OFFCUT_THRESHOLD = 0.5;
const PAIRING_THRESHOLD = 0.95;
const AREA_SAMPLES = 10;

// 🆕 URL 파라미터로 view 모드 감지
const isViewMode = typeof window !== 'undefined' && new URLSearchParams(window.location.search).get('view') === '1';

function Button({ children, variant = "default", className = "", ...props }) {
  const v = {
    default: "bg-slate-900 text-white hover:bg-slate-800",
    outline: "border border-slate-300 bg-white text-slate-900 hover:bg-slate-50",
    destructive: "bg-red-600 text-white hover:bg-red-700",
  };
  return (
    <button
      className={`inline-flex items-center justify-center rounded-xl px-3 py-2 text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed ${v[variant] || v.default} ${className}`}
      {...props}
    >{children}</button>
  );
}
function Card({ children, className = "" }) {
  return <div className={`rounded-2xl bg-white shadow-sm border border-slate-200 ${className}`}>{children}</div>;
}
function CardContent({ children, className = "" }) {
  return <div className={className}>{children}</div>;
}

function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function polygonArea(points) {
  if (points.length < 3) return 0;
  let sum = 0;
  for (let i = 0; i < points.length; i++) {
    const a = points[i];
    const b = points[(i + 1) % points.length];
    sum += a.x * b.y - b.x * a.y;
  }
  return Math.abs(sum / 2);
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    const intersect = yi > point.y !== yj > point.y && point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function rectCorners(x, y, size) {
  return [{ x, y }, { x: x + size, y }, { x: x + size, y: y + size }, { x, y: y + size }];
}

function rectIntersectsPolygon(x, y, size, polygon) {
  const center = { x: x + size / 2, y: y + size / 2 };
  if (pointInPolygon(center, polygon)) return true;
  const corners = rectCorners(x, y, size);
  if (corners.some((p) => pointInPolygon(p, polygon))) return true;
  if (polygon.some((p) => p.x >= x && p.x <= x + size && p.y >= y && p.y <= y + size)) return true;
  return false;
}

function matAreaRatio(x, y, size, polygon, samples) {
  if (polygon.length < 3) return 0;
  let inside = 0;
  const total = samples * samples;
  for (let i = 0; i < samples; i++) {
    for (let j = 0; j < samples; j++) {
      const px = x + (i + 0.5) * size / samples;
      const py = y + (j + 0.5) * size / samples;
      if (pointInPolygon({ x: px, y: py }, polygon)) inside++;
    }
  }
  return inside / total;
}

function bbox(points) {
  if (!points.length) return null;
  return {
    minX: Math.min(...points.map((p) => p.x)),
    minY: Math.min(...points.map((p) => p.y)),
    maxX: Math.max(...points.map((p) => p.x)),
    maxY: Math.max(...points.map((p) => p.y)),
  };
}

function expandBbox(b, px) {
  return { minX: b.minX - px, minY: b.minY - px, maxX: b.maxX + px, maxY: b.maxY + px };
}

function makeLayout(polygon, matPx, offsetX, offsetY, overcutPx) {
  if (polygon.length < 3) return [];
  const b = expandBbox(bbox(polygon), overcutPx);
  const startX = Math.floor((b.minX - offsetX) / matPx) * matPx + offsetX - matPx;
  const startY = Math.floor((b.minY - offsetY) / matPx) * matPx + offsetY - matPx;
  const endX = b.maxX + matPx;
  const endY = b.maxY + matPx;
  const mats = [];
  let id = 1;
  for (let y = startY; y <= endY; y += matPx) {
    for (let x = startX; x <= endX; x += matPx) {
      if (!rectIntersectsPolygon(x, y, matPx, polygon)) continue;
      const corners = rectCorners(x, y, matPx);
      const full = corners.every((p) => pointInPolygon(p, polygon));
      mats.push({ id: id++, x, y, full });
    }
  }
  return mats;
}

// 🆕 단순화: priority 제거, 항상 "재단장 적게" 점수 사용
function optimizeLayout(polygon, matPx, overcutPx) {
  let best = null;
  if (polygon.length < 3) return { mats: [], ox: 0, oy: 0, score: 0, cutCount: 0 };
  const step = matPx / 10;
  for (let ox = 0; ox < matPx; ox += step) {
    for (let oy = 0; oy < matPx; oy += step) {
      const mats = makeLayout(polygon, matPx, ox, oy, overcutPx);
      const cutCount = mats.filter((m) => !m.full).length;
      // 재단장 적게 우선: cutCount * 150
      const score = mats.length * 1000 + cutCount * 150;
      if (!best || score < best.score) best = { mats, ox, oy, score, cutCount };
    }
  }
  return best || { mats: [], ox: 0, oy: 0, score: 0, cutCount: 0 };
}

function pairOffcuts(offcuts, threshold) {
  const sorted = [...offcuts].sort((a, b) => b.areaRatio - a.areaRatio);
  const pairs = [];
  const used = new Set();
  for (let i = 0; i < sorted.length; i++) {
    if (used.has(sorted[i].id)) continue;
    for (let j = i + 1; j < sorted.length; j++) {
      if (used.has(sorted[j].id)) continue;
      if (sorted[i].areaRatio + sorted[j].areaRatio <= threshold) {
        pairs.push({ a: sorted[i], b: sorted[j] });
        used.add(sorted[i].id);
        used.add(sorted[j].id);
        break;
      }
    }
  }
  const unpaired = sorted.filter(m => !used.has(m.id));
  return { pairs, unpaired };
}

function PuzzleMatLayoutApp() {
  const [image, setImage] = useState(null);
  const [imageDims, setImageDims] = useState({ w: 760, h: 540 });
  const [mode, setMode] = useState("scale");
  const [points, setPoints] = useState([]);
  const [excludedMatKeys, setExcludedMatKeys] = useState([]);
  const [scalePoints, setScalePoints] = useState([]);
  const [scaleInputM, setScaleInputM] = useState("2.04");
  const [pxPerMeter, setPxPerMeter] = useState(DEFAULT_SCALE);
  const [overcutCm, setOvercutCm] = useState(2);
  const [zoom, setZoom] = useState(isViewMode ? 1.5 : 1); // view 모드는 더 크게 시작
  const [showNumbers, setShowNumbers] = useState(true);
  const [showPairing, setShowPairing] = useState(true);
  const [restored, setRestored] = useState(false);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const svgRef = useRef(null);
  const fileInputRef = useRef(null);
  const wasDraggingRef = useRef(false);
  const polygonDragRef = useRef(null);

  // 자동 복원
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.points) setPoints(d.points);
      if (d.excludedMatKeys) setExcludedMatKeys(d.excludedMatKeys);
      if (d.pxPerMeter) setPxPerMeter(d.pxPerMeter);
      if (d.overcutCm !== undefined) setOvercutCm(d.overcutCm);
      if (d.image) setImage(d.image);
      if (d.imageDims) setImageDims(d.imageDims);
      // view 모드면 자동으로 idle 모드 진입 (편집 불가)
      if (isViewMode && d.points && d.points.length >= 3) setMode("idle");
      setRestored(true);
      setTimeout(() => setRestored(false), 5000);
    } catch (e) {}
  }, []);

  // 자동 저장
  useEffect(() => {
    if (isViewMode) return; // view 모드는 저장 안 함 (편집 페이지에서만 저장)
    try {
      const data = { points, excludedMatKeys, pxPerMeter, overcutCm, image, imageDims };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      try {
        const data = { points, excludedMatKeys, pxPerMeter, overcutCm, imageDims };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e2) {}
    }
  }, [points, excludedMatKeys, pxPerMeter, overcutCm, image, imageDims]);

  // 🆕 view 모드: 다른 탭에서 변경 시 자동 동기화
  // 🆕 편집 모드: 제외 매트만 view 탭에서 변경되면 동기화
  useEffect(() => {
    const handleStorage = (e) => {
      if (e.key !== STORAGE_KEY || !e.newValue) return;
      try {
        const d = JSON.parse(e.newValue);
        // 모든 데이터 동기화
        if (d.points) setPoints(d.points);
        if (d.excludedMatKeys) setExcludedMatKeys(d.excludedMatKeys);
        if (d.pxPerMeter) setPxPerMeter(d.pxPerMeter);
        if (d.overcutCm !== undefined) setOvercutCm(d.overcutCm);
        if (d.image) setImage(d.image);
        if (d.imageDims) setImageDims(d.imageDims);
      } catch (err) {}
    };
    window.addEventListener('storage', handleStorage);
    return () => window.removeEventListener('storage', handleStorage);
  }, []);

  // 🆕 view 모드에서 매트 제외 변경 시 다른 탭에 알리기 위해 직접 저장
  useEffect(() => {
    if (!isViewMode) return;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const d = raw ? JSON.parse(raw) : {};
      d.excludedMatKeys = excludedMatKeys;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    } catch (e) {}
  }, [excludedMatKeys]);

  // 점 드래그
  useEffect(() => {
    if (draggingIdx === null) return;
    wasDraggingRef.current = true;
    const handleMove = (e) => {
      if (!svgRef.current) return;
      const svg = svgRef.current;
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const p = pt.matrixTransform(svg.getScreenCTM().inverse());
      setPoints(prev => prev.map((pos, i) => i === draggingIdx ? p : pos));
    };
    const handleUp = () => {
      setDraggingIdx(null);
      setTimeout(() => { wasDraggingRef.current = false; }, 100);
    };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
    };
  }, [draggingIdx]);

  // 키보드 화살표 (선택된 점 미세 이동)
  useEffect(() => {
    if (selectedIdx === null || mode !== "draw") return;
    const handleKey = (e) => {
      let dx = 0, dy = 0;
      const step = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowUp') dy = -step;
      else if (e.key === 'ArrowDown') dy = step;
      else if (e.key === 'ArrowLeft') dx = -step;
      else if (e.key === 'ArrowRight') dx = step;
      else if (e.key === 'Escape') { setSelectedIdx(null); return; }
      else return;
      e.preventDefault();
      setPoints(prev => prev.map((pos, i) =>
        i === selectedIdx ? { x: pos.x + dx, y: pos.y + dy } : pos
      ));
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [selectedIdx, mode]);

  // idle 모드 화살표 (전체 이동)
  useEffect(() => {
    if (mode !== "idle" || points.length < 3 || isViewMode) return;
    const handleKey = (e) => {
      let dx = 0, dy = 0;
      const step = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowUp') dy = -step;
      else if (e.key === 'ArrowDown') dy = step;
      else if (e.key === 'ArrowLeft') dx = -step;
      else if (e.key === 'ArrowRight') dx = step;
      else return;
      e.preventDefault();
      setPoints(prev => prev.map(p => ({ x: p.x + dx, y: p.y + dy })));
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [mode, points.length]);

  // idle 모드 마우스 드래그 (전체 이동)
  useEffect(() => {
    if (mode !== "idle" || points.length < 3 || isViewMode) return;
    const handleMove = (e) => {
      if (!polygonDragRef.current || !svgRef.current) return;
      const svg = svgRef.current;
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const p = pt.matrixTransform(svg.getScreenCTM().inverse());
      const dx = p.x - polygonDragRef.current.x;
      const dy = p.y - polygonDragRef.current.y;
      if (dx !== 0 || dy !== 0) {
        setPoints(prev => prev.map(pos => ({ x: pos.x + dx, y: pos.y + dy })));
        polygonDragRef.current = p;
      }
    };
    const handleUp = () => { polygonDragRef.current = null; };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
    };
  }, [mode, points.length]);

  const matPx = pxPerMeter;
  const overcutPx = (Number(overcutCm) / 100) * pxPerMeter;

  const optimized = useMemo(
    () => optimizeLayout(points, matPx, overcutPx),
    [points, matPx, overcutPx]
  );

  const matsWithArea = useMemo(() => {
    return optimized.mats.map(m => {
      if (m.full) return { ...m, areaRatio: 1.0 };
      return { ...m, areaRatio: matAreaRatio(m.x, m.y, matPx, points, AREA_SAMPLES) };
    });
  }, [optimized.mats, points, matPx]);

  const matKey = (m) => `${m.x.toFixed(2)}_${m.y.toFixed(2)}`;
  const excludedSet = new Set(excludedMatKeys);
  const isExcluded = (m) => excludedSet.has(matKey(m));

  let displayNum = 0;
  const matsWithDisplay = matsWithArea.map((m) => {
    const excluded = isExcluded(m);
    return { ...m, excluded, displayNumber: excluded ? null : ++displayNum };
  });

  const visibleMats = matsWithDisplay.filter((m) => !m.excluded);

  const pairing = useMemo(() => {
    const offcuts = visibleMats.filter(m => !m.full && m.areaRatio < OFFCUT_THRESHOLD);
    return pairOffcuts(offcuts, PAIRING_THRESHOLD);
  }, [visibleMats]);

  const matToPair = new Map();
  pairing.pairs.forEach((pair, idx) => {
    matToPair.set(matKey(pair.a), idx + 1);
    matToPair.set(matKey(pair.b), idx + 1);
  });

  const totalMats = visibleMats.length;
  const fullMats = visibleMats.filter((m) => m.full).length;
  const cutMats = totalMats - fullMats;
  const excludedCount = excludedMatKeys.length;
  const offcutsCount = pairing.pairs.length * 2 + pairing.unpaired.length;
  const pairsCount = pairing.pairs.length;
  const unpairedOffcutsCount = pairing.unpaired.length;
  const bigCutsCount = cutMats - offcutsCount;
  const actualOrderMats = fullMats + bigCutsCount + pairsCount + unpairedOffcutsCount;
  const savedMats = totalMats - actualOrderMats;

  const areaM2 = polygonArea(points) / (pxPerMeter * pxPerMeter);
  const netAreaM2 = areaM2;
  const actualMatAreaM2 = actualOrderMats * 1.0;
  const lossRate = actualOrderMats > 0 ? Math.max(0, ((actualMatAreaM2 - netAreaM2) / actualMatAreaM2) * 100) : 0;

  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const targetW = 760;
        const targetH = (img.height / img.width) * targetW;
        setImageDims({ w: targetW, h: targetH });
        setImage(reader.result);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  const getSvgPoint = (evt) => {
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  };

  const applyScale = () => {
    if (scalePoints.length !== 2) return;
    const m = Number(scaleInputM);
    if (!m || m <= 0) return;
    setPxPerMeter(distance(scalePoints[0], scalePoints[1]) / m);
  };

  const handleCanvasClick = (evt) => {
    if (wasDraggingRef.current) return;
    if (isViewMode) return; // view 모드는 캔버스 클릭으로 점 추가 안 됨
    if (mode === "idle" || mode === "exclude") return;
    const p = getSvgPoint(evt);
    if (mode === "scale") setScalePoints((prev) => (prev.length >= 2 ? [p] : [...prev, p]));
    if (mode === "draw") {
      setPoints((prev) => [...prev, p]);
      setSelectedIdx(points.length);
    }
  };

  const handlePointMouseDown = (e, i) => {
    if (mode !== "draw" || isViewMode) return;
    e.stopPropagation();
    setDraggingIdx(i);
    setSelectedIdx(i);
  };

  // 🆕 매트 클릭 - view 모드에서도 항상 토글 가능
  const toggleMatExclude = (m, e) => {
    if (!isViewMode && mode !== "exclude") return;
    e.stopPropagation();
    const key = matKey(m);
    setExcludedMatKeys((prev) =>
      prev.includes(key) ? prev.filter((k) => k !== key) : [...prev, key]
    );
  };

  const undo = () => {
    if (mode === "draw") {
      setPoints((prev) => prev.slice(0, -1));
      setSelectedIdx(null);
    }
    if (mode === "scale") setScalePoints((prev) => prev.slice(0, -1));
    if (mode === "exclude") setExcludedMatKeys((prev) => prev.slice(0, -1));
  };

  const finishDraw = () => { setMode("idle"); setSelectedIdx(null); };

  const resetAll = () => {
    if (!confirm('모든 작업이 삭제됩니다. 계속하시겠습니까?')) return;
    setPoints([]);
    setExcludedMatKeys([]);
    setScalePoints([]);
    setImage(null);
    setImageDims({ w: 760, h: 540 });
    setMode("scale");
    setSelectedIdx(null);
    setDraggingIdx(null);
    if (fileInputRef.current) fileInputRef.current.value = '';
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  };

  const clearExcluded = () => {
    if (excludedMatKeys.length === 0) return;
    if (!confirm(`제외된 매트 ${excludedMatKeys.length}장을 모두 복구할까요?`)) return;
    setExcludedMatKeys([]);
  };

  // 🆕 전체화면 보기 모드 새 탭 열기
  const openViewerTab = () => {
    const url = window.location.pathname + '?view=1';
    window.open(url, '_blank');
  };

  const exportJson = () => {
    const payload = {
      version: "0.7",
      rule: { matSizeMm: 1000, overcutCm: Number(overcutCm), offcutThreshold: OFFCUT_THRESHOLD, pairingThreshold: PAIRING_THRESHOLD },
      scale: { pxPerMeter },
      polygon: points,
      excludedMatKeys,
      result: {
        netAreaM2: Number(netAreaM2.toFixed(2)),
        totalMats, fullMats, cutMats, excludedCount,
        bigCutsCount, offcutsCount, pairsCount, unpairedOffcutsCount,
        actualOrderMats, savedMats,
        estimatedLossRate: Number(lossRate.toFixed(1)),
        gridOffset: { x: optimized.ox, y: optimized.oy },
        mats: matsWithDisplay.map(m => ({ ...m, pairNumber: matToPair.get(matKey(m)) || null })),
        pairs: pairing.pairs.map((p, idx) => ({ pairNumber: idx + 1, mats: [matKey(p.a), matKey(p.b)] })),
      },
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mat-layout-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const polygonStr = points.map((p) => `${p.x},${p.y}`).join(" ");
  const zoomPresets = [
    { label: "50%", value: 0.5 },
    { label: "75%", value: 0.75 },
    { label: "100%", value: 1.0 },
    { label: "150%", value: 1.5 },
  ];

  const getMatColors = (m) => {
    if (m.excluded) return { fill: "rgba(148,163,184,0.10)", stroke: "#94a3b8", dash: "5 4" };
    if (m.full) return { fill: "rgba(34,197,94,0.12)", stroke: "#16a34a", dash: "0" };
    if (m.areaRatio < OFFCUT_THRESHOLD) {
      const isPaired = matToPair.has(matKey(m));
      if (isPaired && showPairing) {
        return { fill: "rgba(250,204,21,0.18)", stroke: "#ca8a04", dash: "0" };
      } else {
        return { fill: "rgba(249,115,22,0.10)", stroke: "#fb923c", dash: "3 2" };
      }
    }
    return { fill: "rgba(249,115,22,0.13)", stroke: "#ea580c", dash: "0" };
  };

  // ════════════════════════════════════════════════════
  // 🆕 VIEW MODE (전체화면 보기 모드) - 사이드바 없음
  // ════════════════════════════════════════════════════
  if (isViewMode) {
    return (
      <div className="min-h-screen bg-slate-50 text-slate-900">
        {/* 간소화된 헤더 */}
        <div className="bg-white border-b border-slate-200 px-4 py-3 flex flex-wrap items-center justify-between gap-2 sticky top-0 z-10">
          <div className="flex items-center gap-3">
            <h1 className="text-lg font-bold">시공 보기</h1>
            <div className="text-xs text-slate-500">매트 클릭 = 제외/복구</div>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex items-center gap-3 text-sm bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-200">
              <span>실제 발주 <b className="text-amber-900 text-base">{actualOrderMats}장</b></span>
              <span className="text-slate-400">|</span>
              <span>면적 <b>{netAreaM2.toFixed(2)}㎡</b></span>
              <span className="text-slate-400">|</span>
              <span>제외 <b>{excludedCount}</b></span>
            </div>
            <div className="flex gap-1">
              <Button variant="outline" onClick={() => setZoom(z => Math.max(0.4, z - 0.1))}>−</Button>
              <Button variant="outline" onClick={() => setZoom(z => Math.min(3, z + 0.1))}>+</Button>
              <Button variant="outline" onClick={() => setShowNumbers(v => !v)}>번호</Button>
            </div>
            <a href={window.location.pathname} className="text-sm text-blue-600 hover:underline">← 편집 모드</a>
          </div>
        </div>

        {/* 풀스크린 캔버스 */}
        <div className="overflow-auto bg-white" style={{ height: 'calc(100vh - 60px)' }}>
          <svg
            ref={svgRef}
            width={1400 * zoom}
            height={1000 * zoom}
            viewBox="0 0 1400 1000"
            className="cursor-default"
          >
            <defs>
              <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1" />
              </pattern>
            </defs>
            <rect width="1400" height="1000" fill="url(#smallGrid)" />
            {image && (
              <image href={image} x="80" y="60" width={imageDims.w} height={imageDims.h} opacity="0.6" />
            )}
            {matsWithDisplay.map((m) => {
              const colors = getMatColors(m);
              const pairNum = matToPair.get(matKey(m));
              const isPaired = pairNum && showPairing;
              return (
                <g
                  key={`m-${m.x}-${m.y}`}
                  onClick={(e) => toggleMatExclude(m, e)}
                  className="mat-clickable"
                >
                  <rect
                    x={m.x} y={m.y}
                    width={matPx} height={matPx}
                    fill={colors.fill}
                    stroke={colors.stroke}
                    strokeWidth="2"
                    strokeDasharray={colors.dash}
                  />
                  {m.excluded && (
                    <>
                      <line x1={m.x + 12} y1={m.y + 12} x2={m.x + matPx - 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                      <line x1={m.x + matPx - 12} y1={m.y + 12} x2={m.x + 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                      <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="600" fill="#64748b" style={{pointerEvents:"none"}}>제외</text>
                    </>
                  )}
                  {!m.excluded && showNumbers && (
                    <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="700" fill="#0f172a" style={{pointerEvents:"none"}}>{m.displayNumber}</text>
                  )}
                  {!m.excluded && isPaired && (
                    <g style={{pointerEvents:"none"}}>
                      <rect x={m.x + matPx - 24} y={m.y + 4} width="20" height="16" rx="3" fill="#ca8a04"/>
                      <text x={m.x + matPx - 14} y={m.y + 12} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill="white">P{pairNum}</text>
                    </g>
                  )}
                </g>
              );
            })}
            {points.length >= 3 && (
              <polygon points={polygonStr} fill="rgba(59,130,246,0.10)" stroke="#2563eb" strokeWidth="3" />
            )}
          </svg>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════
  // EDIT MODE (편집 모드 - 기본)
  // ════════════════════════════════════════════════════
  return (
    <div className="min-h-screen bg-slate-50 p-3 md:p-4 text-slate-900">
      <div className="mx-auto max-w-7xl space-y-4">

        <div className="flex flex-col gap-3 rounded-2xl bg-white p-4 shadow-sm md:flex-row md:items-center md:justify-between">
          <div>
            <h1 className="text-xl md:text-2xl font-bold">매트 배치 프로그램</h1>
            <p className="text-xs md:text-sm text-slate-500">스케일 보정 → 시공 영역 → 매트 제외 → 자동 수량 계산</p>
          </div>
          <div className="flex flex-wrap gap-2">
            <label className="inline-flex cursor-pointer items-center gap-2 rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
              도면 업로드
              <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleUpload} />
            </label>
            {/* 전체화면 보기 버튼 */}
            {points.length >= 3 && (
              <Button variant="outline" onClick={openViewerTab} className="bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100">
                전체화면 보기
              </Button>
            )}
            <Button variant="outline" onClick={exportJson}>결과 저장</Button>
            <Button variant="outline" onClick={undo}>취소</Button>
            <Button variant="destructive" onClick={resetAll}>초기화</Button>
          </div>
        </div>

        {restored && (
          <div className="rounded-xl bg-amber-50 border border-amber-200 px-4 py-3 text-sm text-amber-900">
            이전 작업이 자동으로 복원되었습니다. 새로 시작하려면 "초기화"를 누르세요.
          </div>
        )}

        <div className="grid gap-4 lg:grid-cols-[340px_1fr]">

          <div className="space-y-4">

            <Card>
              <CardContent className="space-y-3 p-4">
                <h2 className="font-semibold">1. 작업 모드</h2>
                <div className="grid grid-cols-3 gap-2">
                  <Button variant={mode === "scale" ? "default" : "outline"} onClick={() => setMode("scale")}>스케일</Button>
                  <Button variant={mode === "draw" ? "default" : "outline"} onClick={() => setMode("draw")}>시공</Button>
                  <Button variant={mode === "exclude" ? "default" : "outline"} onClick={() => setMode("exclude")}>제외</Button>
                </div>
                <p className="text-xs text-slate-500 leading-relaxed">
                  도면 치수선의 양 끝을 찍고 실제 길이를 입력하면 1m 매트 크기가 도면에 맞게 자동 보정됩니다.
                </p>
              </CardContent>
            </Card>

            <Card>
              <CardContent className="space-y-3 p-4">
                <h2 className="font-semibold">2. 스케일 보정</h2>
                <div className="flex items-center gap-2">
                  <input
                    type="text" inputMode="decimal"
                    value={scaleInputM}
                    onChange={(e) => setScaleInputM(e.target.value)}
                    className="w-full rounded-xl border border-slate-300 px-3 py-2 text-base"
                    placeholder="예: 2.04"
                  />
                  <span className="text-sm">m</span>
                </div>
                <Button className="w-full" onClick={applyScale} disabled={scalePoints.length !== 2}>
                  선택한 두 점으로 스케일 적용
                </Button>
                <div className="text-sm">현재 1m = <b>{pxPerMeter.toFixed(2)}px</b></div>
              </CardContent>
            </Card>

            <Card>
              <CardContent className="space-y-3 p-4">
                <h2 className="font-semibold">3. 시공 변수</h2>
                <div>
                  <label className="text-sm font-medium">벽면 밀착 여유</label>
                  <div className="flex items-center gap-2 mt-1">
                    <input
                      type="number" inputMode="decimal" min="0" max="5" step="0.1"
                      value={overcutCm}
                      onChange={(e) => setOvercutCm(e.target.value)}
                      className="w-full rounded-xl border border-slate-300 px-3 py-2 text-base"
                    />
                    <span className="text-sm">cm</span>
                  </div>
                  <p className="text-xs text-slate-500 mt-1">매트가 벽 안쪽으로 더 들어가는 여유. 추천: 1~3cm</p>
                </div>

                {mode === "draw" && (
                  <Button className="w-full" variant="outline" onClick={finishDraw} disabled={points.length < 3}>
                    그리기 종료
                  </Button>
                )}
                {mode === "exclude" && excludedCount > 0 && (
                  <Button className="w-full" variant="outline" onClick={clearExcluded}>
                    제외 매트 복구 ({excludedCount}장)
                  </Button>
                )}
              </CardContent>
            </Card>

            {/* 실제 발주 매트 카드 */}
            {points.length >= 3 && (
              <Card className="border-2 border-amber-300 bg-amber-50/50">
                <CardContent className="space-y-2 p-4">
                  <h2 className="font-bold text-base text-amber-900">실제 발주 매트</h2>
                  <div className="text-3xl font-bold text-amber-900">
                    {actualOrderMats}<span className="text-base font-medium text-amber-700 ml-1">장</span>
                  </div>
                  {savedMats > 0 && (
                    <div className="text-xs text-emerald-700 font-medium">
                      짜투리 재활용으로 {savedMats}장 절약 (페어 {pairsCount}개)
                    </div>
                  )}
                  <div className="text-xs text-slate-600 pt-1 border-t border-amber-200">
                    화면 표시 매트: {totalMats}장 | 절약: {savedMats}장
                  </div>
                </CardContent>
              </Card>
            )}

            <Card>
              <CardContent className="space-y-3 p-4">
                <h2 className="font-semibold">상세 통계</h2>
                <div className="grid grid-cols-2 gap-2 text-sm">
                  <div className="rounded-xl bg-slate-100 p-3">
                    <div className="text-slate-500 text-xs">순시공 면적</div>
                    <b className="text-base">{netAreaM2.toFixed(2)}㎡</b>
                  </div>
                  <div className="rounded-xl bg-emerald-50 p-3">
                    <div className="text-emerald-700 text-xs">온장</div>
                    <b className="text-base text-emerald-900">{fullMats}장</b>
                  </div>
                  <div className="rounded-xl bg-orange-50 p-3">
                    <div className="text-orange-700 text-xs">큰 재단장</div>
                    <b className="text-base text-orange-900">{bigCutsCount}장</b>
                  </div>
                  <div className="rounded-xl bg-yellow-50 p-3">
                    <div className="text-yellow-700 text-xs">짜투리(페어)</div>
                    <b className="text-base text-yellow-900">{pairsCount}쌍</b>
                  </div>
                  <div className="rounded-xl bg-orange-50 p-3">
                    <div className="text-orange-700 text-xs">외톨이 짜투리</div>
                    <b className="text-base text-orange-900">{unpairedOffcutsCount}장</b>
                  </div>
                  <div className="rounded-xl bg-slate-100 p-3">
                    <div className="text-slate-500 text-xs">예상 로스율</div>
                    <b className="text-base">{lossRate.toFixed(1)}%</b>
                  </div>
                  <div className="rounded-xl bg-slate-100 p-3">
                    <div className="text-slate-500 text-xs">제외 매트</div>
                    <b className="text-base">{excludedCount}장</b>
                  </div>
                  <div className="rounded-xl bg-slate-100 p-3">
                    <div className="text-slate-500 text-xs">밀착 여유</div>
                    <b className="text-base">{overcutCm}cm</b>
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card>
              <CardContent className="space-y-3 p-4">
                <h2 className="font-semibold">보기 설정</h2>
                <div className="flex gap-2 flex-wrap">
                  <Button variant="outline" onClick={() => setZoom((z) => Math.max(0.4, z - 0.1))}>−</Button>
                  <Button variant="outline" onClick={() => setZoom((z) => Math.min(2.5, z + 0.1))}>+</Button>
                  <Button variant="outline" onClick={() => setShowNumbers((v) => !v)}>번호</Button>
                  <Button variant={showPairing ? "default" : "outline"} onClick={() => setShowPairing((v) => !v)}>페어</Button>
                </div>
                <div className="grid grid-cols-4 gap-1">
                  {zoomPresets.map((p) => (
                    <Button
                      key={p.label}
                      variant={Math.abs(zoom - p.value) < 0.05 ? "default" : "outline"}
                      onClick={() => setZoom(p.value)}
                      className="px-2 py-1 text-xs"
                    >{p.label}</Button>
                  ))}
                </div>
                <div className="text-xs text-slate-500">현재 줌: {(zoom * 100).toFixed(0)}%</div>

                <div className="text-xs space-y-1 pt-2 border-t border-slate-200">
                  <div className="font-semibold text-slate-700 mb-1">색상 안내</div>
                  <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-emerald-300 border border-emerald-600"></span>온장 (100%)</div>
                  <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-orange-300 border border-orange-600"></span>큰 재단장 (50%↑)</div>
                  <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-yellow-300 border border-yellow-600"></span>짜투리 페어 (재활용)</div>
                  <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-orange-200 border border-orange-400 border-dashed"></span>외톨이 짜투리</div>
                </div>
              </CardContent>
            </Card>
          </div>

          <Card className="overflow-hidden">
            <CardContent className="p-0">
              <div className="h-[760px] overflow-auto bg-white">
                <svg
                  ref={svgRef}
                  width={1400 * zoom}
                  height={1000 * zoom}
                  viewBox="0 0 1400 1000"
                  onClick={handleCanvasClick}
                  onMouseDown={(e) => {
                    if (mode === "idle" && points.length >= 3) {
                      const p = getSvgPoint(e);
                      polygonDragRef.current = p;
                    }
                  }}
                  className={
                    mode === "idle" && points.length >= 3 ? "cursor-grab"
                    : mode === "exclude" ? ""
                    : "cursor-crosshair"
                  }
                >
                  <defs>
                    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1" />
                    </pattern>
                  </defs>
                  <rect width="1400" height="1000" fill="url(#smallGrid)" />

                  {image && (
                    <image href={image} x="80" y="60" width={imageDims.w} height={imageDims.h} opacity="0.6" />
                  )}

                  {matsWithDisplay.map((m) => {
                    const colors = getMatColors(m);
                    const pairNum = matToPair.get(matKey(m));
                    const isPaired = pairNum && showPairing;
                    return (
                      <g
                        key={`m-${m.x}-${m.y}`}
                        onClick={mode === "exclude" ? (e) => toggleMatExclude(m, e) : undefined}
                        className={mode === "exclude" ? "mat-clickable" : ""}
                        style={{ pointerEvents: mode === "exclude" ? "auto" : "none" }}
                      >
                        <rect
                          x={m.x} y={m.y}
                          width={matPx} height={matPx}
                          fill={colors.fill}
                          stroke={colors.stroke}
                          strokeWidth="2"
                          strokeDasharray={colors.dash}
                        />
                        {m.excluded && (
                          <>
                            <line x1={m.x + 12} y1={m.y + 12} x2={m.x + matPx - 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                            <line x1={m.x + matPx - 12} y1={m.y + 12} x2={m.x + 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                            <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="600" fill="#64748b" style={{pointerEvents:"none"}}>제외</text>
                          </>
                        )}
                        {!m.excluded && showNumbers && (
                          <text
                            x={m.x + matPx / 2} y={m.y + matPx / 2}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize="14" fontWeight="700" fill="#0f172a"
                            style={{pointerEvents:"none"}}
                          >{m.displayNumber}</text>
                        )}
                        {!m.excluded && isPaired && (
                          <g style={{pointerEvents:"none"}}>
                            <rect x={m.x + matPx - 24} y={m.y + 4} width="20" height="16" rx="3" fill="#ca8a04"/>
                            <text x={m.x + matPx - 14} y={m.y + 12} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill="white">P{pairNum}</text>
                          </g>
                        )}
                      </g>
                    );
                  })}

                  {points.length >= 3 && (
                    <polygon points={polygonStr} fill="rgba(59,130,246,0.10)" stroke="#2563eb" strokeWidth="3" />
                  )}
                  {points.length >= 2 && points.length < 3 && (
                    <polyline points={polygonStr} fill="none" stroke="#2563eb" strokeWidth="3" strokeDasharray="6 6" />
                  )}
                  {points.map((p, i) => {
                    const isSelected = i === selectedIdx;
                    const isFirst = i === 0;
                    return (
                      <g key={`p-${i}`}>
                        {isSelected && (
                          <circle cx={p.x} cy={p.y} r="14" fill="none" stroke="#dc2626" strokeWidth="2" strokeDasharray="3 3" />
                        )}
                        <circle
                          cx={p.x} cy={p.y}
                          r={isSelected ? "10" : (isFirst ? "8" : "7")}
                          fill={isSelected ? "#dc2626" : (isFirst ? "#1e40af" : "#2563eb")}
                          stroke="white"
                          strokeWidth="2"
                          onMouseDown={(e) => handlePointMouseDown(e, i)}
                          style={{
                            cursor: mode === "draw" ? "move" : "default",
                            pointerEvents: mode === "draw" ? "auto" : "none",
                          }}
                        />
                      </g>
                    );
                  })}

                  {scalePoints.length === 2 && (
                    <line x1={scalePoints[0].x} y1={scalePoints[0].y} x2={scalePoints[1].x} y2={scalePoints[1].y} stroke="#7c3aed" strokeWidth="4" />
                  )}
                  {scalePoints.map((p, i) => <circle key={`s-${i}`} cx={p.x} cy={p.y} r="8" fill="#7c3aed" />)}
                </svg>
              </div>

              <div className="px-4 py-3 text-xs text-slate-700 border-t bg-slate-50">
                {mode === "scale" && "스케일 모드 — 도면의 치수선 양 끝을 클릭한 후 \"스케일 적용\" 버튼을 누르세요."}
                {mode === "draw" && (
                  selectedIdx !== null
                    ? "시공 모드 — 점 선택됨. 드래그하거나 화살표 키 (Shift+화살표 = 10px씩) | Esc 선택해제 | 빈 공간 클릭 = 새 점 추가"
                    : "시공 모드 — 도면 꼭짓점을 클릭하세요. 이미 찍은 점은 드래그하거나 클릭 후 화살표 키로 미세 조정 가능."
                )}
                {mode === "exclude" && "제외 모드 — 빼고 싶은 매트(가구·기둥 위치)를 클릭하세요. 다시 클릭하면 복구됩니다."}
                {mode === "idle" && "잠금 상태 — 마우스로 드래그하거나 화살표 키로 시공 영역 전체 이동 (Shift+화살표 = 10px씩). 다시 편집하려면 \"시공\" 모드 클릭."}
              </div>
            </CardContent>
          </Card>
        </div>

        <div className="text-center text-xs text-slate-400 py-2">
          돌봄매트 시공 도구 v1.8
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PuzzleMatLayoutApp />);
</script>
</body>
</html>
