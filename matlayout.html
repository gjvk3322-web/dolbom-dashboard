<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매트 배치 프로그램</title>

<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">

<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { font-family: 'Pretendard Variable', -apple-system, sans-serif; }
  svg { touch-action: pan-x pan-y pinch-zoom; }
  .mat-clickable { cursor: pointer; }
  .mat-clickable:active { opacity: 0.6; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useMemo, useRef, useState, useEffect } = React;

const DEFAULT_SCALE = 80;
const STORAGE_KEY = 'puzzleMatLayout_v3';
const OFFCUT_THRESHOLD = 0.5;
const PAIRING_THRESHOLD = 0.95;
const AREA_SAMPLES = 10;

// 🆕 URL 파라미터로 view 모드 감지
const isViewMode = typeof window !== 'undefined' && new URLSearchParams(window.location.search).get('view') === '1';

function Button({ children, variant = "default", className = "", ...props }) {
  const v = {
    default: "bg-slate-900 text-white hover:bg-slate-800",
    outline: "border border-slate-300 bg-white text-slate-900 hover:bg-slate-50",
    destructive: "bg-red-600 text-white hover:bg-red-700",
  };
  return (
    <button
      className={`inline-flex items-center justify-center rounded-xl px-3 py-2 text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed ${v[variant] || v.default} ${className}`}
      {...props}
    >{children}</button>
  );
}
function Card({ children, className = "" }) {
  return <div className={`rounded-2xl bg-white shadow-sm border border-slate-200 ${className}`}>{children}</div>;
}
function CardContent({ children, className = "" }) {
  return <div className={className}>{children}</div>;
}

function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function polygonArea(points) {
  if (points.length < 3) return 0;
  let sum = 0;
  for (let i = 0; i < points.length; i++) {
    const a = points[i];
    const b = points[(i + 1) % points.length];
    sum += a.x * b.y - b.x * a.y;
  }
  return Math.abs(sum / 2);
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    const intersect = yi > point.y !== yj > point.y && point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi;
    if (intersect) inside = !inside;
  }
  return inside;
}

function rectCorners(x, y, size) {
  return [{ x, y }, { x: x + size, y }, { x: x + size, y: y + size }, { x, y: y + size }];
}

function rectIntersectsPolygon(x, y, size, polygon) {
  const center = { x: x + size / 2, y: y + size / 2 };
  if (pointInPolygon(center, polygon)) return true;
  const corners = rectCorners(x, y, size);
  if (corners.some((p) => pointInPolygon(p, polygon))) return true;
  if (polygon.some((p) => p.x >= x && p.x <= x + size && p.y >= y && p.y <= y + size)) return true;
  return false;
}

// 점에서 선분까지의 최단 거리
function distanceFromPointToSegment(p, a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2));
  const px = a.x + t * dx;
  const py = a.y + t * dy;
  return Math.hypot(p.x - px, p.y - py);
}

// 점에서 폴리곤(외곽선)까지의 최단 거리
function distanceFromPointToPolygon(p, polygon) {
  if (polygon.length < 2) return Infinity;
  let minDist = Infinity;
  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];
    const d = distanceFromPointToSegment(p, a, b);
    if (d < minDist) minDist = d;
  }
  return minDist;
}

// 매트가 폴리곤과 겹치거나 overcut 이내로 가까이 있으면 포함
function rectNearPolygon(x, y, size, polygon, overcutPx) {
  if (rectIntersectsPolygon(x, y, size, polygon)) return true;
  if (overcutPx <= 0) return false;
  const corners = rectCorners(x, y, size);
  for (const c of corners) {
    if (distanceFromPointToPolygon(c, polygon) <= overcutPx) return true;
  }
  // 매트 중심도 체크 (얇고 긴 폴리곤 대비)
  const center = { x: x + size / 2, y: y + size / 2 };
  if (distanceFromPointToPolygon(center, polygon) <= overcutPx) return true;
  return false;
}

function matAreaRatio(x, y, size, polygon, samples) {
  if (polygon.length < 3) return 0;
  let inside = 0;
  const total = samples * samples;
  for (let i = 0; i < samples; i++) {
    for (let j = 0; j < samples; j++) {
      const px = x + (i + 0.5) * size / samples;
      const py = y + (j + 0.5) * size / samples;
      if (pointInPolygon({ x: px, y: py }, polygon)) inside++;
    }
  }
  return inside / total;
}

function bbox(points) {
  if (!points.length) return null;
  return {
    minX: Math.min(...points.map((p) => p.x)),
    minY: Math.min(...points.map((p) => p.y)),
    maxX: Math.max(...points.map((p) => p.x)),
    maxY: Math.max(...points.map((p) => p.y)),
  };
}

function expandBbox(b, px) {
  return { minX: b.minX - px, minY: b.minY - px, maxX: b.maxX + px, maxY: b.maxY + px };
}

function makeLayout(polygon, matPx, offsetX, offsetY, overcutPx) {
  if (polygon.length < 3) return [];
  const b = expandBbox(bbox(polygon), overcutPx);
  const startX = Math.floor((b.minX - offsetX) / matPx) * matPx + offsetX - matPx;
  const startY = Math.floor((b.minY - offsetY) / matPx) * matPx + offsetY - matPx;
  const endX = b.maxX + matPx;
  const endY = b.maxY + matPx;
  const mats = [];
  let id = 1;
  for (let y = startY; y <= endY; y += matPx) {
    for (let x = startX; x <= endX; x += matPx) {
      // 🆕 폴리곤과 겹치거나 overcut 이내 거리에 있으면 포함
      if (!rectNearPolygon(x, y, matPx, polygon, overcutPx)) continue;
      const corners = rectCorners(x, y, matPx);
      const full = corners.every((p) => pointInPolygon(p, polygon));
      mats.push({ id: id++, x, y, full });
    }
  }
  return mats;
}

// 🆕 단순화: priority 제거, 항상 "재단장 적게" 점수 사용
function optimizeLayout(polygon, matPx, overcutPx) {
  let best = null;
  if (polygon.length < 3) return { mats: [], ox: 0, oy: 0, score: 0, cutCount: 0 };
  const step = matPx / 10;
  for (let ox = 0; ox < matPx; ox += step) {
    for (let oy = 0; oy < matPx; oy += step) {
      const mats = makeLayout(polygon, matPx, ox, oy, overcutPx);
      const cutCount = mats.filter((m) => !m.full).length;
      // 재단장 적게 우선: cutCount * 150
      const score = mats.length * 1000 + cutCount * 150;
      if (!best || score < best.score) best = { mats, ox, oy, score, cutCount };
    }
  }
  return best || { mats: [], ox: 0, oy: 0, score: 0, cutCount: 0 };
}

function pairOffcuts(offcuts, threshold) {
  const sorted = [...offcuts].sort((a, b) => b.areaRatio - a.areaRatio);
  const pairs = [];
  const used = new Set();
  for (let i = 0; i < sorted.length; i++) {
    if (used.has(sorted[i].id)) continue;
    for (let j = i + 1; j < sorted.length; j++) {
      if (used.has(sorted[j].id)) continue;
      if (sorted[i].areaRatio + sorted[j].areaRatio <= threshold) {
        pairs.push({ a: sorted[i], b: sorted[j] });
        used.add(sorted[i].id);
        used.add(sorted[j].id);
        break;
      }
    }
  }
  const unpaired = sorted.filter(m => !used.has(m.id));
  return { pairs, unpaired };
}

function PuzzleMatLayoutApp() {
  const [image, setImage] = useState(null);
  const [imageDims, setImageDims] = useState({ w: 760, h: 540 });
  const [mode, setMode] = useState("scale");
  const [points, setPoints] = useState([]);
  const [excludedMatKeys, setExcludedMatKeys] = useState([]);
  const [scalePoints, setScalePoints] = useState([]);
  const [scaleInputM, setScaleInputM] = useState("2.04");
  const [pxPerMeter, setPxPerMeter] = useState(DEFAULT_SCALE);
  // 초기 zoom: 컨테이너에 fit 되도록 작게 시작 (편집 0.55, view 0.7)
  const [zoom, setZoom] = useState(isViewMode ? 0.7 : 0.55);
  const [showNumbers, setShowNumbers] = useState(true);
  const [showPairing, setShowPairing] = useState(true);
  const [restored, setRestored] = useState(false);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const svgRef = useRef(null);
  const fileInputRef = useRef(null);
  const wasDraggingRef = useRef(false);
  const polygonDragRef = useRef(null);
  const pinchRef = useRef(null); // 핀치줌 시작 거리/줌 저장

  // 자동 복원
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.points) setPoints(d.points);
      if (d.excludedMatKeys) setExcludedMatKeys(d.excludedMatKeys);
      if (d.pxPerMeter) setPxPerMeter(d.pxPerMeter);
      if (d.image) setImage(d.image);
      if (d.imageDims) setImageDims(d.imageDims);
      // view 모드면 자동으로 idle 모드 진입 (편집 불가)
      if (isViewMode && d.points && d.points.length >= 3) setMode("idle");
      setRestored(true);
      setTimeout(() => setRestored(false), 5000);
    } catch (e) {}
  }, []);

  // 자동 저장 (이미 같은 값이면 저장 안 함 - 탭 간 무한 루프 차단)
  useEffect(() => {
    if (isViewMode) return;
    try {
      const data = JSON.stringify({ points, excludedMatKeys, pxPerMeter, image, imageDims });
      if (localStorage.getItem(STORAGE_KEY) !== data) {
        localStorage.setItem(STORAGE_KEY, data);
      }
    } catch (e) {
      try {
        const data = JSON.stringify({ points, excludedMatKeys, pxPerMeter, imageDims });
        if (localStorage.getItem(STORAGE_KEY) !== data) {
          localStorage.setItem(STORAGE_KEY, data);
        }
      } catch (e2) {}
    }
  }, [points, excludedMatKeys, pxPerMeter, image, imageDims]);

  // 다른 탭에서 변경 시 자동 동기화 (현재 값과 다를 때만 setState - 무한 루프 차단)
  useEffect(() => {
    const handleStorage = (e) => {
      if (e.key !== STORAGE_KEY || !e.newValue) return;
      try {
        const d = JSON.parse(e.newValue);
        if (d.points) {
          setPoints(prev =>
            JSON.stringify(prev) === JSON.stringify(d.points) ? prev : d.points
          );
        }
        if (d.excludedMatKeys) {
          setExcludedMatKeys(prev =>
            JSON.stringify(prev) === JSON.stringify(d.excludedMatKeys) ? prev : d.excludedMatKeys
          );
        }
        if (d.pxPerMeter) setPxPerMeter(prev => prev === d.pxPerMeter ? prev : d.pxPerMeter);
        if (d.image) setImage(prev => prev === d.image ? prev : d.image);
        if (d.imageDims) {
          setImageDims(prev =>
            (prev.w === d.imageDims.w && prev.h === d.imageDims.h) ? prev : d.imageDims
          );
        }
      } catch (err) {}
    };
    window.addEventListener('storage', handleStorage);
    return () => window.removeEventListener('storage', handleStorage);
  }, []);

  // view 모드에서 매트 제외 변경 시 다른 탭에 알리기 위해 저장 (이미 같은 값이면 저장 안 함)
  useEffect(() => {
    if (!isViewMode) return;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const d = raw ? JSON.parse(raw) : {};
      const oldKeys = JSON.stringify(d.excludedMatKeys || []);
      const newKeys = JSON.stringify(excludedMatKeys);
      if (oldKeys !== newKeys) {
        d.excludedMatKeys = excludedMatKeys;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
      }
    } catch (e) {}
  }, [excludedMatKeys]);

  // 점 드래그 (마우스 + 터치)
  useEffect(() => {
    if (draggingIdx === null) return;
    wasDraggingRef.current = true;
    const handleMove = (e) => {
      if (!svgRef.current) return;
      // 터치 또는 마우스 좌표 추출
      const touch = e.touches ? e.touches[0] : e;
      if (!touch) return;
      const svg = svgRef.current;
      const pt = svg.createSVGPoint();
      pt.x = touch.clientX; pt.y = touch.clientY;
      const p = pt.matrixTransform(svg.getScreenCTM().inverse());
      setPoints(prev => prev.map((pos, i) => i === draggingIdx ? p : pos));
      if (e.touches) e.preventDefault(); // 터치 시 스크롤 방지
    };
    const handleUp = () => {
      setDraggingIdx(null);
      setTimeout(() => { wasDraggingRef.current = false; }, 100);
    };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleUp);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleUp);
    };
  }, [draggingIdx]);

  // 키보드 화살표 (선택된 점 미세 이동)
  useEffect(() => {
    if (selectedIdx === null || mode !== "draw") return;
    const handleKey = (e) => {
      let dx = 0, dy = 0;
      const step = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowUp') dy = -step;
      else if (e.key === 'ArrowDown') dy = step;
      else if (e.key === 'ArrowLeft') dx = -step;
      else if (e.key === 'ArrowRight') dx = step;
      else if (e.key === 'Escape') { setSelectedIdx(null); return; }
      else return;
      e.preventDefault();
      setPoints(prev => prev.map((pos, i) =>
        i === selectedIdx ? { x: pos.x + dx, y: pos.y + dy } : pos
      ));
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [selectedIdx, mode]);

  // idle 모드 화살표 (전체 이동)
  useEffect(() => {
    if (mode !== "idle" || points.length < 3 || isViewMode) return;
    const handleKey = (e) => {
      let dx = 0, dy = 0;
      const step = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowUp') dy = -step;
      else if (e.key === 'ArrowDown') dy = step;
      else if (e.key === 'ArrowLeft') dx = -step;
      else if (e.key === 'ArrowRight') dx = step;
      else return;
      e.preventDefault();
      setPoints(prev => prev.map(p => ({ x: p.x + dx, y: p.y + dy })));
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [mode, points.length]);

  // 핀치줌 (두 손가락 - 모든 모드에서 작동)
  useEffect(() => {
    const svg = svgRef.current;
    if (!svg) return;

    const handleTouchStart = (e) => {
      // 두 손가락 이상 닿으면 즉시 "드래그 중" 플래그 ON → 손바닥 보호 효과
      if (e.touches.length >= 2) {
        wasDraggingRef.current = true;
        const [t1, t2] = [e.touches[0], e.touches[1]];
        const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        pinchRef.current = { startDist: dist, startZoom: zoom };
      }
    };

    const handleTouchMove = (e) => {
      if (e.touches.length === 2 && pinchRef.current) {
        e.preventDefault();
        const [t1, t2] = [e.touches[0], e.touches[1]];
        const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        const ratio = dist / pinchRef.current.startDist;
        const newZoom = Math.max(0.4, Math.min(3, pinchRef.current.startZoom * ratio));
        setZoom(newZoom);
      }
    };

    const handleTouchEnd = (e) => {
      if (e.touches.length < 2) {
        pinchRef.current = null;
        // 모든 손가락이 떨어진 후 약간 시간을 둬서 의도치 않은 클릭 방지
        if (e.touches.length === 0) {
          setTimeout(() => { wasDraggingRef.current = false; }, 200);
        }
      }
    };

    svg.addEventListener('touchstart', handleTouchStart, { passive: true });
    svg.addEventListener('touchmove', handleTouchMove, { passive: false });
    svg.addEventListener('touchend', handleTouchEnd);
    svg.addEventListener('touchcancel', handleTouchEnd);
    return () => {
      svg.removeEventListener('touchstart', handleTouchStart);
      svg.removeEventListener('touchmove', handleTouchMove);
      svg.removeEventListener('touchend', handleTouchEnd);
      svg.removeEventListener('touchcancel', handleTouchEnd);
    };
  }, [zoom]);

  // idle 모드 마우스+터치 드래그 (전체 이동)
  useEffect(() => {
    if (mode !== "idle" || points.length < 3 || isViewMode) return;
    const handleMove = (e) => {
      if (!polygonDragRef.current || !svgRef.current) return;
      const touch = e.touches ? e.touches[0] : e;
      if (!touch) return;
      const svg = svgRef.current;
      const pt = svg.createSVGPoint();
      pt.x = touch.clientX; pt.y = touch.clientY;
      const p = pt.matrixTransform(svg.getScreenCTM().inverse());
      const dx = p.x - polygonDragRef.current.x;
      const dy = p.y - polygonDragRef.current.y;
      if (dx !== 0 || dy !== 0) {
        setPoints(prev => prev.map(pos => ({ x: pos.x + dx, y: pos.y + dy })));
        polygonDragRef.current = p;
      }
    };
    const handleUp = () => { polygonDragRef.current = null; };
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchmove', handleMove);
    window.addEventListener('touchend', handleUp);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleUp);
    };
  }, [mode, points.length]);

  const matPx = pxPerMeter;
  const overcutPx = 0; // 밀착 여유 제거 - 알고리즘이 100가지 격자 위치 시도하므로 불필요

  const optimized = useMemo(
    () => optimizeLayout(points, matPx, overcutPx),
    [points, matPx, overcutPx]
  );

  const matsWithArea = useMemo(() => {
    return optimized.mats.map(m => {
      if (m.full) return { ...m, areaRatio: 1.0 };
      return { ...m, areaRatio: matAreaRatio(m.x, m.y, matPx, points, AREA_SAMPLES) };
    });
  }, [optimized.mats, points, matPx]);

  const matKey = (m) => `${m.x.toFixed(2)}_${m.y.toFixed(2)}`;
  const excludedSet = new Set(excludedMatKeys);
  const isExcluded = (m) => excludedSet.has(matKey(m));

  let displayNum = 0;
  const matsWithDisplay = matsWithArea.map((m) => {
    const excluded = isExcluded(m);
    return { ...m, excluded, displayNumber: excluded ? null : ++displayNum };
  });

  const visibleMats = matsWithDisplay.filter((m) => !m.excluded);

  const pairing = useMemo(() => {
    const offcuts = visibleMats.filter(m => !m.full && m.areaRatio < OFFCUT_THRESHOLD);
    return pairOffcuts(offcuts, PAIRING_THRESHOLD);
  }, [visibleMats]);

  const matToPair = new Map();
  pairing.pairs.forEach((pair, idx) => {
    matToPair.set(matKey(pair.a), idx + 1);
    matToPair.set(matKey(pair.b), idx + 1);
  });

  const totalMats = visibleMats.length;
  const fullMats = visibleMats.filter((m) => m.full).length;
  const cutMats = totalMats - fullMats;
  const excludedCount = excludedMatKeys.length;
  const offcutsCount = pairing.pairs.length * 2 + pairing.unpaired.length;
  const pairsCount = pairing.pairs.length;
  const unpairedOffcutsCount = pairing.unpaired.length;
  const bigCutsCount = cutMats - offcutsCount;
  const actualOrderMats = fullMats + bigCutsCount + pairsCount + unpairedOffcutsCount;
  const savedMats = totalMats - actualOrderMats;

  const areaM2 = polygonArea(points) / (pxPerMeter * pxPerMeter);
  const netAreaM2 = areaM2;
  const actualMatAreaM2 = actualOrderMats * 1.0;
  const lossRate = actualOrderMats > 0 ? Math.max(0, ((actualMatAreaM2 - netAreaM2) / actualMatAreaM2) * 100) : 0;

  const handleUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const targetW = 760;
        const targetH = (img.height / img.width) * targetW;
        setImageDims({ w: targetW, h: targetH });
        setImage(reader.result);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  const getSvgPoint = (evt) => {
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX;
    pt.y = evt.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  };

  const applyScale = () => {
    if (scalePoints.length !== 2) return;
    const m = Number(scaleInputM);
    if (!m || m <= 0) return;
    setPxPerMeter(distance(scalePoints[0], scalePoints[1]) / m);
  };

  const handleCanvasClick = (evt) => {
    if (wasDraggingRef.current) return;
    if (isViewMode) return;
    if (mode === "idle" || mode === "exclude") return;

    // 손바닥 보호 1: 터치 이벤트일 때 손바닥이 동시에 닿으면 무시
    if (evt.touches && evt.touches.length > 1) return;

    // 손바닥 보호 2: 큰 영역 터치(손바닥)는 무시 - 여러 속성 종합 검사
    const native = evt.nativeEvent;
    if (native) {
      // 터치 이벤트의 첫 번째 터치 정보
      const touch = evt.changedTouches?.[0] || native.changedTouches?.[0];
      if (touch) {
        const radiusX = touch.radiusX || 0;
        const radiusY = touch.radiusY || 0;
        const force = touch.force ?? 1;
        // 손바닥 특징: 큰 반경 (>20) 또는 매우 약한 압력 (<0.1)
        if (radiusX > 20 || radiusY > 20) return;
        if (force > 0 && force < 0.05) return; // 손바닥은 압력이 약함
      }
      // 폴백: height 체크 (이전 로직)
      if (native.height && native.height > 25) return;
      if (native.width && native.width > 25) return;
    }

    const p = getSvgPoint(evt);
    if (mode === "scale") setScalePoints((prev) => (prev.length >= 2 ? [p] : [...prev, p]));
    if (mode === "draw") {
      setPoints((prev) => [...prev, p]);
      setSelectedIdx(points.length);
      // 점 추가 직후 300ms 동안 추가 탭 차단 (손바닥이 연달아 닿는 경우 보호)
      wasDraggingRef.current = true;
      setTimeout(() => { wasDraggingRef.current = false; }, 300);
    }
  };

  const handlePointMouseDown = (e, i) => {
    if (mode !== "draw" || isViewMode) return;
    e.stopPropagation();
    if (e.preventDefault) e.preventDefault(); // 터치 시 스크롤 방지
    setDraggingIdx(i);
    setSelectedIdx(i);
  };

  // 🆕 매트 클릭 - view 모드에서도 항상 토글 가능
  const toggleMatExclude = (m, e) => {
    if (!isViewMode && mode !== "exclude") return;
    e.stopPropagation();
    const key = matKey(m);
    setExcludedMatKeys((prev) =>
      prev.includes(key) ? prev.filter((k) => k !== key) : [...prev, key]
    );
  };

  const undo = () => {
    if (mode === "draw") {
      setPoints((prev) => prev.slice(0, -1));
      setSelectedIdx(null);
    }
    if (mode === "scale") setScalePoints((prev) => prev.slice(0, -1));
    if (mode === "exclude") setExcludedMatKeys((prev) => prev.slice(0, -1));
  };

  const finishDraw = () => { setMode("idle"); setSelectedIdx(null); };

  const resetAll = () => {
    if (!confirm('모든 작업이 삭제됩니다. 계속하시겠습니까?')) return;
    setPoints([]);
    setExcludedMatKeys([]);
    setScalePoints([]);
    setImage(null);
    setImageDims({ w: 760, h: 540 });
    setMode("scale");
    setSelectedIdx(null);
    setDraggingIdx(null);
    if (fileInputRef.current) fileInputRef.current.value = '';
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  };

  const clearExcluded = () => {
    if (excludedMatKeys.length === 0) return;
    if (!confirm(`제외된 매트 ${excludedMatKeys.length}장을 모두 복구할까요?`)) return;
    setExcludedMatKeys([]);
  };

  // 🆕 전체화면 보기 모드 새 탭 열기
  const openViewerTab = () => {
    const url = window.location.pathname + '?view=1';
    window.open(url, '_blank');
  };

  // PNG 이미지 생성 (SVG → Canvas → PNG Blob)
  const generatePngBlob = async () => {
    if (!svgRef.current || points.length < 3) return null;

    const originalSvg = svgRef.current;
    const clonedSvg = originalSvg.cloneNode(true);
    clonedSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clonedSvg.setAttribute('width', '1400');
    clonedSvg.setAttribute('height', '1100');
    clonedSvg.setAttribute('viewBox', '0 0 1400 1100');

    // 하단 정보 박스 추가
    const today = new Date();
    const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
    const infoBox = `
      <g transform="translate(0, 1010)">
        <rect x="80" y="0" width="1240" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="12"/>
        <text x="120" y="35" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#78350f">실제 발주 매트</text>
        <text x="120" y="65" font-family="Pretendard, sans-serif" font-size="32" font-weight="800" fill="#78350f">${actualOrderMats}장</text>
        <text x="450" y="35" font-family="Pretendard, sans-serif" font-size="16" fill="#78350f">짜투리 절약</text>
        <text x="450" y="60" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#78350f">${savedMats}장 (페어 ${pairsCount}개)</text>
        <text x="780" y="35" font-family="Pretendard, sans-serif" font-size="16" fill="#78350f">제외 매트</text>
        <text x="780" y="60" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#78350f">${excludedCount}장</text>
        <text x="1000" y="35" font-family="Pretendard, sans-serif" font-size="14" fill="#92400e">측정일자</text>
        <text x="1000" y="60" font-family="Pretendard, sans-serif" font-size="18" font-weight="600" fill="#78350f">${dateStr}</text>
        <text x="1280" y="35" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#78350f" text-anchor="end">돌봄매트</text>
        <text x="1280" y="60" font-family="Pretendard, sans-serif" font-size="13" fill="#92400e" text-anchor="end">DOLBOMMAT</text>
      </g>
    `;
    clonedSvg.insertAdjacentHTML('beforeend', infoBox);
    const bgRect = `<rect x="0" y="0" width="1400" height="1100" fill="white"/>`;
    clonedSvg.insertAdjacentHTML('afterbegin', bgRect);

    const svgString = new XMLSerializer().serializeToString(clonedSvg);
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const scale = 2; // 고해상도
        const canvas = document.createElement('canvas');
        canvas.width = 1400 * scale;
        canvas.height = 1100 * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 1400, 1100);
        ctx.drawImage(img, 0, 0, 1400, 1100);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => resolve(blob), 'image/png', 0.95);
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  };

  // PNG 다운로드 (사진앱/파일앱에 저장)
  const downloadPng = async () => {
    const blob = await generatePngBlob();
    if (!blob) { alert('이미지 생성 실패. 도면과 시공 영역이 모두 설정되었는지 확인하세요.'); return; }
    const url = URL.createObjectURL(blob);
    const today = new Date().toISOString().slice(0, 10);
    const a = document.createElement('a');
    a.href = url;
    a.download = `매트배치_${today}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const polygonStr = points.map((p) => `${p.x},${p.y}`).join(" ");

  const getMatColors = (m) => {
    if (m.excluded) return { fill: "rgba(148,163,184,0.10)", stroke: "#94a3b8", dash: "5 4" };
    if (m.full) return { fill: "rgba(34,197,94,0.12)", stroke: "#16a34a", dash: "0" };
    if (m.areaRatio < OFFCUT_THRESHOLD) {
      const isPaired = matToPair.has(matKey(m));
      if (isPaired && showPairing) {
        return { fill: "rgba(250,204,21,0.18)", stroke: "#ca8a04", dash: "0" };
      } else {
        return { fill: "rgba(249,115,22,0.10)", stroke: "#fb923c", dash: "3 2" };
      }
    }
    return { fill: "rgba(249,115,22,0.13)", stroke: "#ea580c", dash: "0" };
  };

  // ════════════════════════════════════════════════════
  // 🆕 VIEW MODE (전체화면 보기 모드) - 사이드바 없음
  // ════════════════════════════════════════════════════
  if (isViewMode) {
    return (
      <div className="min-h-screen bg-slate-50 text-slate-900">
        {/* 간소화된 헤더 */}
        <div className="bg-white border-b border-slate-200 px-4 py-3 flex flex-wrap items-center justify-between gap-2 sticky top-0 z-10">
          <div className="flex items-center gap-3">
            <h1 className="text-lg font-bold">시공 보기</h1>
            <div className="text-xs text-slate-500">매트 클릭 = 제외/복구 · 두 손가락으로 확대/축소 · 수정은 편집 탭에서</div>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex items-center gap-3 text-sm bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-200">
              <span>실제 발주 <b className="text-amber-900 text-base">{actualOrderMats}장</b></span>
              <span className="text-slate-400">|</span>
              <span>면적 <b>{netAreaM2.toFixed(2)}㎡</b></span>
              <span className="text-slate-400">|</span>
              <span>제외 <b>{excludedCount}</b></span>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-500 hidden sm:inline">크기</span>
              <input
                type="range"
                min="40"
                max="300"
                step="5"
                value={zoom * 100}
                onChange={(e) => setZoom(Number(e.target.value) / 100)}
                className="w-24 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-700"
              />
              <span className="text-xs text-slate-500 font-mono w-10 text-right">{(zoom * 100).toFixed(0)}%</span>
              <Button variant="outline" onClick={() => setShowNumbers(v => !v)}>{showNumbers ? "✓ 번호" : "번호"}</Button>
              <Button variant="outline" onClick={downloadPng} className="bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100">이미지 저장</Button>
            </div>
            <button
              onClick={() => window.close()}
              className="text-sm text-slate-600 hover:text-slate-900 hover:underline"
              title="이 보기 탭을 닫습니다. 수정은 편집 탭에서 하세요."
            >탭 닫기</button>
          </div>
        </div>

        {/* 풀스크린 캔버스 */}
        <div className="overflow-hidden bg-white flex items-center justify-center" style={{ height: 'calc(100vh - 60px)' }}>
          <svg
            ref={svgRef}
            width={1400 * zoom}
            height={1000 * zoom}
            viewBox="0 0 1400 1000"
            className="cursor-default"
          >
            <defs>
              <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1" />
              </pattern>
            </defs>
            <rect width="1400" height="1000" fill="url(#smallGrid)" />
            {image && (
              <image href={image} x="80" y="60" width={imageDims.w} height={imageDims.h} opacity="0.6" />
            )}
            {matsWithDisplay.map((m) => {
              const colors = getMatColors(m);
              const pairNum = matToPair.get(matKey(m));
              const isPaired = pairNum && showPairing;
              return (
                <g
                  key={`m-${m.x}-${m.y}`}
                  onClick={(e) => toggleMatExclude(m, e)}
                  className="mat-clickable"
                >
                  <rect
                    x={m.x} y={m.y}
                    width={matPx} height={matPx}
                    fill={colors.fill}
                    stroke={colors.stroke}
                    strokeWidth="2"
                    strokeDasharray={colors.dash}
                  />
                  {m.excluded && (
                    <>
                      <line x1={m.x + 12} y1={m.y + 12} x2={m.x + matPx - 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                      <line x1={m.x + matPx - 12} y1={m.y + 12} x2={m.x + 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                      <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="600" fill="#64748b" style={{pointerEvents:"none"}}>제외</text>
                    </>
                  )}
                  {!m.excluded && showNumbers && (
                    <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="700" fill="#0f172a" style={{pointerEvents:"none"}}>{m.displayNumber}</text>
                  )}
                  {!m.excluded && isPaired && (
                    <g style={{pointerEvents:"none"}}>
                      <rect x={m.x + matPx - 24} y={m.y + 4} width="20" height="16" rx="3" fill="#ca8a04"/>
                      <text x={m.x + matPx - 14} y={m.y + 12} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill="white">P{pairNum}</text>
                    </g>
                  )}
                </g>
              );
            })}
            {/* view 모드는 잠금 상태이므로 파란 폴리곤 숨김 (가독성) */}
          </svg>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════
  // EDIT MODE (편집 모드 - 기본)
  // ════════════════════════════════════════════════════
  return (
    <div className="min-h-screen bg-slate-50 p-3 md:p-4 text-slate-900">
      <div className="mx-auto max-w-7xl space-y-4">

        <div className="flex flex-col gap-3 rounded-2xl bg-white p-4 shadow-sm md:flex-row md:items-center md:justify-between">
          <div>
            <h1 className="text-xl md:text-2xl font-bold">매트 배치 프로그램</h1>
            <p className="text-xs md:text-sm text-slate-500">스케일 보정 → 시공 영역 → 매트 제외 → 자동 수량 계산</p>
          </div>
          <div className="flex flex-wrap gap-2">
            <label className="inline-flex cursor-pointer items-center gap-2 rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
              도면 업로드
              <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleUpload} />
            </label>
            {points.length >= 3 && (
              <>
                {/* 좌측: 전체화면 보기 */}
                <Button variant="outline" onClick={openViewerTab} className="bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100">
                  전체화면 보기
                </Button>
                {/* 가운데: 편집/잠금 토글 (현재 상태에 따라 라벨만 변경) */}
                <Button
                  variant="outline"
                  onClick={() => {
                    if (mode === "idle") {
                      setMode("draw");
                    } else {
                      setMode("idle");
                      setSelectedIdx(null);
                    }
                  }}
                  className={mode === "idle"
                    ? "bg-blue-50 border-blue-300 text-blue-900 hover:bg-blue-100"
                    : "bg-slate-100 border-slate-400 text-slate-900 hover:bg-slate-200"
                  }
                >
                  {mode === "idle" ? "편집 모드" : "잠금"}
                </Button>
              </>
            )}
            <Button variant="outline" onClick={undo}>뒤로가기</Button>
            <Button variant="destructive" onClick={resetAll}>초기화</Button>
            {/* 우측: 이미지 저장 */}
            {points.length >= 3 && (
              <Button variant="outline" onClick={downloadPng} className="bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100">
                이미지 저장
              </Button>
            )}
          </div>
        </div>

        {restored && (
          <div className="rounded-xl bg-amber-50 border border-amber-200 px-4 py-3 text-sm text-amber-900">
            이전 작업이 자동으로 복원되었습니다. 새로 시작하려면 "초기화"를 누르세요.
          </div>
        )}

        <div className="grid gap-3 lg:grid-cols-[280px_1fr]">

          <div className="space-y-3">

            <Card>
              <CardContent className="space-y-2 p-3">
                <h2 className="font-semibold text-sm">1. 작업 모드</h2>
                <div className="grid grid-cols-3 gap-1.5">
                  <Button variant={mode === "scale" ? "default" : "outline"} onClick={() => setMode("scale")} className="text-xs px-2">스케일</Button>
                  <Button variant={mode === "draw" ? "default" : "outline"} onClick={() => setMode("draw")} className="text-xs px-2">시공</Button>
                  <Button variant={mode === "exclude" ? "default" : "outline"} onClick={() => setMode("exclude")} className="text-xs px-2">제외</Button>
                </div>
                {mode === "draw" && (
                  <Button className="w-full" variant="outline" onClick={finishDraw} disabled={points.length < 3}>
                    그리기 종료
                  </Button>
                )}
                {mode === "exclude" && excludedCount > 0 && (
                  <Button className="w-full" variant="outline" onClick={clearExcluded}>
                    제외 매트 복구 ({excludedCount}장)
                  </Button>
                )}
              </CardContent>
            </Card>

            <Card>
              <CardContent className="space-y-2 p-3">
                <h2 className="font-semibold text-sm">2. 스케일 보정</h2>
                <div className="flex items-center gap-2">
                  <input
                    type="text" inputMode="decimal"
                    value={scaleInputM}
                    onChange={(e) => setScaleInputM(e.target.value)}
                    className="w-full rounded-lg border border-slate-300 px-2 py-1.5 text-sm"
                    placeholder="예: 2.04"
                  />
                  <span className="text-sm">m</span>
                </div>
                <Button className="w-full text-xs" onClick={applyScale} disabled={scalePoints.length !== 2}>
                  선택한 두 점으로 스케일 적용
                </Button>
                <div className="text-xs text-slate-600">현재 1m = <b>{pxPerMeter.toFixed(2)}px</b></div>
              </CardContent>
            </Card>

            {/* 실제 발주 매트 카드 - 가장 중요한 정보, 항상 펼침 */}
            {points.length >= 3 && (
              <Card className="border-2 border-amber-300 bg-amber-50/50">
                <CardContent className="space-y-1 p-3">
                  <h2 className="font-bold text-sm text-amber-900">실제 발주 매트</h2>
                  <div className="text-3xl font-bold text-amber-900">
                    {actualOrderMats}<span className="text-base font-medium text-amber-700 ml-1">장</span>
                  </div>
                  {savedMats > 0 && (
                    <div className="text-xs text-emerald-700 font-medium">
                      짜투리 재활용 {savedMats}장 절약 (페어 {pairsCount}개)
                    </div>
                  )}
                </CardContent>
              </Card>
            )}

            {/* 상세 통계 - 접기 (기본 닫힘) */}
            {points.length >= 3 && (
              <Card>
                <CardContent className="p-0">
                  <details>
                    <summary className="cursor-pointer p-3 font-semibold text-sm hover:bg-slate-50 flex items-center justify-between">
                      <span>상세 통계</span>
                      <span className="text-xs text-slate-400">▼</span>
                    </summary>
                    <div className="px-3 pb-3 grid grid-cols-2 gap-1.5 text-xs">
                      <div className="rounded-lg bg-slate-100 p-2">
                        <div className="text-slate-500">순시공 면적</div>
                        <b>{netAreaM2.toFixed(2)}㎡</b>
                      </div>
                      <div className="rounded-lg bg-emerald-50 p-2">
                        <div className="text-emerald-700">온장</div>
                        <b className="text-emerald-900">{fullMats}장</b>
                      </div>
                      <div className="rounded-lg bg-orange-50 p-2">
                        <div className="text-orange-700">큰 재단장</div>
                        <b className="text-orange-900">{bigCutsCount}장</b>
                      </div>
                      <div className="rounded-lg bg-yellow-50 p-2">
                        <div className="text-yellow-700">짜투리(페어)</div>
                        <b className="text-yellow-900">{pairsCount}쌍</b>
                      </div>
                      <div className="rounded-lg bg-orange-50 p-2">
                        <div className="text-orange-700">외톨이</div>
                        <b className="text-orange-900">{unpairedOffcutsCount}장</b>
                      </div>
                      <div className="rounded-lg bg-slate-100 p-2">
                        <div className="text-slate-500">예상 로스율</div>
                        <b>{lossRate.toFixed(1)}%</b>
                      </div>
                      <div className="rounded-lg bg-slate-100 p-2 col-span-2">
                        <div className="text-slate-500">제외 매트 / 화면 표시</div>
                        <b>{excludedCount}장 / {totalMats}장</b>
                      </div>
                    </div>
                  </details>
                </CardContent>
              </Card>
            )}

            {/* 보기 설정 - 접기 (기본 닫힘) */}
            <Card>
              <CardContent className="p-0">
                <details>
                  <summary className="cursor-pointer p-3 font-semibold text-sm hover:bg-slate-50 flex items-center justify-between">
                    <span>보기 설정</span>
                    <span className="text-xs text-slate-400">▼</span>
                  </summary>
                  <div className="px-3 pb-3 space-y-3">
                    {/* 줌 슬라이더 */}
                    <div>
                      <div className="flex items-center justify-between mb-1">
                        <label className="text-xs font-medium text-slate-700">크기 조절</label>
                        <span className="text-xs text-slate-500 font-mono">{(zoom * 100).toFixed(0)}%</span>
                      </div>
                      <input
                        type="range"
                        min="40"
                        max="300"
                        step="5"
                        value={zoom * 100}
                        onChange={(e) => setZoom(Number(e.target.value) / 100)}
                        className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-700"
                      />
                      <div className="flex justify-between text-[10px] text-slate-400 mt-0.5">
                        <span>작게</span>
                        <span>기본</span>
                        <span>크게</span>
                      </div>
                    </div>
                    {/* 표시 옵션 */}
                    <div className="flex gap-1 flex-wrap pt-1 border-t border-slate-100">
                      <Button variant="outline" onClick={() => setShowNumbers((v) => !v)} className="text-xs px-2 flex-1">{showNumbers ? "✓ 번호" : "번호"}</Button>
                      <Button variant={showPairing ? "default" : "outline"} onClick={() => setShowPairing((v) => !v)} className="text-xs px-2 flex-1">{showPairing ? "✓ 페어" : "페어"}</Button>
                    </div>
                    {/* 색상 안내 */}
                    <div className="text-xs space-y-1 pt-2 border-t border-slate-200">
                      <div className="font-semibold text-slate-700 mb-1">색상 안내</div>
                      <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-emerald-300 border border-emerald-600"></span>온장 (100%)</div>
                      <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-orange-300 border border-orange-600"></span>큰 재단장</div>
                      <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-yellow-300 border border-yellow-600"></span>짜투리 페어</div>
                      <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-sm bg-orange-200 border border-orange-400 border-dashed"></span>외톨이</div>
                    </div>
                  </div>
                </details>
              </CardContent>
            </Card>
          </div>

          <Card className="overflow-hidden">
            <CardContent className="p-0">
              <div className="h-[760px] overflow-hidden bg-white flex items-center justify-center">
                <svg
                  ref={svgRef}
                  width={1400 * zoom}
                  height={1000 * zoom}
                  viewBox="0 0 1400 1000"
                  onClick={handleCanvasClick}
                  onMouseDown={(e) => {
                    if (mode === "idle" && points.length >= 3) {
                      const p = getSvgPoint(e);
                      polygonDragRef.current = p;
                    }
                  }}
                  onTouchStart={(e) => {
                    if (mode === "idle" && points.length >= 3 && e.touches.length === 1) {
                      const touch = e.touches[0];
                      const svg = svgRef.current;
                      const pt = svg.createSVGPoint();
                      pt.x = touch.clientX; pt.y = touch.clientY;
                      polygonDragRef.current = pt.matrixTransform(svg.getScreenCTM().inverse());
                    }
                  }}
                  className={
                    mode === "idle" && points.length >= 3 ? "cursor-grab"
                    : mode === "exclude" ? ""
                    : "cursor-crosshair"
                  }
                >
                  <defs>
                    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1" />
                    </pattern>
                  </defs>
                  <rect width="1400" height="1000" fill="url(#smallGrid)" />

                  {image && (
                    <image href={image} x="80" y="60" width={imageDims.w} height={imageDims.h} opacity="0.6" />
                  )}

                  {matsWithDisplay.map((m) => {
                    const colors = getMatColors(m);
                    const pairNum = matToPair.get(matKey(m));
                    const isPaired = pairNum && showPairing;
                    return (
                      <g
                        key={`m-${m.x}-${m.y}`}
                        onClick={mode === "exclude" ? (e) => toggleMatExclude(m, e) : undefined}
                        className={mode === "exclude" ? "mat-clickable" : ""}
                        style={{ pointerEvents: mode === "exclude" ? "auto" : "none" }}
                      >
                        <rect
                          x={m.x} y={m.y}
                          width={matPx} height={matPx}
                          fill={colors.fill}
                          stroke={colors.stroke}
                          strokeWidth="2"
                          strokeDasharray={colors.dash}
                        />
                        {m.excluded && (
                          <>
                            <line x1={m.x + 12} y1={m.y + 12} x2={m.x + matPx - 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                            <line x1={m.x + matPx - 12} y1={m.y + 12} x2={m.x + 12} y2={m.y + matPx - 12} stroke="#94a3b8" strokeWidth="2.5" />
                            <text x={m.x + matPx / 2} y={m.y + matPx / 2} textAnchor="middle" dominantBaseline="middle" fontSize="11" fontWeight="600" fill="#64748b" style={{pointerEvents:"none"}}>제외</text>
                          </>
                        )}
                        {!m.excluded && showNumbers && (
                          <text
                            x={m.x + matPx / 2} y={m.y + matPx / 2}
                            textAnchor="middle" dominantBaseline="middle"
                            fontSize="14" fontWeight="700" fill="#0f172a"
                            style={{pointerEvents:"none"}}
                          >{m.displayNumber}</text>
                        )}
                        {!m.excluded && isPaired && (
                          <g style={{pointerEvents:"none"}}>
                            <rect x={m.x + matPx - 24} y={m.y + 4} width="20" height="16" rx="3" fill="#ca8a04"/>
                            <text x={m.x + matPx - 14} y={m.y + 12} textAnchor="middle" dominantBaseline="middle" fontSize="10" fontWeight="700" fill="white">P{pairNum}</text>
                          </g>
                        )}
                      </g>
                    );
                  })}

                  {/* 파란색 폴리곤은 편집/그리기 중일 때만 표시 (잠금 상태에서는 숨김 - 가독성) */}
                  {points.length >= 3 && mode !== "idle" && (
                    <polygon points={polygonStr} fill="rgba(59,130,246,0.10)" stroke="#2563eb" strokeWidth="3" />
                  )}
                  {points.length >= 2 && points.length < 3 && (
                    <polyline points={polygonStr} fill="none" stroke="#2563eb" strokeWidth="3" strokeDasharray="6 6" />
                  )}
                  {/* 점은 편집/그리기 중에만 표시 (잠금 상태에서는 숨김) */}
                  {mode !== "idle" && points.map((p, i) => {
                    const isSelected = i === selectedIdx;
                    const isFirst = i === 0;
                    return (
                      <g key={`p-${i}`}>
                        {isSelected && (
                          <circle cx={p.x} cy={p.y} r="14" fill="none" stroke="#dc2626" strokeWidth="2" strokeDasharray="3 3" />
                        )}
                        <circle
                          cx={p.x} cy={p.y}
                          r={isSelected ? "12" : (isFirst ? "10" : "9")}
                          fill={isSelected ? "#dc2626" : (isFirst ? "#1e40af" : "#2563eb")}
                          stroke="white"
                          strokeWidth="2"
                          onMouseDown={(e) => handlePointMouseDown(e, i)}
                          onTouchStart={(e) => handlePointMouseDown(e, i)}
                          style={{
                            cursor: mode === "draw" ? "move" : "default",
                            pointerEvents: mode === "draw" ? "auto" : "none",
                            touchAction: "none",
                          }}
                        />
                      </g>
                    );
                  })}

                  {scalePoints.length === 2 && (
                    <line x1={scalePoints[0].x} y1={scalePoints[0].y} x2={scalePoints[1].x} y2={scalePoints[1].y} stroke="#7c3aed" strokeWidth="4" />
                  )}
                  {scalePoints.map((p, i) => <circle key={`s-${i}`} cx={p.x} cy={p.y} r="8" fill="#7c3aed" />)}
                </svg>
              </div>

              <div className="px-4 py-3 text-xs text-slate-700 border-t bg-slate-50 flex items-center justify-between gap-2">
                <div className="flex-1">
                  {mode === "scale" && "스케일 모드 — 도면의 치수선 양 끝을 클릭한 후 \"스케일 적용\" 버튼을 누르세요."}
                  {mode === "draw" && (
                    selectedIdx !== null
                      ? "시공 모드 — 점 선택됨. 드래그하거나 화살표 키 (Shift+화살표 = 10px씩) | Esc 선택해제 | 빈 공간 탭 = 새 점 추가"
                      : "시공 모드 — 도면 꼭짓점을 한 손가락으로 탭하세요. 손바닥은 자동 무시됩니다."
                  )}
                  {mode === "exclude" && "제외 모드 — 빼고 싶은 매트(가구·기둥 위치)를 클릭하세요. 다시 클릭하면 복구됩니다."}
                  {mode === "idle" && "잠금 상태 — 도면 위 빈 공간을 드래그하거나 화살표 키로 시공 영역 전체 이동. 편집은 우측 상단 \"편집 모드\" 버튼."}
                </div>
                {mode === "draw" && points.length > 0 && (
                  <button
                    onClick={undo}
                    className="shrink-0 inline-flex items-center gap-1 px-4 py-2 rounded-xl bg-white border-2 border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-100 active:bg-slate-200 shadow-sm"
                  >
                    ← 방금 점 취소
                  </button>
                )}
              </div>
            </CardContent>
          </Card>
        </div>

        <div className="text-center text-xs text-slate-400 py-2">
          돌봄매트 시공 도구 v2.5 · 줌 슬라이더 + 스크롤 제거
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PuzzleMatLayoutApp />);
</script>
</body>
</html>
