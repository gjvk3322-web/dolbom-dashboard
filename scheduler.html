<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b12;--card:#151520;--card2:#1c1c2a;--border:rgba(255,255,255,.07);--text:#eaeaf2;--dim:#6e6e88;--blue:#5b8def;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--pink:#f472b6;--purple:#a78bfa;--orange:#fb923c;--font:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding-bottom:80px}
.hd{background:var(--card);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
.hd h1{font-size:18px;font-weight:900}.hd-sub{font-size:11px;color:var(--dim);margin-top:3px}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;max-width:600px;margin:0 auto}
.nav a{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:500;color:var(--dim);text-decoration:none;border-top:2px solid transparent}
.nav a.on{color:var(--blue);border-top-color:var(--blue)}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
.pane{display:none;padding:12px 12px 20px}.pane.on{display:block}

/* Day Card */
.daycard{background:var(--card);border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border)}
.daycard-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--card2)}
.daycard-date{font-size:16px;font-weight:900}.daycard-dow{font-size:13px;font-weight:700;padding:4px 12px;border-radius:8px}
.dow-mon{background:rgba(91,141,239,.15);color:var(--blue)}.dow-tue{background:rgba(52,211,153,.15);color:var(--green)}.dow-wed{background:rgba(251,191,36,.15);color:var(--yellow)}.dow-thu{background:rgba(167,139,250,.15);color:var(--purple)}.dow-fri{background:rgba(244,114,182,.15);color:var(--pink)}.dow-sat{background:rgba(91,141,239,.2);color:var(--blue)}.dow-sun{background:rgba(248,113,113,.15);color:var(--red)}
.daycard-off{padding:6px 16px;font-size:12px;color:var(--red)}
.daycard-body{padding:8px 12px}

/* Team Job Block */
.tjob{background:var(--card2);border-radius:12px;padding:12px 14px;margin:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.tjob:active{background:rgba(255,255,255,.05)}
.tjob-team{display:inline-block;padding:4px 14px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:8px}
.tjob-line{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:14px;line-height:1.6}
.tjob-time{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:700;flex-shrink:0}
.tjob-time.am{background:rgba(251,191,36,.15);color:var(--yellow)}.tjob-time.pm{background:rgba(167,139,250,.15);color:var(--purple)}
.tjob-addr{flex:1;font-weight:500}
.tjob-mat{display:flex;gap:4px;flex-wrap:wrap;padding:4px 0 0 0}
.mat{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}
.mat-marble{background:rgba(91,141,239,.15);color:var(--blue)}.mat-cotton{background:rgba(52,211,153,.15);color:var(--green)}.mat-modern{background:rgba(248,113,113,.15);color:var(--red)}
.tjob-dist{font-size:11px;color:var(--yellow);margin-left:auto}
.new-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(248,113,113,.2);color:var(--red);margin-left:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Unassigned */
.ujob{background:var(--card2);border:1px dashed rgba(251,191,36,.3);border-radius:12px;padding:12px 14px;margin:6px 0}
.ujob-title{font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:6px}

/* Team Setup */
.tcard{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.tcard h3{font-size:15px;font-weight:700;margin-bottom:12px}
.tslot{min-height:50px;background:var(--card2);border-radius:10px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.tmem{padding:8px 16px;border-radius:10px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px}
.tmem .x{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.pool{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.pool-mem{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid transparent}
.pool-mem:active{transform:scale(.95)}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin:8px 0}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#000}.btn-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.2)}

/* Fair */
.fcard{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.frow{display:flex;align-items:center;gap:10px;margin:8px 0}
.fname{min-width:48px;font-size:13px;font-weight:700}
.fbar{flex:1;height:24px;background:var(--card2);border-radius:8px;overflow:hidden}
.ffill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:24px}
.fval{min-width:50px;text-align:right;font-size:12px;font-family:monospace;color:var(--dim)}
.score{text-align:center;padding:20px}.score-n{font-size:52px;font-weight:900}.score-l{font-size:12px;color:var(--dim)}
.sec{font-size:15px;font-weight:700;margin-bottom:10px}

/* Toast + Copy popup */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;white-space:nowrap}
.toast-ok{background:var(--green);color:#000}.toast-copy{background:var(--blue);color:#fff}

/* Colors */
.tc0{background:var(--blue);color:#fff}.tc1{background:var(--green);color:#000}.tc2{background:var(--yellow);color:#000}.tc3{background:var(--pink);color:#fff}.tc4{background:var(--purple);color:#fff}.tc5{background:var(--orange);color:#000}
.tl0{background:rgba(91,141,239,.15);color:var(--blue)}.tl1{background:rgba(52,211,153,.15);color:var(--green)}.tl2{background:rgba(251,191,36,.15);color:var(--yellow)}.tl3{background:rgba(244,114,182,.15);color:var(--pink)}.tl4{background:rgba(167,139,250,.15);color:var(--purple)}.tl5{background:rgba(251,146,60,.15);color:var(--orange)}

.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:14px;font-family:var(--font);outline:none}

/* 직원 캘린더 팝업 */
.cal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.cal-overlay.show{display:flex}
.cal-sheet{background:var(--card);border-radius:20px 20px 0 0;max-width:500px;width:100%;padding:20px 16px 30px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-hd h3{font-size:17px;font-weight:900}
.cal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-dow{font-size:10px;color:var(--dim);font-weight:700;padding:4px 0}
.cal-day{padding:8px 0;border-radius:10px;font-size:13px;font-weight:500;color:var(--text)}
.cal-day.off{background:rgba(248,113,113,.2);color:var(--red);font-weight:900}
.cal-day.work{background:rgba(52,211,153,.1);color:var(--green)}
.cal-day.today{border:2px solid var(--blue)}
.cal-day.empty{color:transparent}
.cal-day.sun{color:var(--red)}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:11px;color:var(--dim)}
.cal-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.cal-legend .lg-off::before{background:rgba(248,113,113,.3)}
.cal-legend .lg-work::before{background:rgba(52,211,153,.2)}
.emp-badge{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;user-select:none}
.emp-badge::after{content:'📅';font-size:8px;position:absolute;top:-2px;right:-2px}

/* 출발확인 */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:20px;max-width:400px;width:100%;padding:24px;animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:18px;font-weight:900;text-align:center;margin-bottom:16px}
.confirm-item{padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px}
.confirm-label{font-size:10px;color:var(--dim);font-weight:700;margin-bottom:4px}
.confirm-value{font-size:15px;font-weight:700}
.confirm-btn{display:block;width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:900;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin-top:16px}
.confirm-ok{background:var(--green);color:#000}
.confirm-cancel{background:var(--card2);color:var(--dim);margin-top:8px}
.confirmed-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(52,211,153,.15);color:var(--green)}
.depart-btn{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(251,191,36,.2);color:var(--yellow);cursor:pointer;border:1px solid rgba(251,191,36,.3);animation:pulseBtn 2s infinite}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.3)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}
</style>
</head>
<body>

<div class="hd" onclick="manualRefresh()" style="cursor:pointer">
    <h1>🔧 돌봄매트 시공 스케줄러 <span id="verTag" style="font-size:10px;font-weight:400;color:var(--dim)"></span></h1>
    <div class="hd-sub" id="sub">로딩 중...</div>
</div>

<div id="updateBar" style="display:none;background:linear-gradient(135deg,#5b8def,#34d399);padding:10px 16px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#fff" onclick="location.reload(true)">🔄 새 버전이 있어요! 터치하면 업데이트</div>

<div id="donghoBar" style="display:none;background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.1));border-bottom:1px solid rgba(251,191,36,.3);padding:12px 16px;font-size:14px;color:var(--yellow);text-align:center;position:sticky;top:48px;z-index:99"></div>

<div class="pane on" id="p-sched"><div id="schedView"></div></div>
<div class="pane" id="p-team"><div id="teamView"></div></div>
<div class="pane" id="p-fair"><div id="fairView"></div></div>

<nav class="nav">
    <a class="on" onclick="sw('sched')" href="#"><span>📋</span>스케줄</a>
    <a onclick="sw('team')" href="#"><span>👥</span>팀설정</a>
    <a onclick="sw('fair')" href="#"><span>⚖️</span>공정성</a>
</nav>

<div class="toast" id="toast"></div>

<div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this)closeConfirm()">
<div class="confirm-box">
<div class="confirm-title">🚗 출발 확인</div>
<div id="confirmBody"></div>
<button class="confirm-btn confirm-ok" id="confirmOkBtn" onclick="doConfirm()">✅ 자재 확인 완료 · 출발!</button>
<button class="confirm-btn confirm-cancel" onclick="closeConfirm()">취소</button>
</div>
</div>

<div class="cal-overlay" id="calOverlay" onclick="if(event.target===this)closeCal()">
<div class="cal-sheet">
<div class="cal-hd"><h3 id="calTitle"></h3><button class="cal-close" onclick="closeCal()">✕</button></div>
<div id="calMonthNav" style="display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:12px">
<span id="calPrev" onclick="calMove(-1)" style="font-size:18px;cursor:pointer;padding:4px 12px;color:var(--dim)">‹</span>
<span id="calMonth" style="font-size:14px;font-weight:700"></span>
<span id="calNext" onclick="calMove(1)" style="font-size:18px;cursor:pointer;padding:4px 12px;color:var(--dim)">›</span>
</div>
<div class="cal-grid" id="calGrid"></div>
<div class="cal-legend"><span class="lg-off">휴무</span><span class="lg-work">시공</span></div>
<div id="calSummary" style="text-align:center;margin-top:12px;font-size:12px;color:var(--dim)"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ===== Config =====
const VER='2026.03.17.13';
const FB_URL='https://dolbom-schedule-default-rtdb.asia-southeast1.firebasedatabase.app';
const CSV_URL='https://docs.google.com/spreadsheets/d/1dhcmDkkDGe3Bw4jY3vfPcJGq5H-EGhB3mL4BXqgJiBQ/gviz/tq?tqx=out:csv';
const MAPS_KEY='AIzaSyAEz2OXudxNoTTn2ueFKWm7KGSnwDW83mw';
const OFF_B={lat:35.1253,lng:128.9736};
const OFF_A={lat:37.3159,lng:126.8233};
const SOUTH=['부산','사상','사하','동래','해운대','연제','남구','북구','서구','중구','동구','금정','강서','기장','김해','양산','울산','창원','경남','경북','대구','마산','진해','밀양','거제','통영','진주','목포','광주','전남','전북','함안','밀양'];
const DOW=['일','월','화','수','목','금','토'];
const DOW_CLS=['dow-sun','dow-mon','dow-tue','dow-wed','dow-thu','dow-fri','dow-sat'];

// ===== Firebase =====
firebase.initializeApp({databaseURL:FB_URL});
const db=firebase.database();

let E=['준형','윤철','세욱','승재','민석'];
let teams=[];
let A={};
let CF={};  // 출발확인
let DIST={};  // 거리 캐시 {주소: km}
let J=[];
let prevJobIds=new Set();
let DC=JSON.parse(localStorage.getItem('s4_dc')||'{}');

// Firebase 실시간 리스너
db.ref('employees').on('value',snap=>{const v=snap.val();if(v)E=v;renderAll()});
db.ref('teams').on('value',snap=>{const v=snap.val();if(v)teams=v;else teams=[];renderAll()});
db.ref('assignments').on('value',snap=>{const v=snap.val();if(v)A=v;else A={};renderAll()});
db.ref('confirms').on('value',snap=>{const v=snap.val();if(v)CF=v;else CF={};renderAll()});
db.ref('distances').on('value',snap=>{const v=snap.val();if(v)DIST=v;else DIST={};renderAll()});
db.ref('prevJobIds').on('value',snap=>{const v=snap.val();if(v)prevJobIds=new Set(v);});

function fbSave(key,val){db.ref(key).set(val)}

// ===== Distance =====
async function geo(addr){
if(DC[addr])return DC[addr];
try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key='+MAPS_KEY+'&language=ko');
const d=await r.json();if(d.results&&d.results[0]){const l=d.results[0].geometry.location;DC[addr]={lat:l.lat,lng:l.lng};localStorage.setItem('s4_dc',JSON.stringify(DC));return DC[addr]}}catch(e){}
return null}

function hav(a1,n1,a2,n2){const R=6371,x=(a2-a1)*Math.PI/180,y=(n2-n1)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}

function getOffice(addr){return SOUTH.some(r=>addr.includes(r))?OFF_B:OFF_A}

async function calcDist(addr){const o=getOffice(addr);const c=await geo(addr);if(!c)return 0;return Math.round(hav(o.lat,o.lng,c.lat,c.lng))}

// ===== CSV Parse =====
function parseCSV(text){
const lines=text.split('\n');J=[];
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[0]||!r[1])continue;
const doff=[];for(let j=8;j<=13;j++){if(r[j]&&r[j].trim())doff.push(r[j].trim())}
const mat=[];if(r[5]&&parseInt(r[5])>0)mat.push({t:'마블',q:parseInt(r[5])});if(r[6]&&parseInt(r[6])>0)mat.push({t:'코튼',q:parseInt(r[6])});if(r[7]&&parseInt(r[7])>0)mat.push({t:'모던',q:parseInt(r[7])});
let ds=r[1];if(ds.length===8)ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
const id=ds+'_'+r[0]+'_'+i;
J.push({id,time:r[0],addr:r[2]||'',date:ds,py:r[3]||'',scope:r[4]||'',doff,mat,dist:0,isNew:false})}}

// ===== Auto Assign =====
async function autoAssign(){
toast('⏳ 자동 배정 중...','ok');

// 거리 계산
for(const j of J){if(j.addr&&!j.dist){j.dist=await calcDist(j.addr)}}

const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const empDist={};E.forEach(e=>empDist[e]=0);

// 기존 배정 거리 반영
J.forEach(j=>{if(A[j.id]){A[j.id].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0})}});

for(const date of Object.keys(bd).sort()){
const dj=bd[date];
const ao=new Set();dj.forEach(j=>j.doff.forEach(n=>ao.add(n)));
const avail=E.filter(e=>!ao.has(e));
if(!avail.length)continue;

const am=dj.filter(j=>j.time==='오전'||j.time.includes('2:')).sort((a,b)=>(b.dist||0)-(a.dist||0));
const pm=dj.filter(j=>j.time==='오후'||j.time==='as').sort((a,b)=>(b.dist||0)-(a.dist||0));

function makeGroups(pool,jobCnt){
if(teams.length){
// 팀 기반으로 먼저 그룹화
const avTeams=teams.map((t,i)=>({idx:i,members:t.filter(m=>pool.includes(m))})).filter(t=>t.members.length>0);
const grouped=avTeams.map(t=>t.members);
// 어떤 팀에도 속하지 않는 출근자
const inTeam=new Set();grouped.forEach(g=>g.forEach(m=>inTeam.add(m)));
const orphans=pool.filter(m=>!inTeam.has(m));

// 혼자인 그룹끼리 합치기 (1인 팀원의 팀 동료가 쉬는 경우)
const solos=grouped.filter(g=>g.length===1);
const pairs=grouped.filter(g=>g.length>=2);
const result=[...pairs];

// 1인 그룹 + 미배정 직원 합쳐서 2인 1조로
const singles=[...solos.map(g=>g[0]),...orphans];
for(let i=0;i<singles.length;i+=2){
if(i+1<singles.length)result.push([singles[i],singles[i+1]]);
else result.push([singles[i]])}

// 시공 건수가 그룹보다 많으면 쪼개기
if(jobCnt>result.length){
const expanded=[];
result.forEach(g=>{
if(jobCnt>expanded.length+result.length-expanded.length&&g.length>=2){
g.forEach(m=>expanded.push([m]))}
else expanded.push(g)});
return expanded}
return result}

// 팀 없으면 자동 2인 1조
const sorted=[...pool].sort((a,b)=>(empDist[a]||0)-(empDist[b]||0));
const groups=[];
if(jobCnt>=sorted.length){sorted.forEach(e=>groups.push([e]))}
else{for(let i=0;i<sorted.length;i+=2){if(i+1<sorted.length)groups.push([sorted[i],sorted[i+1]]);else groups.push([sorted[i]])}}
return groups}

function assignSlot(slot){
const groups=makeGroups(avail,slot.length);
groups.sort((a,b)=>{const da=a.reduce((s,e)=>s+(empDist[e]||0),0)/a.length;const db=b.reduce((s,e)=>s+(empDist[e]||0),0)/b.length;return da-db});
// 미배정 건에 그룹 배정 (같은 그룹이 여러 건 가능)
let gi=0;
slot.forEach(j=>{if(!A[j.id]&&groups.length){
A[j.id]=[...groups[gi%groups.length]];
groups[gi%groups.length].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0});
gi++}})}

assignSlot(am);assignSlot(pm)}

if(!es[e].days[j.date])es[e].days[j.date]=0;
es[e].days[j.date]++}
// 이동거리 (Firebase에서 캐시된 거리 사용)
const dKey=j.addr?j.addr.replace(/[.#$/\[\]]/g,'_'):'';
es[e].km+=DIST[dKey]||0}})});

// 두탕 = 같은 날 시공(오전+오후) 2건 이상 (AS 미포함)
E.forEach(e=>{es[e].double=Object.values(es[e].days).filter(c=>c>=2).length});

// 최대값 (바 차트 비율용)
const maxDouble=Math.max(...E.map(e=>es[e].double),1);
const maxAs=Math.max(...E.map(e=>es[e].as),1);
const maxKm=Math.max(...E.map(e=>es[e].km),1);

let html=`<div style="text-align:center;padding:12px;margin-bottom:12px;font-size:15px;font-weight:900">📊 ${monthStr} 실적</div>`;

// 두탕 횟수
html+=`<div class="fcard"><div class="sec">🔥 두탕 (오전+오후 시공, AS 제외)</div>`;
html+=E.map((e,i)=>{
const v=es[e].double;const w=Math.round(v/maxDouble*100);
return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[i%6]}">${v}</div></div><span class="fval">${v}일</span></div>`}).join('');
html+=`</div>`;

// AS 건수
html+=`<div class="fcard"><div class="sec">🔧 AS 건수</div>`;
html+=E.map((e,i)=>{
const v=es[e].as;const w=Math.round(v/maxAs*100);
return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[i%6]}">${v}</div></div><span class="fval">${v}건</span></div>`}).join('');
html+=`</div>`;

// 이동거리
const totalAddrs=new Set(mj.map(j=>j.addr).filter(Boolean));
const calcAddrs=[...totalAddrs].filter(a=>DIST[a.replace(/[.#$/\[\]]/g,'_')]!==undefined);
html+=`<div class="fcard"><div class="sec">🚗 이동거리 <span style="font-size:11px;font-weight:400;color:var(--dim)">(${calcAddrs.length}/${totalAddrs.size} 주소 계산됨)</span></div>`;
const hasKm=E.some(e=>es[e].km>0);
if(hasKm){
html+=E.map((e,i)=>{
const v=es[e].km;const w=Math.round(v/maxKm*100);
return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[i%6]}">${v}</div></div><span class="fval">${v}km</span></div>`}).join('')}
else{html+=`<div style="color:var(--dim);font-size:12px;padding:8px">주소 거리 계산 중... 잠시 후 새로고침 해주세요</div>`}
html+=`</div>`;

// 요약 테이블
html+=`<div class="fcard"><div class="sec">📋 요약</div>`;
html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
<tr style="border-bottom:1px solid var(--border)">
<th style="text-align:left;padding:8px 4px;color:var(--dim);font-size:11px">이름</th>
<th style="text-align:center;padding:8px 4px;color:var(--dim);font-size:11px">두탕</th>
<th style="text-align:center;padding:8px 4px;color:var(--dim);font-size:11px">AS</th>
<th style="text-align:right;padding:8px 4px;color:var(--dim);font-size:11px">이동거리</th>
</tr>`;
html+=E.map((e,i)=>{const s=es[e];
return `<tr style="border-bottom:1px solid var(--border)">
<td style="padding:10px 4px;font-weight:700;color:${cl[i%6]}">${e}</td>
<td style="text-align:center;padding:10px 4px;font-weight:700">${s.double}일</td>
<td style="text-align:center;padding:10px 4px;font-weight:700">${s.as}건</td>
<td style="text-align:right;padding:10px 4px;font-weight:700">${s.km}km</td>
</tr>`}).join('');
html+=`</table></div></div>`;

document.getElementById('fairView').innerHTML=html}

// ===== Nav =====
function sw(n){
document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('on'));
document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
document.getElementById('p-'+n).classList.add('on');
const tabs=['sched','team','fair'];
document.querySelectorAll('.nav a')[tabs.indexOf(n)].classList.add('on');
renderAll()}

function renderAll(){renderSched();renderTeam();renderFair()}

function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+(type||'ok');t.style.display='block';setTimeout(()=>t.style.display='none',2500)}

// ===== 직원 캘린더 =====
let calEmp='',calYear=0,calMonth=0;

function openCal(emp){
calEmp=emp;
const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
renderCal();
document.getElementById('calOverlay').classList.add('show');
}
function closeCal(){document.getElementById('calOverlay').classList.remove('show')}
function calMove(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCal()}

function renderCal(){
const ei=E.indexOf(calEmp);
const ecl=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
const ec=ecl[ei%6];
document.getElementById('calTitle').innerHTML=`<span style="color:${ec}">${calEmp}</span> 근무 캘린더`;
document.getElementById('calMonth').textContent=calYear+'년 '+(calMonth+1)+'월';

// 이 달의 휴무일 + 시공일 계산
const offDays=new Set();const workDays=new Set();
J.forEach(j=>{
const jd=new Date(j.date);
if(jd.getFullYear()===calYear&&jd.getMonth()===calMonth){
// 이 날짜의 전체 휴무자
const dateOffsAll=new Set();
J.filter(jj=>jj.date===j.date).forEach(jj=>jj.doff.forEach(n=>dateOffsAll.add(n)));
if(dateOffsAll.has(calEmp)){offDays.add(jd.getDate())}
// 이 직원이 배정된 날
const t=A[j.id];
if(t&&t.includes(calEmp)){workDays.add(jd.getDate())}
}});

const today=new Date();
const todayD=(today.getFullYear()===calYear&&today.getMonth()===calMonth)?today.getDate():-1;

const first=new Date(calYear,calMonth,1);
const lastDay=new Date(calYear,calMonth+1,0).getDate();
const startDow=first.getDay();

let grid='';
['일','월','화','수','목','금','토'].forEach((d,i)=>{
grid+=`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--blue)':''}">${d}</div>`});

for(let i=0;i<startDow;i++) grid+=`<div class="cal-day empty">·</div>`;
for(let d=1;d<=lastDay;d++){
const dow=(startDow+d-1)%7;
const isOff=offDays.has(d);
const isWork=workDays.has(d);
const isToday=d===todayD;
const isSun=dow===0;
let cls='cal-day';
if(isOff) cls+=' off';
else if(isWork) cls+=' work';
if(isToday) cls+=' today';
if(isSun&&!isOff) cls+=' sun';
grid+=`<div class="${cls}">${d}</div>`}

document.getElementById('calGrid').innerHTML=grid;
document.getElementById('calSummary').textContent=
`시공 ${workDays.size}일 · 휴무 ${offDays.size}일 · 근무일 ${lastDay-offDays.size}일`;
}

// 길게 누르기 핸들러
let lpTimer=null;
function empDown(emp){lpTimer=setTimeout(()=>{openCal(emp);lpTimer='fired'},300)}
function empUp(e){if(lpTimer==='fired'){e.preventDefault()}clearTimeout(lpTimer);lpTimer=null}

// ===== Init =====
async function init(){
document.getElementById('sub').textContent='구글시트 불러오는 중...';
try{
const r=await fetch(CSV_URL);const text=await r.text();parseCSV(text);
lastCSVHash=text.length+'-'+text.slice(0,200);

// 새 일정 감지
J.forEach(j=>{if(!prevJobIds.has(j.id))j.isNew=true});

// 휴무자 자동 제거 - 같은 날짜의 모든 휴무자를 모아서 그 날짜 전체 배정에서 제거
let changed=false;
const dateOffs={};
J.forEach(j=>{if(j.doff.length){if(!dateOffs[j.date])dateOffs[j.date]=new Set();j.doff.forEach(n=>dateOffs[j.date].add(n))}});
J.forEach(j=>{
const offs=dateOffs[j.date];
if(A[j.id]&&offs&&offs.size){
const before=A[j.id].length;
A[j.id]=A[j.id].filter(e=>!offs.has(e));
if(A[j.id].length===0)delete A[j.id];
if(A[j.id]&&A[j.id].length!==before)changed=true;
if(!A[j.id])changed=true}});
if(changed){fbSave('assignments',A);toast('⚠️ 휴무자 배정 자동 해제됨','ok')}

// 미배정 건이 있으면 자동 배정 실행
const unassignedCnt=J.filter(j=>!A[j.id]).length;
if(unassignedCnt>0){await autoAssign()}

const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
document.getElementById('sub').textContent='✅ '+J.length+'건 · '+E.length+'명 · '+teams.length+'팀 · '+hm+' ↻ 터치';
}catch(e){document.getElementById('sub').textContent='⚠️ 연결 실패 · 터치하여 재시도'}
renderAll()}

init();

// 백그라운드 거리 계산 (init 완료 후 조용히 실행)
setTimeout(async()=>{
let updated=false;
for(const j of J){
if(!j.addr)continue;
// Firebase 키 안전하게 변환
const key=j.addr.replace(/[.#$/\[\]]/g,'_');
if(DIST[key]!==undefined)continue;
const d=await calcDist(j.addr);
if(d>0){DIST[key]=d;updated=true}
}
if(updated)fbSave('distances',DIST);
},3000);

// 버전 표시
document.getElementById('verTag').textContent='v'+VER;

// 알림 권한 요청 (처음 한 번만)
if('Notification' in window&&Notification.permission==='default'){
Notification.requestPermission()}

// 구글시트 갱신 함수 (자동 + 수동 공용)
let lastCSVHash='';
async function refreshSheet(showToast){
try{
const sub=document.getElementById('sub');
if(showToast)sub.textContent='🔄 갱신 중...';
const r=await fetch(CSV_URL+'&_='+Date.now());
const text=await r.text();

// 변경 감지 (내용이 바뀌었을 때만 알림)
const newHash=text.length+'-'+text.slice(0,200);
const changed=lastCSVHash&&lastCSVHash!==newHash;
lastCSVHash=newHash;

parseCSV(text);
const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
sub.textContent='✅ '+J.length+'건 · '+E.length+'명 · '+teams.length+'팀 · '+hm+' ↻ 터치';
renderAll();
if(changed)toast('📋 엑셀 변경 감지! 최신 반영됨','ok');
else if(showToast)toast('✅ 최신 상태예요','ok');
}catch(e){if(showToast)toast('⚠️ 연결 실패','ok')}}

function manualRefresh(){refreshSheet(true)}

// ===== 출발 확인 시스템 =====
let pendingConfirmId='';

async function startConfirm(jobId){
// 1단계: 엑셀에서 최신 데이터 강제 불러오기
document.getElementById('confirmBody').innerHTML='<div style="text-align:center;padding:20px;color:var(--dim)">🔄 최신 데이터 확인 중...</div>';
document.getElementById('confirmOkBtn').style.display='none';
document.getElementById('confirmOverlay').classList.add('show');

try{
const r=await fetch(CSV_URL+'&_='+Date.now());
const text=await r.text();
parseCSV(text);
renderAll();
}catch(e){}

// 2단계: 해당 시공 건 최신 정보 표시
const job=J.find(j=>j.id===jobId);
if(!job){closeConfirm();toast('시공 건을 찾을 수 없어요','ok');return}

const team=A[jobId]||[];
const matsHtml=job.mat.length?job.mat.map(m=>{
const cls=m.t==='마블'?'marble':m.t==='코튼'?'cotton':'modern';
return `<span class="mat mat-${cls}" style="font-size:14px;padding:4px 12px">${m.t} ${m.q}장</span>`}).join(' '):'<span style="color:var(--dim)">자재 정보 없음</span>';

document.getElementById('confirmBody').innerHTML=`
<div class="confirm-item">
<div class="confirm-label">📍 주소</div>
<div class="confirm-value">${job.addr}</div>
</div>
<div class="confirm-item">
<div class="confirm-label">🔨 시공 범위</div>
<div class="confirm-value">${job.scope||'-'}</div>
</div>
<div class="confirm-item">
<div class="confirm-label">🎨 자재 · 색상 · 수량</div>
<div class="confirm-value" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">${matsHtml}</div>
</div>
<div class="confirm-item">
<div class="confirm-label">⏰ 시간</div>
<div class="confirm-value">${job.time}</div>
</div>
<div class="confirm-item">
<div class="confirm-label">👷 배정 팀원</div>
<div class="confirm-value">${team.join(', ')||'미배정'}</div>
</div>
<div style="text-align:center;margin-top:12px;padding:10px;background:rgba(251,191,36,.1);border-radius:10px;border:1px solid rgba(251,191,36,.2)">
<div style="font-size:12px;font-weight:700;color:var(--yellow)">⚠️ 위 자재가 맞는지 꼭 확인하세요!</div>
<div style="font-size:11px;color:var(--dim);margin-top:4px">방금 엑셀에서 최신 데이터를 불러왔어요</div>
</div>`;

document.getElementById('confirmOkBtn').style.display='block';
pendingConfirmId=jobId;
}

function doConfirm(){
if(!pendingConfirmId)return;
const job=J.find(j=>j.id===pendingConfirmId);
const now=new Date();
const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
const team=A[pendingConfirmId]||[];
// 자재 정보 해시 저장 (나중에 변경 감지용)
const matHash=job?job.mat.map(m=>m.t+m.q).join(','):'';
CF[pendingConfirmId]={who:team.join('+'),time:hm,ts:Date.now(),matHash};
fbSave('confirms',CF);
closeConfirm();
toast('✅ 출발 확인 완료!','ok');
renderAll();
}

function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');pendingConfirmId=''}

// 1분마다 구글시트 자동 갱신
setInterval(()=>refreshSheet(false),60*1000);

// 5분마다 새 버전 체크
setInterval(()=>{
fetch(location.href+'?_='+Date.now()).then(r=>r.text()).then(html=>{
const m=html.match(/const VER='([^']+)'/);
if(m&&m[1]!==VER)document.getElementById('updateBar').style.display='block'
}).catch(()=>{})
},5*60*1000);
</script>
