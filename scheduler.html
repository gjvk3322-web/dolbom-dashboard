<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0b12;--card:#151520;--card2:#1c1c2a;--border:rgba(255,255,255,.07);--text:#eaeaf2;--dim:#6e6e88;--blue:#5b8def;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--pink:#f472b6;--purple:#a78bfa;--orange:#fb923c;--font:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding-bottom:80px}
.hd{background:var(--card);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:100}
.hd h1{font-size:18px;font-weight:900}.hd-sub{font-size:11px;color:var(--dim);margin-top:3px}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;max-width:600px;margin:0 auto}
.nav a{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:500;color:var(--dim);text-decoration:none;border-top:2px solid transparent}
.nav a.on{color:var(--blue);border-top-color:var(--blue)}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
.pane{display:none;padding:12px 12px 20px}.pane.on{display:block}

/* Day Card */
.daycard{background:var(--card);border-radius:14px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border)}
.daycard-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--card2)}
.daycard-date{font-size:16px;font-weight:900}.daycard-dow{font-size:13px;font-weight:700;padding:4px 12px;border-radius:8px}
.dow-mon{background:rgba(91,141,239,.15);color:var(--blue)}.dow-tue{background:rgba(52,211,153,.15);color:var(--green)}.dow-wed{background:rgba(251,191,36,.15);color:var(--yellow)}.dow-thu{background:rgba(167,139,250,.15);color:var(--purple)}.dow-fri{background:rgba(244,114,182,.15);color:var(--pink)}.dow-sat{background:rgba(91,141,239,.2);color:var(--blue)}.dow-sun{background:rgba(248,113,113,.15);color:var(--red)}
.daycard-off{padding:6px 16px;font-size:12px;color:var(--red)}
.daycard-body{padding:8px 12px}

/* Team Job Block */
.tjob{background:var(--card2);border-radius:12px;padding:12px 14px;margin:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
.tjob:active{background:rgba(255,255,255,.05)}
.tjob-team{display:inline-block;padding:4px 14px;border-radius:8px;font-size:14px;font-weight:700;margin-bottom:8px}
.tjob-line{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:14px;line-height:1.6}
.tjob-time{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:700;flex-shrink:0}
.tjob-time.am{background:rgba(251,191,36,.15);color:var(--yellow)}.tjob-time.pm{background:rgba(167,139,250,.15);color:var(--purple)}
.tjob-addr{flex:1;font-weight:500}
.tjob-mat{display:flex;gap:4px;flex-wrap:wrap;padding:4px 0 0 0}
.mat{padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}
.mat-marble{background:rgba(91,141,239,.15);color:var(--blue)}.mat-cotton{background:rgba(52,211,153,.15);color:var(--green)}.mat-modern{background:rgba(248,113,113,.15);color:var(--red)}
.tjob-dist{font-size:11px;color:var(--yellow);margin-left:auto}
.new-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(248,113,113,.2);color:var(--red);margin-left:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Unassigned */
.ujob{background:var(--card2);border:1px dashed rgba(251,191,36,.3);border-radius:12px;padding:12px 14px;margin:6px 0}
.ujob-title{font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:6px}

/* Team Setup */
.tcard{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.tcard h3{font-size:15px;font-weight:700;margin-bottom:12px}
.tslot{min-height:50px;background:var(--card2);border-radius:10px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.tmem{padding:8px 16px;border-radius:10px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px}
.tmem .x{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.pool{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.pool-mem{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid transparent}
.pool-mem:active{transform:scale(.95)}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin:8px 0}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#000}.btn-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.2)}

/* Fair */
.fcard{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.frow{display:flex;align-items:center;gap:10px;margin:8px 0}
.fname{min-width:48px;font-size:13px;font-weight:700}
.fbar{flex:1;height:24px;background:var(--card2);border-radius:8px;overflow:hidden}
.ffill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:24px}
.fval{min-width:50px;text-align:right;font-size:12px;font-family:monospace;color:var(--dim)}
.score{text-align:center;padding:20px}.score-n{font-size:52px;font-weight:900}.score-l{font-size:12px;color:var(--dim)}
.sec{font-size:15px;font-weight:700;margin-bottom:10px}

/* Toast + Copy popup */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;white-space:nowrap}
.toast-ok{background:var(--green);color:#000}.toast-copy{background:var(--blue);color:#fff}

/* Colors */
.tc0{background:var(--blue);color:#fff}.tc1{background:var(--green);color:#000}.tc2{background:var(--yellow);color:#000}.tc3{background:var(--pink);color:#fff}.tc4{background:var(--purple);color:#fff}.tc5{background:var(--orange);color:#000}
.tl0{background:rgba(91,141,239,.15);color:var(--blue)}.tl1{background:rgba(52,211,153,.15);color:var(--green)}.tl2{background:rgba(251,191,36,.15);color:var(--yellow)}.tl3{background:rgba(244,114,182,.15);color:var(--pink)}.tl4{background:rgba(167,139,250,.15);color:var(--purple)}.tl5{background:rgba(251,146,60,.15);color:var(--orange)}

.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:14px;font-family:var(--font);outline:none}
</style>
</head>
<body>

<div class="hd">
    <h1>🔧 돌봄매트 시공 스케줄러</h1>
    <div class="hd-sub" id="sub">로딩 중...</div>
</div>

<div class="pane on" id="p-sched"><div id="schedView"></div></div>
<div class="pane" id="p-team"><div id="teamView"></div></div>
<div class="pane" id="p-fair"><div id="fairView"></div></div>

<nav class="nav">
    <a class="on" onclick="sw('sched')" href="#"><span>📋</span>스케줄</a>
    <a onclick="sw('team')" href="#"><span>👥</span>팀설정</a>
    <a onclick="sw('fair')" href="#"><span>⚖️</span>공정성</a>
</nav>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ===== Config =====
const FB_URL='https://dolbom-schedule-default-rtdb.asia-southeast1.firebasedatabase.app';
const CSV_URL='https://docs.google.com/spreadsheets/d/1dhcmDkkDGe3Bw4jY3vfPcJGq5H-EGhB3mL4BXqgJiBQ/gviz/tq?tqx=out:csv';
const MAPS_KEY='AIzaSyAEz2OXudxNoTTn2ueFKWm7KGSnwDW83mw';
const OFF_B={lat:35.1253,lng:128.9736};
const OFF_A={lat:37.3159,lng:126.8233};
const SOUTH=['부산','사상','사하','동래','해운대','연제','남구','북구','서구','중구','동구','금정','강서','기장','김해','양산','울산','창원','경남','경북','대구','마산','진해','밀양','거제','통영','진주','목포','광주','전남','전북','함안','밀양'];
const DOW=['일','월','화','수','목','금','토'];
const DOW_CLS=['dow-sun','dow-mon','dow-tue','dow-wed','dow-thu','dow-fri','dow-sat'];

// ===== Firebase =====
firebase.initializeApp({databaseURL:FB_URL});
const db=firebase.database();

let E=['준형','윤철','세욱','승재','민석'];
let teams=[];
let A={};
let J=[];
let prevJobIds=new Set();
let DC=JSON.parse(localStorage.getItem('s4_dc')||'{}');

// Firebase 실시간 리스너
db.ref('employees').on('value',snap=>{const v=snap.val();if(v)E=v;renderAll()});
db.ref('teams').on('value',snap=>{const v=snap.val();if(v)teams=v;else teams=[];renderAll()});
db.ref('assignments').on('value',snap=>{const v=snap.val();if(v)A=v;else A={};renderAll()});
db.ref('prevJobIds').on('value',snap=>{const v=snap.val();if(v)prevJobIds=new Set(v);});

function fbSave(key,val){db.ref(key).set(val)}

// ===== Distance =====
async function geo(addr){
if(DC[addr])return DC[addr];
try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key='+MAPS_KEY+'&language=ko');
const d=await r.json();if(d.results&&d.results[0]){const l=d.results[0].geometry.location;DC[addr]={lat:l.lat,lng:l.lng};localStorage.setItem('s4_dc',JSON.stringify(DC));return DC[addr]}}catch(e){}
return null}

function hav(a1,n1,a2,n2){const R=6371,x=(a2-a1)*Math.PI/180,y=(n2-n1)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}

function getOffice(addr){return SOUTH.some(r=>addr.includes(r))?OFF_B:OFF_A}

async function calcDist(addr){const o=getOffice(addr);const c=await geo(addr);if(!c)return 0;return Math.round(hav(o.lat,o.lng,c.lat,c.lng))}

// ===== CSV Parse =====
function parseCSV(text){
const lines=text.split('\n');J=[];
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[0]||!r[1])continue;
const doff=[];for(let j=8;j<=13;j++){if(r[j]&&r[j].trim())doff.push(r[j].trim())}
const mat=[];if(r[5]&&parseInt(r[5])>0)mat.push({t:'마블',q:parseInt(r[5])});if(r[6]&&parseInt(r[6])>0)mat.push({t:'코튼',q:parseInt(r[6])});if(r[7]&&parseInt(r[7])>0)mat.push({t:'모던',q:parseInt(r[7])});
let ds=r[1];if(ds.length===8)ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
const id=ds+'_'+r[0]+'_'+i;
J.push({id,time:r[0],addr:r[2]||'',date:ds,py:r[3]||'',scope:r[4]||'',doff,mat,dist:0,isNew:false})}}

// ===== Auto Assign =====
async function autoAssign(){
toast('⏳ 자동 배정 중...','ok');

// 거리 계산
for(const j of J){if(j.addr&&!j.dist){j.dist=await calcDist(j.addr)}}

const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const empDist={};E.forEach(e=>empDist[e]=0);

// 기존 배정 거리 반영
J.forEach(j=>{if(A[j.id]){A[j.id].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0})}});

for(const date of Object.keys(bd).sort()){
const dj=bd[date];
const ao=new Set();dj.forEach(j=>j.doff.forEach(n=>ao.add(n)));
const avail=E.filter(e=>!ao.has(e));
if(!avail.length)continue;

const am=dj.filter(j=>j.time==='오전'||j.time.includes('2:')).sort((a,b)=>(b.dist||0)-(a.dist||0));
const pm=dj.filter(j=>j.time==='오후').sort((a,b)=>(b.dist||0)-(a.dist||0));

function makeGroups(pool,jobCnt){
if(teams.length){
// 팀 기반으로 먼저 그룹화
const avTeams=teams.map((t,i)=>({idx:i,members:t.filter(m=>pool.includes(m))})).filter(t=>t.members.length>0);
const grouped=avTeams.map(t=>t.members);
// 어떤 팀에도 속하지 않는 출근자
const inTeam=new Set();grouped.forEach(g=>g.forEach(m=>inTeam.add(m)));
const orphans=pool.filter(m=>!inTeam.has(m));

// 혼자인 그룹끼리 합치기 (1인 팀원의 팀 동료가 쉬는 경우)
const solos=grouped.filter(g=>g.length===1);
const pairs=grouped.filter(g=>g.length>=2);
const result=[...pairs];

// 1인 그룹 + 미배정 직원 합쳐서 2인 1조로
const singles=[...solos.map(g=>g[0]),...orphans];
for(let i=0;i<singles.length;i+=2){
if(i+1<singles.length)result.push([singles[i],singles[i+1]]);
else result.push([singles[i]])}

// 시공 건수가 그룹보다 많으면 쪼개기
if(jobCnt>result.length){
const expanded=[];
result.forEach(g=>{
if(jobCnt>expanded.length+result.length-expanded.length&&g.length>=2){
g.forEach(m=>expanded.push([m]))}
else expanded.push(g)});
return expanded}
return result}

// 팀 없으면 자동 2인 1조
const sorted=[...pool].sort((a,b)=>(empDist[a]||0)-(empDist[b]||0));
const groups=[];
if(jobCnt>=sorted.length){sorted.forEach(e=>groups.push([e]))}
else{for(let i=0;i<sorted.length;i+=2){if(i+1<sorted.length)groups.push([sorted[i],sorted[i+1]]);else groups.push([sorted[i]])}}
return groups}

function assignSlot(slot){
const groups=makeGroups(avail,slot.length);
groups.sort((a,b)=>{const da=a.reduce((s,e)=>s+(empDist[e]||0),0)/a.length;const db=b.reduce((s,e)=>s+(empDist[e]||0),0)/b.length;return da-db});
// 미배정 건에 그룹 배정 (같은 그룹이 여러 건 가능)
let gi=0;
slot.forEach(j=>{if(!A[j.id]&&groups.length){
A[j.id]=[...groups[gi%groups.length]];
groups[gi%groups.length].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0});
gi++}})}

assignSlot(am);assignSlot(pm)}

fbSave('assignments',A);
fbSave('prevJobIds',J.map(j=>j.id));
toast('✅ 자동 배정 완료!','ok');renderAll()}

function resetAssign(){if(!confirm('모든 배정을 초기화할까요?'))return;A={};fbSave('assignments',{});toast('초기화됨','ok');renderAll()}

// 수동 배정 (직원 1명)
function ma(jobId,emp){
const cur=A[jobId];
if(cur&&cur.includes(emp)){
// 이미 이 사람이 배정되어있으면 제거
A[jobId]=cur.filter(e=>e!==emp);
if(A[jobId].length===0)delete A[jobId];
}else if(cur){
// 다른 사람이 배정되어있으면 추가
A[jobId]=[...cur,emp];
}else{
// 미배정이면 새로 배정
A[jobId]=[emp];
}
fbSave('assignments',A);toast('✅ 배정 업데이트','ok');renderAll()}

// 배정 취소
function unassign(jobId){delete A[jobId];fbSave('assignments',A);toast('배정 취소됨','ok');renderAll()}

// ===== Copy Address =====
function copyAddr(addr){
navigator.clipboard.writeText(addr).then(()=>{toast('📋 주소 복사됨! 네비에 붙여넣기','copy')}).catch(()=>{
const ta=document.createElement('textarea');ta.value=addr;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
toast('📋 주소 복사됨!','copy')})}

// ===== Render Schedule =====
function renderSched(){
const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const jobDates=Object.keys(bd).sort();
const today=new Date();const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

// 첫날~마지막날 사이 모든 날짜 생성
function getAllDates(start,end){
const dates=[];const cur=new Date(start);const last=new Date(end);
while(cur<=last){dates.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));cur.setDate(cur.getDate()+1)}
return dates}

const firstDate=jobDates.length?jobDates[0]:todayStr;
const lastDate=jobDates.length?jobDates[jobDates.length-1]:todayStr;
// 오늘~마지막날 (과거 포함하려면 firstDate부터)
const allDatesRange=getAllDates(firstDate,lastDate);
const futureDates=allDatesRange.filter(d=>d>=todayStr);
const pastDates=allDatesRange.filter(d=>d<todayStr);

// Stats
const total=J.length,assigned=J.filter(j=>A[j.id]).length,newCnt=J.filter(j=>j.isNew).length;
let html=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
<div style="background:var(--card);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-size:22px;font-weight:900;color:var(--blue)">${total}</div><div style="font-size:10px;color:var(--dim)">전체</div></div>
<div style="background:var(--card);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-size:22px;font-weight:900;color:var(--green)">${assigned}</div><div style="font-size:10px;color:var(--dim)">배정</div></div>
<div style="background:var(--card);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)"><div style="font-size:22px;font-weight:900;color:${newCnt?'var(--red)':'var(--dim)'}">${newCnt}</div><div style="font-size:10px;color:var(--dim)">신규</div></div></div>`;

html+=`<div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn btn-blue" onclick="autoAssign()" style="flex:2;margin:0">🤖 자동 배정</button><button class="btn btn-red" onclick="resetAssign()" style="flex:1;margin:0">🔄 초기화</button></div>`;

// 직원 색상 범례
const ecl=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center">${E.map((e,i)=>`<span style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;background:${ecl[i%6]};color:${i===2||i===5?'#000':'#fff'}">${e}</span>`).join('')}</div>`;

if(!jobDates.length){html+='<div style="text-align:center;padding:40px;color:var(--dim)">구글시트에 데이터를 입력하세요</div>';document.getElementById('schedView').innerHTML=html;return}

function renderDayCards(dates,dimmed){
return dates.map(date=>{
const jobs=bd[date]||[];const d=new Date(date);const di=d.getDay();const dn=DOW[di];
const isToday=date===todayStr;
const isSun=di===0;const isSat=di===6;
const dateBorderColor=isSun?'var(--red)':isSat?'var(--blue)':isToday?'var(--blue)':'var(--border)';
const dateBorderWidth=isSun||isSat||isToday?'2px':'1px';
const dateColor=isSun?'var(--red)':isSat?'var(--blue)':'var(--text)';

if(!jobs.length){
return `<div class="daycard" style="opacity:${dimmed?.5:.7};border:${dateBorderWidth} solid ${dateBorderColor}">
<div class="daycard-hd"><span class="daycard-date" style="color:${dateColor}">${date.slice(2).replace(/-/g,'')}${isToday?' (오늘)':''}</span><span class="daycard-dow ${DOW_CLS[di]}">${dn}</span></div>
<div class="daycard-body"><div style="color:var(--dim);font-size:13px;padding:8px">${isSun?'🔴 일요일':'시공 없음'}</div></div></div>`}

const offs=new Set();jobs.forEach(j=>j.doff.forEach(n=>offs.add(n)));
const offHtml=offs.size?'<div class="daycard-off">'+[...offs].map(n=>n+' 휴무').join(' · ')+'</div>':'';

// 팀별 그룹
const tm={};const un=[];
jobs.forEach(j=>{const t=A[j.id];if(t){const k=t.join('+');if(!tm[k])tm[k]={team:t,jobs:[]};tm[k].jobs.push(j)}else un.push(j)});

let body=Object.values(tm).map(tg=>{
const ti=teams.findIndex(t=>t.some(m=>tg.team.includes(m)));
const tc=ti>=0?ti%6:0;
const hasNew=tg.jobs.some(j=>j.isNew);
const dayOffSet=new Set();jobs.forEach(jj=>jj.doff.forEach(n=>dayOffSet.add(n)));
const jobLines=tg.jobs.map(j=>{
const isAm=j.time==='오전'||j.time.includes('2:');
const mats=j.mat.map(m=>`<span class="mat mat-${m.t==='마블'?'marble':m.t==='코튼'?'cotton':'modern'}">${m.t}${m.q}</span>`).join('');
const distH=j.dist?`<span class="tjob-dist">${j.dist}km</span>`:'';
const safeAddr=j.addr.replace(/'/g,"\\'");
const curTeam=A[j.id]||[];
const empColors=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
const editBtns=E.map((e,ei)=>{
const isOff=dayOffSet.has(e);
const isIn=curTeam.includes(e);
const ec=empColors[ei%6];
return `<button onclick="event.stopPropagation();ma('${j.id}','${e}')" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;border:2px solid ${isIn?ec:'var(--border)'};background:${isIn?ec+'22':'var(--card2)'};color:${isOff?'var(--red)':isIn?ec:'var(--text)'};cursor:pointer;font-family:var(--font);margin:2px;${isOff&&!isIn?'opacity:.3;text-decoration:line-through;pointer-events:none':''}">${e}${isIn?' ✓':''}</button>`}).join('');
return `<div class="tjob-line" onclick="event.stopPropagation();copyAddr('${safeAddr}')">
<span class="tjob-time ${isAm?'am':'pm'}">${j.time}</span>
<span class="tjob-addr">${j.addr}/${j.scope}</span>
<span style="font-size:11px;color:var(--blue);flex-shrink:0">📋복사</span>
</div><div class="tjob-mat">${mats}${distH}${j.isNew?'<span class="new-badge">🆕 NEW</span>':''}
<span onclick="event.stopPropagation();unassign('${j.id}')" style="font-size:10px;color:var(--red);cursor:pointer;margin-left:auto;padding:2px 8px;border:1px solid rgba(248,113,113,.2);border-radius:6px">취소</span></div>
<div id="edit_${j.id}" style="display:none;margin-top:6px;flex-wrap:wrap;gap:2px">${editBtns}</div>
<div style="text-align:right;margin-top:4px"><span onclick="event.stopPropagation();const el=document.getElementById('edit_${j.id}');el.style.display=el.style.display==='flex'?'none':'flex'" style="font-size:11px;color:var(--dim);cursor:pointer;padding:2px 8px">✏️ 편집</span></div>`}).join('');

return `<div class="tjob">
<div>${tg.team.map(m=>`<span class="tjob-team tc${E.indexOf(m)%6}" style="margin-right:4px">${m}</span>`).join('')}${hasNew?'<span class="new-badge">🆕</span>':''}</div>
${jobLines}</div>`}).join('');

if(un.length){
body+=un.map(j=>{
const isAm=j.time==='오전'||j.time.includes('2:');
const safeAddr=j.addr.replace(/'/g,"\\'");
const mats=j.mat.map(m=>`<span class="mat mat-${m.t==='마블'?'marble':m.t==='코튼'?'cotton':'modern'}">${m.t}${m.q}</span>`).join('');
// 이날 쉬는 사람
const dayOffSet=new Set();jobs.forEach(jj=>jj.doff.forEach(n=>dayOffSet.add(n)));
const empBtns=E.map((e,ei)=>{
const isOff=dayOffSet.has(e);
const ecols=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
const ec=ecols[ei%6];
return `<button style="padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;border:2px solid ${ec};background:${ec}22;color:${isOff?'var(--red)':ec};cursor:pointer;font-family:var(--font);margin:3px;${isOff?'opacity:.3;text-decoration:line-through;pointer-events:none':''}" onclick="ma('${j.id}','${e}')">${e}</button>`}).join('');
return `<div class="ujob">
<div class="ujob-title">⚠️ 미배정${j.isNew?' 🆕 NEW':''}</div>
<div class="tjob-line" onclick="event.stopPropagation();copyAddr('${safeAddr}')"><span class="tjob-time ${isAm?'am':'pm'}">${j.time}</span><span class="tjob-addr">${j.addr}/${j.scope}</span><span style="font-size:11px;color:var(--blue);flex-shrink:0">📋복사</span></div>
<div class="tjob-mat">${mats}</div>
<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:2px">${empBtns}</div>
</div>`}).join('')}

return `<div class="daycard" style="${dimmed?'opacity:.5':''}border:${dateBorderWidth} solid ${dateBorderColor}">
<div class="daycard-hd"><span class="daycard-date" style="color:${dateColor}">${date.slice(2).replace(/-/g,'')}${isToday?' (오늘)':''}</span><span class="daycard-dow ${DOW_CLS[di]}">${dn}</span></div>
${offHtml}<div class="daycard-body">${body||'<div style="color:var(--dim);font-size:13px;padding:8px">시공 없음</div>'}</div></div>`}).join('')}

html+=renderDayCards(futureDates,false);
if(pastDates.length){
html+=`<div style="margin:16px 0;text-align:center"><button onclick="document.getElementById('pastDays').style.display=document.getElementById('pastDays').style.display==='none'?'block':'none'" style="padding:10px 20px;background:var(--card);border:1px solid var(--border);color:var(--dim);border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font)">📅 지난 일정 (${pastDates.length}일)</button></div>`;
html+=`<div id="pastDays" style="display:none">${renderDayCards(pastDates,true)}</div>`};

document.getElementById('schedView').innerHTML=html}

// ===== Render Team =====
function renderTeam(){
const colors=['tc0','tc1','tc2','tc3','tc4','tc5'];
let html='<div class="sec">👥 이번 달 팀 구성</div>';
html+='<p style="font-size:12px;color:var(--dim);margin-bottom:14px">팀을 구성하면 한 달간 같은 팀으로 운영됩니다</p>';

if(teams.length){
html+=teams.map((t,i)=>{
const members=t.map(m=>`<span class="tmem ${colors[i%6]}">${m}<span class="x" onclick="rmMem(${i},'${m}')">×</span></span>`).join('');
return `<div class="tcard"><h3 style="display:flex;justify-content:space-between">${i+1}팀<span style="font-size:12px;font-weight:400;color:var(--red);cursor:pointer" onclick="delTeam(${i})">삭제</span></h3><div class="tslot">${members||'<span style="color:var(--dim);font-size:13px">비어있음</span>'}</div></div>`}).join('')}

const assigned=new Set();teams.forEach(t=>t.forEach(m=>assigned.add(m)));
const unassigned=E.filter(e=>!assigned.has(e));
if(unassigned.length){
html+=`<div class="tcard"><h3>미배정 직원</h3><div class="pool">${unassigned.map(e=>`<div class="pool-mem tl${teams.length%6}" onclick="addMem('${e}')">${e}</div>`).join('')}</div></div>`}

html+=`<button class="btn btn-blue" onclick="addTeam()">+ 새 팀 추가</button>`;

// 직원 관리
html+=`<div style="margin-top:24px"><div class="sec">👷 직원 관리</div>
<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${E.map(e=>`<span style="padding:8px 14px;background:var(--card2);border-radius:8px;font-size:13px;display:inline-flex;align-items:center;gap:6px">${e}<span style="color:var(--red);cursor:pointer" onclick="delEmp('${e}')">×</span></span>`).join('')}</div>
<div class="add-row"><input id="ne" placeholder="새 직원 이름"><button class="btn btn-blue" style="width:auto;padding:12px 24px;margin:0" onclick="addEmp()">추가</button></div></div>`;

document.getElementById('teamView').innerHTML=html}

function addTeam(){teams.push([]);fbSave('teams',teams);renderTeam()}
function delTeam(i){if(!confirm((i+1)+'팀 삭제?'))return;teams.splice(i,1);fbSave('teams',teams);renderTeam()}
function addMem(name){if(!teams.length)teams.push([]);let mi=0,ml=teams[0].length;teams.forEach((t,i)=>{if(t.length<ml){ml=t.length;mi=i}});teams[mi].push(name);fbSave('teams',teams);renderTeam()}
function rmMem(ti,name){teams[ti]=teams[ti].filter(m=>m!==name);fbSave('teams',teams);renderTeam()}
function addEmp(){const n=document.getElementById('ne');const v=n.value.trim();if(!v||E.includes(v))return;E.push(v);n.value='';fbSave('employees',E);renderTeam();toast(v+' 추가!','ok')}
function delEmp(name){if(!confirm(name+' 삭제?'))return;E=E.filter(e=>e!==name);teams=teams.map(t=>t.filter(m=>m!==name));fbSave('employees',E);fbSave('teams',teams);renderTeam()}

// ===== Render Fair =====
function renderFair(){
const es={};E.forEach(e=>es[e]={d:0,c:0});
J.forEach(j=>{const t=A[j.id];if(t)t.forEach(e=>{if(es[e]){es[e].d+=j.dist||0;es[e].c++}})});
const md=Math.max(...Object.values(es).map(s=>s.d),1);
const mc=Math.max(...Object.values(es).map(s=>s.c),1);
const cl=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)'];
const dists=E.map(e=>es[e].d);const avg=dists.reduce((a,b)=>a+b,0)/dists.length||0;
const mxd=Math.max(...dists.map(d=>Math.abs(d-avg)),0);
const sc=avg>0?Math.max(0,Math.round(100-mxd/avg*100)):100;
const hasDist=dists.some(d=>d>0);

const pc={};
J.forEach(j=>{const t=A[j.id];if(t&&t.length>=2){const k=[...t].sort().join('+');pc[k]=(pc[k]||0)+1}});

document.getElementById('fairView').innerHTML=
`<div class="fcard"><div class="score"><div class="score-l">공정성 점수</div><div class="score-n" style="color:${sc>=80?'var(--green)':sc>=60?'var(--yellow)':'var(--red)'}">${sc}<span style="font-size:20px">점</span></div><div class="score-l">거리 편차 ${Math.round(mxd)}km</div></div></div>`+
(hasDist?`<div class="fcard"><div class="sec">📏 총 이동거리</div>${E.map((e,i)=>{const s=es[e];const w=Math.round(s.d/md*100);return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${Math.max(w,5)}%;background:${cl[i%6]}">${s.d}</div></div><span class="fval">${s.d}km</span></div>`}).join('')}</div>`:`<div class="fcard"><div style="color:var(--dim);font-size:13px">자동 배정 후 거리가 표시됩니다</div></div>`)+
`<div class="fcard"><div class="sec">📊 시공 건수</div>${E.map((e,i)=>{const s=es[e];const w=Math.round(s.c/mc*100);return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${Math.max(w,5)}%;background:${cl[i%6]}">${s.c}</div></div><span class="fval">${s.c}건</span></div>`}).join('')}</div>`+
`<div class="fcard"><div class="sec">🤝 팀 조합 횟수</div>${Object.keys(pc).length?Object.entries(pc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px"><span>${k.replace(/\+/g,' + ')}</span><span style="font-weight:700">${v}회</span></div>`).join(''):'<div style="color:var(--dim);font-size:13px">배정 후 표시됩니다</div>'}</div>`}

// ===== Nav =====
function sw(n){
document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('on'));
document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
document.getElementById('p-'+n).classList.add('on');
const tabs=['sched','team','fair'];
document.querySelectorAll('.nav a')[tabs.indexOf(n)].classList.add('on');
renderAll()}

function renderAll(){renderSched();renderTeam();renderFair()}

function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+(type||'ok');t.style.display='block';setTimeout(()=>t.style.display='none',2500)}

// ===== Init =====
async function init(){
document.getElementById('sub').textContent='구글시트 불러오는 중...';
try{
const r=await fetch(CSV_URL);const text=await r.text();parseCSV(text);

// 새 일정 감지
J.forEach(j=>{if(!prevJobIds.has(j.id))j.isNew=true});

// 휴무자 자동 제거 - 엑셀에서 휴무 추가하면 배정에서 빠짐
let changed=false;
J.forEach(j=>{
if(A[j.id]&&j.doff.length){
const before=A[j.id].length;
A[j.id]=A[j.id].filter(e=>!j.doff.includes(e));
if(A[j.id].length===0)delete A[j.id];
if(A[j.id]&&A[j.id].length!==before)changed=true;
if(!A[j.id])changed=true}});
if(changed){fbSave('assignments',A);toast('⚠️ 휴무자 배정 자동 해제됨','ok')}

document.getElementById('sub').textContent='✅ '+J.length+'건 · '+E.length+'명 · '+teams.length+'팀';
}catch(e){document.getElementById('sub').textContent='⚠️ 연결 실패'}
renderAll()}

init();
</script>
</body>
</html>
