// 사수/부사수 결정 (팀 순서 기반)
function getSasuBusasu(jobId){
  const crew=A[jobId];
  if(!crew||!crew.length)return{sasu:'',busasu:''};
  if(crew.length===1)return{sasu:crew[0],busasu:''};
  if(teams.length){
    for(const t of teams){
      const ordered=t.filter(m=>crew.includes(m));
      if(ordered.length>=2)return{sasu:ordered[0],busasu:ordered.slice(1).join(',')};
      if(ordered.length===1){
        const rest=crew.filter(m=>m!==ordered[0]);
        return{sasu:ordered[0],busasu:rest.join(',')};
      }
    }
  }
  return{sasu:crew[0],busasu:crew.slice(1).join(',')};
}

async function geo(addr){
if(DC[addr])return DC[addr];
try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?address='+encodeURIComponent(addr)+'&key=AIzaSyAEz2OXudxNoTTn2ueFKWm7KGSnwDW83mw&language=ko');
const d=await r.json();if(d.results&&d.results[0]){const l=d.results[0].geometry.location;DC[addr]={lat:l.lat,lng:l.lng};localStorage.setItem('s4_dc',JSON.stringify(DC));return DC[addr]}}catch(e){}
return null}

function hav(a1,n1,a2,n2){const R=6371,x=(a2-a1)*Math.PI/180,y=(n2-n1)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}

function getOffice(addr){return SOUTH.some(r=>addr.includes(r))?OFF_B:OFF_A}

async function calcDist(addr){const o=getOffice(addr);const c=await geo(addr);if(!c)return 0;return Math.round(hav(o.lat,o.lng,c.lat,c.lng))}

// ===== Auto Assign =====
async function autoAssign(){
  if(isAssigning){assignQueue=true;return;}
  isAssigning=true;assignQueue=false;
  toast('⏳ 자동 배정 중...','ok');
  try{
    for(const j of J){if(j.addr&&!j.offOnly&&!j.dist)j.dist=await calcDist(j.addr);}
    const bd={};
    J.filter(j=>!j.offOnly).forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j);});
    const empDist={};E.forEach(e=>empDist[e]=0);
    J.forEach(j=>{if(A[j.id])A[j.id].forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0;});});
    const cutoff=new Date();cutoff.setHours(0,0,0,0);cutoff.setDate(cutoff.getDate()+3);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    const curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
    const empTwoTang={};E.forEach(e=>empTwoTang[e]=0);
    const empDateJobs={};
    J.filter(j=>!j.offOnly).forEach(j=>{
      const jd=new Date(j.date);
      if(jd.getFullYear()===curYear&&jd.getMonth()===curMonth&&A[j.id]){
        A[j.id].forEach(e=>{
          if(!empDateJobs[e])empDateJobs[e]={};
          if(!empDateJobs[e][j.date])empDateJobs[e][j.date]=0;
          empDateJobs[e][j.date]++;
        });
      }
    });
    E.forEach(e=>{if(empDateJobs[e])Object.values(empDateJobs[e]).forEach(cnt=>{if(cnt>=2)empTwoTang[e]++;});});
    function makeGroups(pool){
      if(!pool||!pool.length)return[];
      if(teams.length){
        const grouped=[];const inTeamSet=new Set();
        teams.forEach(t=>{
          const av=t.filter(m=>pool.includes(m));
          if(av.length>0){grouped.push(av);av.forEach(m=>inTeamSet.add(m));}
        });
        const orphans=pool.filter(m=>!inTeamSet.has(m));
        const fullTeams=grouped.filter(g=>g.length>=2);
        const solos=grouped.filter(g=>g.length===1).map(g=>g[0]);
        const allSingles=[...solos,...orphans];
        const paired=[];
        for(let i=0;i<allSingles.length;i+=2){
          if(i+1<allSingles.length)paired.push([allSingles[i],allSingles[i+1]]);
          else paired.push([allSingles[i]]);
        }
        return[...fullTeams,...paired];
      }
      const sorted=[...pool].sort((a,b)=>(empDist[a]||0)-(empDist[b]||0));
      const groups=[];
      for(let i=0;i<sorted.length;i+=2){
        if(i+1<sorted.length)groups.push([sorted[i],sorted[i+1]]);
        else groups.push([sorted[i]]);
      }
      return groups;
    }
    function findTeamPartner(emp,usedSet,availPool){
      if(!teams.length)return null;
      const myTeam=teams.find(t=>t.includes(emp));
      if(!myTeam)return null;
      return myTeam.find(m=>m!==emp&&availPool.includes(m)&&!usedSet.has(m))||null;
    }
    for(const date of Object.keys(bd).sort()){
      if(date<cutoffStr)continue;
      const dj=bd[date];
      const ao=new Set();
      if(OFFS[date])OFFS[date].forEach(n=>ao.add(n));
      dj.forEach(jj=>jj.doff.forEach(n=>ao.add(n)));
      const avail=E.filter(e=>!ao.has(e));
      if(!avail.length)continue;
      const amReal=dj.filter(j=>(j.time==='오전'||j.time.includes('2:'))&&j.addr&&j.addr.trim()).sort((a,b)=>(b.dist||0)-(a.dist||0));
      const pmReal=dj.filter(j=>(j.time==='오후'||j.time==='as')&&j.addr&&j.addr.trim()).sort((a,b)=>(b.dist||0)-(a.dist||0));
      if(!amReal.length&&!pmReal.length)continue;
      // 오전 배정
      const amUsed=new Set();
      amReal.filter(j=>A[j.id]&&A[j.id].length>=2).forEach(j=>A[j.id].forEach(e=>amUsed.add(e)));
      amReal.filter(j=>A[j.id]&&A[j.id].length===1).forEach(j=>{
        const sasu=A[j.id][0];amUsed.add(sasu);
        const partner=findTeamPartner(sasu,amUsed,avail);
        if(partner){A[j.id]=[sasu,partner];amUsed.add(partner);}
        else{const free=avail.filter(e=>!amUsed.has(e)&&e!==sasu);if(free.length){A[j.id]=[sasu,free[0]];amUsed.add(free[0]);}}
      });
      const amEmpty=amReal.filter(j=>!A[j.id]);
      if(amEmpty.length){
        const amFree=avail.filter(e=>!amUsed.has(e));
        const amGroups=makeGroups(amFree);
        let gi=0;
        amEmpty.forEach(j=>{
          if(!amGroups.length)return;
          const g=amGroups[gi%amGroups.length];
          A[j.id]=[...g];
          g.forEach(e=>{amUsed.add(e);if(empDist[e]!==undefined)empDist[e]+=j.dist||0;});
          gi++;
        });
      }
      const amAssigned=new Set(amUsed);
      // 오후 배정
      const pmUsed=new Set();
      pmReal.filter(j=>A[j.id]&&A[j.id].length>=2).forEach(j=>A[j.id].forEach(e=>pmUsed.add(e)));
      pmReal.filter(j=>A[j.id]&&A[j.id].length===1).forEach(j=>{
        const sasu=A[j.id][0];pmUsed.add(sasu);
        const freshUsed=new Set([...pmUsed,...amAssigned]);
        const freshPartner=findTeamPartner(sasu,freshUsed,avail);
        if(freshPartner){A[j.id]=[sasu,freshPartner];pmUsed.add(freshPartner);}
        else{
          const partner=findTeamPartner(sasu,pmUsed,avail);
          if(partner){A[j.id]=[sasu,partner];pmUsed.add(partner);}
          else{const free=avail.filter(e=>!pmUsed.has(e)&&e!==sasu);if(free.length){A[j.id]=[sasu,free[0]];pmUsed.add(free[0]);}}
        }
      });
      const pmEmpty=pmReal.filter(j=>!A[j.id]);
      if(pmEmpty.length){
        const pmFresh=avail.filter(e=>!amAssigned.has(e)&&!pmUsed.has(e));
        const pmTwoTang=avail.filter(e=>amAssigned.has(e)&&!pmUsed.has(e)).sort((a,b)=>(empTwoTang[a]||0)-(empTwoTang[b]||0));
        const pmPool=pmFresh.length>=2?pmFresh:pmFresh.length>0?[...pmFresh,...pmTwoTang]:pmTwoTang.length?pmTwoTang:avail.filter(e=>!pmUsed.has(e));
        const pmGroups=makeGroups(pmPool);
        let gi=0;
        pmEmpty.forEach(j=>{
          if(!pmGroups.length)return;
          const g=pmGroups[gi%pmGroups.length];
          A[j.id]=[...g];
          g.forEach(e=>{if(empDist[e]!==undefined)empDist[e]+=j.dist||0;});
          gi++;
        });
      }
    }
    lastAHash=aHash(A);
    fbSave('assignments',A);
    fbSave('prevJobIds',J.map(j=>j.id));
    syncToSheet();
    toast('✅ 자동 배정 완료!','ok');
    renderAll();
  }catch(err){
    console.error('[autoAssign] error:',err);
    toast('⚠️ 배정 오류','ok');
  }finally{
    isAssigning=false;
    if(assignQueue){assignQueue=false;setTimeout(()=>autoAssign(),200);}
  }
}

function ma(jobId,emp){
  const cur=A[jobId]||[];
  if(cur.includes(emp)){
    const next=cur.filter(e=>e!==emp);
    if(next.length)A[jobId]=next;else delete A[jobId];
  }else{
    A[jobId]=[...cur,emp];
  }
  lastAHash=aHash(A);fbSave('assignments',A);syncToSheet();
  toast('✅ 배정 업데이트','ok');renderAll();
}

}
