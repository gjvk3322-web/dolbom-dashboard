<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="/auth.js"></script>
    <!-- 검색엔진 노출 차단 (자동 추가) -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="naverbot" content="noindex, nofollow">
    <meta name="yeti" content="noindex, nofollow">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>돌봄매트 시공 스케줄러</title>
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="돌봄매트">
<meta name="theme-color" content="#1a1a2e">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#191a20;--card:#21222c;--card2:#282a36;--border:rgba(255,255,255,.05);--text:#f2f2f7;--dim:#8e8e93;--sub:#aeaeb2;--blue:#5AC8FA;--green:#30D158;--red:#FF453A;--yellow:#FFD60A;--pink:#FF6482;--purple:#BF5AF2;--orange:#FF9F0A;--cyan:#64D2FF;--lime:#a3e635;--rose:#FF6482;--teal:#40E0D0;--font:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding-bottom:80px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
html{overflow-x:hidden;-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%}
.hd{padding:20px 16px 12px;padding-top:max(32px, env(safe-area-inset-top));position:sticky;top:0;z-index:100;background:var(--bg)}
.hd h1{font-size:18px;font-weight:900;letter-spacing:-.3px}.hd-sub{font-size:11px;color:var(--dim);margin-top:4px}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);z-index:100;max-width:600px;margin:0 auto;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav a{flex:1;padding:8px 4px 12px;text-align:center;font-size:10px;font-weight:600;color:var(--dim);text-decoration:none;border-top:2px solid transparent;transition:color .15s}
.nav a.on{color:var(--text);border-top-color:var(--text)}
.nav a span{display:block;font-size:18px;margin-bottom:2px}
.pane{display:none;padding:8px 16px 20px}.pane.on{display:block}

/* Emp Badge */
.emp-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.emp-badge:active{transform:scale(.92)}

/* Day Card - 토스 스타일 */
.daycard{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;border:none}
.daycard-hd{display:flex;align-items:center;padding:16px 18px 12px;gap:8px;flex-wrap:wrap}
.daycard-date{font-size:18px;font-weight:900;letter-spacing:-.5px}.daycard-dow{font-size:12px;font-weight:700}
.dow-mon{color:#fff}.dow-tue{color:#fff}.dow-wed{color:#fff}.dow-thu{color:#fff}.dow-fri{color:#fff}.dow-sat{color:var(--blue)}.dow-sun{color:var(--red)}
.daycard-off{padding:6px 18px;font-size:11px;color:#fff;font-weight:500;opacity:.7}
.daycard-body{padding:4px 14px 14px}

/* Team Job Block - 토스 카드 */
.tjob{background:var(--card2);border-radius:14px;padding:14px 16px;margin:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tjob:active{background:rgba(255,255,255,.04);transform:scale(.99)}
.tjob-team{display:inline-block;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:6px}
.tjob-time{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;flex-shrink:0}
.tjob-time.am{background:rgba(255,214,10,.1);color:var(--yellow)}.tjob-time.pm{background:rgba(191,90,242,.1);color:var(--purple)}.tjob-time.measure{background:rgba(52,211,153,.15);color:var(--green)}
.mat{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.mat-marble{background:rgba(90,200,250,.12);color:var(--blue)}.mat-cotton{background:rgba(48,209,88,.12);color:var(--green)}.mat-modern{background:rgba(255,69,58,.12);color:var(--red)}.mat-beige{background:rgba(255,214,10,.12);color:var(--yellow)}
.new-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(255,69,58,.15);color:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Unassigned */
.ujob{background:var(--card2);border:1px dashed rgba(255,214,10,.2);border-radius:14px;padding:14px 16px;margin:6px 0}
.ujob-title{font-size:11px;color:var(--yellow);font-weight:700;margin-bottom:8px}

/* Team Setup */
.tcard{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;border:none}
.tcard h3{font-size:15px;font-weight:800;margin-bottom:14px}
.tslot{min-height:50px;background:var(--card2);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.tmem{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.tmem .x{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.pool{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.pool-mem{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.pool-mem:active{transform:scale(.95)}

/* Drag & Drop */
.drag-ghost{position:fixed;z-index:500;pointer-events:none;opacity:.9;transform:scale(1.08);filter:brightness(1.2)}
.drag-over{outline:2px dashed var(--blue);outline-offset:-2px;background:rgba(90,200,250,.08)!important}
.drag-src{opacity:.3;transform:scale(.9)}
.tslot.drag-over,.pool.drag-over{outline:2px dashed var(--blue);outline-offset:-2px;background:rgba(90,200,250,.08)!important}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin:8px 0;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#000}.btn-green{background:var(--green);color:#000}.btn-red{background:rgba(255,69,58,.12);color:var(--red)}

/* Fair */
.fcard{background:var(--card);border-radius:16px;padding:18px;margin-bottom:12px;border:none}
.frow{display:flex;align-items:center;gap:10px;margin:8px 0}
.fname{min-width:44px;font-size:12px;font-weight:700}
.fbar{flex:1;height:22px;background:var(--card2);border-radius:8px;overflow:hidden}
.ffill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:20px}
.fval{min-width:50px;text-align:right;font-size:11px;font-family:monospace;color:var(--dim)}
.sec{font-size:14px;font-weight:800;margin-bottom:10px;letter-spacing:-.2px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:14px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.toast-ok{background:rgba(48,209,88,.9);color:#000}.toast-copy{background:rgba(90,200,250,.9);color:#000}

/* Colors */
.tc0{background:var(--blue);color:#000}.tc1{background:var(--green);color:#000}.tc2{background:var(--yellow);color:#000}.tc3{background:var(--pink);color:#fff}.tc4{background:var(--purple);color:#fff}.tc5{background:var(--orange);color:#000}.tc6{background:var(--cyan);color:#000}.tc7{background:var(--lime);color:#000}.tc8{background:var(--rose);color:#fff}.tc9{background:var(--teal);color:#000}
.tl0{background:rgba(90,200,250,.12);color:var(--blue)}.tl1{background:rgba(48,209,88,.12);color:var(--green)}.tl2{background:rgba(255,214,10,.12);color:var(--yellow)}.tl3{background:rgba(255,100,130,.12);color:var(--pink)}.tl4{background:rgba(191,90,242,.12);color:var(--purple)}.tl5{background:rgba(255,159,10,.12);color:var(--orange)}.tl6{background:rgba(100,210,255,.12);color:var(--cyan)}.tl7{background:rgba(163,230,53,.12);color:var(--lime)}.tl8{background:rgba(255,100,130,.12);color:var(--rose)}.tl9{background:rgba(64,224,208,.12);color:var(--teal)}

.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:14px;font-family:var(--font);outline:none}

/* 캘린더 */
.cal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.cal-overlay.show{display:flex}
.cal-sheet{background:var(--card);border-radius:24px 24px 0 0;max-width:500px;width:100%;padding:24px 18px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cal-hd h3{font-size:17px;font-weight:900}
.cal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-dow{font-size:10px;color:var(--dim);font-weight:700;padding:4px 0}
.cal-day{padding:8px 0;border-radius:10px;font-size:13px;font-weight:500;color:var(--text)}
.cal-day.off{background:rgba(255,69,58,.15);color:var(--red);font-weight:900}
.cal-day.work{background:rgba(48,209,88,.08);color:var(--green)}
.cal-day.today{border:2px solid var(--blue)}
.cal-day.empty{color:transparent}
.cal-day.sun{color:var(--red)}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:11px;color:var(--dim)}
.cal-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
.cal-legend .lg-off::before{background:rgba(248,113,113,.3)}
.cal-legend .lg-work::before{background:rgba(52,211,153,.2)}
.emp-badge{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;user-select:none}
.emp-badge::after{content:'📅';font-size:8px;position:absolute;top:-2px;right:-2px}

/* 출발확인 */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:20px;max-width:400px;width:100%;padding:24px;animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:18px;font-weight:900;text-align:center;margin-bottom:16px}
.confirm-item{padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px}
.confirm-label{font-size:10px;color:var(--dim);font-weight:700;margin-bottom:4px}
.confirm-value{font-size:15px;font-weight:700}
.confirm-btn{display:block;width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:900;border:none;cursor:pointer;font-family:var(--font);text-align:center;margin-top:16px}
.confirm-ok{background:var(--green);color:#000}
.confirm-cancel{background:var(--card2);color:var(--dim);margin-top:8px}
.confirmed-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(52,211,153,.15);color:var(--green)}
.depart-btn{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(251,191,36,.2);color:var(--yellow);cursor:pointer;border:1px solid rgba(251,191,36,.3);animation:pulseBtn 2s infinite}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.3)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}

/* 월간 캘린더 */
.mc-hd{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:14px}
.mc-hd h2{font-size:17px;font-weight:900;min-width:120px;text-align:center}
.mc-arrow{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mc-arrow:active{background:var(--card2);transform:scale(.95)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mc-dow{text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:6px 0}
.mc-dow.sun{color:var(--red)}.mc-dow.sat{color:var(--blue)}
.mc-cell{background:var(--card);border-radius:10px;min-height:80px;padding:4px;overflow:hidden;cursor:pointer;transition:background .15s;border:1px solid transparent;position:relative}
.mc-cell:active{background:var(--card2)}
.mc-cell.today{border:1.5px solid var(--blue)}
.mc-cell.has-job{background:rgba(48,209,88,.06)}
.mc-cell.mc-cell-off{background:rgba(255,69,58,.06)}
.mc-cell.empty{background:transparent;min-height:0;cursor:default}
.mc-cell.mc-sat{background:rgba(90,200,250,.06)}
.mc-cell.mc-sun{background:rgba(255,69,58,.06)}
.mc-cell.mc-holiday{background:rgba(255,69,58,.06)}
.mc-date{font-size:12px;font-weight:700;padding:2px 4px;margin-bottom:2px}
.mc-date.sun{color:var(--red)}.mc-date.sat{color:var(--blue)}
.mc-badge{display:inline-block;padding:1px 4px;border-radius:4px;font-size:8px;font-weight:700;margin:1px 0}
.mc-badge.am{background:rgba(90,200,250,.15);color:var(--blue)}
.mc-badge.pm{background:rgba(191,90,242,.15);color:var(--purple)}
.mc-badge.as-b{background:rgba(255,69,58,.1);color:var(--red)}
.mc-off{font-size:8px;font-weight:600;line-height:1.3;margin-top:1px}
.mc-legend{display:flex;gap:12px;justify-content:center;margin-top:12px;font-size:11px;color:var(--dim);flex-wrap:wrap}
.mc-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:4px;vertical-align:middle}
.mc-legend .lg-job::before{background:rgba(48,209,88,.3)}
.mc-legend .lg-am::before{background:rgba(90,200,250,.4)}
.mc-legend .lg-pm::before{background:rgba(191,90,242,.4)}
.mc-legend .lg-off2::before{background:rgba(255,69,58,.4)}
.mc-summary{background:var(--card);border-radius:14px;padding:14px;margin-top:12px}
.mc-summary-title{font-size:13px;font-weight:800;margin-bottom:10px}
.mc-emp-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.mc-emp-name{font-size:11px;font-weight:700;min-width:32px}
.mc-emp-bar{flex:1;height:16px;background:var(--card2);border-radius:6px;overflow:hidden;display:flex}
.mc-emp-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.mc-emp-num{font-size:10px;color:var(--dim);min-width:140px;text-align:right;font-family:monospace;white-space:nowrap}

/* 당번 모드 */
.admin-btn{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:var(--font)}
.admin-btn.off{background:var(--card2);color:var(--dim)}
.admin-btn.on{background:rgba(48,209,88,.2);color:var(--green);border:1px solid rgba(48,209,88,.3)}
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
.pin-overlay.show{display:flex}
.pin-box{background:var(--card);border-radius:20px;max-width:300px;width:100%;padding:28px 24px;text-align:center;animation:popIn .2s ease}
.pin-box h3{font-size:16px;font-weight:900;margin-bottom:6px}
.pin-box p{font-size:12px;color:var(--dim);margin-bottom:18px}
.pin-input{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pin-input input{width:44px;height:52px;border-radius:12px;border:2px solid var(--border);background:var(--card2);color:var(--text);font-size:22px;font-weight:900;text-align:center;font-family:var(--font);caret-color:var(--green)}
.pin-input input:focus{outline:none;border-color:var(--green)}
.pin-error{font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.admin-bar{display:none;background:rgba(48,209,88,.1);border-bottom:1px solid rgba(48,209,88,.2);padding:8px 16px;font-size:12px;color:var(--green);text-align:center;font-weight:600}
.admin-bar.show{display:block}
</style>
</head>
<body>
<script>
// 부산 열면 부산으로 기억
localStorage.setItem('dolbom_region','bs');
</script>

<div class="hd">
    <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
            <span onclick="localStorage.removeItem('dolbom_region');location.href='./app.html'" style="font-size:18px;cursor:pointer;opacity:.5">🏠</span>
            <h1>돌봄매트 <span style="color:var(--dim);font-weight:400;font-size:12px" id="verTag"></span></h1>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
            <button class="admin-btn off" id="adminToggle" onclick="toggleAdmin()">🔑</button>
            <div style="display:flex;background:var(--card2);border-radius:10px;padding:2px;gap:2px;white-space:nowrap">
                <span style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;background:var(--red);color:#fff;cursor:default">부산</span>
                <span onclick="localStorage.setItem('dolbom_region','gg');location.href='./scheduler-gg.html'" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer">경기</span>
            </div>
        </div>
    </div>
    <div class="hd-sub" id="sub">로딩 중...</div>
</div>

<div class="admin-bar" id="adminBar">🔑 당번 모드 활성 · 배정 수정 가능 <span onclick="adminOff()" style="margin-left:8px;cursor:pointer;opacity:.6">해제</span></div>

<div id="updateBar" style="display:none;background:linear-gradient(135deg,#5b8def,#34d399);padding:10px 16px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#fff" onclick="location.reload(true)">🔄 새 버전이 있어요! 터치하면 업데이트</div>

<div class="pin-overlay" id="pinOverlay" onclick="if(event.target===this)closePin()">
<div class="pin-box">
<h3>🔑 당번 모드</h3>
<p>배정 수정 권한을 활성화합니다</p>
<div class="pin-input" id="pinInputs">
<input type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
<input type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
<input type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
<input type="tel" maxlength="1" inputmode="numeric" autocomplete="off">
</div>
<div class="pin-error" id="pinError">PIN이 올바르지 않습니다</div>
<button onclick="closePin()" style="padding:10px 24px;border-radius:10px;background:var(--card2);color:var(--dim);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">취소</button>
</div>
</div>

<div id="donghoBar" style="display:none;background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.1));border-bottom:1px solid rgba(251,191,36,.3);padding:12px 16px;font-size:14px;color:var(--yellow);text-align:center;position:sticky;top:48px;z-index:99"></div>

<div class="pane on" id="p-sched"><div id="schedView"></div></div>
<div class="pane" id="p-month"><div id="monthView"></div></div>
<div class="pane" id="p-team"><div id="teamView"></div></div>
<div class="pane" id="p-fair"><div id="fairView"></div></div>
<div class="pane" id="p-car"><div id="carView"></div></div>

<nav class="nav">
    <a class="on" onclick="sw('sched')" href="#"><span>📋</span>스케줄</a>

async function calcDist(addr){const o=getOffice(addr);const c=await geo(addr);if(!c)return 0;return Math.round(hav(o.lat,o.lng,c.lat,c.lng)*2)}

// 하루 경로 기반 이동거리: 사무실 → 시공1 → 시공2 → ... → 사무실
function calcRouteKm(jobs){
  if(!jobs.length)return 0;
  const tOrd={'오전':0,'오후':1,'as':2,'AS':2,'실측':3};
  const sorted=[...jobs].sort((a,b)=>(tOrd[a.time]||9)-(tOrd[b.time]||9));
  const office=getOffice(sorted[0].addr||'');
  const coords=sorted.map(j=>j.addr?DC[j.addr]:null).filter(Boolean);
  if(!coords.length)return 0;
  let total=0,prev=office;
  for(const c of coords){total+=hav(prev.lat,prev.lng,c.lat,c.lng);prev=c}
  total+=hav(prev.lat,prev.lng,office.lat,office.lng);
  return Math.round(total);
}

// 직원별 날짜별 경로 거리 합산 헬퍼
function calcEmpRouteTotals(jobList){
  const dateJobs={};
  jobList.forEach(j=>{if(A[j.id])A[j.id].forEach(e=>{
    const k=e+'|'+j.date;
    if(!dateJobs[k])dateJobs[k]=[];
    dateJobs[k].push(j);
  })});
  const totals={};
  Object.entries(dateJobs).forEach(([k,jobs])=>{
    const emp=k.split('|')[0];
    if(!totals[emp])totals[emp]=0;
    totals[emp]+=calcRouteKm(jobs);
  });
  return totals;
}

// 휴무 CSV 파싱 (A:날짜 B:요일 C~L:이름1~이름10)
function parseOffCSV(text){
const lines=text.split('\n');
for(let i=1;i<lines.length;i++){
const r=[];let cur='',inQ=false;
for(let c=0;c<lines[i].length;c++){const ch=lines[i][c];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){r.push(cur.trim().replace(/^"|"$/g,''));cur=''}else{cur+=ch}}
r.push(cur.trim().replace(/^"|"$/g,''));
if(!r[0])continue;
let ds=r[0].trim();
if(ds.includes('T'))ds=ds.substring(0,10);
// YYYYMMDD → YYYY-MM-DD
if(ds.match(/^\d{8}$/))ds=ds.slice(0,4)+'-'+ds.slice(4,6)+'-'+ds.slice(6,8);
// YYYY-M-D → YYYY-MM-DD
if(ds.match(/^\d{4}-\d{1,2}-\d{1,2}$/)){
  const parts=ds.split('-');
  ds=parts[0]+'-'+parts[1].padStart(2,'0')+'-'+parts[2].padStart(2,'0');
}
if(!ds.match(/^\d{4}-\d{2}-\d{2}$/))continue; // 유효한 날짜만
// C~L열 (r[2]~r[11]) 모든 이름 읽기
for(let ci=2;ci<=11;ci++){
  if(!r[ci]||!r[ci].trim())continue;
  const raw=r[ci].trim();
  // 예비군:이름, 교육:이름, 출장:이름 등 접두어 처리
  const prefixMatch=raw.match(/^(예비군|교육|출장|훈련):(.+)$/);
  if(prefixMatch){
    const reason=prefixMatch[1];
    const name=matchEmpName(prefixMatch[2]);
    if(name){
      if(!OFFS[ds])OFFS[ds]=new Set();
      OFFS[ds].add(name); // 배정에서는 제외
      if(!DUTY[ds])DUTY[ds]={};
      DUTY[ds][name]=reason; // 근무로 카운트
    }
  }else{
    const name=matchEmpName(raw);
    if(name){
      if(!OFFS[ds])OFFS[ds]=new Set();
      OFFS[ds].add(name);
    }
  }
}
}}

// 시트 이름 → 직원 짧은 이름 매칭 (이준형→준형, 윤철→윤철)
function matchEmpName(sheetName){
if(!sheetName)return null;
const n=sheetName.trim();
// 정확히 일치
if(E.includes(n))return n;
// 3글자 이상이면 성 제거 후 매칭
if(n.length>=3){const short=n.slice(1);if(E.includes(short))return short;}
// 직원 이름이 시트 이름에 포함
const found=E.find(e=>n.includes(e));
if(found)return found;
return null;
}

function teamFairPenalty(members){
  let total=0;

    total+=((fairScore[m].km-avgKm)/20);   // 이동거리 20km 초과 = 1점
  });
  return total/Math.max(members.length,1);
}

// 팀 그룹 생성 함수
function makeGroups(pool,jobCnt){
  if(teams.length){
    const avTeams=teams.map((t,i)=>({idx:i,members:t.filter(m=>pool.includes(m))})).filter(t=>t.members.length>0);
    const grouped=avTeams.map(t=>t.members);
    const inTeam=new Set();grouped.forEach(g=>g.forEach(m=>inTeam.add(m)));
    const orphans=pool.filter(m=>!inTeam.has(m));
    const fullTeams=grouped.filter(g=>g.length>=2).map(g=>g.sort((a,b)=>(hireDate[a]||'9999').localeCompare(hireDate[b]||'9999')));
    const soloTeam=grouped.filter(g=>g.length===1).map(g=>g[0]);
    const allSingles=[...soloTeam,...orphans].sort((a,b)=>(hireDate[a]||'9999').localeCompare(hireDate[b]||'9999'));
    const paired=[];
    for(let i=0;i<allSingles.length;i+=2){
      if(i+1<allSingles.length)paired.push([allSingles[i],allSingles[i+1]]);
    }
    return [...fullTeams,...paired];
  }
  const sorted=[...pool];
  const groups=[];
  for(let i=0;i<sorted.length;i+=2){
    if(i+1<sorted.length)groups.push([sorted[i],sorted[i+1]]);
  }
  return groups;
}

  // ── 오후 처리 (지역 매칭 + 공평 분배) ──
  const pmUsed=new Set();
  pm2.forEach(j=>{if(A[j.id])A[j.id].forEach(e=>pmUsed.add(e))});
  
  pm2.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&A[j.id]&&A[j.id].length===1).forEach(j=>{
    const sasu=A[j.id][0];
    if(teams.length){
      const myTeam=teams.find(t=>t.includes(sasu));
      if(myTeam){
        const partner=myTeam.find(m=>m!==sasu&&avail2.includes(m)&&!pmUsed.has(m));
        if(partner){A[j.id]=[sasu,partner].sort(hdSort);pmUsed.add(partner);return}
      }
    }
    const free=avail2.filter(e=>!pmUsed.has(e)&&e!==sasu);
    if(free.length){A[j.id]=[sasu,free[0]].sort(hdSort);pmUsed.add(free[0])}
  });
  
  const pmEmpty2=pm2.filter(j=>!A[j.id]&&!SKIP.has(j.id)&&!LOCK.has(j.id));
  if(pmEmpty2.length){
    // 오전 팀 목록 (마지막 시공 주소 + GPS 좌표 + 건수 추적)
    const amTeamInfo=[];
    am2.forEach(j=>{if(A[j.id]&&A[j.id].length>=2){
      const key=[...A[j.id]].sort().join('+');
      const existing=amTeamInfo.find(t=>t.key===key);
      if(!existing){amTeamInfo.push({key,team:[...A[j.id]],lastAddr:j.addr||'',lastGeo:null,pmCount:0})}
      else{existing.lastAddr=j.addr||''} // 마지막 오전 주소 갱신
    }});
    // 기존 오후 배정 건수 반영
    pm2.forEach(j=>{if(A[j.id]){
      const key=[...A[j.id]].sort().join('+');
      const t=amTeamInfo.find(ti=>ti.key===key);
      if(t)t.pmCount++;
    }});

    // GPS 좌표 미리 계산 (오전 팀 마지막 위치 + 오후 건 위치)
    for(const ti of amTeamInfo){
      if(ti.lastAddr)ti.lastGeo=await geo(ti.lastAddr);
    }
    for(const j of pmEmpty2){
      if(j.addr&&!j._geo)j._geo=await geo(j.addr);
    }

    pmEmpty2.forEach(j=>{
      if(A[j.id])return;
      const pmGeo=j._geo;

      // 1순위: 당일 0건인 대기팀 (출근했는데 놀고 있는 팀)
      const allAssigned=new Set();
      [...am2,...pm2].forEach(jj=>{if(A[jj.id])A[jj.id].forEach(e=>allAssigned.add(e))});
      const idlePeople=avail2.filter(e=>!allAssigned.has(e)&&!pmUsed.has(e));
      const idleTeams=makeGroups(idlePeople,1);
      if(idleTeams.length){
        // 대기팀 중 GPS 가장 가까운 팀 (사무실에서 출발)
        let bestIdle=idleTeams[0];
        if(pmGeo&&idleTeams.length>1){
          let minD=9999;
          for(const it of idleTeams){
            const d=hav(OFF_B.lat,OFF_B.lng,pmGeo.lat,pmGeo.lng);
            if(d<minD){minD=d;bestIdle=it}
          }
        }
        A[j.id]=[...bestIdle].sort(hdSort);
        bestIdle.forEach(e=>{pmUsed.add(e);crossDateKm[e]+=(j.dist||0)});
        return;
      }

      // 2순위: 오전팀 중 GPS 가장 가까운 팀
      const availTeams=amTeamInfo.filter(t=>t.team.every(m=>!pmUsed.has(m)));
      if(availTeams.length){
        availTeams.forEach(t=>{
          t._dist=(t.lastGeo&&pmGeo)?hav(t.lastGeo.lat,t.lastGeo.lng,pmGeo.lat,pmGeo.lng):9999;
        });
        availTeams.sort((a,b)=>{
          const scoreA=a._dist+(a.pmCount*15);
          const scoreB=b._dist+(b.pmCount*15);
          return scoreA-scoreB;
        });
        const best=availTeams[0];
        A[j.id]=[...best.team].sort(hdSort);
        best.team.forEach(e=>{pmUsed.add(e);crossDateKm[e]+=(j.dist||0)});
        best.pmCount++;
        return;
      }
      // 3순위 : 두탕 (pmUsed 무시하고 오전팀 재사용)
      if(!A[j.id]&&amTeamInfo.length){
        amTeamInfo.forEach(t=>{
          t._dist2=(t.lastGeo&&pmGeo)?hav(t.lastGeo.lat,t.lastGeo.lng,pmGeo.lat,pmGeo.lng):9999;
          t._score2=t._dist2+(t.pmCount*15); // [추가⑤] 이미 받은 오후 건수만큼 패널티 → 한 팀 몰림 방지
        });
        amTeamInfo.sort((a,b)=>a._score2-b._score2);
        A[j.id]=[...amTeamInfo[0].team].sort(hdSort);
        amTeamInfo[0].pmCount++;
        return;
      }
      // 4순위 : 남는 사람
      const freeP=avail2.filter(e=>!pmUsed.has(e));
      const gP=makeGroups(freeP,1);
      if(gP.length){
        A[j.id]=[...gP[0]].sort(hdSort);
        gP[0].forEach(e=>pmUsed.add(e));
      }
    });
  }
  continue;
}

const dj=bd[date];
const ao=new Set();
if(OFFS[date])OFFS[date].forEach(n=>ao.add(n));
J.filter(jj=>jj.date===date).forEach(jj=>jj.doff.forEach(n=>ao.add(n)));
const avail=E.filter(e=>!ao.has(e));
if(!avail.length)continue;

// 배정 대상 건 (주소 있고, SKIP 아니고, 미배정 또는 1인)
const allJobs=dj.filter(j=>j.addr&&j.addr.trim());
const needWork=allJobs.filter(j=>!SKIP.has(j.id)&&!LOCK.has(j.id)&&(!A[j.id]||A[j.id].length===1));
if(!needWork.length)continue;

// 팀 생성
const dayTeams=makeGroups(avail,needWork.length);
if(!dayTeams.length)continue;

// 기존 2인 배정은 유지 (해당 팀의 건수에 반영)
const teamLoad={};
dayTeams.forEach(g=>{const k=[...g].sort().join('+');teamLoad[k]={team:[...g],count:0,cities:[]}});
allJobs.forEach(j=>{if(A[j.id]&&A[j.id].length>=2){
  const k=[...A[j.id]].sort().join('+');
  if(teamLoad[k]){teamLoad[k].count++;teamLoad[k].cities.push((j.addr||'').slice(0,2))}
}});

// 1인→2인 보완
needWork.filter(j=>A[j.id]&&A[j.id].length===1).forEach(j=>{
  const sasu=A[j.id][0];
  if(teams.length){
    const myTeam=teams.find(t=>t.includes(sasu));
    if(myTeam){
      const partner=myTeam.find(m=>m!==sasu&&avail.includes(m));
      if(partner){A[j.id]=[sasu,partner].sort(hdSort);return}
    }
  }
  const myGroup=dayTeams.find(g=>g.includes(sasu));
  if(myGroup){const partner=myGroup.find(m=>m!==sasu);if(partner)A[j.id]=[sasu,partner].sort(hdSort)}
});

// 미배정 건 GPS 거리 기반 배정
const unassigned=needWork.filter(j=>!A[j.id]);
if(unassigned.length){
  // 각 팀의 마지막 배정 주소 GPS 좌표 계산
  for(const k of Object.keys(teamLoad)){
    const tl=teamLoad[k];
    const lastJob=allJobs.filter(j=>A[j.id]&&[...A[j.id]].sort().join('+')===k).pop();
    tl.lastGeo=lastJob?await geo(lastJob.addr):null;
  }
  // 미배정 건 GPS 좌표 미리 계산
  for(const j of unassigned){if(j.addr&&!j._geo)j._geo=await geo(j.addr)}

  // 오전/오후 분리: 오전 먼저 → 오후는 오전 위치 기반
  const amUn=unassigned.filter(j=>j.time.startsWith('오전')||j.time.includes('2:'));
  const pmUn=unassigned.filter(j=>j.time.startsWith('오후')||j.time==='as'||j.time==='AS'||j.time==='실측');

  // 오전 배정: 건수 균등 + 누적 공정성
  amUn.forEach(j=>{
    if(A[j.id])return;
    const allTeamsSorted=Object.values(teamLoad).sort((a,b)=>{
      if(a.count!==b.count)return a.count-b.count;
      return teamFairSort(a,b);
    });
    if(allTeamsSorted.length){
      const best=allTeamsSorted[0];
      A[j.id]=[...best.team].sort(hdSort);
      best.count++;
      bumpCnt(best.team,date);
      if(j._geo)best.lastGeo=j._geo;
    }
  });

  // 오후 배정: 0건 팀 우선 + GPS 거리
  pmUn.forEach(j=>{
    if(A[j.id])return;
    const pmGeo=j._geo;
    const allTeamsSorted=Object.values(teamLoad);

    if(allTeamsSorted.length&&pmGeo){
      allTeamsSorted.forEach(t=>{
        // 0건 팀은 사무실에서 출발
        const fromGeo=t.lastGeo||OFF_B;
        t._dist=hav(fromGeo.lat,fromGeo.lng,pmGeo.lat,pmGeo.lng);
      });
      // 0건 팀 우선 (count*15) + GPS 거리 + 누적 공정성
      allTeamsSorted.sort((a,b)=>{
        const cntA=a.team.reduce((s,m)=>s+(crossDateCnt[m]||0),0)/Math.max(a.team.length,1);
        const cntB=b.team.reduce((s,m)=>s+(crossDateCnt[m]||0),0)/Math.max(b.team.length,1);
        const scoreA=a._dist+(a.count*15)+cntA*5;
        const scoreB=b._dist+(b.count*15)+cntB*5;
        return scoreA-scoreB;
      });
      const best=allTeamsSorted[0];
      A[j.id]=[...best.team].sort(hdSort);
      best.count++;
      bumpCnt(best.team,date);
      // 월간 누적 갱신
      best.team.forEach(e=>{crossDateKm[e]+=(j.dist||0)});
      // 이 팀의 마지막 위치를 오후 건으로 갱신 (다음 오후 건 거리 계산에 반영)
      if(pmGeo)best.lastGeo=pmGeo;
    }else{
      // GPS 없으면 건수 + 누적 공정성
      const fairTeam=Object.values(teamLoad).sort((a,b)=>{
        if(a.count!==b.count)return a.count-b.count;
        return teamFairSort(a,b);
      })[0];
      if(fairTeam){
        A[j.id]=[...fairTeam.team].sort(hdSort);
        fairTeam.count++;
        bumpCnt(fairTeam.team,date);
      }
    }
  });
}}

function renderSched(){
const bd={};J.forEach(j=>{if(!bd[j.date])bd[j.date]=[];bd[j.date].push(j)});
const jobDates=Object.keys(bd).sort();
const today=new Date();const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

// 휴무자 사전 정리 (렌더링용 로컬 복사본 - A 원본은 수정하지 않음!)
const dateOffs={};
// OFFS 데이터에서 휴무자 수집
Object.keys(OFFS).forEach(d=>{if(!dateOffs[d])dateOffs[d]=new Set();OFFS[d].forEach(n=>dateOffs[d].add(n))});
// 기존 doff에서도 수집 (호환성)
J.forEach(j=>{if(j.doff.length){if(!dateOffs[j.date])dateOffs[j.date]=new Set();j.doff.forEach(n=>dateOffs[j.date].add(n))}});
// 렌더링용 배정 복사본 (휴무자 제외된 버전)
const RA={};
Object.keys(A).forEach(k=>{
  const jobDate=k.split('_')[0];
  const offs=dateOffs[jobDate];
  if(offs&&offs.size){
    const filtered=A[k].filter(e=>!offs.has(e));
    if(filtered.length)RA[k]=filtered;
  }else{
    RA[k]=A[k];
  }
});

function getAllDates(start,end){
const dates=[];const cur=new Date(start);const last=new Date(end);
while(cur<=last){dates.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));cur.setDate(cur.getDate()+1)}
return dates}

const firstDate=jobDates.length?jobDates[0]:todayStr;
const lastDate=jobDates.length?jobDates[jobDates.length-1]:todayStr;
// 오늘~마지막날 (과거 포함하려면 firstDate부터)
const allDatesRange=getAllDates(firstDate,lastDate);
const futureDates=allDatesRange.filter(d=>d>=todayStr);
const pastDates=allDatesRange.filter(d=>d<todayStr);

// 직원 색상 범례

function renderDayCards(dates,dimmed){

const jobs=bd[date]||[];const realJobs=jobs.filter(j=>!j.offOnly&&j.addr&&j.addr.trim());const d=new Date(date);const di=d.getDay();const dn=DOW[di];
const isToday=date===todayStr;
const holiday=isHoliday(date);
const isSun=di===0;const isSat=di===6;const isRedDay=isSun||!!holiday;
const dateBorderColor=isRedDay?'var(--red)':isSat?'var(--blue)':isToday?'var(--blue)':'var(--border)';
const dateBorderWidth=isRedDay||isSat||isToday?'2px':'1px';
const dateColor=isRedDay?'var(--red)':isSat?'var(--blue)':'var(--text)';

// 휴무 표시 (OFFS + doff 합산)
const offs=new Set();
if(OFFS[date])OFFS[date].forEach(n=>offs.add(n));
jobs.forEach(j=>j.doff.forEach(n=>offs.add(n)));
const offHtml=offs.size?'<span style="font-size:11px;font-weight:500;opacity:.6">· 휴무 : '+[...offs].join(' ')+'</span>':'';

if(!realJobs.length){

const ecl2=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)','var(--cyan)','var(--lime)','var(--rose)','var(--teal)'];

// 팀별 그룹
const tm={};const un=[];
realJobs.forEach(j=>{const t=RA[j.id];if(t&&t.length){const k=[...t].sort().join('+');if(!tm[k])tm[k]={team:t.slice().sort((a,b)=>{const ti=teams.findIndex(tt=>tt.includes(a)&&tt.includes(b));if(ti>=0)return teams[ti].indexOf(a)-teams[ti].indexOf(b);return 0}),jobs:[]};tm[k].jobs.push(j)}else un.push(j)});

});

let body=tmArr.map(tg=>{

const hasNew=tg.jobs.some(j=>j.isNew);
const dayOffSet=new Set();jobs.forEach(jj=>jj.doff.forEach(n=>dayOffSet.add(n)));

// 오전 → 오후 → as 순서로 정렬
const timeOrder={'오전':0,'오전(이전설치)':0,'오후':1,'오후(이전설치)':1,'as':2,'AS':2,'실측':3};
const sorted=[...tg.jobs].sort((a,b)=>(timeOrder[a.time]??1)-(timeOrder[b.time]??1));

const jobRows=sorted.map(j=>{

// ===== 터치 드래그앤드롭 시스템 =====
let dndState=null;
function initDnD(){
const members=document.querySelectorAll('.tmem[data-name],.pool-mem[data-name]');
members.forEach(el=>{
  el.addEventListener('touchstart',dndTouchStart,{passive:false});
  el.addEventListener('mousedown',dndMouseDown);
});
}

function dndTouchStart(e){
const el=e.currentTarget;
const name=el.dataset.name;
if(!name)return;
// 길게 누르기 감지 (200ms)
const timer=setTimeout(()=>{
  e.preventDefault();
  startDrag(el,e.touches[0].clientX,e.touches[0].clientY);
},200);
el._dndTimer=timer;
el._dndMoved=false;
el.addEventListener('touchmove',function onM(ev){
  if(!dndState){
    // 아직 드래그 시작 안 됐으면 타이머 취소 (스크롤 허용)
    const dx=Math.abs(ev.touches[0].clientX-(e.touches[0]?.clientX||0));
    const dy=Math.abs(ev.touches[0].clientY-(e.touches[0]?.clientY||0));
    if(dx>5||dy>5){clearTimeout(timer);el.removeEventListener('touchmove',onM)}
    return;
  }
  ev.preventDefault();
  moveDrag(ev.touches[0].clientX,ev.touches[0].clientY);
},{passive:false});
el.addEventListener('touchend',function onE(ev){
  clearTimeout(timer);
  if(dndState)endDrag(ev.changedTouches[0].clientX,ev.changedTouches[0].clientY);
  el.removeEventListener('touchend',onE);
},{once:true});
el.addEventListener('touchcancel',function(){clearTimeout(timer);cancelDrag()},{once:true});
}

function dndMouseDown(e){
const el=e.currentTarget;
if(e.target.classList.contains('x'))return; // X 버튼은 무시
const name=el.dataset.name;
if(!name)return;
e.preventDefault();
startDrag(el,e.clientX,e.clientY);
function onM(ev){ev.preventDefault();moveDrag(ev.clientX,ev.clientY)}
function onU(ev){endDrag(ev.clientX,ev.clientY);document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU)}
document.addEventListener('mousemove',onM);
document.addEventListener('mouseup',onU);
}

function startDrag(el,x,y){
if(!isAdmin){toast('🔒 당번 모드에서만 가능합니다','error');return}
const rect=el.getBoundingClientRect();
const ghost=el.cloneNode(true);
ghost.className=el.className+' drag-ghost';
ghost.style.width=rect.width+'px';
ghost.style.left=(x-rect.width/2)+'px';
ghost.style.top=(y-rect.height/2)+'px';
document.body.appendChild(ghost);
el.classList.add('drag-src');
dndState={name:el.dataset.name,fromType:el.dataset.from,fromTi:el.dataset.ti!==undefined?parseInt(el.dataset.ti):undefined,ghost,srcEl:el};
}

function moveDrag(x,y){
if(!dndState)return;
dndState.ghost.style.left=(x-dndState.ghost.offsetWidth/2)+'px';
dndState.ghost.style.top=(y-dndState.ghost.offsetHeight/2)+'px';
// 드롭 대상 하이라이트
document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
const target=document.elementFromPoint(x,y);
if(target){
  const drop=target.closest('[data-drop]');
  if(drop)drop.classList.add('drag-over');
}
}

function endDrag(x,y){
if(!dndState)return;
document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
const target=document.elementFromPoint(x,y);
if(target){
  const drop=target.closest('[data-drop]');
  if(drop){
    const toType=drop.dataset.drop;
    const toTi=drop.dataset.ti!==undefined?parseInt(drop.dataset.ti):undefined;
    // 같은 자리가 아니면 이동
    if(toType!==dndState.fromType||toTi!==dndState.fromTi){
      moveMember(dndState.name,dndState.fromType,dndState.fromTi,toType,toTi);
    }
  }
}
cancelDrag();
}

function cancelDrag(){
if(!dndState)return;
if(dndState.ghost&&dndState.ghost.parentNode)dndState.ghost.remove();
if(dndState.srcEl)dndState.srcEl.classList.remove('drag-src');
dndState=null;
}

const monthStr=mYear+'년 '+(mMonth+1)+'월';

// 선택한 달 시공 건 필터
const mj=J.filter(j=>!j.offOnly&&new Date(j.date).getFullYear()===mYear&&new Date(j.date).getMonth()===mMonth);

// 직원별 집계
const es={};E.forEach(e=>es[e]={double:0,as:0,km:0,days:{},workDates:new Set()});

mj.forEach(j=>{const t=A[j.id];if(t)t.forEach(e=>{if(es[e]){
// 근무일 추적
es[e].workDates.add(j.date);
// AS 건수 (별도)
if(j.time==='as'||j.time==='AS'||j.time==='실측'){if(j.time==='as'||j.time==='AS')es[e].as++}
else{
// 시공(오전/오후)만 날짜별 추적 (두탕 계산용)
if(!es[e].days[j.date])es[e].days[j.date]=0;
es[e].days[j.date]++}
}})});

// 경로 기반 이동거리: 사무실→시공1→시공2→...→사무실 (하루 단위)
const fairTabRoutes=calcEmpRouteTotals(mj);
E.forEach(e=>{es[e].km=fairTabRoutes[e]||0});

// 두탕 = 같은 날 시공(오전+오후) 2건 이상 (AS 미포함)
E.forEach(e=>{es[e].double=Object.values(es[e].days).filter(c=>c>=2).length});

// 일 평균 km 계산
E.forEach(e=>{const wd=es[e].workDates.size;es[e].avgKm=wd>0?Math.round(es[e].km/wd):0;es[e].workDays=wd});

// 입사일 기준 정렬 (고참→막내)
const sE=[...E].sort(hdSort);

// 최대값 (바 차트 비율용)
const maxDouble=Math.max(...E.map(e=>es[e].double),1);
const maxAs=Math.max(...E.map(e=>es[e].as),1);

let html=`<div style="text-align:center;padding:12px;margin-bottom:12px;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;gap:16px"><span onclick="fairMove(-1)" style="cursor:pointer;font-size:20px;color:var(--dim);padding:4px 8px">◀</span>📊 ${monthStr} 실적<span onclick="fairMove(1)" style="cursor:pointer;font-size:20px;color:var(--dim);padding:4px 8px">▶</span></div>`;

// ========== 🏆 두탕 순위 (TOP 카드) ==========
const dbRanked=[...sE].sort((a,b)=>es[a].double-es[b].double);
const dbAvg=E.reduce((s,e)=>s+es[e].double,0)/Math.max(E.length,1);
const dbMax2=Math.max(...E.map(e=>es[e].double),1);
const medals=['🥇','🥈','🥉'];
html+=`<div class="fcard" style="background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(251,191,36,0.02));border:1px solid rgba(251,191,36,0.2)">`;
html+=`<div class="sec">🏆 이번달 두탕 순위 <span style="font-size:11px;font-weight:400;color:var(--dim)">(적게 간 순 = 다음 배정 우선)</span></div>`;
html+=dbRanked.map((e,i)=>{
  const v=es[e].double;
  const diff=Math.round((v-dbAvg)*10)/10;
  const w=Math.round(v/dbMax2*100);
  const medal=i<3?medals[i]:'  ';
  const ci=E.indexOf(e);
  const isFirst=i===0;
  const diffStr=diff>0?`+${diff}회 과다`:(diff<0?`${diff}회 부족`:'평균');
  const diffColor=diff>0?'#ef4444':(diff<0?'var(--green)':'var(--dim)');
  return `<div class="frow" style="${isFirst?'background:rgba(251,191,36,0.1);border-radius:6px;padding:4px 6px':''}">
    <span style="font-size:14px;width:20px;display:inline-block;text-align:center;flex-shrink:0">${medal}</span>
    <span class="fname">${e}</span>
    <div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[ci%10]}">${v}</div></div>
    <span class="fval" style="min-width:100px;text-align:right">${v}일 ${isFirst?'<span style="font-size:10px;font-weight:800;color:#f59e0b">⭐</span>':`<span style="font-size:10px;color:${diffColor}">${diffStr}</span>`}</span>
  </div>`;
}).join('');
html+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);text-align:center">
  평균 ${Math.round(dbAvg*10)/10}회 · 편차 ${Math.max(...E.map(e=>es[e].double))-Math.min(...E.map(e=>es[e].double))}회
</div>`;
html+=`</div>`;

// ========== 📐 공정성 점수 설명 카드 ==========
const fairAvgWd=E.reduce((s,e)=>s+es[e].workDays,0)/Math.max(E.length,1);
const fairAvgDb=E.reduce((s,e)=>s+es[e].double,0)/Math.max(E.length,1);
const fairAvgKm=E.reduce((s,e)=>s+es[e].km,0)/Math.max(E.length,1);
const personalScores={};
E.forEach(e=>{
  const dbDiff=es[e].double-fairAvgDb;
  const wdDiff=es[e].workDays-fairAvgWd;
  const kmDiff=es[e].km-fairAvgKm;
  const score=Math.round((dbDiff*8+wdDiff*3+kmDiff/20)*10)/10;
  personalScores[e]={dbDiff:Math.round(dbDiff*10)/10,wdDiff:Math.round(wdDiff*10)/10,kmDiff:Math.round(kmDiff),score:score};
});
const scoreSorted=[...E].sort((a,b)=>personalScores[a].score-personalScores[b].score);

html+=`<div class="fcard" style="background:linear-gradient(135deg,rgba(59,130,246,0.05),rgba(59,130,246,0.01));border:1px solid rgba(59,130,246,0.15)">`;
html+=`<div class="sec">📐 종합 공정성 점수 <span style="font-size:11px;font-weight:400;color:var(--dim)">(점수 낮을수록 다음 배정 우선)</span></div>`;

// 테이블 헤더
html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px">
  <tr style="border-bottom:1px solid var(--border);color:var(--dim);font-size:10px">
    <th style="text-align:left;padding:6px 4px">이름</th>
    <th style="text-align:center;padding:6px 4px">두탕</th>
    <th style="text-align:center;padding:6px 4px">근무일</th>
    <th style="text-align:center;padding:6px 4px">이동km</th>
    <th style="text-align:right;padding:6px 4px">점수</th>
  </tr>`;
html+=scoreSorted.map((e,i)=>{
  const p=personalScores[e];
  const ci=E.indexOf(e);
  const isFirst=i===0;
  const isLast=i===scoreSorted.length-1;
  const scoreColor=p.score<-2?'var(--green)':(p.score>5?'#ef4444':'var(--text)');
  const sign=(n,dec=1)=>n>0?`+${n.toFixed(dec)}`:n.toFixed(dec);
  return `<tr style="border-bottom:1px solid var(--border);${isFirst?'background:rgba(52,211,153,0.08)':''}${isLast?'background:rgba(239,68,68,0.05)':''}">
    <td style="padding:8px 4px;font-weight:700;color:${cl[ci%10]}">${e}${isFirst?' 🏆':''}${isLast?' ⚠️':''}</td>
    <td style="text-align:center;padding:8px 4px;font-size:11px;color:${p.dbDiff>0?'#ef4444':(p.dbDiff<0?'var(--green)':'var(--dim)')}">${sign(p.dbDiff)}</td>
    <td style="text-align:center;padding:8px 4px;font-size:11px;color:${p.wdDiff>0?'#ef4444':(p.wdDiff<0?'var(--green)':'var(--dim)')}">${sign(p.wdDiff)}</td>
    <td style="text-align:center;padding:8px 4px;font-size:11px;color:${p.kmDiff>0?'#ef4444':(p.kmDiff<0?'var(--green)':'var(--dim)')}">${sign(p.kmDiff,0)}</td>
    <td style="text-align:right;padding:8px 4px;font-weight:800;color:${scoreColor}">${sign(p.score)}</td>
  </tr>`;
}).join('');
html+=`</table></div>`;

// 계산식 설명 박스
html+=`<div style="background:var(--card2);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:11px;line-height:1.7">
  <div style="font-weight:700;color:var(--text);margin-bottom:6px">🔢 계산식</div>
  <div style="color:var(--dim)">
    점수 = <span style="color:#f59e0b">두탕 초과 × 8</span>
    + <span style="color:var(--blue)">근무일 초과 × 3</span>
    + <span style="color:var(--green)">이동거리 초과 ÷ 20</span>
  </div>
  <div style="margin-top:6px;color:var(--dim)">
    <b style="color:var(--text)">"초과"란?</b> 전체 평균과의 차이<br>
    예) 이달 평균 두탕 ${Math.round(fairAvgDb*10)/10}회 → 내가 ${Math.round(fairAvgDb*10)/10+2}회면 "+2회 초과"
  </div>
  <div style="margin-top:6px;color:var(--dim)">
    <b style="color:var(--text)">왜 두탕이 가장 큰가요?</b> 인센티브 기회 균등 배분을 위해 가중치 8 (근무일은 3)
  </div>
  <div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);color:var(--dim)">
    <b style="color:var(--green)">🟢 음수(-)</b>: 평균보다 적게 받음 → 다음 배정 우선<br>
    <b style="color:#ef4444">🔴 양수(+)</b>: 평균보다 많이 받음 → 다음 배정 후순위
  </div>
</div>`;
html+=`</div>`;

// 두탕 횟수
html+=`<div class="fcard"><div class="sec">🔥 두탕 (오전+오후 시공, 인센티브 💰)</div>`;
html+=sE.map((e,i)=>{
const v=es[e].double;const w=Math.round(v/maxDouble*100);
return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[i%10]}">${v}</div></div><span class="fval">${v}일</span></div>`}).join('');
html+=`</div>`;

// AS 건수
html+=`<div class="fcard"><div class="sec">🔧 AS 건수</div>`;
html+=sE.map((e,i)=>{
const v=es[e].as;const w=Math.round(v/maxAs*100);
return `<div class="frow"><span class="fname">${e}</span><div class="fbar"><div class="ffill" style="width:${v?Math.max(w,10):0}%;background:${cl[i%10]}">${v}</div></div><span class="fval">${v}건</span></div>`}).join('');
html+=`</div>`;

// 이동거리 (총거리 + 일평균 겹친 막대)
const totalAddrs=new Set(mj.map(j=>j.addr).filter(Boolean));
const calcAddrs=[...totalAddrs].filter(a=>DIST[a.replace(/[.#$/\[\]]/g,'_')]!==undefined);
const maxTotalKm=Math.max(...E.map(e=>es[e].km),1);
html+=`<div class="fcard"><div class="sec">🚗 이동거리 <span style="font-size:11px;font-weight:400;color:var(--dim)">(${calcAddrs.length}/${totalAddrs.size} 주소 계산됨)</span></div>`;
const hasKm=E.some(e=>es[e].km>0);
if(hasKm){
html+=sE.map((e,i)=>{
const s=es[e];
const wTotal=Math.round(s.km/maxTotalKm*100);
const wAvg=s.km>0?Math.round(s.avgKm/maxTotalKm*s.workDays/1*100):0;
return `<div style="margin:10px 0">
<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px">
<span class="fname">${e}</span>
<span style="font-size:11px;color:var(--dim)">${s.workDays}일 근무</span>
<span style="font-size:13px;font-weight:900;color:${cl[i%10]};margin-left:auto">${s.avgKm}km/일</span>
</div>
<div style="position:relative;height:24px;background:var(--card2);border-radius:8px;overflow:hidden">
<div style="position:absolute;height:100%;width:${Math.max(Math.round(s.avgKm/(Math.max(...E.map(e2=>es[e2].avgKm),1))*100),5)}%;background:${cl[i%10]};border-radius:8px"></div>
</div>
</div>`}).join('');
html+=`<div style="font-size:10px;color:var(--dim);margin-top:8px;text-align:center">일평균은 근무일 기준이라 연차·휴무와 무관해요</div>`}
else{html+=`<div style="color:var(--dim);font-size:12px;padding:8px">주소 거리 계산 중... 잠시 후 새로고침 해주세요</div>`}
html+=`</div>`;

// 요약 테이블
html+=`<div class="fcard"><div class="sec">📋 요약</div>`;
html+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
<tr style="border-bottom:1px solid var(--border)">
<th style="text-align:left;padding:8px 4px;color:var(--dim);font-size:11px">이름</th>
<th style="text-align:center;padding:8px 4px;color:var(--dim);font-size:11px">근무</th>
<th style="text-align:center;padding:8px 4px;color:var(--dim);font-size:11px">두탕</th>
<th style="text-align:center;padding:8px 4px;color:var(--dim);font-size:11px">AS</th>
<th style="text-align:right;padding:8px 4px;color:var(--dim);font-size:11px">평균km</th>
</tr>`;
html+=sE.map((e,i)=>{const s=es[e];
return `<tr style="border-bottom:1px solid var(--border)">
<td style="padding:10px 4px;font-weight:700;color:${cl[i%10]}">${e}</td>
<td style="text-align:center;padding:10px 4px;font-weight:700">${s.workDays}일</td>
<td style="text-align:center;padding:10px 4px;font-weight:700">${s.double}일</td>
<td style="text-align:center;padding:10px 4px;font-weight:700">${s.as}건</td>
<td style="text-align:right;padding:10px 4px;font-weight:700">${s.avgKm}km</td>
</tr>`}).join('');
html+=`</table></div></div>`;

// 배정 우선순위 (공정성 점수 시각화)
const fScores={};
const aWd=E.reduce((s,e)=>s+es[e].workDays,0)/Math.max(E.length,1);
const aDb=E.reduce((s,e)=>s+es[e].double,0)/Math.max(E.length,1);
const aKm2=E.reduce((s,e)=>s+es[e].km,0)/Math.max(E.length,1);
E.forEach(e=>{
  fScores[e]=Math.round(((es[e].workDays-aWd)*3+(es[e].double-aDb)*8+((es[e].km-aKm2)/20))*10)/10;
});
const sortedByPriority=[...E].sort((a,b)=>fScores[a]-fScores[b]);
const minFS=Math.min(...E.map(e=>fScores[e]));
const maxFS=Math.max(...E.map(e=>fScores[e]),1);
const fsRange=Math.max(maxFS-minFS,1);

html+=`<div class="fcard"><div class="sec">🎯 다음 배정 우선순위</div>`;
html+=`<p style="font-size:11px;color:var(--dim);margin-bottom:12px">점수가 낮을수록 다음 배정에서 우선 (근무일·두탕·거리 기준)</p>`;
html+=sortedByPriority.map((e,rank)=>{
  const ci=E.indexOf(e);
  const score=fScores[e];
  const w=Math.round(((score-minFS)/fsRange)*100);
  const isFirst=rank===0;
  const badge=isFirst?'<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(48,209,88,.15);color:var(--green);font-weight:700;margin-left:6px">우선</span>':'';
  return `<div class="frow">
  <span class="fname" style="color:${cl[ci%10]}">${rank+1}. ${e}${badge}</span>
  <div class="fbar"><div class="ffill" style="width:${Math.max(w,5)}%;background:${score<=0?'var(--green)':'var(--yellow)'}">${score>0?'+':''}${score}</div></div>
  <span class="fval">${score>0?'+':''}${score}점</span>
  </div>`}).join('');
html+=`<div style="font-size:10px;color:var(--dim);margin-top:10px;text-align:center">자동배정 시 이 순위가 거리·건수와 함께 반영돼요</div>`;
html+=`</div>`;

document.getElementById('fairView').innerHTML=html}

// ===== 차량배정 =====
function renderCars(){
const el=document.getElementById('carView');
if(!el)return;
const empColors=['var(--blue)','var(--green)','var(--yellow)','var(--pink)','var(--purple)','var(--orange)','var(--cyan)','var(--lime)','var(--rose)','var(--teal)'];
const plates=Object.keys(VEHICLES);

let html=`<div style="padding:8px 0">
<div style="font-size:16px;font-weight:800;margin-bottom:4px">🚗 차량 배정</div>
<div style="font-size:12px;color:var(--dim);margin-bottom:16px">차량별 탑승 직원을 배정하면 알림톡에 차량번호가 자동 포함돼요</div>`;

// 등록된 차량 목록
plates.forEach((plate,i)=>{
  const driver=VEHICLES[plate]||'';
  const di=E.indexOf(driver);
  const ec=di>=0?empColors[di%10]:'var(--dim)';
  const opts=E.map(n=>`<option value="${n}"${n===driver?' selected':''}>${n}</option>`).join('');
  html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:6px;background:var(--card2);border-radius:10px;border-left:3px solid ${ec}">
    <span style="font-weight:700;font-size:14px;min-width:90px;color:var(--text)">${plate}</span>
    <select id="drv_${i}" onchange="updateDriver(${i})" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text)">
      <option value="">미배정</option>${opts}
    </select>
    <button onclick="deleteCar(${i})" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--red);font-size:12px;cursor:pointer;font-family:var(--font)">삭제</button>
  </div>`;
});

// 새 차량 추가
html+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;margin-top:12px;background:var(--card2);border-radius:10px;border:1.5px dashed var(--border)">
  <input id="newPlate" placeholder="차량번호 입력" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text)">
  <button onclick="addCar()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap">+ 추가</button>
</div>`;

// 현황 요약
const assigned=plates.filter(p=>VEHICLES[p]);
const noDriver=plates.filter(p=>!VEHICLES[p]);
const noCarDrivers=E.filter(n=>!plates.some(p=>VEHICLES[p]===n));
html+=`<div style="margin-top:16px;padding:12px;background:var(--card2);border-radius:10px;border:1px solid var(--border)">
<div style="font-size:13px;font-weight:700;margin-bottom:8px">📋 현황</div>`;
if(assigned.length) html+=assigned.map(p=>`<div style="font-size:12px;padding:3px 0">✅ ${p} → <span style="font-weight:600">${VEHICLES[p]}</span></div>`).join('');
if(noCarDrivers.length) html+=`<div style="margin-top:6px">`+noCarDrivers.map(n=>`<div style="font-size:12px;padding:3px 0;color:var(--red)">❌ ${n}: 차량 미배정</div>`).join('')+`</div>`;
html+=`</div></div>`;

el.innerHTML=html;
}

function addCar(){
  if(!isAdmin){toast('🔒 당번 모드에서만 가능합니다','error');return;}
  const plate=document.getElementById('newPlate').value.trim();
  if(!plate){toast('차량번호를 입력하세요','ok');return;}
  if(VEHICLES[plate]!==undefined){toast('이미 등록된 차량이에요','ok');return;}
  const next={...VEHICLES};
  next[plate]='';
  fbSave('vehicles',next);
  toast(plate+' 추가!','ok');
}

function updateDriver(idx){
  if(!isAdmin){toast('🔒 당번 모드에서만 가능합니다','error');renderCars();return;}
  const plates=Object.keys(VEHICLES);
  const plate=plates[idx];
  const driver=document.getElementById('drv_'+idx).value;
  const next={...VEHICLES};
  next[plate]=driver;
  fbSave('vehicles',next);
  syncToSheet();renderSched();
  toast(plate+' → '+(driver||'미배정'),'ok');
}

function quickVehicle(sasu,plate,rows){
  if(!isAdmin){toast('🔒 당번 모드에서만 가능합니다','error');return;}
  if(rows&&rows.length){
    // 잠긴 건 체크
    var lockedRows=[];

// ===== 연차 자동 집계 (명단/배정과 무관, 표시 전용) =====
const ANNUAL_AUTO_START='2026-04-01'; // 휴무 데이터 시작일. 이전은 시트 J열(기존사용).
function monthRequiredOff(y,m){ // 소정휴일수(토일+공휴일,중복제거). m:0-based
  const lastDay=new Date(y,m+1,0).getDate();
  const startDow=new Date(y,m,1).getDay();
  const off=new Set();
  for(let d=1;d<=lastDay;d++){const dow=(startDow+d-1)%7;if(dow===0||dow===6)off.add(d)}
  getMonthHolidays(y,m).forEach(h=>off.add(h.date));
  return off.size;
}
function monthPureOff(emp,y,m){ // 순수휴무일수(예비군/교육/출장/훈련=DUTY 제외)
  const lastDay=new Date(y,m+1,0).getDate();
  const ym=y+'-'+String(m+1).padStart(2,'0');
  let c=0;
  for(let d=1;d<=lastDay;d++){
    const ds=ym+'-'+String(d).padStart(2,'0');
    if(OFFS[ds]&&OFFS[ds].has(emp)){ if(DUTY[ds]&&DUTY[ds][emp])continue; c++; }
  }
  return c;
}
function calcAnnualUsed(emp){ // 4/1~오늘 월별(순수휴무-소정휴일) 양수만 누적
  if(!emp)return 0;
  const start=new Date(ANNUAL_AUTO_START);
  const today=new Date();
  let total=0, y=start.getFullYear(), m=start.getMonth();
  while(y<today.getFullYear()||(y===today.getFullYear()&&m<=today.getMonth())){
    const ex=monthPureOff(emp,y,m)-monthRequiredOff(y,m);
    if(ex>0)total+=ex;
    m++; if(m>11){m=0;y++}
  }
  return total;
}

document.getElementById('confirmOkBtn').style.display='block';
pendingConfirmId=jobId;
}

function doConfirm(){
if(!pendingConfirmId)return;
const job=J.find(j=>j.id===pendingConfirmId);
const now=new Date();
const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
const team=A[pendingConfirmId]||[];
// 자재 정보 해시 저장 (나중에 변경 감지용)
const matHash=job?job.mat.map(m=>m.t+m.q).join(','):'';
CF[pendingConfirmId]={who:team.join('+'),time:hm,ts:Date.now(),matHash};
fbSave('confirms',CF);
closeConfirm();
toast('✅ 출발 확인 완료!','ok');
renderAll();
}

function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');pendingConfirmId=''}

// 1분마다 구글시트 자동 갱신
setInterval(()=>refreshSheet(false),180*1000);

// 5분마다 새 버전 체크
setInterval(()=>{
fetch(location.href+'?_='+Date.now()).then(r=>r.text()).then(html=>{
const m=html.match(/const VER='([^']+)'/);
if(m&&m[1]!==VER)document.getElementById('updateBar').style.display='block'
}).catch(()=>{})
},5*60*1000);
</script>
