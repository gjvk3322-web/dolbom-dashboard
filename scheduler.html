<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>돌봄매트 시공 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a25;
    --card: #16161f;
    --border: rgba(255,255,255,.06);
    --text: #e8e8f0;
    --text2: #8888a0;
    --blue: #5b8def;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --pink: #f472b6;
    --purple: #a78bfa;
    --orange: #fb923c;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-tap-highlight-color:transparent; }

/* Header */
.header { background:var(--bg2); border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; z-index:100; }
.header h1 { font-size:17px; font-weight:700; letter-spacing:-.5px; }
.header p { font-size:11px; color:var(--text2); margin-top:2px; }

/* Tabs */
.tabs { display:flex; gap:0; background:var(--bg2); border-bottom:1px solid var(--border); overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab { flex:1; min-width:80px; padding:12px 8px; text-align:center; font-size:12px; font-weight:500; color:var(--text2); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; font-family:var(--font); }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); }

/* Content */
.content { display:none; padding:12px; }
.content.active { display:block; }

/* Cards */
.job-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
.job-card.assigned { border-left:3px solid var(--green); }
.job-card.unassigned { border-left:3px solid var(--yellow); }
.job-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.job-date { font-size:13px; font-weight:700; color:var(--blue); }
.job-time { font-size:11px; padding:3px 8px; border-radius:6px; font-weight:600; }
.job-time.am { background:rgba(251,191,36,.15); color:var(--yellow); }
.job-time.pm { background:rgba(168,85,247,.15); color:var(--purple); }
.job-info { font-size:12px; color:var(--text2); line-height:1.8; }
.job-info span { color:var(--text); font-weight:500; }
.job-info .material { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-left:4px; }
.job-info .material.marble { background:rgba(91,141,239,.15); color:var(--blue); }
.job-info .material.cotton { background:rgba(52,211,153,.15); color:var(--green); }
.job-info .material.modern { background:rgba(248,113,113,.15); color:var(--red); }

/* Assign section */
.assign-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.assign-btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-family:var(--font); transition:all .15s; }
.assign-btn:active { transform:scale(.95); }
.assign-btn.selected { background:var(--green); color:#000; border-color:var(--green); }
.assign-btn.off { background:rgba(248,113,113,.1); color:var(--red); border-color:rgba(248,113,113,.3); text-decoration:line-through; opacity:.5; pointer-events:none; }
.assigned-name { display:inline-block; padding:4px 12px; border-radius:8px; font-size:13px; font-weight:700; background:rgba(52,211,153,.15); color:var(--green); }
.unassign-btn { margin-left:6px; padding:4px 10px; border-radius:6px; font-size:11px; background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.2); cursor:pointer; font-family:var(--font); }

/* Employee management */
.emp-list { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
.emp-chip { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:10px; font-size:13px; font-weight:600; }
.emp-remove { width:20px; height:20px; border-radius:50%; background:rgba(248,113,113,.2); color:var(--red); border:none; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:var(--font); }
.add-row { display:flex; gap:8px; margin-top:12px; }
.add-row input { flex:1; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:10px; font-size:14px; font-family:var(--font); outline:none; }
.add-row input:focus { border-color:var(--blue); }
.add-row button { padding:10px 20px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font); }

/* Sheet URL */
.url-section { margin-bottom:16px; }
.url-input { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:10px; font-size:12px; font-family:var(--font); outline:none; }
.url-input:focus { border-color:var(--blue); }
.load-btn { width:100%; margin-top:8px; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:var(--font); }
.load-btn:active { transform:scale(.98); }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.stat-num { font-size:22px; font-weight:900; }
.stat-label { font-size:10px; color:var(--text2); margin-top:2px; }

/* Week nav */
.week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.week-nav button { padding:8px 16px; background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:13px; cursor:pointer; font-family:var(--font); }
.week-nav span { font-size:14px; font-weight:700; }

/* Filter */
.filter-row { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
.filter-btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:500; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-family:var(--font); white-space:nowrap; }
.filter-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }

/* Workload */
.workload { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
.wl-row { display:flex; align-items:center; gap:10px; margin:8px 0; }
.wl-name { min-width:50px; font-size:13px; font-weight:600; }
.wl-bar { flex:1; height:20px; background:var(--bg3); border-radius:6px; overflow:hidden; }
.wl-fill { height:100%; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; min-width:24px; }
.wl-count { min-width:30px; text-align:right; font-size:12px; font-family:monospace; }

.section-title { font-size:15px; font-weight:700; margin-bottom:12px; }
.empty-msg { text-align:center; padding:30px; color:var(--text2); font-size:13px; }

/* Colors for employees */
.ec0 { background:rgba(91,141,239,.15); color:var(--blue); }
.ec1 { background:rgba(52,211,153,.15); color:var(--green); }
.ec2 { background:rgba(251,191,36,.15); color:var(--yellow); }
.ec3 { background:rgba(244,114,182,.15); color:var(--pink); }
.ec4 { background:rgba(167,139,250,.15); color:var(--purple); }
.ec5 { background:rgba(251,146,60,.15); color:var(--orange); }

.efc0 { background:var(--blue); color:#fff; }
.efc1 { background:var(--green); color:#000; }
.efc2 { background:var(--yellow); color:#000; }
.efc3 { background:var(--pink); color:#fff; }
.efc4 { background:var(--purple); color:#fff; }
.efc5 { background:var(--orange); color:#000; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:#000; padding:10px 24px; border-radius:10px; font-size:13px; font-weight:700; z-index:999; display:none; }
</style>
</head>
<body>

<div class="header">
    <h1>🔧 돌봄매트 시공 스케줄러</h1>
    <p id="headerSub">시공 예약을 직원에게 쉽게 배정하세요</p>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('schedule')">📋 배정</div>
    <div class="tab" onclick="switchTab('workload')">📊 업무량</div>
    <div class="tab" onclick="switchTab('employees')">👷 직원</div>
    <div class="tab" onclick="switchTab('settings')">⚙️ 설정</div>
</div>

<!-- 배정 탭 -->
<div class="content active" id="t-schedule">
    <div class="stats" id="stats"></div>
    <div class="filter-row" id="filterRow"></div>
    <div id="jobList"></div>
</div>

<!-- 업무량 탭 -->
<div class="content" id="t-workload">
    <div class="section-title">📊 이번 주 직원별 업무량</div>
    <div id="workloadChart"></div>
    <div class="section-title" style="margin-top:20px">📅 날짜별 시공 현황</div>
    <div id="dailyChart"></div>
</div>

<!-- 직원 탭 -->
<div class="content" id="t-employees">
    <div class="section-title">👷 직원 관리</div>
    <div class="emp-list" id="empList"></div>
    <div class="add-row">
        <input type="text" id="newEmpName" placeholder="새 직원 이름">
        <button onclick="addEmployee()">추가</button>
    </div>
</div>

<!-- 설정 탭 -->
<div class="content" id="t-settings">
    <div class="section-title">🔗 구글시트 연결</div>
    <div class="url-section">
        <input type="text" class="url-input" id="sheetUrl" placeholder="구글시트 CSV URL 붙여넣기">
        <button class="load-btn" onclick="loadFromSheet()">📥 데이터 불러오기</button>
    </div>
    <div style="margin-top:16px;font-size:12px;color:var(--text2);line-height:1.8">
        <b>설정 방법:</b><br>
        1. 구글시트 → 파일 → 공유 → 웹에 게시<br>
        2. CSV 선택 → 게시<br>
        3. 나오는 URL을 위에 붙여넣기<br>
        4. "데이터 불러오기" 클릭
    </div>
    <div style="margin-top:20px">
        <button class="load-btn" style="background:var(--red)" onclick="resetAll()">🗑 전체 초기화</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 데이터 =====
let employees = JSON.parse(localStorage.getItem('db_employees') || '["준형","윤철","세욱"]');
let assignments = JSON.parse(localStorage.getItem('db_assignments') || '{}');
let jobs = JSON.parse(localStorage.getItem('db_jobs') || '[]');
let sheetUrl = localStorage.getItem('db_sheetUrl') || '';
let currentFilter = 'all';

function save() {
    localStorage.setItem('db_employees', JSON.stringify(employees));
    localStorage.setItem('db_assignments', JSON.stringify(assignments));
    localStorage.setItem('db_jobs', JSON.stringify(jobs));
    localStorage.setItem('db_sheetUrl', sheetUrl);
}

// ===== 구글시트 로드 =====
async function loadFromSheet() {
    const url = document.getElementById('sheetUrl').value.trim();
    if (!url) { showToast('URL을 입력하세요'); return; }
    
    sheetUrl = url;
    save();
    
    try {
        showToast('불러오는 중...');
        const r = await fetch(url);
        const text = await r.text();
        parseCSV(text);
        showToast('✅ ' + jobs.length + '건 불러옴!');
        switchTab('schedule');
    } catch(e) {
        showToast('❌ 불러오기 실패');
    }
}

function parseCSV(text) {
    const lines = text.split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    if (lines.length < 2) return;
    
    jobs = [];
    for (let i = 1; i < lines.length; i++) {
        const row = lines[i];
        if (!row[0] || !row[2]) continue;
        
        const time = row[0]; // 오전/오후
        const region = row[1]; // 영업지역
        const dateRaw = row[2]; // 20260101
        const apt = row[3]; // 아파트
        const pyeong = row[4]; // 평수
        const scope = row[5]; // 시공범위
        
        // 휴무 직원 (G~K = index 6~10)
        const dayOff = [];
        for (let j = 6; j <= 10; j++) {
            if (row[j] && row[j].trim()) dayOff.push(row[j].trim());
        }
        
        // 자재 (M=12, N=13, O=14)
        const materials = [];
        if (row[12] && parseInt(row[12]) > 0) materials.push({type:'마블', qty:parseInt(row[12])});
        if (row[13] && parseInt(row[13]) > 0) materials.push({type:'코튼', qty:parseInt(row[13])});
        if (row[14] && parseInt(row[14]) > 0) materials.push({type:'모던', qty:parseInt(row[14])});
        
        // 날짜 포맷
        let dateStr = dateRaw;
        if (dateRaw.length === 8) {
            dateStr = dateRaw.slice(0,4) + '-' + dateRaw.slice(4,6) + '-' + dateRaw.slice(6,8);
        }
        
        const jobId = dateStr + '_' + time + '_' + i;
        
        jobs.push({
            id: jobId,
            time, region, date: dateStr, apt, pyeong, scope,
            dayOff, materials
        });
    }
    save();
}

// ===== 탭 전환 =====
function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.getElementById('t-' + name).classList.add('active');
    
    const tabNames = ['schedule','workload','employees','settings'];
    document.querySelectorAll('.tab')[tabNames.indexOf(name)].classList.add('active');
    
    if (name === 'schedule') renderSchedule();
    if (name === 'workload') renderWorkload();
    if (name === 'employees') renderEmployees();
    if (name === 'settings') document.getElementById('sheetUrl').value = sheetUrl;
}

// ===== 배정 화면 =====
function renderSchedule() {
    // Stats
    const total = jobs.length;
    const assigned = jobs.filter(j => assignments[j.id]).length;
    const unassigned = total - assigned;
    
    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${total}</div><div class="stat-label">전체</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--green)">${assigned}</div><div class="stat-label">배정완료</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--yellow)">${unassigned}</div><div class="stat-label">미배정</div></div>
    `;
    
    // Filter buttons
    const dates = [...new Set(jobs.map(j => j.date))].sort();
    let filterHtml = '<div class="filter-btn ' + (currentFilter==='all'?'active':'') + '" onclick="setFilter(\'all\')">전체</div>';
    filterHtml += '<div class="filter-btn ' + (currentFilter==='unassigned'?'active':'') + '" onclick="setFilter(\'unassigned\')">미배정</div>';
    dates.forEach(d => {
        const short = d.slice(5); // MM-DD
        const dow = ['일','월','화','수','목','금','토'][new Date(d).getDay()];
        filterHtml += `<div class="filter-btn ${currentFilter===d?'active':''}" onclick="setFilter('${d}')">${short}(${dow})</div>`;
    });
    document.getElementById('filterRow').innerHTML = filterHtml;
    
    // Job list
    let filtered = [...jobs];
    if (currentFilter === 'unassigned') filtered = filtered.filter(j => !assignments[j.id]);
    else if (currentFilter !== 'all') filtered = filtered.filter(j => j.date === currentFilter);
    
    filtered.sort((a,b) => a.date.localeCompare(b.date) || (a.time==='오전'?0:1) - (b.time==='오전'?0:1));
    
    if (!filtered.length) {
        document.getElementById('jobList').innerHTML = '<div class="empty-msg">표시할 시공 건이 없습니다.<br>⚙️ 설정에서 구글시트를 연결하세요.</div>';
        return;
    }
    
    document.getElementById('jobList').innerHTML = filtered.map(job => {
        const isAssigned = !!assignments[job.id];
        const assignedTo = assignments[job.id] || '';
        const dow = ['일','월','화','수','목','금','토'][new Date(job.date).getDay()];
        
        const matHtml = job.materials.map(m => {
            const cls = m.type==='마블'?'marble':m.type==='코튼'?'cotton':'modern';
            return `<span class="material ${cls}">${m.type} ${m.qty}</span>`;
        }).join('');
        
        let assignHtml = '';
        if (isAssigned) {
            const ei = employees.indexOf(assignedTo) % 6;
            assignHtml = `<div class="assign-row">
                <span class="assigned-name efc${ei}">${assignedTo}</span>
                <button class="unassign-btn" onclick="unassign('${job.id}')">취소</button>
            </div>`;
        } else {
            const btns = employees.map((emp, ei) => {
                const isOff = job.dayOff.includes(emp);
                const cls = isOff ? 'off' : '';
                return `<button class="assign-btn ${cls}" onclick="assign('${job.id}','${emp}')">${emp}${isOff?' (휴무)':''}</button>`;
            }).join('');
            assignHtml = `<div class="assign-row">${btns}</div>`;
        }
        
        return `<div class="job-card ${isAssigned?'assigned':'unassigned'}">
            <div class="job-header">
                <span class="job-date">${job.date.slice(5)} (${dow})</span>
                <span class="job-time ${job.time==='오전'?'am':'pm'}">${job.time}</span>
            </div>
            <div class="job-info">
                📍 <span>${job.region}</span> · ${job.apt} · <span>${job.pyeong}평</span><br>
                🔧 ${job.scope} ${matHtml}
            </div>
            ${assignHtml}
        </div>`;
    }).join('');
}

function setFilter(f) {
    currentFilter = f;
    renderSchedule();
}

function assign(jobId, emp) {
    // 같은 날 같은 시간대에 이미 배정된 건이 있는지 체크
    const job = jobs.find(j => j.id === jobId);
    const conflict = jobs.find(j => 
        j.id !== jobId && 
        j.date === job.date && 
        j.time === job.time && 
        assignments[j.id] === emp
    );
    
    if (conflict) {
        if (!confirm(`${emp}님이 같은 날 ${job.time}에 이미 배정되어 있어요. 그래도 배정할까요?`)) return;
    }
    
    assignments[jobId] = emp;
    save();
    renderSchedule();
    showToast(`✅ ${emp} 배정 완료`);
}

function unassign(jobId) {
    delete assignments[jobId];
    save();
    renderSchedule();
    showToast('배정 취소됨');
}

// ===== 업무량 =====
function renderWorkload() {
    const empCount = {};
    employees.forEach(e => empCount[e] = {am:0, pm:0, total:0});
    
    jobs.forEach(j => {
        const emp = assignments[j.id];
        if (emp && empCount[emp] !== undefined) {
            empCount[emp].total++;
            if (j.time === '오전') empCount[emp].am++;
            else empCount[emp].pm++;
        }
    });
    
    const maxTotal = Math.max(...Object.values(empCount).map(v => v.total), 1);
    
    document.getElementById('workloadChart').innerHTML = employees.map((emp, i) => {
        const c = empCount[emp];
        const w = Math.round(c.total / maxTotal * 100);
        return `<div class="workload">
            <div class="wl-row">
                <span class="wl-name">${emp}</span>
                <div class="wl-bar">
                    <div class="wl-fill efc${i%6}" style="width:${Math.max(w,8)}%">${c.total}</div>
                </div>
                <span class="wl-count">${c.am}+${c.pm}</span>
            </div>
            <div style="font-size:11px;color:var(--text2);padding-left:60px">오전 ${c.am}건 · 오후 ${c.pm}건</div>
        </div>`;
    }).join('');
    
    // 날짜별
    const dateCount = {};
    jobs.forEach(j => {
        if (!dateCount[j.date]) dateCount[j.date] = {total:0, assigned:0};
        dateCount[j.date].total++;
        if (assignments[j.id]) dateCount[j.date].assigned++;
    });
    
    const dates = Object.keys(dateCount).sort();
    document.getElementById('dailyChart').innerHTML = dates.map(d => {
        const c = dateCount[d];
        const dow = ['일','월','화','수','목','금','토'][new Date(d).getDay()];
        const pct = Math.round(c.assigned / c.total * 100);
        return `<div class="workload">
            <div class="wl-row">
                <span class="wl-name" style="min-width:80px">${d.slice(5)}(${dow})</span>
                <div class="wl-bar">
                    <div class="wl-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}">${c.assigned}/${c.total}</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ===== 직원 관리 =====
function renderEmployees() {
    document.getElementById('empList').innerHTML = employees.map((emp, i) => {
        return `<div class="emp-chip ec${i%6}">
            ${emp}
            <button class="emp-remove" onclick="removeEmployee('${emp}')">×</button>
        </div>`;
    }).join('');
}

function addEmployee() {
    const input = document.getElementById('newEmpName');
    const name = input.value.trim();
    if (!name) return;
    if (employees.includes(name)) { showToast('이미 있는 직원입니다'); return; }
    employees.push(name);
    input.value = '';
    save();
    renderEmployees();
    showToast(`${name} 추가 완료`);
}

function removeEmployee(name) {
    if (!confirm(`${name}님을 삭제할까요?`)) return;
    employees = employees.filter(e => e !== name);
    // 배정된 것도 삭제
    Object.keys(assignments).forEach(k => {
        if (assignments[k] === name) delete assignments[k];
    });
    save();
    renderEmployees();
    showToast(`${name} 삭제됨`);
}

// ===== 유틸 =====
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

function resetAll() {
    if (!confirm('모든 데이터를 초기화할까요?')) return;
    localStorage.removeItem('db_employees');
    localStorage.removeItem('db_assignments');
    localStorage.removeItem('db_jobs');
    localStorage.removeItem('db_sheetUrl');
    location.reload();
}

// ===== Init =====
if (sheetUrl) document.getElementById('sheetUrl').value = sheetUrl;
renderSchedule();
</script>
</body>
